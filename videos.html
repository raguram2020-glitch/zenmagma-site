<style>
/* ── Hero ── */
.videos-hero {
  padding: 52px 32px 40px;
  text-align: center;
  background: linear-gradient(135deg, rgba(108,92,231,.12), rgba(139,124,246,.06));
}
.videos-hero-icon { font-size: 60px; display: block; margin-bottom: 14px; }
.videos-hero h1 {
  font-family: var(--font-title, 'Nunito', sans-serif);
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 900;
  color: var(--c-text);
  margin-bottom: 10px;
}
.videos-hero p {
  font-size: 16px;
  color: var(--c-muted);
  max-width: 560px;
  margin: 0 auto 24px;
  line-height: 1.6;
}
.videos-hero-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 26px;
}
.yt-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 800;
  text-decoration: none;
  transition: transform .15s ease, box-shadow .15s ease;
  box-shadow: var(--shadow-card);
}
.yt-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
.yt-btn.yt-subscribe { background: #ff0000; color: #fff; }
.yt-btn.ig-follow { background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5); color: #fff; }
.videos-hero-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
}
.vh-stat-val {
  font-family: var(--font-game, 'Nunito', sans-serif);
  font-size: 24px;
  font-weight: 900;
  color: var(--c-text);
}
.vh-stat-label {
  font-size: 11px;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 3px;
}

/* ── Grid wrapper ── */
.videos-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}
.videos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}
.video-card {
  background: var(--c-card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow-card);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  cursor: pointer;
  text-align: left;
  display: block;
}
.video-card:hover {
  transform: translateY(-3px);
  border-color: var(--c-border-h);
  box-shadow: var(--shadow-card-hover);
}
.video-thumb {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: var(--c-card-h);
}
.video-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .3s ease;
}
.video-card:hover .video-thumb img { transform: scale(1.06); }
.video-play-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.5) 0%, rgba(0,0,0,.05) 55%, transparent 100%);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: var(--trans);
}
.video-card:hover .video-play-overlay { opacity: 1; }
.video-play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: #ff0000;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
  box-shadow: 0 4px 16px rgba(20,20,40,.35);
  transform: scale(.6); opacity: 0;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.video-card:hover .video-play-btn { transform: scale(1); opacity: 1; }
.video-info { padding: 12px 14px; }
.video-title {
  font-weight: 800; font-size: 14px; margin-bottom: 6px;
  color: var(--c-text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.35; min-height: 38px;
}
.video-meta {
  font-size: 12px; color: var(--c-muted);
  display: flex; align-items: center; gap: 6px;
}

/* ── Video modal ── */
#video-modal {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(10,10,20,.88);
  display: none; align-items: center; justify-content: center;
  padding: 40px 20px;
}
#video-modal.open { display: flex; }
.video-modal-inner {
  width: 100%; max-width: 920px;
}
.video-modal-frame-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  border-radius: 14px; overflow: hidden; background: #000;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.video-modal-frame-wrap iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
}
.video-modal-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-top: 14px;
}
.video-modal-title { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.4; }
.video-modal-close {
  flex-shrink: 0;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  font-size: 16px; cursor: pointer;
  transition: background .2s;
}
.video-modal-close:hover { background: rgba(255,255,255,.22); }

@media (max-width: 600px) {
  .videos-hero { padding: 40px 20px 32px; }
  .videos-wrap { padding: 24px 16px 60px; }
}

<body>

<!-- ── HEADER (injected) ── -->

<!-- ── HERO ── -->

  <p>Original stories about letting go, inner strength, and finding meaning in everyday moments — from our YouTube channel, <strong>ZenMagma_WisdomNest</strong>. New story every week.</p>
  <div class="videos-hero-actions">
    <a class="yt-btn yt-subscribe" href="https://www.youtube.com/@zenmagma_wisdomnest?sub_confirmation=1" target="_blank" rel="noopener">▶️ Subscribe on YouTube</a>
    <a class="yt-btn ig-follow" href="https://www.instagram.com/zenmagma_official/" target="_blank" rel="noopener">📸 Follow on Instagram</a>

    </div>

</div>

<!-- ── FOOTER ── -->
<div id="zm-footer"></div>

<!-- ── VIDEO MODAL ── -->
<div id="video-modal" role="dialog" aria-modal="true" aria-label="Play video">
  <div class="video-modal-inner">
    <div class="video-modal-frame-wrap">
      <iframe id="video-modal-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen title="Video"></iframe>
    </div>
    <div class="video-modal-bar">
      <div class="video-modal-title" id="video-modal-title"></div>
      <button class="video-modal-close" onclick="closeVideoModal()" aria-label="Close">✕</button>
    </div>
  </div>
</div>

<!-- ── SCRIPTS ── -->
<script src="js/videos-data.js"></script>
<script src="js/page-shared.js"></script>

<script>
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('videos-grid');
  const countEl = document.getElementById('video-count');
  if (!grid || typeof VIDEOS === 'undefined') return;

  countEl.textContent = VIDEOS.length;

  grid.innerHTML = VIDEOS.map((v, i) => `
    <a class="video-card"
       href="${escapeHtml(v.url)}" target="_blank" rel="noopener"
       data-video-id="${escapeHtml(v.id)}">
      <div class="video-thumb">
        <img src="${escapeHtml(v.thumb)}" alt="${escapeHtml(v.title)}" loading="lazy" onerror="this.style.display='none'">
        <div class="video-play-overlay"><div class="video-play-btn">▶</div></div>
      </div>
      <div class="video-info">
        <div class="video-title">${escapeHtml(v.title)}</div>
        <div class="video-meta">📅 ${formatDate(v.publishedAt)}</div>
      </div>
    </a>
  `).join('');

  grid.addEventListener('click', e => {
    const card = e.target.closest('.video-card');
    if (!card) return;
    const video = VIDEOS.find(v => v.id === card.dataset.videoId);
    if (!video) return;
    openVideoModal(e, video.id, video.title);
  });
});

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function openVideoModal(evt, id, title) {
  evt.preventDefault();
  const modal = document.getElementById('video-modal');
  const frame = document.getElementById('video-modal-frame');
  const titleEl = document.getElementById('video-modal-title');
  frame.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  titleEl.textContent = title;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  return false;
}

function closeVideoModal() {
  const modal = document.getElementById('video-modal');
  const frame = document.getElementById('video-modal-frame');
  modal.classList.remove('open');
  frame.src = 'about:blank';
  document.body.style.overflow = '';
}

document.getElementById('video-modal').addEventListener('click', e => {
  if (e.target.id === 'video-modal') closeVideoModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeVideoModal();
});
</script>

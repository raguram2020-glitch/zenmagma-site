<script>
const CAT_ID = 'runner';
let _games = [], _sort = 'popular';
document.addEventListener('DOMContentLoaded', () => {
  if (typeof GAMES === 'undefined') return;
  _games = GAMES.filter(g => g.category === CAT_ID || g.tags?.includes(CAT_ID));
  document.getElementById('cat-count').textContent = _games.length;
  renderCatGrid();
});
function sortGames(by, btn) {
  _sort = by;
  document.querySelectorAll('.cat-sort-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  renderCatGrid();
}
function renderCatGrid() {
  const grid = document.getElementById('cat-grid'), noGames = document.getElementById('no-games');
  if (!grid) return;
  const sorted = [..._games].sort((a, b) => {
    if (_sort === 'rating') return b.rating - a.rating;
    if (_sort === 'new')    return (b.isNew?1:0) - (a.isNew?1:0);
    if (_sort === 'az')     return a.title.localeCompare(b.title);
    return b.plays - a.plays;
  });
  if (!sorted.length) { grid.innerHTML = ''; if (noGames) noGames.style.display = 'block'; return; }
  if (noGames) noGames.style.display = 'none';
  grid.innerHTML = sorted.map((g, i) => {
    const delay = Math.min(i * 35, 350);
    const thumb = g.thumb
      ? `<img src="${g.thumb}" alt="${g.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`
      : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${g.color}dd,${g.color}55);display:flex;align-items:center;justify-content:center;font-size:48px">${g.emoji}</div>`;
    return `
      <a class="game-card will-reveal" href="../game.html?id=${g.slug}" style="animation-delay:${delay}ms" title="${g.title}">
        <div class="card-thumb" style="background:${g.color}33">
          ${thumb}
          <div class="card-overlay"><div class="card-play-label">▶ Play Now</div></div>
          <div class="card-badges">
            ${g.isExternal?'<span class="badge gd">🌐 Live</span>':''}
            ${g.isNew?'<span class="badge new">✨ New</span>':''}
            ${g.trending?'<span class="badge hot">🔥 Hot</span>':''}
          </div>
          <div class="card-players"><span class="dot"></span>${fakePlayerCount(g.id)} online</div>
        </div>
        <div class="card-info">
          <div class="card-title">${g.title}</div>
          <div class="card-meta">
            <span class="card-cat-badge">Runner</span>
            <span class="card-rating">⭐ ${g.rating}</span>
          </div>
          <div class="card-plays-row"><span class="live-dot"></span>${formatPlays(g.plays)} plays</div>
        </div>
      </a>`;
  }).join('');
}
function fakePlayerCount(id) {
  let h = 0;
  for (const c of (id||'x')) h = ((h<<5)-h)+c.charCodeAt(0);
  return (Math.abs(h)%900+100).toLocaleString();
}

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Bubble Wrap - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000a14;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a8edea,#fed6e3);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #a8edea}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#a8edea,#fed6e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Popped:<b id="pp"> 0</b></span><span class="hv">Time:<b id="tm"> 30</b>s</span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="420" height="380" style="cursor:pointer"></canvas>
<div id="done" style="font-size:1.3em;padding:8px;height:36px"></div></div>
<div id="ov"><div id="ob"><h2>Bubble Wrap</h2><p>Pop as many bubbles as you can before the timer runs out! Popping is satisfying! Try to pop them all!</p><button class="btn" onclick="go()">POP!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=420,H=380;
const COLS=12,ROWS=10,BR=16;
let bubbles=[],popped=0,score=0,timeLeft=30,timer,running=false;
function init(){bubbles=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)bubbles.push({x:20+c*34,y:20+r*35,r:BR,popped:false,hue:Math.floor(Math.random()*360)});}
function draw(){
  ctx.fillStyle="#000a14";ctx.fillRect(0,0,W,H);
  bubbles.forEach(b=>{if(b.popped){ctx.strokeStyle="rgba(200,200,255,.2)";ctx.lineWidth=1;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();return;}ctx.fillStyle=`hsla(${b.hue},70%,75%,.8)`;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,255,255,.5)";ctx.beginPath();ctx.ellipse(b.x-5,b.y-5,6,4,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle="rgba(255,255,255,.3)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();});
}
cv.addEventListener("click",e=>{if(!running)return;const mx=e.offsetX,my=e.offsetY;bubbles.forEach(b=>{if(!b.popped&&Math.hypot(b.x-mx,b.y-my)<b.r+3){b.popped=true;popped++;score+=5;document.getElementById("pp").textContent=popped;document.getElementById("sc").textContent=score;}});draw();if(bubbles.every(b=>b.popped)){clearInterval(timer);document.getElementById("done").innerHTML='<span style="color:#2ecc71">ALL POPPED! 🎉 +500 bonus!</span>';score+=500;document.getElementById("sc").textContent=score;}});
cv.addEventListener("mousemove",e=>{if(!running||!mouseDown)return;const mx=e.offsetX,my=e.offsetY;bubbles.forEach(b=>{if(!b.popped&&Math.hypot(b.x-mx,b.y-my)<b.r){b.popped=true;popped++;score+=5;document.getElementById("pp").textContent=popped;document.getElementById("sc").textContent=score;}});draw();});
let mouseDown=false;cv.addEventListener("mousedown",()=>mouseDown=true);cv.addEventListener("mouseup",()=>mouseDown=false);
cv.addEventListener("touchmove",e=>{e.preventDefault();const r=cv.getBoundingClientRect(),t=e.touches[0],mx=t.clientX-r.left,my=t.clientY-r.top;bubbles.forEach(b=>{if(!b.popped&&Math.hypot(b.x-mx,b.y-my)<b.r+5){b.popped=true;popped++;score+=5;document.getElementById("pp").textContent=popped;document.getElementById("sc").textContent=score;}});draw();},{passive:false});
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;setTimeout(()=>alert("Time up! Popped "+popped+" bubbles! Score: "+score),200);}else timeLeft--;}
function go(){document.getElementById("ov").style.display="none";running=true;init();draw();timer=setInterval(tick,1000);}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script></body></html>

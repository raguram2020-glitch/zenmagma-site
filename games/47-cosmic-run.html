<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cosmic Run</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='cr_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120,MAX_LIVES=3,OBS_DELAY=180;
const stars=Array.from({length:150},()=>({x:Math.random(),y:Math.random()*0.75,s:Math.random()*2.5+0.5,twk:Math.random()*Math.PI*2}));
const planets=[{x:0.8,y:0.2,r:40,c:'#9933cc',ring:true},{x:0.15,y:0.12,r:22,c:'#cc6600',ring:false}];
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT,lives,obsDelay;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
let jetPuffs=[];
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;lives=MAX_LIVES;obsDelay=OBS_DELAY;obs=[];coll=[];parts=[];pups=[];ftxts=[];jetPuffs=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
function doJump(){if(py>=GY-2){vy=JV;for(let i=0;i<8;i++)jetPuffs.push({x:W*0.22-10,y:py,vx:-(Math.random()*2+1),vy:(Math.random()-0.5)*2,life:25,s:Math.random()*6+3});}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-1)*5,life:35,col,s:Math.random()*4+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=60;w=45;oy=GY-h;}else if(t==='tall'){h=105;w=40;oy=GY-h;}else{h=16;w=130;oy=GY-78;}obs.push({x:W+60,y:oy,w,h,type:t});}
function spawnCoin(x){coll.push({x,y:GY-45-Math.random()*75,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
// Draw astronaut
function drawPlayer(x,y,sl){
  const bob=Math.sin(fr*0.18)*2.5;
  if(!sl){
    // Jetpack
    cx.fillStyle='#888';cx.fillRect(x-22,y-38+bob,10,24);
    cx.fillStyle='#555';cx.fillRect(x-20,y-36+bob,6,20);
    // Body suit (white)
    cx.fillStyle='#e0e0e0';
    cx.beginPath();cx.ellipse(x,y-22+bob,14,22,0,0,Math.PI*2);cx.fill();
    // Helmet
    cx.fillStyle='#ddd';cx.beginPath();cx.arc(x,y-46+bob,16,0,Math.PI*2);cx.fill();
    // Visor (cyan)
    cx.fillStyle='#00ccff';cx.beginPath();cx.arc(x,y-46+bob,11,0.3,Math.PI-0.3);cx.closePath();cx.fill();
    // Helmet glare
    cx.fillStyle='rgba(255,255,255,0.6)';cx.beginPath();cx.ellipse(x-4,y-50+bob,4,3,0,0,Math.PI*2);cx.fill();
    // Legs
    const lg=Math.sin(fr*0.25)*8;
    cx.fillStyle='#bbb';cx.fillRect(x-10,y,8,18-lg);cx.fillRect(x+2,y,8,18+lg);
    cx.fillStyle='#888';cx.fillRect(x-12,y+14-lg,12,6);cx.fillRect(x,y+14+lg,12,6);
    // Arms
    const ar=Math.sin(fr*0.25)*5;
    cx.fillStyle='#bbb';cx.fillRect(x-22,y-30+bob+ar,8,14);cx.fillRect(x+14,y-30+bob-ar,8,14);
  }else{
    // Sliding
    cx.fillStyle='#888';cx.fillRect(x-28,y-12,12,10);
    cx.fillStyle='#e0e0e0';cx.fillRect(x-14,y-12,36,14);
    cx.fillStyle='#ddd';cx.beginPath();cx.arc(x+6,y-16,14,0,Math.PI*2);cx.fill();
    cx.fillStyle='#00ccff';cx.beginPath();cx.arc(x+6,y-16,9,0.3,Math.PI-0.3);cx.closePath();cx.fill();
    cx.fillStyle='#bbb';cx.fillRect(x+20,y-4,16,8);cx.fillRect(x+28,y+4,14,6);
  }
}
function drawObs(o){
  if(o.type==='short'){
    // Meteor
    cx.fillStyle='#554433';cx.beginPath();cx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0.3,0,Math.PI*2);cx.fill();
    cx.fillStyle='#332211';cx.beginPath();cx.ellipse(o.x+o.w/2-4,o.y+o.h/2-4,o.w/4,o.h/4,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#aa6644';cx.beginPath();cx.ellipse(o.x+o.w/2+4,o.y+o.h/2+2,6,4,0.5,0,Math.PI*2);cx.fill();
  }else if(o.type==='tall'){
    // Energy barrier
    cx.fillStyle='rgba(0,255,255,0.15)';cx.fillRect(o.x,o.y,o.w,o.h);
    for(let i=0;i<o.h;i+=12){
      const alpha=0.5+Math.sin(fr*0.2+i*0.3)*0.4;
      cx.strokeStyle=`rgba(0,255,255,${alpha})`;cx.lineWidth=2;
      cx.beginPath();cx.moveTo(o.x,o.y+i);cx.lineTo(o.x+o.w,o.y+i);cx.stroke();
    }
    cx.fillStyle='#00ffff';cx.fillRect(o.x,o.y,o.w,4);cx.fillRect(o.x,o.y+o.h-4,o.w,4);
    cx.fillRect(o.x,o.y,4,o.h);cx.fillRect(o.x+o.w-4,o.y,4,o.h);
    // Sparks
    for(let i=0;i<3;i++){const sx=o.x+Math.random()*o.w,sy=o.y+Math.random()*o.h;cx.fillStyle='#fff';cx.fillRect(sx,sy,2,2);}
  }else{
    // Space debris low bar
    cx.fillStyle='rgba(180,80,0,0.8)';cx.fillRect(o.x,o.y,o.w,o.h);
    cx.fillStyle='#ff4400';cx.fillRect(o.x,o.y,o.w,3);
    cx.fillStyle='rgba(255,100,0,0.4)';cx.fillRect(o.x,o.y,o.w,o.h);
    for(let i=0;i<o.w;i+=20){cx.fillStyle='#ff6600';cx.beginPath();cx.ellipse(o.x+i+10,o.y+9,6,4,0,0,Math.PI*2);cx.fill();}
  }
}
function drawCoin(c){
  // Gold star orb
  const r=10+Math.sin(c.a*0.15)*2;
  cx.fillStyle='rgba(255,200,0,0.3)';cx.beginPath();cx.arc(c.x,c.y,r+4,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ffcc00';cx.beginPath();cx.arc(c.x,c.y,r,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(c.x-3,c.y-3,r/3,0,Math.PI*2);cx.fill();
  // Star shape overlay
  cx.strokeStyle='#ffaa00';cx.lineWidth=1;
  for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;cx.beginPath();cx.moveTo(c.x,c.y);cx.lineTo(c.x+Math.cos(a)*r,c.y+Math.sin(a)*r);cx.stroke();}
}
function drawBG(){
  // Deep space gradient
  const grad=cx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#000005');grad.addColorStop(0.5,'#0a0020');grad.addColorStop(1,'#0d1a0d');
  cx.fillStyle=grad;cx.fillRect(0,0,W,H);
  // Nebula clouds
  cx.fillStyle='rgba(80,0,120,0.08)';cx.beginPath();cx.ellipse(W*0.6,H*0.3,200,100,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(0,50,120,0.07)';cx.beginPath();cx.ellipse(W*0.3,H*0.2,150,80,0,0,Math.PI*2);cx.fill();
  // Stars
  stars.forEach(s=>{
    const twink=0.5+0.5*Math.sin(fr*0.03+s.twk);
    cx.fillStyle=`rgba(255,255,255,${twink})`;
    cx.beginPath();cx.arc(s.x*W,s.y*H,s.s,0,Math.PI*2);cx.fill();
  });
  // Planets
  planets.forEach(p=>{
    cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);cx.fill();
    if(p.ring){cx.strokeStyle='rgba(200,150,50,0.6)';cx.lineWidth=4;cx.beginPath();cx.ellipse(p.x*W,p.y*H,p.r+20,p.r*0.3,0.3,0,Math.PI*2);cx.stroke();}
    cx.fillStyle='rgba(0,0,0,0.2)';cx.beginPath();cx.arc(p.x*W+p.r*0.2,p.y*H-p.r*0.1,p.r*0.7,0,Math.PI*2);cx.fill();
  });
  // Ground - alien rock
  cx.fillStyle='#2a2a2a';cx.fillRect(0,GY,W,H-GY);
  // Glowing cracks
  cx.strokeStyle='rgba(0,200,100,0.4)';cx.lineWidth=1.5;
  for(let i=0;i<8;i++){const gx=(bgOff*1.5+i*150)%W;cx.beginPath();cx.moveTo(gx,GY);cx.lineTo(gx+30,GY+20);cx.lineTo(gx+50,GY+5);cx.stroke();}
  cx.fillStyle='#1a1a1a';cx.fillRect(0,GY,W,6);
  cx.fillStyle='rgba(0,200,100,0.3)';cx.fillRect(0,GY,W,3);
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';cx.strokeStyle=col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,12+Math.sin(p.a*0.1)*3,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(0,0,0,0.5)';cx.fill();cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t[0].toUpperCase(),p.x,p.y+4);cx.textAlign='left';}
function drawHUD(){
  cx.fillStyle='rgba(0,0,20,0.7)';cx.fillRect(0,0,W,44);
  cx.font='bold 14px monospace';
  cx.fillStyle='#00ffff';cx.fillText('SCORE: '+sc,16,28);
  cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);
  cx.fillStyle='#ffcc00';cx.fillText('COINS: '+coins,W*0.5,28);
  cx.fillStyle='#cc88ff';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);
  // Lives as hearts
  cx.font='18px monospace';
  for(let i=0;i<MAX_LIVES;i++){cx.fillStyle=i<lives?'#ff4466':'#444';cx.fillText('❤',W-20-i*26,28);}
  if(shield){cx.fillStyle='#00aaff';cx.font='bold 12px monospace';cx.fillText('SHIELD',W*0.88,28);}
  if(mag){cx.fillStyle='#ff88ff';cx.font='bold 12px monospace';cx.fillText('MAGNET',W*0.88,28);}
}
function drawStart(){
  drawBG();
  cx.fillStyle='rgba(0,0,20,0.6)';cx.fillRect(W/2-240,H*0.28,480,H*0.55);
  cx.fillStyle='#00ffff';cx.font='bold 52px monospace';cx.textAlign='center';cx.fillText('COSMIC RUN',W/2,H*0.38);
  cx.fillStyle='#cc88ff';cx.font='20px monospace';cx.fillText('SPACE RUNNER',W/2,H*0.47);
  cx.fillStyle='#88ff88';cx.font='16px monospace';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#0033aa';cx.fillRect(W/2-80,H*0.65,160,44);cx.fillStyle='#00ffff';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.65+28);
  if(best>0){cx.fillStyle='#ffcc00';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){cx.fillStyle='rgba(0,0,20,0.82)';cx.fillRect(0,0,W,H);cx.fillStyle='#ff4444';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);cx.fillStyle='#ffcc00';cx.fillText('BEST:  '+best,W/2,H*0.54);cx.fillStyle='#0033aa';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#00ffff';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);cx.textAlign='left';}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(obsDelay>0){obsDelay--;} else if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});parts=parts.filter(p=>p.life>0);
  jetPuffs.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});jetPuffs=jetPuffs.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?50:28,ph=sliding?16:62,phY=sliding?py-16:py-62;
  if(!dead&&!inv){
    for(let o of obs){if(hit(PX-pw/2,phY,pw,ph,o)){if(shield){shield=false;inv=true;invT=90;spawnP(PX,py-30,'#00ffff',15);addFT(PX,py-60,'SHIELD!','#00ffff');}else{lives--;spawnP(PX,py-30,'#ff4444',15);if(lives<=0){dead=true;if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},900);}else{inv=true;invT=120;obs=[];addFT(PX,py-60,'❤ '+lives+' LEFT!','#ff4466');}}break;}}
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-30)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffcc00');spawnP(c.x,c.y,'#ffcc00',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-30)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  // Jet puffs
  jetPuffs.forEach(p=>{cx.globalAlpha=p.life/25*0.6;cx.fillStyle='rgba(100,200,255,0.8)';cx.beginPath();cx.arc(p.x,p.y,p.s,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
  parts.forEach(p=>{cx.globalAlpha=p.life/35;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.s/2,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.strokeStyle='rgba(0,200,255,0.5)';cx.lineWidth=3;cx.beginPath();cx.arc(W*0.22,py-30,40,0,Math.PI*2);cx.stroke();}
    drawPlayer(W*0.22,py,sliding);
  }
  for(let o of obs){if(o.x-W*0.22<320&&o.x-W*0.22>60){cx.font='bold 16px monospace';cx.textAlign='center';if(o.type==='short'){cx.fillStyle='#88ff88';cx.fillText('JUMP ↑',W*0.22,GY-95);}else{cx.fillStyle='#ffaa44';cx.fillText('SLIDE ↓',W*0.22,GY-95);}cx.textAlign='left';}}
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(0,0,30,0.6)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){update();if(state==='start')drawStart();else if(state==='over'){draw();drawOver();}else draw();requestAnimationFrame(loop);}
init();loop();
</script>
</body>
</html>

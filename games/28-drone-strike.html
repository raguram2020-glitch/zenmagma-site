<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000510;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00f5d4,#00bbf9);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #00f5d4}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#00f5d4,#00bbf9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Missiles:<b id="ms"> 3</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="480" height="480"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Move drone: arrow keys | Click to fire intercept missile</p>
<div id="ov"><div id="ob"><h2>Drone Strike</h2><p>Intercept enemy missiles before they hit the ground! Move your drone and fire at incoming threats.</p><button class="btn" onclick="go()">Launch!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=480;
const skyBg=new Image();skyBg.src='../assets/game-art/drone-strike/sky.jpg';
let drone,missiles,intercepts,explosions,score,level,missileHp,frame,running;
const keys={};
function init(){drone={x:W/2,y:100,r:16,spd:5};missiles=[];intercepts=[];explosions=[];score=0;level=1;missileHp=3;frame=0;}
function spawnMissile(){const x=20+Math.random()*(W-40);missiles.push({x,y:-20,r:8,dy:1.5+level*.3,tx:20+Math.random()*(W-40),angle:0});}
document.addEventListener("keydown",e=>keys[e.key]=true);document.addEventListener("keyup",e=>keys[e.key]=false);
cv.addEventListener("click",e=>{if(!running||missileHp<=0)return;intercepts.push({x:drone.x,y:drone.y,dx:(e.offsetX-drone.x)/20,dy:(e.offsetY-drone.y)/20});missileHp--;document.getElementById("ms").textContent=missileHp;});
function update(){
  frame++;
  if(keys["ArrowLeft"])drone.x=Math.max(drone.r,drone.x-drone.spd);
  if(keys["ArrowRight"])drone.x=Math.min(W-drone.r,drone.x+drone.spd);
  if(keys["ArrowUp"])drone.y=Math.max(drone.r,drone.y-drone.spd);
  if(keys["ArrowDown"])drone.y=Math.min(H*.7,drone.y+drone.spd);
  if(frame%Math.max(20,60-level*5)===0)spawnMissile();
  if(missileHp<5&&frame%120===0){missileHp++;document.getElementById("ms").textContent=missileHp;}
  intercepts=intercepts.filter(ic=>{ic.x+=ic.dx;ic.y+=ic.dy;let hit=false;missiles=missiles.filter(m=>{if(Math.hypot(ic.x-m.x,ic.y-m.y)<m.r+8){hit=true;explosions.push({x:m.x,y:m.y,r:30,life:20});score+=10*level;document.getElementById("sc").textContent=score;if(window.GameFX)GameFX.burst(cv,m.x,m.y,{count:14,colors:['#f39c12','#e74c3c','#00f5d4'],spread:2.5,life:0.4});return false;}return true;});return !hit&&ic.x>0&&ic.x<W&&ic.y>0&&ic.y<H;});
  missiles=missiles.filter(m=>{m.y+=m.dy;const a=Math.atan2(m.tx-m.x,1);m.x+=Math.sin(a)*.5;if(m.y>H-20){explosions.push({x:m.x,y:H-20,r:40,life:30});score=Math.max(0,score-50);document.getElementById("sc").textContent=score;return false;}return true;});
  explosions=explosions.filter(e=>{e.r+=2;e.life--;return e.life>0;});
  if(score>level*200){level++;document.getElementById("lv").textContent=level;}
}
function draw(){
  if(window.GameFX)GameFX.fxImage(ctx,skyBg,()=>{ctx.fillStyle="#000510";ctx.fillRect(0,0,W,H);},0,0,W,H);
  else{ctx.fillStyle="#000510";ctx.fillRect(0,0,W,H);}
  for(let i=0;i<60;i++){ctx.fillStyle="rgba(255,255,255,.2)";ctx.fillRect((i*137)%W,(i*97)%H,1,1);}
  ctx.fillStyle="#0a2a0a";ctx.fillRect(0,H-20,W,20);
  ctx.fillStyle="#0f0f0f";for(let i=0;i<W;i+=50){ctx.fillRect(i,H-20,30,20);}
  missiles.forEach(m=>{ctx.fillStyle="#e74c3c";ctx.save();ctx.translate(m.x,m.y);ctx.rotate(Math.atan2(1,0));ctx.fillRect(-4,-12,8,24);ctx.fillStyle="#f39c12";ctx.beginPath();ctx.moveTo(-4,12);ctx.lineTo(4,12);ctx.lineTo(0,20);ctx.closePath();ctx.fill();ctx.restore();});
  intercepts.forEach(ic=>{ctx.fillStyle="#00f5d4";ctx.beginPath();ctx.arc(ic.x,ic.y,5,0,Math.PI*2);ctx.fill();});
  explosions.forEach(e=>{ctx.globalAlpha=(e.life/30);ctx.fillStyle=`rgba(255,120,0,0.5)`;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
  ctx.fillStyle="#00bbf9";ctx.save();ctx.translate(drone.x,drone.y);ctx.fillRect(-20,-6,40,12);ctx.fillRect(-5,-12,10,24);ctx.fillStyle="#00f5d4";[[-18,-4],[18,-4],[-18,4],[18,4]].forEach(([x,y])=>{ctx.fillRect(x-8,y-2,16,4);});ctx.restore();
}
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script>    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body></html>

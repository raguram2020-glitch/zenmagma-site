<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pirate Cannon - ZenMagma</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000814;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#c9a84c,#8B4513);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #c9a84c}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#c9a84c,#8B4513);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Cannonballs:<b id="cb"> 10</b></span><span class="hv">Wind:<b id="wd"> 0</b></span><button class="btn" onclick="ng()">New Voyage</button></div>
<canvas id="c" width="500" height="440"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Drag to aim, release to fire! Account for wind and arc.</p>
<div id="ov"><div id="ob"><h2>Pirate Cannon</h2><p>Aim your cannon and fire at enemy ships sailing past! Account for wind and distance to get the perfect shot!</p><button class="btn" onclick="go()">Fire!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=500,H=440;
let ships,ball,score,cannonballs,wind,angle,frame,dragging,running;
function init(){ships=[];ball=null;score=0;cannonballs=10;wind=(Math.random()-.5)*0.15;angle=Math.PI/4;frame=0;dragging=false;document.getElementById("wd").textContent=(wind>0?"+":"")+wind.toFixed(2);}
function spawnShip(){ships.push({x:Math.random()<0.5?-80:W+80,y:H*.3+Math.random()*80,spd:(Math.random()*.5+0.5)*(Math.random()<0.5?1:-1),hp:2,maxHp:2,w:70,h:30});}
let startX,startY,curX=0,curY=0;
cv.addEventListener("mousemove",e=>{curX=e.offsetX;curY=e.offsetY;});
cv.addEventListener("mousedown",e=>{dragging=true;startX=e.offsetX;startY=e.offsetY;});
cv.addEventListener("mouseup",e=>{
  if(!running||!dragging||ball)return;dragging=false;
  const dx=startX-e.offsetX,dy=startY-e.offsetY;
  const power=Math.min(Math.hypot(dx,dy),150)/150;
  const a=Math.atan2(-dy,-dx);
  ball={x:60,y:H-60,dx:Math.cos(a)*12*power,dy:Math.sin(a)*12*power,r:8};
  cannonballs--;document.getElementById("cb").textContent=cannonballs;
});
function update(){
  frame++;if(frame%120===0)spawnShip();
  ships=ships.filter(s=>{s.x+=s.spd;return s.x>-100&&s.x<W+100;});
  if(ball){ball.x+=ball.dx;ball.dy+=0.2;ball.dx+=wind;ball.y+=ball.dy;let hit=false;ships=ships.filter(s=>{if(!hit&&ball.x>s.x-s.w/2&&ball.x<s.x+s.w/2&&ball.y>s.y-s.h/2&&ball.y<s.y+s.h/2){s.hp--;score+=50*(3-s.hp);document.getElementById("sc").textContent=score;hit=true;return s.hp>0;}return true;});if(hit||ball.y>H||ball.x<0||ball.x>W)ball=null;if(!ball&&cannonballs<=0)setTimeout(()=>window._showMod("No cannonballs! Score: "+score),200);}
}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#001428");g.addColorStop(.7,"#00294d");g.addColorStop(1,"#00bcd4");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Waves
  ctx.strokeStyle="rgba(0,188,212,.3)";ctx.lineWidth=2;for(let i=0;i<5;i++){ctx.beginPath();for(let x=0;x<W;x+=5){ctx.lineTo(x,H*.6+Math.sin((x+frame*.5+i*40)*.05)*8+i*15);}ctx.stroke();}
  // Cannon island
  ctx.fillStyle="#8B4513";ctx.beginPath();ctx.arc(60,H-30,40,0,Math.PI*2);ctx.fill();ctx.fillStyle="#c9a84c";ctx.save();ctx.translate(60,H-60);ctx.rotate(-Math.PI/4);ctx.fillRect(0,-8,50,16);ctx.restore();
  ships.forEach(s=>{ctx.fillStyle="#8B4513";ctx.fillRect(s.x-s.w/2,s.y-s.h/2,s.w,s.h);ctx.fillStyle="#f5f5dc";ctx.fillRect(s.x-4,s.y-s.h/2-30,8,30);ctx.beginPath();ctx.moveTo(s.x-4,s.y-s.h/2-30);ctx.lineTo(s.x+20,s.y-s.h/2-15);ctx.lineTo(s.x-4,s.y-s.h/2);ctx.fill();ctx.fillStyle="#333";ctx.fillRect(s.x-s.w/2,s.y+s.h/2-5,s.w*(s.hp/s.maxHp),5);});
  if(ball){ctx.fillStyle="#555";ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();}
  // Trajectory preview during drag
  if(dragging&&!ball&&cannonballs>0){
    const dx=startX-curX,dy=startY-curY;
    const power=Math.min(Math.hypot(dx,dy),150)/150;
    const a=Math.atan2(-dy,-dx);
    let px=60,py=H-60,vx=Math.cos(a)*12*power,vy=Math.sin(a)*12*power;
    ctx.strokeStyle="rgba(201,168,76,.5)";ctx.lineWidth=2;ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(px,py);
    for(let i=0;i<40&&px>=0&&px<=W&&py<=H;i++){px+=vx;vy+=0.2;vx+=wind;py+=vy;ctx.lineTo(px,py);}
    ctx.stroke();ctx.setLineDash([]);
    // Power meter
    ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(10,H-50,100,10);ctx.fillStyle=power>0.7?"#e74c3c":power>0.4?"#f39c12":"#2ecc71";ctx.fillRect(10,H-50,100*power,10);
    // Wind arrow
    const wx=W/2,wy=H-90,wlen=wind*300;ctx.strokeStyle="#00bcd4";ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+wlen,wy);ctx.stroke();ctx.fillStyle="#00bcd4";ctx.beginPath();ctx.moveTo(wx+wlen+(wind>0?6:-6),wy);ctx.lineTo(wx+wlen-(wind>0?4:-4),wy-4);ctx.lineTo(wx+wlen-(wind>0?4:-4),wy+4);ctx.closePath();ctx.fill();
    ctx.fillStyle="#00bcd4";ctx.font="12px sans-serif";ctx.textAlign="center";ctx.fillText("Wind",wx,wy-8);
  }
}
function go(){document.getElementById("ov").style.display="none";running=true;spawnShip();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){init();if(running)running=false;setTimeout(go,100);}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none'" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
</body></html>

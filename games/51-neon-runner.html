<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}
body{touch-action:none;user-select:none;-webkit-user-select:none}

#touch-btns button{pointer-events:all;width:110px;height:72px;font-size:18px;font-weight:bold;font-family:monospace;border:3px solid rgba(255,255,255,0.5);border-radius:14px;background:rgba(0,0,0,0.55);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<canvas id="c"></canvas>
<div id="touch-btns">
  <button id="btn-jump">⬆️ JUMP</button>
  <button id="btn-slide">⬇️ SLIDE</button>
</div>
<script>
const BG=new Image(); BG.src='../assets/backgrounds/neon-runner-bg.jpg';
const MOOD_LABELS=['CYBER CITY','VIRUS ALERT','DEEP SCAN','OVERDRIVE'];
const MOOD_OVERLAYS=['rgba(0,255,255,0.04)','rgba(255,0,50,0.3)','rgba(0,50,255,0.3)','rgba(255,100,0,0.22)'];
let moodIdx=0,moodFade=0,moodChanging=false,moodText='',moodTextT=0;
function triggerMood(n){moodIdx=n%MOOD_LABELS.length;moodFade=0;moodChanging=true;moodText=MOOD_LABELS[moodIdx];moodTextT=120;}
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='nr_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120,MAX_LIVES=5;
// Neon signs
const signs=[{x:0.7,y:0.2,txt:'CYBER',col:'#ff0080'},{x:0.45,y:0.12,txt:'NEON',col:'#00ffff'},{x:0.2,y:0.18,txt:'CITY',col:'#ff0080'}];
// Rain
const rain=Array.from({length:80},()=>({x:Math.random(),y:Math.random(),len:0.02+Math.random()*0.03,speed:0.015+Math.random()*0.01}));
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT,lives;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;lives=MAX_LIVES;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');moodIdx=0;moodFade=0;moodChanging=false;moodText='';moodTextT=0;}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
// ── Touch controls ───────────────────────────────────────────────────────────
let _ty0=null;
function _onTouchStart(e){
  e.preventDefault();
  _ty0=e.changedTouches[0].clientY;
  if(state==='start'||state==='over'){startGame();}
}
function _onTouchEnd(e){
  e.preventDefault();
  if(_ty0===null)return;
  const dy=e.changedTouches[0].clientY-_ty0;
  _ty0=null;
  if(state==='start'||state==='over'){return;}
  if(state==='play'){if(dy>40)doSlide();else doJump();}
}
document.addEventListener('touchstart',_onTouchStart,{passive:false});
document.addEventListener('touchend',_onTouchEnd,{passive:false});
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doJump();else startGame();},{passive:false});
document.getElementById('btn-slide').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doSlide();else startGame();},{passive:false});
document.getElementById('btn-jump').addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();},{passive:false});
document.getElementById('btn-slide').addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();},{passive:false});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#00ffff',6);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-1)*4,life:30,col,s:Math.random()*4+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=40;w=28;oy=GY-h;}else if(t==='tall'){h=70;w=32;oy=GY-h;}else{h=12;w=90;oy=GY-78;}obs.push({x:W+60,y:oy,w,h,type:t});}
function spawnCoin(x){coll.push({x,y:GY-42-Math.random()*80,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function neonGlow(col,blur,fn){cx.shadowBlur=blur;cx.shadowColor=col;fn();cx.shadowBlur=0;}
function drawPlayer(x,y,sl){
  const t=cx,bob=Math.sin(fr*0.2)*2,pulse=0.6+Math.sin(fr*0.15)*0.4;
  t.save(); t.translate(Math.floor(x),Math.floor(y));
  // Neon body glow
  const glow=t.createRadialGradient(0,-30+bob,2,0,-30+bob,28);
  glow.addColorStop(0,`rgba(0,255,180,${pulse*0.3})`); glow.addColorStop(1,'rgba(0,255,180,0)');
  t.fillStyle=glow; t.fillRect(-30,-62+bob,60,70);
  if(sl){
    t.fillStyle='#111'; t.fillRect(-22,-10,44,12);
    t.fillStyle=`rgba(0,255,180,${pulse})`; t.fillRect(-22,-10,44,3);
    t.fillStyle='#0f0f0f'; t.beginPath(); t.arc(12,-5,10,0,Math.PI*2); t.fill();
    t.fillStyle=`rgba(0,255,180,0.8)`; t.beginPath(); t.arc(12,-5,7,0.3,Math.PI-0.3); t.stroke();
  } else {
    const lk=Math.sin(fr*0.25)*12;
    // Legs - black bodysuit
    t.fillStyle='#0a0a0a';
    t.save(); t.rotate(lk*0.04); t.fillRect(-9,0+bob,9,22); t.restore();
    t.save(); t.rotate(-lk*0.04); t.fillRect(2,0+bob,9,22); t.restore();
    // Neon leg stripes
    t.fillStyle=`rgba(0,255,180,${pulse})`; t.fillRect(-9,8+bob,3,6); t.fillRect(2,14+bob,3,6);
    // Boots
    t.fillStyle='#1a1a1a'; t.fillRect(-11,20+bob,12,8); t.fillRect(1,20+bob,12,8);
    t.fillStyle=`rgba(0,255,180,0.8)`; t.fillRect(-11,26+bob,12,2); t.fillRect(1,26+bob,12,2);
    // Body armor
    t.fillStyle='#111'; t.fillRect(-14,-40+bob,28,42);
    t.fillStyle='#1a1a1a'; t.fillRect(-12,-38+bob,24,38);
    // Neon chest lines
    t.fillStyle=`rgba(0,255,180,${pulse})`;
    t.fillRect(-10,-30+bob,20,2); t.fillRect(-10,-22+bob,20,2); t.fillRect(-6,-14+bob,12,2);
    // Arms
    t.fillStyle='#111';
    t.save(); t.rotate(-lk*0.04); t.fillRect(-24,-38+bob,10,24); t.restore();
    t.save(); t.rotate(lk*0.04); t.fillRect(14,-38+bob,10,24); t.restore();
    // Arm neon lines
    t.fillStyle=`rgba(0,255,180,${pulse})`; t.fillRect(-24,-24+bob,10,2); t.fillRect(14,-28+bob,10,2);
    // Head / mask
    t.fillStyle='#0a0a0a'; t.fillRect(-12,-58+bob,24,20);
    // Visor glow
    t.fillStyle=`rgba(0,255,180,${pulse})`; t.fillRect(-10,-54+bob,20,6);
    t.fillStyle='rgba(0,255,180,0.3)'; t.fillRect(-10,-54+bob,20,6);
    // Head wrap
    t.fillStyle='#0f0f0f'; t.beginPath(); t.arc(0,-62+bob,10,Math.PI,0); t.fill();
    // Energy sword hint
    t.strokeStyle=`rgba(0,255,180,${pulse})`; t.lineWidth=3;
    t.beginPath(); t.moveTo(18,-44+bob); t.lineTo(28,-56+bob); t.stroke();
    t.lineWidth=1; t.strokeStyle=`rgba(180,255,255,${pulse*0.5})`;
    t.beginPath(); t.moveTo(18,-44+bob); t.lineTo(28,-56+bob); t.stroke();
  }
  t.restore();
}
function drawObs(o){
  if(o.type==='short'){
    // Neon security drone
    const cx2=cx,mx=o.x+o.w/2,my=o.y+o.h/2;
    const spin=fr*0.08;
    neonGlow('#00ffff',14,()=>{
      // Spinning rings
      cx2.strokeStyle='rgba(0,255,220,0.7)';cx2.lineWidth=2;
      cx2.save();cx2.translate(mx,my);cx2.rotate(spin);
      cx2.beginPath();cx2.ellipse(0,0,o.w*0.7,o.h*0.3,0,0,Math.PI*2);cx2.stroke();
      cx2.rotate(Math.PI/2);
      cx2.beginPath();cx2.ellipse(0,0,o.w*0.7,o.h*0.3,0,0,Math.PI*2);cx2.stroke();
      cx2.restore();
    });
    // Dark body
    cx2.fillStyle='#111';cx2.beginPath();cx2.arc(mx,my,o.w*0.38,0,Math.PI*2);cx2.fill();
    cx2.fillStyle='#1a1a1a';cx2.beginPath();cx2.arc(mx,my,o.w*0.28,0,Math.PI*2);cx2.fill();
    // Red eye
    neonGlow('#ff2200',18,()=>{
      cx2.fillStyle='#ff3300';cx2.beginPath();cx2.arc(mx,my,5,0,Math.PI*2);cx2.fill();
      cx2.fillStyle='#ff8866';cx2.beginPath();cx2.arc(mx-1,my-1,2,0,Math.PI*2);cx2.fill();
    });
  }else if(o.type==='tall'){
    // Holographic wall panel
    neonGlow('#8800ff',16,()=>{
      // Semi-transparent purple/blue panel
      cx.fillStyle='rgba(80,0,160,0.35)';cx.fillRect(o.x,o.y,o.w,o.h);
      cx.strokeStyle='#aa44ff';cx.lineWidth=2;cx.strokeRect(o.x,o.y,o.w,o.h);
      // Grid lines
      cx.strokeStyle='rgba(100,0,255,0.4)';cx.lineWidth=1;
      for(let gy=o.y;gy<o.y+o.h;gy+=12){cx.beginPath();cx.moveTo(o.x,gy);cx.lineTo(o.x+o.w,gy);cx.stroke();}
      for(let gx=o.x;gx<o.x+o.w;gx+=10){cx.beginPath();cx.moveTo(gx,o.y);cx.lineTo(gx,o.y+o.h);cx.stroke();}
      // Scan line
      const sl2=(fr*2)%o.h;
      cx.fillStyle='rgba(180,100,255,0.3)';cx.fillRect(o.x,o.y+sl2,o.w,4);
      cx.strokeStyle='#cc88ff';cx.lineWidth=1.5;cx.strokeRect(o.x,o.y,o.w,o.h);
    });
  }else{
    // Electric floor trap
    const pulse=0.5+Math.sin(fr*0.3)*0.5;
    neonGlow('#ffaa00',16,()=>{
      // Base bar
      cx.fillStyle='rgba(40,20,0,0.9)';cx.fillRect(o.x,o.y,o.w,o.h);
      cx.strokeStyle='#ff8800';cx.lineWidth=2;cx.strokeRect(o.x,o.y,o.w,o.h);
      // Lightning path
      cx.strokeStyle=`rgba(255,220,0,${pulse})`;cx.lineWidth=2;
      cx.beginPath();cx.moveTo(o.x,o.y+o.h/2);
      for(let lx=o.x+8;lx<o.x+o.w;lx+=8){
        const jag=o.y+(Math.sin(fr*0.5+lx*0.3)>0?2:-2)+o.h/2;
        cx.lineTo(lx,jag);
      }
      cx.lineTo(o.x+o.w,o.y+o.h/2);cx.stroke();
      // Spark nodes
      for(let i=0;i<o.w;i+=22){
        cx.fillStyle=`rgba(255,255,100,${pulse})`;
        cx.beginPath();cx.arc(o.x+i,o.y+o.h/2,3,0,Math.PI*2);cx.fill();
      }
    });
  }
}
function drawCoin(c){
  const pulse=Math.sin(c.a*0.15)*3;
  neonGlow('#00ffff',20,()=>{
    cx.strokeStyle='#00ffff';cx.lineWidth=2;
    cx.beginPath();cx.arc(c.x,c.y,10+pulse,0,Math.PI*2);cx.stroke();
    cx.beginPath();cx.arc(c.x,c.y,7+pulse,0,Math.PI*2);cx.stroke();
  });
  cx.fillStyle='rgba(0,255,255,0.2)';cx.beginPath();cx.arc(c.x,c.y,10+pulse,0,Math.PI*2);cx.fill();
}
function drawBG(){
  cx.drawImage(BG,0,0,W,H);
  cx.fillStyle=MOOD_OVERLAYS[moodIdx];cx.fillRect(0,0,W,H);
  if(moodTextT>0){cx.globalAlpha=Math.min(1,moodTextT/20);cx.fillStyle='rgba(10,0,30,0.75)';cx.fillRect(W/2-160,H*0.18-28,320,46);cx.fillStyle='#ff00ff';cx.font='bold 26px monospace';cx.textAlign='center';cx.fillText('⚡ '+moodText,W/2,H*0.18+8);cx.textAlign='left';cx.globalAlpha=1;}
  cx.fillStyle='rgba(10,0,20,0.45)'; cx.fillRect(0,GY,W,H-GY);
  // Neon grid floor
  cx.strokeStyle='rgba(0,255,255,0.12)';cx.lineWidth=1;
  const gs=40;
  for(let gx2=(bgOff*2)%gs-gs;gx2<W;gx2+=gs){cx.beginPath();cx.moveTo(gx2,GY);cx.lineTo(gx2,H);cx.stroke();}
  for(let gy2=GY;gy2<H;gy2+=gs){cx.beginPath();cx.moveTo(0,gy2);cx.lineTo(W,gy2);cx.stroke();}
  // Buildings bg
  for(let i=0;i<8;i++){const bx=((i*160+bgOff*0.5)%W+W)%W;const bh=80+i*25;cx.fillStyle='#0a0018';cx.fillRect(bx,GY-bh,80,bh);cx.strokeStyle='rgba(255,0,128,0.3)';cx.lineWidth=1;cx.strokeRect(bx,GY-bh,80,bh);}
  // Neon signs
  signs.forEach(s=>{
    const sx=((s.x-bgOff*0.0004)%1.1)*W;
    neonGlow(s.col,15,()=>{cx.fillStyle=s.col;cx.font='bold 18px monospace';cx.textAlign='center';cx.fillText(s.txt,sx,s.y*H);cx.textAlign='left';});
  });
  // Ground
  cx.fillStyle='#111';cx.fillRect(0,GY,W,H-GY);
  // Glowing grid on ground
  cx.strokeStyle='rgba(255,0,128,0.3)';cx.lineWidth=1.5;
  for(let gx2=(bgOff*3)%gs-gs;gx2<W;gx2+=gs){cx.beginPath();cx.moveTo(gx2,GY);cx.lineTo(gx2,H);cx.stroke();}
  for(let gy2=GY;gy2<H;gy2+=gs){cx.beginPath();cx.moveTo(0,gy2);cx.lineTo(W,gy2);cx.stroke();}
  neonGlow('#00ffff',10,()=>{cx.fillStyle='#00ffff';cx.fillRect(0,GY,W,3);});
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';neonGlow(col,12,()=>{cx.strokeStyle=col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,12+Math.sin(p.a*0.1)*3,0,Math.PI*2);cx.stroke();});cx.fillStyle='rgba(0,0,0,0.5)';cx.beginPath();cx.arc(p.x,p.y,14,0,Math.PI*2);cx.fill();cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t[0].toUpperCase(),p.x,p.y+4);cx.textAlign='left';}
function drawHUD(){cx.fillStyle='rgba(10,0,20,0.8)';cx.fillRect(0,0,W,44);neonGlow('#ff0080',8,()=>{cx.font='bold 14px monospace';cx.fillStyle='#ff0080';cx.fillText('SCORE: '+sc,16,28);});cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);cx.fillStyle='#00ffff';cx.fillText('COINS: '+coins,W*0.5,28);cx.fillStyle='#ff88ff';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);for(let i=0;i<MAX_LIVES;i++){cx.fillStyle=i<lives?'#ff4444':'#444';cx.fillRect(W-20-i*22,12,14,14);}if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}}
function drawStart(){
  drawBG();
  cx.fillStyle='rgba(10,0,20,0.7)';cx.fillRect(W/2-240,H*0.28,480,H*0.55);
  neonGlow('#ff0080',20,()=>{cx.fillStyle='#ff0080';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('NEON RUNNER',W/2,H*0.38);});
  cx.fillStyle='#00ffff';cx.font='20px monospace';cx.textAlign='center';cx.fillText('CYBERPUNK RUNNER',W/2,H*0.47);
  const mob=window.matchMedia('(hover:none)and(pointer:coarse)').matches;cx.fillStyle='#ff88ff';cx.font='16px monospace';cx.fillText(mob?'TAP: JUMP  SWIPE ↓: SLIDE':'↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  neonGlow('#00ffff',10,()=>{cx.strokeStyle='#00ffff';cx.lineWidth=2;cx.strokeRect(W/2-80,H*0.65,160,44);});
  cx.fillStyle='rgba(0,10,20,0.8)';cx.fillRect(W/2-80,H*0.65,160,44);cx.fillStyle='#00ffff';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.65+28);
  if(best>0){cx.fillStyle='#ff0080';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){cx.fillStyle='rgba(10,0,20,0.85)';cx.fillRect(0,0,W,H);neonGlow('#ff0080',15,()=>{cx.fillStyle='#ff0080';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);});cx.fillStyle='#fff';cx.font='22px monospace';cx.textAlign='center';cx.fillText('SCORE: '+sc,W/2,H*0.46);cx.fillStyle='#00ffff';cx.fillText('BEST:  '+best,W/2,H*0.54);neonGlow('#00ffff',10,()=>{cx.strokeStyle='#00ffff';cx.lineWidth=2;cx.strokeRect(W/2-80,H*0.63,160,44);});cx.fillStyle='rgba(0,10,20,0.8)';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#00ffff';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);cx.textAlign='left';}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  const _dm=Math.floor(dist/100);if(_dm>0&&Math.floor((dist-spd*0.05)/100)<_dm){triggerMood(_dm);}
  if(moodChanging){moodFade=Math.min(1,moodFade+0.018);if(moodFade>=1)moodChanging=false;}
  if(moodTextT>0)moodTextT--;
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?50:26,ph=sliding?16:62,phY=sliding?py-16:py-62;
  if(!dead&&!inv){
    for(let o of obs){if(hit(PX-pw/2,phY,pw,ph,o)){if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00ffff',15);addFT(PX,py-60,'SHIELD!','#00ffff');}else{lives--;spawnP(PX,py-30,'#ff4444',15);if(lives<=0){dead=true;if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}else{inv=true;invT=120;obs=[];addFT(PX,py-60,'❤ '+lives+' LEFT!','#ff4444');}}break;}}
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-30)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#00ffff');spawnP(c.x,c.y,'#00ffff',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-30)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/30;neonGlow(p.col,8,()=>{cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.s/2,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){neonGlow('#00aaff',20,()=>{cx.strokeStyle='rgba(0,170,255,0.6)';cx.lineWidth=3;cx.beginPath();cx.arc(W*0.22,py-30,42,0,Math.PI*2);cx.stroke();});}
    drawPlayer(W*0.22,py,sliding);
  }
  for(let o of obs){if(o.x-W*0.22<320&&o.x-W*0.22>60){cx.font='bold 16px monospace';cx.textAlign='center';if(o.type==='short'){cx.fillStyle='#88ff88';cx.fillText('JUMP ↑',W*0.22,GY-95);}else{cx.fillStyle='#ffaa44';cx.fillText('SLIDE ↓',W*0.22,GY-95);}cx.textAlign='left';}}
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){const mob=window.matchMedia('(hover:none)and(pointer:coarse)').matches;cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(10,0,20,0.6)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText(mob?'TAP: JUMP  SWIPE ↓: SLIDE':'↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){update();if(state==='start')drawStart();else if(state==='over'){draw();drawOver();}else draw();requestAnimationFrame(loop);}
init();loop();
</script>

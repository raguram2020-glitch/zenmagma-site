<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Letter Hunt - ZenMagma</title>    <meta name="description" content="Find and tap letters before they disappear! Great for learning the alphabet.">

    <meta property="og:title" content="Letter Hunt - ZenMagma">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001a14;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#1abc9c,#16a085);color:#fff;transition:.2s;margin:4px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #1abc9c}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#1abc9c,#16a085);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center">
<div style="padding:8px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Find:<b id="nxt"> A</b></span><span class="hv">Time:<b id="tm"> 60</b>s</span></div>
<canvas id="c" width="480" height="380"></canvas>
</div>
<div id="ov"><div id="ob"><h2>Letter Hunt</h2><p>Find and click letters in alphabetical order: A, B, C... They're scattered all over! Be fast!</p><button class="btn" onclick="go()">Hunt!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=380;
const COLORS=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#1a9850"];
let letters=[],next=0,score=0,timeLeft=60,timer,running=false,glowPulse=0;
function mkLetters(){
  letters=[];
  for(let i=0;i<26;i++){
    let x,y,ok;
    do{x=25+Math.random()*(W-50);y=25+Math.random()*(H-50);ok=!letters.some(l=>Math.hypot(l.x-x,l.y-y)<36);}while(!ok);
    letters.push({x,y,ch:String.fromCharCode(65+i),color:COLORS[i%COLORS.length],found:false});
  }
}
function draw(){
  glowPulse+=0.08;
  ctx.fillStyle="#001a14";ctx.fillRect(0,0,W,H);
  letters.forEach(l=>{
    if(l.found)return;
    const isNext=l.ch===String.fromCharCode(65+next);
    if(isNext){
      const glow=0.4+0.4*Math.sin(glowPulse);
      ctx.save();ctx.shadowColor="#1abc9c";ctx.shadowBlur=18*glow+4;
      ctx.fillStyle=l.color;ctx.beginPath();ctx.arc(l.x,l.y,22,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else {
      ctx.fillStyle=l.color;ctx.beginPath();ctx.arc(l.x,l.y,18,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle="#fff";ctx.font=isNext?"bold 18px Segoe UI":"bold 16px Segoe UI";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(l.ch,l.x,l.y);
  });
}
cv.addEventListener("click",e=>{
  if(!running)return;
  const mx=e.offsetX,my=e.offsetY;
  const l=letters.find(l=>!l.found&&Math.hypot(l.x-mx,l.y-my)<22);
  if(!l)return;
  if(l.ch===String.fromCharCode(65+next)){l.found=true;next++;score+=10*(next);document.getElementById("sc").textContent=score;document.getElementById("nxt").textContent=next<26?String.fromCharCode(65+next):"Done!";if(next>=26){clearInterval(timer);running=false;const bonus=timeLeft>=30?50:0;if(bonus)score+=bonus;window._showMod("All letters found! Score: "+score+(bonus?" (+50 speed bonus! ⚡)":""));}}
  else{score=Math.max(0,score-5);document.getElementById("sc").textContent=score;}
});
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;window._showMod("Time up! Score: "+score);}else timeLeft--;}
function go(){document.getElementById("ov").style.display="none";running=true;timer=setInterval(tick,1000);(function lp(){draw();if(running)requestAnimationFrame(lp);})();}
mkLetters();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none'" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
    <script src="../js/mobile-controls.js" defer></script>
</body></html>

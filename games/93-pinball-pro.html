<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pinball Pro - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000510;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f9d423,#ff4e50);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #f9d423}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f9d423,#ff4e50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Balls:<b id="bl"> 3</b></span><span class="hv">Multi:<b id="mb"> x1</b></span></div>
<canvas id="c" width="360" height="520"></canvas>
<p style="color:#aaa;font-size:.8em">Z/Left = Left flipper | X/Right = Right flipper | Space = Launch</p></div>
<div id="ov"><div id="ob"><h2>Pinball Pro</h2><p>Classic pinball action! Use Z and X (or arrow keys) for flippers. Hit bumpers for points. Keep the ball alive!</p><button class="btn" onclick="go()">Launch!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=360,H=520;
let ball,balls,score,mult,frame,running,lFlip,rFlip,launched;
const bumpers=[[90,120,22],[180,80,22],[270,120,22],[150,200,18],[210,160,18]];
function init(){ball={x:W-20,y:H-100,vx:-1,vy:-8,r:10};balls=3;score=0;mult=1;lFlip=false;rFlip=false;launched=false;frame=0;}
function flipAngle(isLeft,active){return isLeft?(active?-0.5:0.4):(active?Math.PI+0.5:Math.PI-0.4);}
function drawFlipper(cx,cy,angle,len){ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);ctx.fillStyle="#f9d423";ctx.fillRect(0,-6,len,12);ctx.restore();}
function update(){
  frame++;
  if(!launched){ball.x=W-20;ball.y=H-100;return;}
  ball.vy+=0.35;ball.x+=ball.vx;ball.y+=ball.vy;
  // Walls
  if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.8;}
  if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx*=-0.8;}
  if(ball.y<ball.r){ball.y=ball.r;ball.vy*=-0.8;}
  // Bumpers
  bumpers.forEach(([bx,by,br])=>{const d=Math.hypot(ball.x-bx,ball.y-by);if(d<br+ball.r){const a=Math.atan2(ball.y-by,ball.x-bx);ball.vx=Math.cos(a)*8;ball.vy=Math.sin(a)*8;score+=100*mult;document.getElementById("sc").textContent=score;mult++;document.getElementById("mb").textContent="x"+mult;}});
  // Flippers
  const lx=60,rx=W-60,fy=H-60,fl=70;
  if(lFlip){const la=flipAngle(true,true);if(ball.y>fy-15&&ball.y<fy+15&&ball.x>lx&&ball.x<lx+fl){ball.vy=-12;ball.vx+=2;}}
  if(rFlip){if(ball.y>fy-15&&ball.y<fy+15&&ball.x>rx-fl&&ball.x<rx){ball.vy=-12;ball.vx-=2;}}
  // Lost
  if(ball.y>H+20){balls--;document.getElementById("bl").textContent=balls;mult=1;document.getElementById("mb").textContent="x1";launched=false;if(balls<=0){running=false;showGameOver("Score: "+score);}}
}
function draw(){
  ctx.fillStyle="#000510";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#333";ctx.lineWidth=3;ctx.strokeRect(5,5,W-10,H-10);
  bumpers.forEach(([bx,by,br])=>{const pulse=0.8+Math.sin(frame*.2+bx)*.2;ctx.fillStyle=`rgba(249,212,35,${pulse})`;ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();ctx.fillStyle="#000";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("100",bx,by);});
  drawFlipper(60,H-60,flipAngle(true,lFlip),70);drawFlipper(W-60,H-60,flipAngle(false,rFlip),70);
  ctx.fillStyle="#f9d423";ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ball.x-3,ball.y-3,3,0,Math.PI*2);ctx.fill();
}
const keys={};document.addEventListener("keydown",e=>{keys[e.key]=true;if((e.key==="z"||e.key==="Z"||e.key==="ArrowLeft"))lFlip=true;if((e.key==="x"||e.key==="X"||e.key==="ArrowRight"))rFlip=true;if(e.key===" "&&!launched)launched=true;e.preventDefault();});
document.addEventListener("keyup",e=>{if((e.key==="z"||e.key==="Z"||e.key==="ArrowLeft"))lFlip=false;if((e.key==="x"||e.key==="X"||e.key==="ArrowRight"))rFlip=false;});
cv.addEventListener("touchstart",e=>{const mx=e.touches[0].clientX;if(mx<W/2)lFlip=true;else rFlip=true;if(!launched)launched=true;},{passive:true});
cv.addEventListener("touchend",()=>{lFlip=false;rFlip=false;});
function go(){document.getElementById("ov").style.display="none";running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script></body></html>

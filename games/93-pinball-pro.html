<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000510;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 60px rgba(249,212,35,.1);max-width:100vw}.hv{background:rgba(0,0,0,.5);border:1px solid rgba(249,212,35,.25);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px;backdrop-filter:blur(6px)}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f9d423,#ff4e50);color:#000;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(249,212,35,.4)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:50;backdrop-filter:blur(8px)}#ob{background:linear-gradient(160deg,#0a0a20,#000510);border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid rgba(249,212,35,.4);box-shadow:0 20px 60px rgba(0,0,0,.6)}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f9d423,#ff4e50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#goov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px)}#goov .box{background:linear-gradient(160deg,#0a0a20,#000510);border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(249,212,35,.35);box-shadow:0 20px 60px rgba(0,0,0,.6)}</style>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);
    this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
    this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);
    this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);this.closePath();return this;
  };
}
</script>
</head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center">
  <div style="padding:6px">
    <span class="hv">Score: <b id="sc">0</b></span>
    <span class="hv">Balls: <b id="bl">3</b></span>
    <span class="hv">Multi: <b id="mb">x1</b></span>
  </div>
  <canvas id="c" width="360" height="520"></canvas>
  <p style="color:#666;font-size:.75em;margin-top:4px">Z/← = Left flipper | X/→ = Right flipper | Space = Launch</p>
</div>
<div id="ov"><div id="ob"><h2>🎰 Pinball Pro</h2><p>Classic pinball action! Use Z and X (or arrow keys) for flippers. Hit bumpers for big points. Keep the ball alive!</p><button class="btn" onclick="go()">Launch!</button></div></div>
<div id="goov"><div class="box">
  <div style="font-size:3em;margin-bottom:10px">🎰</div>
  <div style="font-size:1.6em;font-weight:800;color:#f9d423;margin-bottom:8px">Game Over</div>
  <div id="gomsg" style="color:#aaa;margin-bottom:20px;font-size:.95em"></div>
  <button class="btn" onclick="doRestart()">▶ Play Again</button>
</div></div>
<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndBump(){const f=300+Math.random()*200;beep(f,0.08,0.18,'square');beep(f*1.5,0.05,0.08,'sine');}
function sndFlip(){beep(400,0.06,0.12,'square');}
function sndLose(){beep(220,0.3,0.2,'sawtooth');setTimeout(()=>beep(160,0.4,0.2,'sawtooth'),200);setTimeout(()=>beep(110,0.5,0.2,'sawtooth'),450);}
function sndLaunch(){beep(180,0.15,0.15,'sawtooth');setTimeout(()=>beep(280,0.1,0.1,'sine'),100);}
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=360,H=520;
let ball,balls,score,mult,frame,running,lFlip,rFlip,launched;
let particles=[],bumperFlash=[],shakeF=0,ballTrail=[];

const bumpers=[
  {x:90,y:120,r:22,col:'#ff4e50',glow:'#ff0020',flash:0},
  {x:180,y:80,r:22,col:'#f9d423',glow:'#ffcc00',flash:0},
  {x:270,y:120,r:22,col:'#00c6ff',glow:'#0080ff',flash:0},
  {x:150,y:200,r:18,col:'#43e97b',glow:'#00cc44',flash:0},
  {x:210,y:160,r:18,col:'#ff4e50',glow:'#ff0040',flash:0},
  {x:100,y:240,r:16,col:'#c471ed',glow:'#8800cc',flash:0},
  {x:260,y:240,r:16,col:'#f9d423',glow:'#cc9900',flash:0},
];

// Slingshot guides (decorative)
const slings=[[40,H-160,40,H-80],[W-40,H-160,W-40,H-80]];

function init(){
  ball={x:W-18,y:H-100,vx:0,vy:0,r:10};
  balls=3;score=0;mult=1;lFlip=false;rFlip=false;launched=false;frame=0;
  ballTrail=[];particles=[];
  bumpers.forEach(b=>b.flash=0);
  document.getElementById('sc').textContent=0;
  document.getElementById('bl').textContent=3;
  document.getElementById('mb').textContent='x1';
}

function flipAngle(isLeft,active){return isLeft?(active?-0.5:0.4):(active?Math.PI+0.5:Math.PI-0.4);}

function spawnParticles(x,y,count,col){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const v=3+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:1,col,size:2+Math.random()*3});
  }
}

function update(){
  frame++;
  if(!launched){ball.x=W-18;ball.y=H-100;ballTrail=[];return;}

  ball.vy+=0.38;
  ball.x+=ball.vx;ball.y+=ball.vy;
  ballTrail.push({x:ball.x,y:ball.y});
  if(ballTrail.length>14)ballTrail.shift();

  if(ball.x<ball.r){ball.x=ball.r;ball.vx=Math.abs(ball.vx)*0.85;}
  if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx)*0.85;}
  if(ball.y<ball.r){ball.y=ball.r;ball.vy=Math.abs(ball.vy)*0.85;}

  // Bumpers
  bumpers.forEach(b=>{
    const d=Math.hypot(ball.x-b.x,ball.y-b.y);
    if(d<b.r+ball.r){
      const a=Math.atan2(ball.y-b.y,ball.x-b.x);
      const spd=Math.max(9,Math.hypot(ball.vx,ball.vy));
      ball.vx=Math.cos(a)*spd;ball.vy=Math.sin(a)*spd;
      score+=100*mult;document.getElementById('sc').textContent=score;
      mult=Math.min(mult+1,8);document.getElementById('mb').textContent='x'+mult;
      b.flash=8;shakeF=4;sndBump();
      spawnParticles(b.x,b.y,8,b.col);
    }
    if(b.flash>0)b.flash--;
  });

  // Flippers
  const lx=60,rx=W-60,fy=H-60,fl=70;
  if(lFlip&&ball.y>fy-20&&ball.y<fy+20&&ball.x>lx-5&&ball.x<lx+fl){
    ball.vy=-13;ball.vx=Math.max(ball.vx+2,-8);
  }
  if(rFlip&&ball.y>fy-20&&ball.y<fy+20&&ball.x>rx-fl&&ball.x<rx+5){
    ball.vy=-13;ball.vx=Math.min(ball.vx-2,8);
  }

  // Lost
  if(ball.y>H+30){
    balls--;document.getElementById('bl').textContent=balls;
    mult=1;document.getElementById('mb').textContent='x1';
    launched=false;ballTrail=[];
    if(balls<=0){
      running=false;sndLose();
      document.getElementById('gomsg').textContent='Final Score: '+score;
      document.getElementById('goov').style.display='flex';
    }
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.04;});
  particles=particles.filter(p=>p.life>0);
  if(shakeF>0)shakeF--;
}

function drawFlipper(cx,cy,angle,len,active){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  // Glow
  ctx.shadowColor=active?'#f9d423':'rgba(249,212,35,.3)';
  ctx.shadowBlur=active?16:6;
  const fg=ctx.createLinearGradient(0,-6,len,6);
  fg.addColorStop(0,'#f9d423');fg.addColorStop(1,'#ff8c00');
  ctx.fillStyle=fg;
  ctx.beginPath();ctx.roundRect(0,-6,len,12,5);ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawBumper(b){
  ctx.save();ctx.translate(b.x,b.y);
  const pulse=0.7+Math.sin(frame*0.05+b.x)*0.3;
  const glow=b.flash>0?30:12*pulse;

  ctx.shadowColor=b.glow;ctx.shadowBlur=glow;
  // Outer ring
  ctx.strokeStyle=b.flash>0?'#fff':b.col;ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.stroke();
  // Fill
  const bg=ctx.createRadialGradient(0,-b.r*0.3,2,0,0,b.r);
  bg.addColorStop(0,b.flash>0?'#fff':b.col+'cc');
  bg.addColorStop(1,b.flash>0?b.col:'rgba(0,0,0,.6)');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Score text
  ctx.fillStyle='#fff';ctx.font='bold 9px "Segoe UI"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('100',0,0);
  ctx.restore();
}

function draw(){
  const shake=shakeF>0?4*(shakeF/5):0;
  ctx.save();
  if(shake)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

  // BG gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#000520');bg.addColorStop(1,'#020015');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid dots
  ctx.fillStyle='rgba(255,255,255,.04)';
  for(let gx=20;gx<W;gx+=30)for(let gy=20;gy<H;gy+=30){
    ctx.beginPath();ctx.arc(gx,gy,1.5,0,Math.PI*2);ctx.fill();
  }

  // Border glow
  ctx.shadowColor='rgba(249,212,35,.2)';ctx.shadowBlur=20;
  ctx.strokeStyle='rgba(249,212,35,.3)';ctx.lineWidth=3;
  ctx.strokeRect(8,8,W-16,H-16);
  ctx.shadowBlur=0;

  // Side gutters (decorative angles)
  ctx.strokeStyle='rgba(100,100,255,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(5,H-160);ctx.lineTo(55,H-80);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-5,H-160);ctx.lineTo(W-55,H-80);ctx.stroke();

  // Launch lane
  ctx.strokeStyle='rgba(200,200,255,.1)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
  ctx.beginPath();ctx.moveTo(W-30,40);ctx.lineTo(W-30,H-80);ctx.stroke();
  ctx.setLineDash([]);

  // Bumpers
  bumpers.forEach(b=>drawBumper(b));

  // Ball trail
  if(ballTrail.length>1){
    for(let i=1;i<ballTrail.length;i++){
      const t=i/ballTrail.length;
      ctx.strokeStyle=`rgba(249,212,35,${t*0.5})`;
      ctx.lineWidth=t*ball.r*1.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(ballTrail[i-1].x,ballTrail[i-1].y);ctx.lineTo(ballTrail[i].x,ballTrail[i].y);ctx.stroke();
    }
  }

  // Ball
  ctx.shadowColor='#f9d423';ctx.shadowBlur=18;
  const bg2=ctx.createRadialGradient(ball.x-3,ball.y-3,1,ball.x,ball.y,ball.r);
  bg2.addColorStop(0,'#fff');bg2.addColorStop(0.4,'#f9d423');bg2.addColorStop(1,'#ff8c00');
  ctx.fillStyle=bg2;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Launch indicator
  if(!launched){
    ctx.strokeStyle='rgba(249,212,35,.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(ball.x,ball.y-ball.r);ctx.lineTo(ball.x,ball.y-40);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(249,212,35,.7)';ctx.font='11px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText('SPACE',ball.x,ball.y-50);
  }

  // Flippers
  drawFlipper(60,H-60,flipAngle(true,lFlip),70,lFlip);
  drawFlipper(W-60,H-60,flipAngle(false,rFlip),70,rFlip);

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  ctx.restore();
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='z'||e.key==='Z'||e.key==='ArrowLeft'){lFlip=true;sndFlip();}
  if(e.key==='x'||e.key==='X'||e.key==='ArrowRight'){rFlip=true;sndFlip();}
  if(e.key===' '&&!launched){launched=true;ball.vy=-12;ball.vx=-(1+Math.random());sndLaunch();}
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  if(e.key==='z'||e.key==='Z'||e.key==='ArrowLeft')lFlip=false;
  if(e.key==='x'||e.key==='X'||e.key==='ArrowRight')rFlip=false;
});
cv.addEventListener('touchstart',e=>{
  const r=cv.getBoundingClientRect();
  const tx=e.touches[0].clientX-r.left;
  if(tx<W/2){lFlip=true;sndFlip();}else{rFlip=true;sndFlip();}
  if(!launched){launched=true;ball.vy=-12;ball.vx=-(1+Math.random());sndLaunch();}
},{passive:true});
cv.addEventListener('touchend',()=>{lFlip=false;rFlip=false;});

function go(){document.getElementById('ov').style.display='none';running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  document.getElementById('goov').style.display='none';
  running=true;init();
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>    <script src="../js/mobile-controls.js" defer></script>
</body></html>

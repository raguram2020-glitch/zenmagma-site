<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Glider</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#87CEEB;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='sg_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120;
// Background clouds
const bgClouds=Array.from({length:12},(x,i)=>({x:Math.random(),y:0.1+Math.random()*0.55,w:0.08+Math.random()*0.12,h:0.03+Math.random()*0.04,speed:0.0003+Math.random()*0.0003}));
// Birds
const birds=Array.from({length:8},()=>({x:Math.random(),y:0.15+Math.random()*0.4,speed:0.001+Math.random()*0.001}));
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#fff',6);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:30,col,s:Math.random()*6+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=60;w=70;oy=GY-h;}else if(t==='tall'){h=105;w=45;oy=GY-h;}else{h=14;w=130;oy=GY-76;}obs.push({x:W+60,y:oy,w,h,type:t});}
function spawnCoin(x){coll.push({x,y:GY-42-Math.random()*80,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function drawPlayer(x,y,sl){
  if(!sl){
    // Hang glider wing
    const wingTilt=Math.sin(fr*0.12)*0.06+vy*0.02;
    cx.save();cx.translate(x,y-40);cx.rotate(wingTilt);
    // Wing body
    cx.fillStyle='#e04020';cx.beginPath();cx.moveTo(0,-10);cx.lineTo(-60,10);cx.lineTo(-50,20);cx.lineTo(0,5);cx.lineTo(50,20);cx.lineTo(60,10);cx.closePath();cx.fill();
    cx.fillStyle='#ff6040';cx.beginPath();cx.moveTo(0,-10);cx.lineTo(-30,5);cx.lineTo(0,5);cx.closePath();cx.fill();
    cx.fillStyle='#ffaa00';cx.beginPath();cx.moveTo(0,-10);cx.lineTo(30,5);cx.lineTo(0,5);cx.closePath();cx.fill();
    // Frame lines
    cx.strokeStyle='#888';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(-60,10);cx.lineTo(0,-8);cx.lineTo(60,10);cx.stroke();
    cx.beginPath();cx.moveTo(-50,20);cx.lineTo(0,12);cx.lineTo(50,20);cx.stroke();
    cx.restore();
    // Harness/pilot
    cx.fillStyle='#448822';cx.beginPath();cx.ellipse(x,y-16,10,14,0,0,Math.PI*2);cx.fill();
    // Head/helmet
    cx.fillStyle='#ffaa44';cx.beginPath();cx.arc(x,y-32,9,0,Math.PI*2);cx.fill();
    cx.fillStyle='#cc2200';cx.beginPath();cx.arc(x,y-34,9,Math.PI,Math.PI*2);cx.fill();
    // Goggles
    cx.fillStyle='#338';cx.fillRect(x-6,y-34,5,4);cx.fillRect(x+1,y-34,5,4);
    // Legs dangling
    const lg=Math.sin(fr*0.2)*5;
    cx.fillStyle='#555';cx.fillRect(x-6,y-2,5,18+lg);cx.fillRect(x+1,y-2,5,18-lg);
  }else{
    // Flat glide
    cx.fillStyle='#e04020';cx.beginPath();cx.moveTo(x-50,y-14);cx.lineTo(x+50,y-14);cx.lineTo(x+40,y-6);cx.lineTo(x-40,y-6);cx.closePath();cx.fill();
    cx.fillStyle='#448822';cx.fillRect(x-10,y-14,20,12);
    cx.fillStyle='#ffaa44';cx.beginPath();cx.arc(x,y-20,9,0,Math.PI*2);cx.fill();
    cx.fillStyle='#cc2200';cx.beginPath();cx.arc(x,y-22,9,Math.PI,Math.PI*2);cx.fill();
  }
}
function drawObs(o){
  if(o.type==='short'){
    // Solid storm cloud
    cx.fillStyle='#556677';
    cx.beginPath();cx.ellipse(o.x+o.w*0.3,o.y+o.h*0.6,o.w*0.35,o.h*0.4,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(o.x+o.w*0.65,o.y+o.h*0.55,o.w*0.3,o.h*0.38,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(o.x+o.w*0.5,o.y+o.h*0.35,o.w*0.4,o.h*0.45,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#667788';
    cx.beginPath();cx.ellipse(o.x+o.w*0.5,o.y+o.h*0.4,o.w*0.35,o.h*0.3,0,0,Math.PI*2);cx.fill();
    // Rain
    cx.strokeStyle='rgba(150,180,220,0.7)';cx.lineWidth=1;
    for(let i=0;i<6;i++){const rx=o.x+i*(o.w/5);cx.beginPath();cx.moveTo(rx,o.y+o.h*0.8);cx.lineTo(rx-5,o.y+o.h+10);cx.stroke();}
  }else if(o.type==='tall'){
    // Lightning bolt
    cx.fillStyle='#aaaacc';
    cx.fillRect(o.x+o.w*0.3,o.y,o.w*0.4,20);
    cx.beginPath();cx.moveTo(o.x+o.w*0.3,o.y);cx.lineTo(o.x+o.w*0.7,o.y+20);cx.lineTo(o.x+o.w*0.5,o.y+20);cx.lineTo(o.x+o.w*0.5,o.y);cx.closePath();cx.fill();
    // Lightning bolt shape
    cx.fillStyle='#cc4400';
    cx.beginPath();
    cx.moveTo(o.x+o.w*0.6,o.y+15);cx.lineTo(o.x+o.w*0.3,o.y+o.h*0.5);cx.lineTo(o.x+o.w*0.5,o.y+o.h*0.5);
    cx.lineTo(o.x+o.w*0.25,o.y+o.h);cx.lineTo(o.x+o.w*0.7,o.y+o.h*0.45);cx.lineTo(o.x+o.w*0.5,o.y+o.h*0.45);
    cx.lineTo(o.x+o.w*0.7,o.y+15);cx.closePath();cx.fill();
    cx.fillStyle='#ffee44';cx.globalAlpha=0.5+Math.sin(fr*0.3)*0.4;
    cx.beginPath();cx.moveTo(o.x+o.w*0.6,o.y+15);cx.lineTo(o.x+o.w*0.3,o.y+o.h*0.5);cx.lineTo(o.x+o.w*0.5,o.y+o.h*0.5);cx.lineTo(o.x+o.w*0.25,o.y+o.h);cx.lineTo(o.x+o.w*0.7,o.y+o.h*0.45);cx.lineTo(o.x+o.w*0.5,o.y+o.h*0.45);cx.lineTo(o.x+o.w*0.7,o.y+15);cx.closePath();cx.fill();
    cx.globalAlpha=1;
  }else{
    // Wind turbulence wave
    cx.fillStyle='rgba(100,130,180,0.7)';cx.fillRect(o.x,o.y,o.w,o.h);
    cx.strokeStyle='rgba(150,200,255,0.9)';cx.lineWidth=2;
    for(let i=0;i<3;i++){cx.beginPath();for(let bx=0;bx<=o.w;bx+=6)cx.lineTo(o.x+bx,o.y+o.h/2+Math.sin((bx+fr*2+i*10)*0.25)*4);cx.stroke();}
  }
}
function drawCoin(c){
  // Golden sun
  const r=10,pulse=Math.sin(c.a*0.15)*2;
  cx.fillStyle='rgba(255,200,0,0.3)';cx.beginPath();cx.arc(c.x,c.y,r+5+pulse,0,Math.PI*2);cx.fill();
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2;cx.fillStyle='#ffcc00';cx.beginPath();cx.ellipse(c.x+Math.cos(a)*(r+3),c.y+Math.sin(a)*(r+3),3,6,a,0,Math.PI*2);cx.fill();}
  cx.fillStyle='#ffdd00';cx.beginPath();cx.arc(c.x,c.y,r,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.6)';cx.beginPath();cx.arc(c.x-3,c.y-3,4,0,Math.PI*2);cx.fill();
}
function drawCloud(cx2,x,y,w,h){
  cx.fillStyle='rgba(255,255,255,0.9)';
  cx.beginPath();cx.ellipse(x+w*0.3,y+h*0.6,w*0.3,h*0.5,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(x+w*0.65,y+h*0.65,w*0.25,h*0.4,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(x+w*0.48,y+h*0.4,w*0.38,h*0.55,0,0,Math.PI*2);cx.fill();
}
function drawBG(){
  const grad=cx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#4a9ae0');grad.addColorStop(0.5,'#87CEEB');grad.addColorStop(1,'#e8f4fc');
  cx.fillStyle=grad;cx.fillRect(0,0,W,H);
  // Background clouds
  bgClouds.forEach(c=>{
    const cx2=((c.x-bgOff*c.speed*0.001)%1.15-0.05)*W;
    drawCloud(cx,cx2,c.y*H,c.w*W,c.h*H);
  });
  // Birds
  birds.forEach(b=>{
    b.x-=b.speed;if(b.x<-0.05)b.x=1.1;
    const bx=b.x*W,by=b.y*H;
    const wing=Math.sin(fr*0.3)*8;
    cx.strokeStyle='#333';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(bx-8,by+wing);cx.lineTo(bx,by);cx.lineTo(bx+8,by+wing);cx.stroke();
  });
  // Cloud platform (ground)
  cx.fillStyle='rgba(255,255,255,0.85)';
  for(let i=0;i<W+100;i+=80){cx.beginPath();cx.ellipse((i-bgOff*2)%W,GY+15,50,22,0,0,Math.PI*2);cx.fill();}
  cx.fillStyle='rgba(255,255,255,0.95)';cx.fillRect(0,GY+8,W,H-GY-8);
  cx.fillStyle='rgba(220,240,255,0.8)';cx.fillRect(0,GY+8,W,10);
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';cx.strokeStyle=col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,12+Math.sin(p.a*0.1)*3,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(255,255,255,0.5)';cx.fill();cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t[0].toUpperCase(),p.x,p.y+4);cx.textAlign='left';}
function drawHUD(){cx.fillStyle='rgba(100,150,200,0.6)';cx.fillRect(0,0,W,44);cx.font='bold 14px monospace';cx.fillStyle='#ffdd00';cx.fillText('SCORE: '+sc,16,28);cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);cx.fillStyle='#ffdd44';cx.fillText('COINS: '+coins,W*0.5,28);cx.fillStyle='#ffcc00';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}}
function drawStart(){
  drawBG();
  cx.fillStyle='rgba(100,150,200,0.6)';cx.fillRect(W/2-230,H*0.28,460,H*0.55);
  cx.fillStyle='#ffdd00';cx.font='bold 46px monospace';cx.textAlign='center';cx.fillText('SKY GLIDER',W/2,H*0.38);
  cx.fillStyle='#fff';cx.font='18px monospace';cx.fillText('HIGH ALTITUDE RUNNER',W/2,H*0.47);
  cx.fillStyle='#223';cx.font='16px monospace';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#2255aa';cx.fillRect(W/2-80,H*0.65,160,44);cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.65+28);
  if(best>0){cx.fillStyle='#ffdd00';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){cx.fillStyle='rgba(20,40,80,0.82)';cx.fillRect(0,0,W,H);cx.fillStyle='#ff4444';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);cx.fillStyle='#ffdd00';cx.fillText('BEST:  '+best,W/2,H*0.54);cx.fillStyle='#2255aa';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);cx.textAlign='left';}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?60:28,ph=sliding?14:64,phY=sliding?py-14:py-64;
  if(!dead&&!inv){
    for(let o of obs){if(hit(PX-pw/2,phY,pw,ph,o)){if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00aaff',15);addFT(PX,py-60,'SHIELD!','#00aaff');}else{dead=true;spawnP(PX,py-30,'#ff4444',20);if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}break;}}
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-32)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffdd00');spawnP(c.x,c.y,'#ffdd00',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-32)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.s/2,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.strokeStyle='rgba(0,170,255,0.5)';cx.lineWidth=3;cx.beginPath();cx.arc(W*0.22,py-30,50,0,Math.PI*2);cx.stroke();}
    drawPlayer(W*0.22,py,sliding);
  }
  for(let o of obs){if(o.x-W*0.22<320&&o.x-W*0.22>60){cx.font='bold 16px monospace';cx.textAlign='center';if(o.type==='short'){cx.fillStyle='#ffdd00';cx.fillText('JUMP ↑',W*0.22,GY-100);}else{cx.fillStyle='#ff6600';cx.fillText('SLIDE ↓',W*0.22,GY-100);}cx.textAlign='left';}}
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(50,80,130,0.55)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){update();if(state==='start')drawStart();else if(state==='over'){draw();drawOver();}else draw();requestAnimationFrame(loop);}
init();loop();
</script>
</body>
</html>

<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bubble Blitz - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:#000a14;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw;max-height:calc(100vh - 60px);width:auto;height:auto}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a8edea,#fed6e3);color:#fff;transition:.2s}
.btn:hover{transform:scale(1.05)}
#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}
#ob{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #a8edea}
#ob h2{font-size:2em;margin-bottom:8px;background:linear-gradient(135deg,#a8edea,#fed6e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#ob p{color:#aaa;margin-bottom:22px;line-height:1.5}
#hm{position:fixed;top:10px;left:10px;padding:6px 14px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.8em;z-index:100}
</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>


<div id="hud"><span class="hval">Score:<b id="sc"> 0</b></span><span class="hval">Level:<b id="lv"> 1</b></span><span class="hval">Ammo:<b id="am"> ∞</b></span><button class="btn" onclick="ng()">Restart</button></div>
<canvas id="c" width="400" height="500"></canvas>
<div id="goov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid #e74c3c;"><div style="font-size:3em;margin-bottom:10px;">💥</div><div style="font-size:1.6em;font-weight:800;color:#e74c3c;margin-bottom:8px;">Game Over!</div><div id="gomsg" style="color:#aaa;margin-bottom:20px;font-size:.95em;"></div><button class="btn" onclick="doRestart()">▶ Play Again</button></div></div>
<div id="ov"><div id="ob"><h2>Bubble Blitz</h2><p>Click to shoot colored bubbles! Match 3+ same-color bubbles to pop them. Clear all bubbles to advance!</p><button class="btn" onclick="go()">Pop!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const W=400,H=500,R=22,COLS=9;
const COLORS=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c"];
let grid=[],shooter,bullet,score=0,level=1,running=false;
function mkGrid(){grid=[];const rows=4+level;for(let r=0;r<rows;r++){grid[r]=[];const cols=r%2===0?COLS:COLS-1;for(let c=0;c<cols;c++)grid[r].push(Math.floor(Math.random()*Math.min(3+level,COLORS.length)));}}
function bx(r,c){return (r%2===0?0:R)+c*R*2+R;}
function by(r){return R+r*R*1.75;}
function mkShooter(){shooter={x:W/2,y:H-40,color:Math.floor(Math.random()*Math.min(3+level,COLORS.length))};}
function draw(){
  ctx.fillStyle="#000a14";ctx.fillRect(0,0,W,H);
  grid.forEach((row,r)=>row.forEach((c,ci)=>{if(c<0)return;const x=bx(r,ci),y=by(r);ctx.fillStyle=COLORS[c];ctx.beginPath();ctx.arc(x,y,R-2,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,255,255,.3)";ctx.beginPath();ctx.arc(x-5,y-5,R*.3,0,Math.PI*2);ctx.fill();}));
  if(bullet){ctx.fillStyle=COLORS[bullet.c];ctx.beginPath();ctx.arc(bullet.x,bullet.y,R-2,0,Math.PI*2);ctx.fill();}
  // Shooter
  ctx.fillStyle=COLORS[shooter.color];ctx.beginPath();ctx.arc(shooter.x,shooter.y,R,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();
}
function findMatches(r,c,col,visited=new Set()){
  const k=`${r},${c}`;if(visited.has(k))return visited;if(r<0||r>=grid.length||c<0||c>=grid[r].length||grid[r][c]!==col)return visited;
  visited.add(k);
  const odd=r%2===1;
  [[r-1,c],[r+1,c],[r,c-1],[r,c+1],[r-1,c+(odd?1:0)],[r-1,c+(odd?0:-1)],[r+1,c+(odd?1:0)],[r+1,c+(odd?0:-1)]].forEach(([nr,nc])=>findMatches(nr,nc,col,visited));
  return visited;
}
function popBubbles(r,c){
  const m=findMatches(r,c,grid[r][c]);
  if(m.size>=3){m.forEach(k=>{const[rr,cc]=k.split(",").map(Number);grid[rr][cc]=-1;});score+=m.size*10*level;document.getElementById("sc").textContent=score;}
}
function placeBullet(){
  let br=0;let bc=0;
  for(let r=grid.length-1;r>=0;r--){
    const bxv=bullet.x,byv=bullet.y,row=grid[r];
    if(!row)continue;
    for(let c=0;c<row.length;c++){if(row[c]<0)continue;const dx=bxv-bx(r,c),dy=byv-by(r);if(Math.hypot(dx,dy)<R*2){br=r;bc=c;break;}}
  }
  // Place near collision
  const pr=Math.round((bullet.y-R)/(R*1.75));const pc=Math.round((bullet.x-(pr%2===0?0:R)-R)/(R*2));
  const rr=Math.max(0,Math.min(grid.length,Math.min(pr,14)));
  while(grid.length<=rr)grid.push([]);
  const cols=rr%2===0?COLS:COLS-1;while(grid[rr].length<cols)grid[rr].push(-1);
  const cc=Math.max(0,Math.min(cols-1,pc));
  if(grid[rr][cc]<0){grid[rr][cc]=bullet.c;popBubbles(rr,cc);}
  bullet=null;mkShooter();
  if(grid.every(row=>row.every(c=>c<0))){level++;document.getElementById("lv").textContent=level;mkGrid();return;}
  // Game over: any active bubble reached too close to the shooter
  const danger=H-90;
  const lost=grid.some((row,r)=>by(r)>danger&&row.some(c=>c>=0));
  if(lost){running=false;showGameOver("Bubbles reached the bottom! Score: "+score);}
}
function update(){
  if(!bullet)return;
  bullet.x+=bullet.dx;bullet.y+=bullet.dy;
  if(bullet.x<R||bullet.x>W-R)bullet.dx*=-1;
  if(bullet.y<R||bullet.y>H-R){if(bullet.y<R)placeBullet();}
  if(bullet){
    const hit=grid.some((row,r)=>row.some((c,ci)=>c>=0&&Math.hypot(bullet.x-bx(r,ci),bullet.y-by(r))<R*2));
    if(hit)placeBullet();
  }
}
cv.addEventListener("click",e=>{
  if(!running||bullet)return;
  const angle=Math.atan2(e.offsetY-shooter.y,e.offsetX-shooter.x);
  if(angle>-Math.PI*.95&&angle<-.05){bullet={x:shooter.x,y:shooter.y,dx:Math.cos(angle)*10,dy:Math.sin(angle)*10,c:shooter.color};}
});
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){score=0;level=1;bullet=null;document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;mkGrid();mkShooter();if(running){running=false;}setTimeout(go,100);}
mkGrid();mkShooter();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  ng();
}
</script></body></html>

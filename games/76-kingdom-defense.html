<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kingdom Defense - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0000;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #c0392b}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#c0392b,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Gold:<b id="gd"> 100</b></span><span class="hv">HP:<b id="hp"> 20</b></span><span class="hv">Wave:<b id="wv"> 1</b></span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="480" height="380"></canvas>
<div style="padding:6px"><button class="btn" onclick="buy('archer')">🏹 Archer (30g)</button><button class="btn" onclick="buy('mage')">🔮 Mage (60g)</button><button class="btn" onclick="buy('cannon')">💣 Cannon (90g)</button></div>
<div style="color:#aaa;font-size:.8em;padding:4px">Click path to place tower | Enemies walk red path</div></div>
<div id="ov"><div id="ob"><h2>Kingdom Defense</h2><p>Place towers along the path to stop enemies reaching your castle! Spend gold on archer, mage, and cannon towers.</p><button class="btn" onclick="go()">Defend!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=380;
const PATH=[[0,190],[80,190],[80,100],[200,100],[200,280],[360,280],[360,120],[480,120]];
let towers=[],enemies=[],bullets=[],gold=100,hp=20,wave=1,score=0,frame=0,running=false,tool="archer";
const TOWER={archer:{r:80,spd:2,dmg:10,rate:60,color:"#27ae60",e:"🏹",cost:30},mage:{r:120,spd:3,dmg:25,rate:90,color:"#9b59b6",e:"🔮",cost:60},cannon:{r:100,spd:1.5,dmg:50,rate:150,color:"#e74c3c",e:"💣",cost:90}};
function pathLen(t){let d=0,px=PATH[0][0],py=PATH[0][1];for(let i=1;i<PATH.length;i++){d+=Math.hypot(PATH[i][0]-px,PATH[i][1]-py);px=PATH[i][0];py=PATH[i][1];}return d;}
function posOnPath(prog){let rem=prog*pathLen(),px=PATH[0][0],py=PATH[0][1];for(let i=1;i<PATH.length;i++){const dx=PATH[i][0]-px,dy=PATH[i][1]-py,seg=Math.hypot(dx,dy);if(rem<=seg)return{x:px+dx*(rem/seg),y:py+dy*(rem/seg)};rem-=seg;px=PATH[i][0];py=PATH[i][1];}return{x:PATH[PATH.length-1][0],y:PATH[PATH.length-1][1]};}
function spawnWave(){for(let i=0;i<4+wave*2;i++)setTimeout(()=>enemies.push({prog:0,spd:0.0008+wave*.0001,hp:wave*20,maxHp:wave*20,r:12}),i*600);}
function buy(t){tool=t;}
function distToPath(x,y){let min=Infinity;for(let i=1;i<PATH.length;i++){const ax=PATH[i-1][0],ay=PATH[i-1][1],bx=PATH[i][0],by=PATH[i][1],dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy,t=Math.max(0,Math.min(1,((x-ax)*dx+(y-ay)*dy)/l));min=Math.min(min,Math.hypot(x-(ax+t*dx),y-(ay+t*dy)));}return min;}
cv.addEventListener("click",e=>{
  if(!running)return;
  const mx=e.offsetX,my=e.offsetY;
  if(distToPath(mx,my)<25)return;
  const tp=TOWER[tool];if(gold<tp.cost)return;
  gold-=tp.cost;towers.push({x:mx,y:my,type:tool,cooldown:0,...tp});document.getElementById("gd").textContent=gold;
});
function update(){
  frame++;
  enemies.forEach(e=>{e.prog+=e.spd;if(e.prog>=1){hp--;document.getElementById("hp").textContent=hp;e.prog=2;if(hp<=0){running=false;setTimeout(()=>window._showMod("Castle fell! Score: "+score),200);}}});
  enemies=enemies.filter(e=>e.prog<2);
  towers.forEach(t=>{t.cooldown--;if(t.cooldown>0)return;const e=enemies.find(en=>{const p=posOnPath(en.prog);return Math.hypot(p.x-t.x,p.y-t.y)<t.r;});if(e){t.cooldown=t.rate;const p=posOnPath(e.prog);bullets.push({x:t.x,y:t.y,tx:p.x,ty:p.y,dmg:t.dmg,color:t.color,prog:0,target:e});}});
  bullets=bullets.filter(b=>{b.prog+=0.1;const p=posOnPath(b.target.prog);b.tx=p.x;b.ty=p.y;if(b.prog>=1){b.target.hp-=b.dmg;if(b.target.hp<=0){score+=10*wave;document.getElementById("sc").textContent=score;gold+=5;document.getElementById("gd").textContent=gold;b.target.prog=2;}return false;}return true;});
  if(enemies.length===0&&frame%10===0){wave++;document.getElementById("wv").textContent=wave;spawnWave();}
}
function draw(){
  ctx.fillStyle="#0a0000";ctx.fillRect(0,0,W,H);
  // Path
  ctx.strokeStyle="rgba(139,0,0,.5)";ctx.lineWidth=28;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();PATH.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));ctx.stroke();
  ctx.strokeStyle="rgba(200,50,50,.3)";ctx.lineWidth=20;ctx.stroke();
  // Castle
  ctx.fillStyle="#8B0000";ctx.fillRect(W-40,90,40,60);ctx.fillStyle="#c0392b";ctx.fillRect(W-48,80,16,20);ctx.fillRect(W-24,80,16,20);
  towers.forEach(t=>{ctx.fillStyle=t.color;ctx.beginPath();ctx.arc(t.x,t.y,14,0,Math.PI*2);ctx.fill();ctx.font="18px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(t.e,t.x,t.y);});
  enemies.forEach(e=>{const p=posOnPath(e.prog);ctx.fillStyle="#8B0000";ctx.beginPath();ctx.arc(p.x,p.y,e.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#aaa";ctx.fillRect(p.x-e.r,p.y-e.r-8,e.r*2,4);ctx.fillStyle="#e74c3c";ctx.fillRect(p.x-e.r,p.y-e.r-8,e.r*2*(e.hp/e.maxHp),4);ctx.fillStyle="#fff";ctx.font="16px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("👹",p.x,p.y);});
  bullets.forEach(b=>{const bx=b.x+(b.tx-b.x)*b.prog,by=b.y+(b.ty-b.y)*b.prog;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fill();});
}
function go(){document.getElementById("ov").style.display="none";running=true;spawnWave();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById(''_gmod'').style.display=''none''" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
</body></html>

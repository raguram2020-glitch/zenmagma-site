<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Duck Shooter - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001a00;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #27ae60}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#27ae60,#1e8449);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Ammo:<b id="am"> 15</b></span><span class="hv">Round:<b id="rnd"> 1</b></span></div>
<canvas id="c" width="480" height="380" style="cursor:crosshair"></canvas></div>
<div id="ov"><div id="ob"><h2>Duck Shooter</h2><p>Ducks pop up from behind the bushes! Click to shoot before they hide again. Limited ammo per round!</p><button class="btn" onclick="go()">Shoot!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=380;
let ducks=[],shots=[],score=0,ammo=15,round=1,running=false,frame=0;
const HOLES=[[80,280],[160,280],[240,280],[320,280],[400,280],[120,220],[200,220],[280,220],[360,220]];
function spawnDuck(){const hole=HOLES[Math.floor(Math.random()*HOLES.length)];if(!ducks.find(d=>d.hx===hole[0]&&d.hy===hole[1])){ducks.push({hx:hole[0],hy:hole[1],y:hole[1]+50,vy:-1.5,visible:0,hit:false,color:`hsl(${Math.random()*360},70%,50%)`});}}
function draw(){
  // Background
  const sg=ctx.createLinearGradient(0,0,0,H);sg.addColorStop(0,"#001a00");sg.addColorStop(.6,"#003300");sg.addColorStop(.6,"#1a6b1a");sg.addColorStop(1,"#2d5a1b");ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
  // Grass lumps
  for(let i=0;i<W;i+=40){ctx.fillStyle="#1a6b1a";ctx.beginPath();ctx.arc(i,H*.6+8,30,Math.PI,0);ctx.fill();}
  // Ducks
  ducks.forEach(d=>{if(d.y>d.hy+60)return;ctx.save();ctx.translate(d.hx,d.y);if(d.hit){ctx.globalAlpha=0.5;ctx.rotate(0.5);}ctx.fillStyle=d.color;ctx.beginPath();ctx.ellipse(0,0,18,12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#f39c12";ctx.beginPath();ctx.arc(20,0,10,0,Math.PI*2);ctx.fill();ctx.fillStyle="#000";ctx.font="20px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🦆",0,0);ctx.restore();});
  // Shots
  shots=shots.filter(s=>{s.r+=3;s.a-=0.08;ctx.globalAlpha=s.a;ctx.strokeStyle="#f1c40f";ctx.lineWidth=3;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;return s.a>0;});
  // UI
  ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(0,H-30,W,30);ctx.fillStyle="#fff";ctx.font="14px Segoe UI";ctx.textAlign="left";ctx.fillText("🔫 Ammo: "+ammo+"  Round: "+round,10,H-10);ctx.textAlign="right";ctx.fillText("Score: "+score,W-10,H-10);
}
function update(){
  frame++;if(frame%80===0)spawnDuck();
  ducks.forEach(d=>{if(d.hit){d.y+=3;return;}d.y+=d.vy;if(d.y<=d.hy-40){d.vy=1.2;}if(d.y>=d.hy+60)ducks.splice(ducks.indexOf(d),1);});
  ducks=ducks.filter(d=>!d.hit||d.y<H+50);
  if(ammo<=0&&ducks.filter(d=>!d.hit).length===0){round++;document.getElementById("rnd").textContent=round;ammo=15;document.getElementById("am").textContent=ammo;spawnDuck();spawnDuck();}
}
cv.addEventListener("click",e=>{
  if(!running||ammo<=0)return;
  ammo--;document.getElementById("am").textContent=ammo;
  const mx=e.offsetX,my=e.offsetY;shots.push({x:mx,y:my,r:5,a:1});
  ducks.forEach(d=>{if(!d.hit&&Math.abs(mx-d.hx)<22&&Math.abs(my-d.y)<15){d.hit=true;score+=20*round;document.getElementById("sc").textContent=score;}});
});
function go(){document.getElementById("ov").style.display="none";running=true;spawnDuck();spawnDuck();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script></body></html>

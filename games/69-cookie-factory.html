<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cookie Factory - ZenMagma</title>    <meta name="description" content="Run a cookie empire! Click to bake and unlock upgrades for your factory.">

<link rel="stylesheet" href="../css/game-fx.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0500;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;transition:.2s;margin:4px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #f7971e}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center;max-width:480px;margin:0 auto">
<div style="padding:8px"><span class="hv">Cookies:<b id="ck"> 0</b></span><span class="hv">Per sec:<b id="ps"> 0</b></span></div>
<div style="font-size:7em;cursor:pointer;user-select:none;padding:10px;transition:.1s" id="cookie" onclick="click_cookie()">🍪</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;max-width:400px;margin:0 auto" id="shop"></div>
<div style="color:#aaa;font-size:.8em;padding:6px" id="log"></div>
</div>
<div id="ov"><div id="ob"><h2>Cookie Factory</h2><p>Click the giant cookie to bake cookies! Buy upgrades to automate production. Reach 1 million cookies to win!</p><button class="btn" onclick="go()">Bake!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

let cookies=0,cps=0,frame=0;
const UPGRADES=[
  {name:"Grandma",emoji:"👵",desc:"Bakes 1/sec",cost:50,cps:1,owned:0},
  {name:"Oven",emoji:"🍳",desc:"Bakes 5/sec",cost:200,cps:5,owned:0},
  {name:"Factory",emoji:"🏭",desc:"Bakes 20/sec",cost:1000,cps:20,owned:0},
  {name:"Robot",emoji:"🤖",desc:"Bakes 100/sec",cost:5000,cps:100,owned:0},
  {name:"Time Machine",emoji:"⏰",desc:"Bakes 500/sec",cost:25000,cps:500,owned:0},
  {name:"Portal",emoji:"🌀",desc:"Bakes 2000/sec",cost:100000,cps:2000,owned:0},
];
function click_cookie(){
  cookies+=1+Math.floor(cps*.1);
  const c=document.getElementById("cookie");c.style.transform="scale(.9)";setTimeout(()=>c.style.transform="scale(1)",80);
  update();
}
function update(){document.getElementById("ck").textContent=fmt(Math.floor(cookies));document.getElementById("ps").textContent=fmt(cps);renderShop();}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n;}
function buy(i){const u=UPGRADES[i];if(cookies<u.cost){document.getElementById("log").textContent="Not enough cookies!";return;}cookies-=u.cost;u.owned++;u.cost=Math.floor(u.cost*1.5);cps+=u.cps;update();}
function renderShop(){document.getElementById("shop").innerHTML=UPGRADES.map((u,i)=>`<button class="btn" onclick="buy(${i})" style="text-align:left;padding:8px 12px;opacity:${cookies>=u.cost?1:.5}"><span style="font-size:1.4em">${u.emoji}</span> ${u.name}<br><small>${u.desc} | ${fmt(u.cost)} 🍪 | Owned:${u.owned}</small></button>`).join("");}
function go(){
  document.getElementById("ov").style.display="none";
  renderShop();
  setInterval(()=>{cookies+=cps;if(cookies>=1000000)document.getElementById("log").textContent="🎉 1 Million cookies! You win!";update();},1000);
}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Kids Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 700px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
            color: #667eea;
        }

        .question {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
            line-height: 1.6;
        }

        .score-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .score-box {
            background: #667eea;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option {
            background: #f0f0f0;
            border: 3px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
            color: #333;
        }

        .option:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .option.disabled {
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            color: #333;
        }

        .modal-title {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }
    </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
    <div class="container">
        <h1>🧠 QUIZ MASTER 🎓</h1>

        <div class="score-info">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Question</div>
                <div class="score-value" id="question-count">1/10</div>
            </div>
        </div>

        <div class="question" id="question">What is 2 + 2?</div>

        <div class="options" id="options"></div>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:12px">
            <button id="btn5050" onclick="use5050()" style="padding:10px 22px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff">🎯 50:50 (1×)</button>
            <button id="btnSkip" onclick="useSkip()" style="padding:10px 22px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff">⏭ Skip (1×)</button>
        </div>
    </div>

    <div class="modal" id="finishModal">
        <div class="modal-content">
            <div class="modal-title">Quiz Complete! 🎉</div>
            <div class="modal-score" id="finalScore">0/10</div>
            <div style="margin: 20px 0; font-size: 18px;">You got <span id="correctCount">0</span> questions correct!</div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="startQuiz()">Try Again</button>
                
            </div>
        </div>
    </div>

    <script>
        const quizzes = [
            { q: 'What is 2 + 2?', options: ['3', '4', '5', '6'], answer: 1 },
            { q: 'What color is the sky?', options: ['Red', 'Blue', 'Green', 'Yellow'], answer: 1 },
            { q: 'How many legs does a dog have?', options: ['2', '3', '4', '5'], answer: 2 },
            { q: 'What is 3 × 3?', options: ['6', '8', '9', '12'], answer: 2 },
            { q: 'Which animal says "Moo"?', options: ['Dog', 'Cat', 'Cow', 'Pig'], answer: 2 },
            { q: 'What is 10 - 5?', options: ['3', '4', '5', '6'], answer: 2 },
            { q: 'How many fingers do you have?', options: ['8', '9', '10', '11'], answer: 2 },
            { q: 'What is 4 + 5?', options: ['8', '9', '10', '11'], answer: 1 },
            { q: 'Which fruit is yellow?', options: ['Apple', 'Banana', 'Grape', 'Orange'], answer: 1 },
            { q: 'How many wheels does a car have?', options: ['2', '3', '4', '5'], answer: 2 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let used5050 = false, usedSkip = false;

        document.addEventListener('DOMContentLoaded', startQuiz);

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            used5050 = false; usedSkip = false;
            document.getElementById('btn5050').disabled = false; document.getElementById('btn5050').style.opacity = '1';
            document.getElementById('btnSkip').disabled = false; document.getElementById('btnSkip').style.opacity = '1';
            document.getElementById('finishModal').classList.remove('active');
            showQuestion();
        }

        function use5050() {
            if (used5050 || answered) return;
            used5050 = true;
            document.getElementById('btn5050').disabled = true; document.getElementById('btn5050').style.opacity = '0.4';
            const quiz = quizzes[currentQuestion];
            const opts = document.querySelectorAll('.option');
            let removed = 0;
            for (let i = 0; i < opts.length && removed < 2; i++) {
                if (i !== quiz.answer) { opts[i].style.visibility = 'hidden'; removed++; }
            }
        }

        function useSkip() {
            if (usedSkip || answered) return;
            usedSkip = true;
            document.getElementById('btnSkip').disabled = true; document.getElementById('btnSkip').style.opacity = '0.4';
            answered = true;
            currentQuestion++;
            setTimeout(showQuestion, 300);
        }

        function showQuestion() {
            if (currentQuestion >= quizzes.length) {
                endQuiz();
                return;
            }

            answered = false;
            const quiz = quizzes[currentQuestion];
            document.getElementById('question').textContent = quiz.q;
            document.getElementById('question-count').textContent = `${currentQuestion + 1}/10`;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            quiz.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectAnswer(index, quiz.answer);
                optionsDiv.appendChild(btn);
            });
        }

        function selectAnswer(selected, correct) {
            if (answered) return;
            answered = true;

            const options = document.querySelectorAll('.option');
            options.forEach((opt, index) => {
                opt.classList.add('disabled');
                if (index === correct) {
                    opt.classList.add('correct');
                }
                if (index === selected && selected !== correct) {
                    opt.classList.add('wrong');
                }
            });

            if (selected === correct) {
                score++;
            }

            document.getElementById('score').textContent = score;

            setTimeout(() => {
                currentQuestion++;
                showQuestion();
            }, 1500);
        }

        function endQuiz() {
            document.getElementById('finalScore').textContent = `${score}/10`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('finishModal').classList.add('active');
        }
    </script>
</body>
</html>

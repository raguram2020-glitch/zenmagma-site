<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Temple Run - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#5c94fc;touch-action:none}
#cv{display:block;position:fixed;top:0;left:0}
</style>
</head><body>
<canvas id="cv"></canvas>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);

/* ── AUDIO ── */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(f,d,v=.12,t='sine',f2=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;
  o.frequency.setValueAtTime(f,a.currentTime);
  if(f2)o.frequency.linearRampToValueAtTime(f2,a.currentTime+d);
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const SND={
  jump:()=>beep(280,.18,.11,'sine',520),
  land:()=>beep(110,.07,.09,'square'),
  slide:()=>beep(180,.13,.07,'sawtooth',90),
  coin:()=>{beep(780,.06,.1,'sine');setTimeout(()=>beep(1050,.06,.08,'sine'),55);},
  hit:()=>{beep(160,.4,.18,'sawtooth');setTimeout(()=>beep(90,.45,.17,'sawtooth'),180);},
  power:()=>beep(550,.22,.12,'sine',880),
  milestone:()=>{beep(660,.08,.1);setTimeout(()=>beep(880,.08,.1),90);setTimeout(()=>beep(1100,.15,.1),180);},
  roar:()=>{beep(80,.9,.35,'sawtooth');setTimeout(()=>beep(60,.6,.3,'sawtooth'),200);},
  scream:()=>{beep(600,.15,.2,'sine',900);setTimeout(()=>beep(500,.15,.2,'sine',300),180);}
};
document.addEventListener('pointerdown',()=>ac(),{once:true});

/* ── BACKGROUNDS / MOODS ── */
const BG=new Image();BG.src='../assets/backgrounds/templerun-bg.jpg';
const BG_NIGHT=new Image();BG_NIGHT.src='../assets/backgrounds/templerun-night.jpg';
const BG_STORM=new Image();BG_STORM.src='../assets/backgrounds/templerun-storm.jpg';
const MOOD_BGS=[BG,BG_NIGHT,BG_STORM];
const MOOD_LABELS=['DAWN RUN','NIGHT RAID','STORM SURGE'];
const MOOD_OVERLAYS=['rgba(255,200,100,0.05)','rgba(0,0,60,0.35)','rgba(80,40,0,0.4)'];
let moodIdx=0,moodFade=0,moodChanging=false,moodText='',moodTextT=0,rainDrops=[];
function triggerMood(next){
  moodIdx=next%MOOD_BGS.length;moodFade=0;moodChanging=true;moodText=MOOD_LABELS[moodIdx];moodTextT=120;
  if(moodIdx===2){rainDrops=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,spd:10+Math.random()*6,len:14+Math.random()*10}));}else rainDrops=[];
}

/* ── CONSTANTS ── */
const PX=()=>W*0.22;
const GRAVITY=0.55,JUMP_V=-13.5,SLIDE_DUR=38;
/* Y offset so running feet land exactly on the grass surface */
const PLAYER_FOOT_OFFSET=56; /* boot bottom is ~56px below translate anchor */
const CHEETAH_FOOT_OFFSET=36; /* paw bottom ~36px below translate anchor (accounting for scale+lean) */

/* ── STATE ── */
let screen='start';
let score,dist,coins,mult,maxMult,bestScore,frame,speed,lives;
let pl,obs=[],coinList=[],particles=[],floats=[],pwrList=[];
let bgX=0,bgX2=0,groundX=0;
let shieldOn=false,magnetOn=false,slowOn=false;
let shieldT=0,magnetT=0,slowT=0;
bestScore=parseInt(localStorage.getItem('tr_hs')||'0');

/* ── CHEETAH ── */
let cheetah={gap:300,targetGap:300,runFrame:0,state:'chase',obsCleared:0,x:0,y:0};
let cheetahCaught=false,catchFrame=0;
const CHEETAH_NORMAL_GAP=300;
const CHEETAH_SURGE_GAP=75;

/* ── CLOUDS / HILLS ── */
const CLOUDS=Array.from({length:6},(_,i)=>({x:i*(W/5),y:H*.08+Math.random()*H*.18,w:70+Math.random()*60,spd:0.4+Math.random()*.3}));
const HILLS=Array.from({length:4},(_,i)=>({x:i*(W/3.5),h:H*.12+Math.random()*H*.1,w:W*.25+Math.random()*W*.1}));

/* ── INIT ── */
function initGame(){
  ac();
  pl={x:PX(),y:GY,vy:0,onGround:true,jumping:false,slideTimer:0,runFrame:0,invincible:0,w:36,h:58};
  obs=[];coinList=[];particles=[];floats=[];pwrList=[];
  score=0;dist=0;coins=0;mult=1;maxMult=1;frame=0;speed=4.5;lives=5;
  shieldOn=false;magnetOn=false;slowOn=false;shieldT=0;magnetT=0;slowT=0;
  bgX=0;bgX2=0;groundX=0;
  moodIdx=0;moodFade=0;moodChanging=false;moodText='';moodTextT=0;rainDrops=[];
  cheetah={gap:CHEETAH_NORMAL_GAP,targetGap:CHEETAH_NORMAL_GAP,runFrame:0,state:'chase',obsCleared:0,x:PX()-CHEETAH_NORMAL_GAP,y:GY};
  cheetahCaught=false;catchFrame=0;
  screen='playing';
}

/* ── CONTROLS ── */
function doJump(){if(!pl.onGround||pl.slideTimer>0)return;pl.vy=JUMP_V;pl.onGround=false;pl.jumping=true;SND.jump();}
function doSlide(){if(!pl.onGround)return;pl.slideTimer=SLIDE_DUR;SND.slide();}
let keys={};
document.addEventListener('keydown',e=>{
  if(screen==='start'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen==='dead'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen!=='playing')return;
  if(e.key==='ArrowUp'||e.key==='ArrowDown'||e.key===' ')e.preventDefault();
  if((e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')&&!keys[e.key])doJump();
  if((e.key==='ArrowDown'||e.key==='s'||e.key==='S')&&!keys[e.key])doSlide();
  keys[e.key]=true;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{ac();const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty,d2=Math.sqrt(dx*dx+dy*dy);
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){if(window._retryBtn){const b=window._retryBtn;if(t.clientX>=b.x&&t.clientX<=b.x+b.w&&t.clientY>=b.y&&t.clientY<=b.y+b.h){initGame();return;}}initGame();return;}
  if(screen!=='playing')return;
  if(d2<18){doJump();return;}
  if(Math.abs(dy)>Math.abs(dx)){dy<-20?doJump():doSlide();}else doJump();
},{passive:true});
cv.addEventListener('click',e=>{
  ac();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){if(window._retryBtn&&inBox(window._retryBtn,mx,my)){initGame();return;}initGame();}
});

/* ── SPAWNING ── */
let spawnClock=0;
function spawnWave(){
  const r=Math.random(),sx=W+60;
  if(r<0.28)obs.push({x:sx,y:GY,w:30,h:42,type:'short'});
  else if(r<0.46)obs.push({x:sx+W*0.3,y:GY,w:28,h:55,type:'tall'});
  else if(r<0.62)obs.push({x:sx+W*0.3,y:GY-H*.14,w:90,h:18,type:'low',fy:GY-H*.14});
  else if(r<0.76){obs.push({x:sx,y:GY,w:28,h:40,type:'short'});obs.push({x:sx+115,y:GY,w:28,h:40,type:'short'});}
  else if(r<0.88)obs.push({x:sx,y:GY,w:28,h:38,type:'fire'});
  else{obs.push({x:sx,y:GY,w:28,h:40,type:'short'});obs.push({x:sx+150,y:GY-H*.15,w:80,h:16,type:'low',fy:GY-H*.15});}
  if(cheetah.state==='surging'){cheetah.obsCleared++;if(cheetah.obsCleared>=2){cheetah.state='chase';cheetah.targetGap=CHEETAH_NORMAL_GAP;cheetah.obsCleared=0;}}
  const n=3+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++)coinList.push({x:sx+20+i*42,y:GY-H*.20-Math.sin(i*.8)*H*.06,r:10,anim:i*.4,done:false});
  if(Math.random()<0.12){const tp=['shield','magnet','slow'];pwrList.push({x:sx+60,y:GY-H*.3,type:tp[Math.floor(Math.random()*3)],anim:0,r:16});}
}
function spawnPfx(x,y,col,n=10){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:-(Math.random()*4+1),life:1,col,r:2+Math.random()*4});}
function spawnFloat(x,y,txt,col='#ffd700'){floats.push({x,y,txt,col,life:1,vy:-1.2});}

/* ── UPDATE ── */
function update(){
  frame++;
  const spd=slowOn?speed*0.45:speed;
  if(frame%360===0)speed=Math.min(9,speed+0.2);
  score+=Math.round(spd*0.6*mult);dist+=spd*0.04;
  if(frame%20===0){mult=Math.min(8,1+Math.floor(coins/10));maxMult=Math.max(maxMult,mult);}
  const dm=Math.floor(dist/100);
  if(dm>0&&Math.floor((dist-spd*.04)/100)<dm){SND.milestone();spawnFloat(PX(),GY-80,dm*100+'m! ⭐','#ffd700');triggerMood(dm);}
  if(moodChanging){moodFade=Math.min(1,moodFade+0.018);if(moodFade>=1)moodChanging=false;}
  if(moodTextT>0)moodTextT--;
  if(rainDrops.length)rainDrops.forEach(r=>{r.y+=r.spd;if(r.y>H){r.y=0;r.x=Math.random()*W;}});
  cheetah.runFrame+=spd*0.28;
  cheetah.gap+=(cheetah.targetGap-cheetah.gap)*0.04;
  cheetah.x=PX()-cheetah.gap;cheetah.y=GY;
  bgX-=spd*0.18;bgX2-=spd*0.32;groundX-=spd;
  if(bgX<-W)bgX+=W;if(bgX2<-W)bgX2+=W;if(groundX<-80)groundX+=80;
  CLOUDS.forEach(c=>{c.x-=c.spd*(slowOn?.45:1);if(c.x+c.w+60<0)c.x=W+c.w;});
  HILLS.forEach(h=>{h.x-=spd*0.4;if(h.x+h.w<0)h.x=W+Math.random()*100;});
  if(pl.slideTimer>0)pl.slideTimer--;
  pl.y+=pl.vy;pl.vy+=GRAVITY;
  if(pl.y>=GY){pl.y=GY;pl.vy=0;if(!pl.onGround){pl.onGround=true;pl.jumping=false;SND.land();}}else pl.onGround=false;
  if(pl.invincible>0)pl.invincible--;
  pl.runFrame+=spd*0.22;
  obs=obs.filter(o=>{o.x-=spd;return o.x+o.w>-20;});
  coinList=coinList.filter(c=>{c.x-=spd;c.anim+=0.1;return c.x+c.r>-20&&!c.done;});
  pwrList=pwrList.filter(p=>{p.x-=spd;p.anim+=0.06;return p.x+p.r>-20;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;return p.life>0;});
  floats=floats.filter(f=>{f.y+=f.vy;f.life-=0.022;return f.life>0;});
  if(magnetOn)coinList.forEach(c=>{const dx=pl.x-c.x,dy=(pl.y-pl.h*.5)-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<160){c.x+=dx*0.1;c.y+=dy*0.1;}});
  const ph=pl.slideTimer>0?pl.h*0.48:pl.h;
  coinList.forEach(c=>{if(c.done)return;if(Math.abs(c.x-pl.x)<(pl.w*0.5+c.r)&&Math.abs(c.y-(pl.y-ph*0.5))<(ph*0.5+c.r)){c.done=true;coins++;const pts=30*mult;score+=pts;spawnPfx(c.x,c.y,'#ffd700',6);spawnFloat(c.x,c.y-10,'+'+pts);SND.coin();if(coins%10===0){mult=Math.min(8,mult+1);maxMult=Math.max(maxMult,mult);spawnFloat(c.x,c.y-30,'MULT x'+mult,'#ff6b6b');}}});
  for(let i=pwrList.length-1;i>=0;i--){const p=pwrList[i];if(Math.abs(p.x-pl.x)<pl.w*0.5+p.r&&Math.abs(p.y-(pl.y-ph*0.5))<ph*0.5+p.r){SND.power();if(p.type==='shield'){shieldOn=true;shieldT=420;}if(p.type==='magnet'){magnetOn=true;magnetT=420;}if(p.type==='slow'){slowOn=true;slowT=280;}spawnPfx(p.x,p.y,'#00e5ff',14);spawnFloat(p.x,p.y-20,p.type.toUpperCase(),'#00e5ff');pwrList.splice(i,1);}}
  if(shieldOn){shieldT--;if(shieldT<=0)shieldOn=false;}
  if(magnetOn){magnetT--;if(magnetT<=0)magnetOn=false;}
  if(slowOn){slowT--;if(slowT<=0)slowOn=false;}
  if(pl.invincible===0){
    const plTop=pl.y-(pl.slideTimer>0?pl.h*0.48:pl.h),plLeft=pl.x-pl.w*0.38,plRight=pl.x+pl.w*0.38;
    for(const o of obs){
      const oTop=o.type==='low'?o.y:o.y-o.h,oBot=o.type==='low'?o.y+o.h:o.y;
      if(plRight>o.x&&plLeft<o.x+o.w&&pl.y>oTop&&plTop<oBot){
        if(shieldOn){shieldOn=false;shieldT=0;pl.invincible=90;spawnPfx(pl.x,pl.y-30,'#00e5ff',18);}
        else{
          spawnPfx(pl.x,pl.y-30,'#ff4444',20);SND.hit();lives--;
          spawnFloat(pl.x,pl.y-50,lives>0?'❤️ -1 Life!':'💀 CAUGHT!','#ff4444');
          cheetah.targetGap=CHEETAH_SURGE_GAP;cheetah.state='surging';cheetah.obsCleared=0;
          if(lives<=0){
            if(score>bestScore){bestScore=score;localStorage.setItem('tr_hs',bestScore);}
            cheetah.targetGap=-30;cheetah.state='catching';
            screen='dying';return;
          }
          pl.invincible=150;return;
        }
      }
    }
  }
  spawnClock+=spd;
  if(spawnClock>620+Math.random()*280){spawnClock=0;spawnWave();}
}

/* ── DYING UPDATE (cheetah catch animation) ── */
function updateDying(){
  frame++;
  /* cheetah rushes in */
  cheetah.runFrame+=speed*0.5;
  cheetah.gap+=(cheetah.targetGap-cheetah.gap)*0.08;
  cheetah.x=PX()-cheetah.gap;
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;return p.life>0;});
  floats=floats.filter(f=>{f.y+=f.vy;f.life-=0.022;return f.life>0;});

  /* trigger catch when cheetah touches player's arm area */
  if(cheetah.gap<22&&!cheetahCaught){
    cheetahCaught=true;
    SND.roar();
    /* cheetah grabs — player screams */
    setTimeout(()=>SND.scream(),200);
    setTimeout(()=>SND.roar(),600);
  }

  if(cheetahCaught){
    catchFrame++;
    /* panic particles */
    if(catchFrame%5===0&&catchFrame<180){
      const cols=['#ff4400','#ff8800','#ffcc00','#fff'];
      particles.push({x:pl.x+(Math.random()-.5)*50,y:pl.y-70+(Math.random()-.5)*40,vx:(Math.random()-.5)*7,vy:-(Math.random()*5+2),life:1,col:cols[Math.floor(Math.random()*cols.length)],r:3+Math.random()*5});
    }
    /* stars/sweat flying off player */
    if(catchFrame%8===0&&catchFrame<160){
      particles.push({x:pl.x+Math.random()*30-15,y:pl.y-90+Math.random()*20,vx:(Math.random()-.5)*4,vy:-Math.random()*3-1,life:1,col:'rgba(100,180,255,0.9)',r:2+Math.random()*2});
    }
    if(catchFrame===40)SND.scream();
    if(catchFrame===100)SND.roar();
    if(catchFrame>230)screen='dead';
  }
}

/* ── BACKGROUND ── */
function drawBg(){
  const curBg=MOOD_BGS[moodIdx];
  if(curBg.complete&&curBg.naturalWidth)ctx.drawImage(curBg,0,0,W,H);
  if(moodChanging&&moodFade>0){ctx.globalAlpha=moodFade;if(curBg.complete&&curBg.naturalWidth)ctx.drawImage(curBg,0,0,W,H);ctx.globalAlpha=1;}
  ctx.fillStyle=MOOD_OVERLAYS[moodIdx];ctx.fillRect(0,0,W,H);
  if(rainDrops.length){ctx.strokeStyle='rgba(180,200,255,0.45)';ctx.lineWidth=1.2;rainDrops.forEach(r=>{ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-2,r.y+r.len);ctx.stroke();});}
  if(moodTextT>0){ctx.globalAlpha=Math.min(1,moodTextT/20);ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W/2-160,H*0.18-28,320,46);ctx.fillStyle='#ffd700';ctx.font='bold 26px sans-serif';ctx.textAlign='center';ctx.fillText('⚡ '+moodText,W/2,H*0.18+8);ctx.textAlign='left';ctx.globalAlpha=1;}
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(0,GY,W,H-GY);
}
function drawGround(){
  const dg=ctx.createLinearGradient(0,GY,0,H);dg.addColorStop(0,'#c8841c');dg.addColorStop(0.15,'#a0621a');dg.addColorStop(1,'#7a4810');
  ctx.fillStyle=dg;ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#5ba05b';ctx.fillRect(0,GY-8,W,16);ctx.fillStyle='#72c472';ctx.fillRect(0,GY-8,W,5);ctx.fillStyle='#3d7a3d';ctx.fillRect(0,GY+6,W,4);
  const BW=52,BH=18;ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;
  for(let row=0;row<Math.ceil((H-GY)/BH);row++){const off=row%2===0?0:BW/2;for(let col=(groundX%BW)-BW+off;col<W+BW;col+=BW)ctx.strokeRect(col,GY+row*BH+8,BW,BH);}
}

/* ══════════════════════════════════════════════════════════
   DRAW CHEETAH — paws sit on the grass line
   Translate anchor = (cx2, GY - CHEETAH_FOOT_OFFSET)
   so bottom of paws = GY
══════════════════════════════════════════════════════════ */
function drawCheetah(){
  const cx2=cheetah.x,cy2=cheetah.y;
  if(cx2>W+80)return;
  const catching=cheetah.state==='catching';
  const surging=cheetah.state==='surging';
  const cycle=cheetah.runFrame*0.14;
  const sc=0.82+Math.min(0.22,(CHEETAH_NORMAL_GAP-cheetah.gap)/CHEETAH_NORMAL_GAP*0.22);
  const gallop=Math.abs(Math.sin(cycle*2))*3.5;
  const legCycle1=Math.sin(cycle),legCycle2=Math.sin(cycle+Math.PI);

  /* shadow in absolute canvas coords */
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(cx2,GY+6,40*sc,9*sc,0,0,Math.PI*2);ctx.fill();

  ctx.save();
  ctx.translate(cx2, cy2-CHEETAH_FOOT_OFFSET);
  ctx.scale(sc,sc);

  const bodyLean=catching?-0.30:surging?-0.20:-0.12;
  ctx.rotate(bodyLean);

  /* ── TAIL ── */
  const tailWag=Math.sin(cycle*1.8)*14;
  ctx.lineWidth=7;ctx.strokeStyle='#c8a030';
  ctx.beginPath();ctx.moveTo(-28,-18);ctx.quadraticCurveTo(-50,-28+tailWag*.4,-54,-52+tailWag);ctx.stroke();
  ctx.lineWidth=4;ctx.strokeStyle='#2a1a00';
  ctx.beginPath();ctx.moveTo(-40,-38+tailWag*.6);ctx.lineTo(-54,-52+tailWag);ctx.stroke();
  ctx.fillStyle='#2a1a00';ctx.beginPath();ctx.arc(-54,-52+tailWag,6,0,Math.PI*2);ctx.fill();

  /* ── BACK LEGS ── */
  [-20,-10].forEach((lx,i)=>{
    const ang=(i===0?legCycle1:legCycle2)*0.55;
    ctx.fillStyle='#c8a030';
    ctx.save();ctx.translate(lx,-2+gallop);ctx.rotate(ang);
    ctx.beginPath();ctx.roundRect(-4,0,9,22,3);ctx.fill();
    ctx.save();ctx.translate(0,22);ctx.rotate(-ang*1.6);
    ctx.beginPath();ctx.roundRect(-4,0,8,20,3);ctx.fill();
    ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,22,7,4,0,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.restore();
  });

  /* ── BODY ── */
  const bG=ctx.createRadialGradient(0,-18+gallop,4,0,-18+gallop,36);
  bG.addColorStop(0,'#f0d060');bG.addColorStop(0.5,'#d4a840');bG.addColorStop(1,'#a07820');
  ctx.fillStyle=bG;ctx.beginPath();ctx.ellipse(0,-18+gallop,36,17,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,245,190,0.55)';ctx.beginPath();ctx.ellipse(0,-13+gallop,28,11,0,0,Math.PI*2);ctx.fill();
  const spots=[[-16,-30,4.5],[-5,-35,3.5],[8,-33,4.5],[22,-27,3.5],[-25,-20,3],[6,-22,4],[-12,-16,3.5],[20,-16,3],[28,-12,3]];
  ctx.fillStyle='#2a1a00';
  spots.forEach(([sx,sy,sr])=>{ctx.save();ctx.translate(sx,sy+gallop);ctx.rotate(0.3);ctx.beginPath();ctx.ellipse(0,0,sr,sr*.75,0,0,Math.PI*2);ctx.fill();ctx.restore();});

  /* ── FRONT LEGS ── */
  [8,18].forEach((lx,i)=>{
    const ang=(i===0?legCycle2:legCycle1)*0.55;
    ctx.fillStyle='#c8a030';
    ctx.save();ctx.translate(lx,-8+gallop);ctx.rotate(ang);
    ctx.beginPath();ctx.roundRect(-4,0,9,20,3);ctx.fill();
    ctx.save();ctx.translate(0,20);ctx.rotate(-ang*1.6);
    ctx.beginPath();ctx.roundRect(-4,0,8,18,3);ctx.fill();
    ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,20,7,4,0,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.restore();
  });

  /* ── NECK ── */
  ctx.fillStyle='#d4a840';
  ctx.save();ctx.translate(24,-24+gallop);ctx.rotate(0.3);
  ctx.beginPath();ctx.roundRect(-6,0,12,20,4);ctx.fill();
  ctx.restore();

  /* ── HEAD ── */
  const hby=-22+gallop+Math.sin(cycle*2)*2;
  const hbx=32;
  const hg=ctx.createRadialGradient(hbx,hby,1,hbx,hby,15);
  hg.addColorStop(0,'#f0d060');hg.addColorStop(1,'#c8a030');
  ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(hbx,hby,15,13,0.2,0,Math.PI*2);ctx.fill();
  [[hbx-6,hby-14],[hbx+5,hby-14]].forEach(([ex,ey])=>{
    ctx.fillStyle='#c8a030';ctx.beginPath();ctx.moveTo(ex-5,ey+5);ctx.lineTo(ex,ey-7);ctx.lineTo(ex+5,ey+5);ctx.fill();
    ctx.fillStyle='#ff9090';ctx.beginPath();ctx.moveTo(ex-3,ey+3);ctx.lineTo(ex,ey-3);ctx.lineTo(ex+3,ey+3);ctx.fill();
  });
  ctx.strokeStyle='#1a0a00';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(hbx-5,hby-2);ctx.quadraticCurveTo(hbx-9,hby+6,hbx-7,hby+12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hbx+7,hby-2);ctx.quadraticCurveTo(hbx+11,hby+6,hbx+9,hby+12);ctx.stroke();
  ctx.fillStyle='#2a1a00';
  [[hbx-9,hby-6,2],[hbx+9,hby-7,2],[hbx,hby-12,2]].forEach(([fx,fy,fr])=>{ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();});
  const eyeCol=catching?'#ff2200':cheetah.gap<120?'#ff7700':'#ffcc00';
  [[hbx-4,hby-1],[hbx+5,hby-1]].forEach(([ex,ey])=>{
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex,ey,3.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=eyeCol;ctx.beginPath();ctx.arc(ex,ey,2.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex,ey,1.4,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=eyeCol;ctx.shadowBlur=catching?18:7;
    ctx.strokeStyle=eyeCol;ctx.lineWidth=1;ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  });
  ctx.fillStyle='#2a1a00';ctx.beginPath();ctx.arc(hbx+13,hby+2,3,0,Math.PI*2);ctx.fill();
  if(catching||cheetah.gap<160){
    ctx.fillStyle='#8b1a00';ctx.beginPath();ctx.ellipse(hbx+11,hby+8,7,6,0.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(hbx+6,hby+5);ctx.lineTo(hbx+8,hby+14);ctx.lineTo(hbx+12,hby+6);ctx.fill();
    ctx.beginPath();ctx.moveTo(hbx+13,hby+5);ctx.lineTo(hbx+15,hby+14);ctx.lineTo(hbx+18,hby+6);ctx.fill();
    if(catching&&frame%16<8){ctx.fillStyle='rgba(255,80,0,0.85)';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('RRAWR!',hbx,hby-30);ctx.textAlign='left';}
  }

  /* ── CATCHING: RAISED GRABBING PAW toward player ── */
  if(catching&&cheetahCaught){
    const grabT=catchFrame;
    const grabAng=-1.9+Math.sin(grabT*0.1)*0.25; /* arm reaching back/up */
    ctx.save();ctx.translate(hbx-4,-16+gallop);ctx.rotate(grabAng);
    ctx.fillStyle='#c8a030';ctx.beginPath();ctx.roundRect(-5,0,10,26,3);ctx.fill();
    ctx.save();ctx.translate(0,26);ctx.rotate(0.5+Math.sin(grabT*0.12)*0.2);
    ctx.beginPath();ctx.roundRect(-4,0,9,22,3);ctx.fill();
    ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,22,8,5,0,0,Math.PI*2);ctx.fill();
    /* claws */
    ctx.fillStyle='rgba(230,230,220,0.95)';
    [-5,0,5].forEach(cx3=>{ctx.save();ctx.translate(cx3,22);ctx.rotate(0.2);ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(-3,10);ctx.lineTo(2,10);ctx.lineTo(2,0);ctx.fill();ctx.restore();});
    ctx.restore();ctx.restore();
  }

  /* speed lines when surging */
  if(surging||catching){
    [-10,-20,-30].forEach((dy,i)=>{
      ctx.globalAlpha=0.35-i*0.08;ctx.strokeStyle='#e8c860';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-32,dy);ctx.lineTo(-55-i*8,dy);ctx.stroke();
    });ctx.globalAlpha=1;
  }

  /* proximity danger bar */
  if(!catching&&cheetah.gap<200){
    ctx.globalAlpha=0.75;
    const filled=Math.min(1,1-(cheetah.gap/CHEETAH_NORMAL_GAP));
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-30,-80,60,8);
    ctx.fillStyle=cheetah.gap<100?'#ff2200':'#ff8800';
    ctx.fillRect(-30,-80,60*filled,8);
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('⚡',0,-73);ctx.textAlign='left';
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

/* ══════════════════════════════════════════════════════════
   DRAW PLAYER — boots sit on the grass line
   translate(px, py - PLAYER_FOOT_OFFSET) so boot bottoms = py = GY
══════════════════════════════════════════════════════════ */
function drawPlayer(){
  if(cheetahCaught&&screen==='dying'){drawPanicPlayer();return;}
  const sliding=pl.slideTimer>0;
  const ph=sliding?pl.h*0.48:pl.h;
  const px=pl.x,py=pl.y;
  const blink=pl.invincible>0&&Math.floor(pl.invincible*.2)%2===0;
  if(blink)return;
  const t=ctx;

  /* shadow always on ground */
  t.fillStyle='rgba(0,0,0,.28)';t.beginPath();t.ellipse(px,GY+4,22,6,0,0,Math.PI*2);t.fill();

  if(sliding){
    /* crouching: body center at (py-8), bottom at (py+5) ≈ grass surface */
    t.save();t.translate(px,py-8);
    const bG=t.createLinearGradient(-22,-8,22,8);bG.addColorStop(0,'#d4b070');bG.addColorStop(1,'#a07840');
    t.fillStyle=bG;t.beginPath();t.ellipse(0,0,24,13,-0.2,0,Math.PI*2);t.fill();
    t.fillStyle='#c8a060';t.beginPath();t.ellipse(-18,2,8,5,0.3,0,Math.PI*2);t.fill();t.beginPath();t.ellipse(18,-2,8,5,-0.3,0,Math.PI*2);t.fill();
    const fG=t.createRadialGradient(10,-8,0,10,-8,11);fG.addColorStop(0,'#f5c87a');fG.addColorStop(1,'#e0a855');
    t.fillStyle=fG;t.beginPath();t.arc(10,-8,10,0,Math.PI*2);t.fill();
    t.fillStyle='#222';t.beginPath();t.arc(14,-9,2,0,Math.PI*2);t.fill();
    t.fillStyle='rgba(255,255,255,0.8)';t.beginPath();t.arc(15,-10,0.8,0,Math.PI*2);t.fill();
    t.fillStyle='#5c3a1a';t.fillRect(-4,-22,26,6);t.fillRect(0,-34,20,13);t.fillStyle='#3a2000';t.fillRect(0,-21,20,2);
    t.restore();
  } else {
    const cycle=pl.runFrame*0.1;
    const legAngle=Math.sin(cycle)*0.44;
    const armAngle=Math.sin(cycle)*0.5;
    const bob=Math.sin(cycle*2)*2.5;

    /* OFFSET: translate up so boots land on grass */
    t.save();t.translate(px, py-PLAYER_FOOT_OFFSET);

    /* ── BACK LEG (right) ── */
    t.save();t.fillStyle='#8b6914';t.translate(4,-2+bob);t.rotate(-legAngle);
    t.beginPath();t.roundRect(-5,0,10,28,3);t.fill();
    t.save();t.translate(0,28);t.rotate(legAngle*1.5);
    t.beginPath();t.roundRect(-4,0,8,24,3);t.fill();
    t.fillStyle='#4a2800';t.fillRect(-6,22,14,8);t.restore();t.restore();

    /* ── FRONT LEG (left) ── */
    t.save();t.fillStyle='#8b6914';t.translate(-4,-2+bob);t.rotate(legAngle);
    t.beginPath();t.roundRect(-5,0,10,28,3);t.fill();
    t.save();t.translate(0,28);t.rotate(-legAngle*1.5);
    t.beginPath();t.roundRect(-4,0,8,24,3);t.fill();
    t.fillStyle='#4a2800';t.fillRect(-6,22,14,8);t.restore();t.restore();

    /* ── BODY ── */
    const bodyG=t.createLinearGradient(-15,-68+bob,15,-24+bob);
    bodyG.addColorStop(0,'#d4b070');bodyG.addColorStop(0.5,'#c8a060');bodyG.addColorStop(1,'#a07840');
    t.fillStyle=bodyG;t.beginPath();t.roundRect(-14,-68+bob,28,44,5);t.fill();
    t.strokeStyle='rgba(0,0,0,0.12)';t.lineWidth=1;t.beginPath();t.roundRect(-14,-68+bob,28,44,5);t.stroke();
    t.fillStyle='rgba(0,0,0,0.1)';t.fillRect(-10,-58+bob,10,8);
    t.fillStyle='#5c3a1a';t.fillRect(-14,-26+bob,28,5);t.fillStyle='#c8a000';t.fillRect(-5,-28+bob,10,8);

    /* ── BACK ARM ── */
    t.save();t.translate(14,-58+bob);t.rotate(-armAngle);
    t.fillStyle='#c8a060';t.beginPath();t.roundRect(-4,0,9,22,3);t.fill();
    t.save();t.translate(0,22);t.rotate(armAngle*1.2+0.3);
    t.beginPath();t.roundRect(-4,0,9,18,3);t.fill();
    t.fillStyle='#f0c878';t.beginPath();t.arc(0,18,5,0,Math.PI*2);t.fill();
    t.restore();t.restore();

    /* ── FRONT ARM + WHIP ── */
    t.save();t.translate(-14,-58+bob);t.rotate(armAngle);
    t.fillStyle='#c8a060';t.beginPath();t.roundRect(-4,0,9,22,3);t.fill();
    t.save();t.translate(0,22);t.rotate(-armAngle*1.2+0.3);
    t.beginPath();t.roundRect(-4,0,9,18,3);t.fill();
    t.fillStyle='#f0c878';t.beginPath();t.arc(0,18,5,0,Math.PI*2);t.fill();
    const wS=Math.sin(cycle*0.7)*8;
    t.strokeStyle='#8b4513';t.lineWidth=2.2;t.beginPath();t.moveTo(2,18);t.quadraticCurveTo(18+wS,-8,14+wS,8);t.stroke();
    t.lineWidth=1;t.strokeStyle='#6b3010';t.beginPath();t.moveTo(14+wS,8);t.quadraticCurveTo(22+wS,16,18+wS,24);t.stroke();
    t.restore();t.restore();

    /* ── HEAD ── */
    const hy=-86+bob;
    t.fillStyle='#f0c878';t.fillRect(-5,-70+bob,10,12);
    const hG=t.createRadialGradient(2,hy,0,2,hy,14);hG.addColorStop(0,'#f5c87a');hG.addColorStop(1,'#d4a055');
    t.fillStyle=hG;t.beginPath();t.ellipse(2,hy,12,13,0,0,Math.PI*2);t.fill();
    t.fillStyle='#e8b860';t.beginPath();t.ellipse(-10,hy+2,4,5,0.2,0,Math.PI*2);t.fill();
    t.fillStyle='#222';t.beginPath();t.arc(5,hy-2,3,0,Math.PI*2);t.fill();t.beginPath();t.arc(-3,hy-1,2.6,0,Math.PI*2);t.fill();
    t.fillStyle='rgba(255,255,255,0.88)';t.beginPath();t.arc(6,hy-3,1.1,0,Math.PI*2);t.fill();
    t.strokeStyle='#5c3a1a';t.lineWidth=2.2;
    t.beginPath();t.moveTo(-5,hy-6);t.lineTo(1,hy-7);t.stroke();
    t.beginPath();t.moveTo(2,hy-6);t.lineTo(8,hy-5);t.stroke();
    t.fillStyle='#c89050';t.beginPath();t.arc(3,hy+3,2,0,Math.PI*2);t.fill();
    t.strokeStyle='#8b5020';t.lineWidth=1.5;t.beginPath();t.moveTo(-1,hy+7);t.lineTo(7,hy+6);t.stroke();
    /* sweat when cheetah is close */
    if(cheetah.gap<180){t.fillStyle='rgba(100,180,255,0.8)';t.beginPath();t.arc(-10,hy-5,3,0,Math.PI*2);t.fill();t.beginPath();t.arc(-13,hy+4,2,0,Math.PI*2);t.fill();}
    t.fillStyle='#2c1a0a';t.beginPath();t.arc(2,hy-8,10,Math.PI,0);t.fill();t.beginPath();t.arc(-6,hy-6,6,-Math.PI*0.8,0);t.fill();
    const hF=Math.sin(cycle*1.5)*4;
    t.strokeStyle='#2c1a0a';t.lineWidth=2.2;
    t.beginPath();t.moveTo(-8,hy-10);t.quadraticCurveTo(-14,hy-14,-12-hF,hy-19);t.stroke();
    t.beginPath();t.moveTo(-5,hy-12);t.quadraticCurveTo(-10,hy-17,-9-hF*.6,hy-22);t.stroke();
    /* hat */
    t.fillStyle='#5c3a1a';t.beginPath();t.ellipse(2,hy-16,19,5,0,0,Math.PI*2);t.fill();
    const hatG=t.createLinearGradient(-13,hy-38,14,hy-16);hatG.addColorStop(0,'#7a5030');hatG.addColorStop(1,'#5c3a1a');
    t.fillStyle=hatG;t.beginPath();t.roundRect(-12,hy-38,26,22,[4,4,0,0]);t.fill();
    t.fillStyle='#3a2000';t.fillRect(-12,hy-17,26,3);
    t.restore();

    /* jump glow */
    if(!pl.onGround){
      const gg=ctx.createRadialGradient(px,py-ph*.5,0,px,py-ph*.5,40);
      gg.addColorStop(0,'rgba(255,220,80,.25)');gg.addColorStop(1,'rgba(255,180,0,0)');
      ctx.fillStyle=gg;ctx.beginPath();ctx.arc(px,py-ph*.5,40,0,Math.PI*2);ctx.fill();
    }
  }
  if(shieldOn){const p=.6+Math.sin(frame*.1)*.35;ctx.strokeStyle=`rgba(0,229,255,${p})`;ctx.lineWidth=3;ctx.shadowColor='#00e5ff';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(px,py-ph*.5,38,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}
}

/* ══════════════════════════════════════════════════════════
   PANIC PLAYER — dramatic catch animation
══════════════════════════════════════════════════════════ */
function drawPanicPlayer(){
  const cf=catchFrame;
  const px=pl.x,py=pl.y;
  const shX=Math.sin(cf*0.8)*Math.min(8,cf*0.09);
  const shY=Math.sin(cf*0.6+1)*Math.min(5,cf*0.06);

  /* shadow */
  ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(px+shX,GY+4,22,6,0,0,Math.PI*2);ctx.fill();

  ctx.save();
  ctx.translate(px+shX, py-PLAYER_FOOT_OFFSET+shY);

  /* legs — stopped, slightly bent in fear */
  const lB=Math.sin(cf*0.15)*6;
  ctx.fillStyle='#8b6914';
  ctx.save();ctx.translate(4,-2);ctx.rotate(0.12+lB*0.015);
  ctx.beginPath();ctx.roundRect(-5,0,10,28,3);ctx.fill();
  ctx.save();ctx.translate(0,28);ctx.rotate(0.28+lB*0.01);
  ctx.beginPath();ctx.roundRect(-4,0,8,24,3);ctx.fill();
  ctx.fillStyle='#4a2800';ctx.fillRect(-6,22,14,8);ctx.restore();ctx.restore();

  ctx.fillStyle='#8b6914';
  ctx.save();ctx.translate(-4,-2);ctx.rotate(-0.12+lB*0.015);
  ctx.beginPath();ctx.roundRect(-5,0,10,28,3);ctx.fill();
  ctx.save();ctx.translate(0,28);ctx.rotate(-0.28+lB*0.01);
  ctx.beginPath();ctx.roundRect(-4,0,8,24,3);ctx.fill();
  ctx.fillStyle='#4a2800';ctx.fillRect(-6,22,14,8);ctx.restore();ctx.restore();

  /* body */
  const bG=ctx.createLinearGradient(-15,-68,15,-24);bG.addColorStop(0,'#d4b070');bG.addColorStop(0.5,'#c8a060');bG.addColorStop(1,'#a07840');
  ctx.fillStyle=bG;ctx.beginPath();ctx.roundRect(-14,-68,28,44,5);ctx.fill();
  ctx.fillStyle='#5c3a1a';ctx.fillRect(-14,-26,28,5);ctx.fillStyle='#c8a000';ctx.fillRect(-5,-28,10,8);

  /* ── ARMS WAVING FRANTICALLY for HELP ── */
  const leftAng=-Math.PI*0.55+Math.sin(cf*0.55)*Math.PI*0.7;
  const rightAng=-Math.PI*0.45+Math.cos(cf*0.55+0.6)*Math.PI*0.7;
  const lFore=Math.sin(cf*0.65+0.5)*0.9;
  const rFore=Math.cos(cf*0.65)*0.9;

  /* right arm swings desperately up */
  ctx.fillStyle='#c8a060';
  ctx.save();ctx.translate(14,-58);ctx.rotate(rightAng);
  ctx.beginPath();ctx.roundRect(-4,0,9,22,3);ctx.fill();
  ctx.save();ctx.translate(0,22);ctx.rotate(rFore);
  ctx.beginPath();ctx.roundRect(-4,0,9,18,3);ctx.fill();
  ctx.fillStyle='#f0c878';ctx.beginPath();ctx.arc(0,18,6,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.restore();

  /* left arm swings desperately up */
  ctx.fillStyle='#c8a060';
  ctx.save();ctx.translate(-14,-58);ctx.rotate(leftAng);
  ctx.beginPath();ctx.roundRect(-4,0,9,22,3);ctx.fill();
  ctx.save();ctx.translate(0,22);ctx.rotate(lFore);
  ctx.beginPath();ctx.roundRect(-4,0,9,18,3);ctx.fill();
  ctx.fillStyle='#f0c878';ctx.beginPath();ctx.arc(0,18,6,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.restore();

  /* ── SCARED HEAD ── */
  const hTilt=Math.sin(cf*0.28)*0.22-0.15; /* tilted back in terror */
  ctx.fillStyle='#f0c878';ctx.fillRect(-5,-70,10,12);
  ctx.save();ctx.translate(2,-86);ctx.rotate(hTilt);

  const hG=ctx.createRadialGradient(0,0,0,0,0,14);hG.addColorStop(0,'#f5c87a');hG.addColorStop(1,'#d4a055');
  ctx.fillStyle=hG;ctx.beginPath();ctx.ellipse(0,0,12,13,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8b860';ctx.beginPath();ctx.ellipse(-10,2,4,5,0.2,0,Math.PI*2);ctx.fill();

  /* WIDE HORROR EYES */
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(5,-3,6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-3,-2,5.5,0,Math.PI*2);ctx.fill();
  /* tiny pupils = maximum fear */
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(5,-3,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-3,-2,2,0,Math.PI*2);ctx.fill();
  /* reflection glint */
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.beginPath();ctx.arc(6.5,-4.5,1.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-1.5,-3.5,1.2,0,Math.PI*2);ctx.fill();
  /* shock-lines around eyes */
  ctx.strokeStyle='rgba(255,140,0,0.75)';ctx.lineWidth=1.5;
  for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(5+Math.cos(a)*7,-3+Math.sin(a)*7);ctx.lineTo(5+Math.cos(a)*12,-3+Math.sin(a)*12);ctx.stroke();}
  /* eyebrows arched way up */
  ctx.strokeStyle='#5c3a1a';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-7,-10);ctx.quadraticCurveTo(-2,-16,1,-11);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2,-10);ctx.quadraticCurveTo(7,-16,10,-11);ctx.stroke();

  /* SCREAMING OPEN MOUTH */
  ctx.fillStyle='#8b1a00';ctx.beginPath();ctx.ellipse(2,7,7,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc2200';ctx.beginPath();ctx.ellipse(2,8,5,6.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(-5,3,4,5);ctx.fillRect(0,3,4,5);ctx.fillRect(5,3,4,5);
  ctx.fillStyle='#cc2200';ctx.beginPath();ctx.ellipse(2,14,4,3,0,0,Math.PI*2);ctx.fill(); /* tongue */

  /* SWEAT DROPS flying off */
  const swOff=Math.sin(cf*0.4)*3;
  ctx.fillStyle='rgba(80,150,255,0.88)';
  ctx.beginPath();ctx.arc(-12,2+swOff,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-16,10+swOff,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(14,0+swOff,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(17,9+swOff,2,0,Math.PI*2);ctx.fill();

  /* HAIR SPIKED UP in terror */
  ctx.fillStyle='#2c1a0a';
  for(let i=0;i<8;i++){
    const hx=-10+i*3,spH=9+Math.sin(cf*0.3+i*0.9)*4+i*0.4;
    ctx.beginPath();ctx.moveTo(hx-2,-10);ctx.lineTo(hx+Math.sin(cf*0.2+i)*2,-(10+spH));ctx.lineTo(hx+2,-10);ctx.fill();
  }
  ctx.restore(); /* head */

  /* HAT flying off dramatically */
  const hatT=Math.min(cf,80);

/* ══════════════════════════════════════════════════════════
   DRAMATIC CATCH OVERLAY
══════════════════════════════════════════════════════════ */
function drawCatchOverlay(){
  if(!cheetahCaught)return;
  const t=catchFrame;

  /* pulsing red vignette */
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(200,0,0,0)');
  vg.addColorStop(1,`rgba(200,0,0,${0.28+Math.sin(t*0.18)*0.14})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  /* ── CAUGHT! flash at the moment of catch ── */
  if(t>0&&t<35){
    const a=(35-t)/35;
    ctx.globalAlpha=a*0.65;ctx.fillStyle='rgba(255,80,0,0.8)';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=a;ctx.fillStyle='#fff';
    ctx.font=`900 ${Math.min(90,W*.16)}px Segoe UI,sans-serif`;
    ctx.textAlign='center';ctx.shadowColor='#ff4400';ctx.shadowBlur=40;
    ctx.fillText('CAUGHT! 🐆',W/2,H*0.48);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  /* ── "NOOO!!" ── */
  if(t>25&&t<95){
    const a=t<45?(t-25)/20:(95-t)/50;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(W/2-200,H*0.12,400,60,16);ctx.fill();
    ctx.fillStyle='#ff3300';ctx.font=`900 ${Math.min(56,W*.1)}px Segoe UI,sans-serif`;
    ctx.textAlign='center';ctx.shadowColor='#ff0000';ctx.shadowBlur=24;
    ctx.fillText('NOOO!! 😱',W/2,H*0.12+42);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  /* ── "HELP ME!!" ── */
  if(t>75&&t<155){
    const a=t<95?(t-75)/20:(155-t)/60;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(W/2-220,H*0.08,440,58,16);ctx.fill();
    ctx.fillStyle='#ffcc00';ctx.font=`900 ${Math.min(50,W*.09)}px Segoe UI,sans-serif`;
    ctx.textAlign='center';ctx.shadowColor='#ff8800';ctx.shadowBlur=20;
    ctx.fillText('HELP ME!! 🆘',W/2,H*0.08+40);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  /* ── "SOMEONE SAVE ME!" ── */
  if(t>130&&t<210){
    const a=t<150?(t-130)/20:(210-t)/60;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(W/2-250,H*0.1,500,52,14);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(38,W*.07)}px Segoe UI,sans-serif`;
    ctx.textAlign='center';ctx.shadowColor='#4488ff';ctx.shadowBlur=14;
    ctx.fillText('SOMEONE SAVE ME!! 😭',W/2,H*0.1+36);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  /* big emoji panic signs floating at random positions */
  if(t>30&&t<200&&t%22===0){
    const emojis=['💫','😱','🆘','❗','⚡','💥'];
    floats.push({x:pl.x+(Math.random()-.5)*120,y:pl.y-100,txt:emojis[Math.floor(Math.random()*emojis.length)],col:'#fff',life:1,vy:-2.2});
  }

  /* fade to black before game over */
  if(t>185){
    ctx.globalAlpha=Math.min(1,(t-185)/45);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}

  rows.forEach((r,i)=>{const ry=H*.61+i*H*.044;ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='left';ctx.fillText(r[0],bx+22,ry);ctx.fillStyle='#ffd700';ctx.textAlign='right';ctx.fillText(r[1],bx+bw-22,ry);});
  const b1w=Math.min(200,W*.44),b1h=54,b1x=W/2-b1w/2,by3=H*.84;
  const bg=ctx.createLinearGradient(b1x,by3,b1x+b1w,by3+b1h);bg.addColorStop(0,'#e74c3c');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(231,76,60,.45)';ctx.shadowBlur=18;ctx.beginPath();ctx.roundRect(b1x,by3,b1w,b1h,27);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(18,W*.04)}px Segoe UI,sans-serif`;ctx.textAlign='center';ctx.fillText('▶ Play Again',b1x+b1w/2,by3+b1h*.66);
  window._retryBtn={x:b1x,y:by3,w:b1w,h:b1h};
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`${Math.min(12,W*.026)}px Segoe UI,sans-serif`;ctx.fillText('or tap anywhere to retry',W/2,H*.96);
}
function inBox(btn,x,y){return btn&&x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h;}

/* ── MAIN LOOP ── */
function draw(){
  ctx.clearRect(0,0,W,H);
  if(screen==='start'){drawStartScreen();return;}

  /* screen shake during catch */
  let shook=false;
  if(cheetahCaught&&catchFrame<50){
    const sm=Math.max(0,8-catchFrame*0.16);
    ctx.save();ctx.translate((Math.random()-.5)*sm*2,(Math.random()-.5)*sm*2);
    shook=true;
  }

  drawBg();drawGround();
  obs.forEach(drawObs);coinList.forEach(drawCoin);pwrList.forEach(drawPowerup);
  drawPfx();
  drawCheetah();  /* cheetah behind player */
  drawPlayer();   /* player on top */
  drawHUD();
  if(screen==='dying')drawCatchOverlay();
  if(screen==='dead')drawDeadScreen();
  if(shook)ctx.restore();
}

function loop(){
  if(screen==='playing')update();
  else if(screen==='dying')updateDying();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

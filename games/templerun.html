<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Temple Run - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#5c94fc;touch-action:none}
#cv{display:block;position:fixed;top:0;left:0}
</style>
</head><body>
<canvas id="cv"></canvas>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);

/* ── AUDIO ── */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(f,d,v=.12,t='sine',f2=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;
  o.frequency.setValueAtTime(f,a.currentTime);
  if(f2)o.frequency.linearRampToValueAtTime(f2,a.currentTime+d);
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const SND={
  jump:()=>beep(280,.18,.11,'sine',520),
  land:()=>beep(110,.07,.09,'square'),
  slide:()=>beep(180,.13,.07,'sawtooth',90),
  coin:()=>{beep(780,.06,.1,'sine');setTimeout(()=>beep(1050,.06,.08,'sine'),55);},
  hit:()=>{beep(160,.4,.18,'sawtooth');setTimeout(()=>beep(90,.45,.17,'sawtooth'),180);},
  power:()=>beep(550,.22,.12,'sine',880),
  milestone:()=>{beep(660,.08,.1);setTimeout(()=>beep(880,.08,.1),90);setTimeout(()=>beep(1100,.15,.1),180);},
  roar:()=>{beep(80,.9,.35,'sawtooth');setTimeout(()=>beep(60,.6,.3,'sawtooth'),200);}
};
document.addEventListener('pointerdown',()=>ac(),{once:true});

/* ── BACKGROUNDS / MOODS ── */
const BG=new Image();BG.src='../assets/backgrounds/templerun-bg.jpg';
const BG_NIGHT=new Image();BG_NIGHT.src='../assets/backgrounds/templerun-night.jpg';
const BG_STORM=new Image();BG_STORM.src='../assets/backgrounds/templerun-storm.jpg';
const MOOD_BGS=[BG,BG_NIGHT,BG_STORM];
const MOOD_LABELS=['DAWN RUN','NIGHT RAID','STORM SURGE'];
const MOOD_OVERLAYS=['rgba(255,200,100,0.05)','rgba(0,0,60,0.35)','rgba(80,40,0,0.4)'];
let moodIdx=0,moodFade=0,moodChanging=false,moodText='',moodTextT=0,rainDrops=[];
function triggerMood(next){
  moodIdx=next%MOOD_BGS.length;moodFade=0;moodChanging=true;moodText=MOOD_LABELS[moodIdx];moodTextT=120;
  if(moodIdx===2){rainDrops=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,spd:10+Math.random()*6,len:14+Math.random()*10}));}else rainDrops=[];
}

/* ── CONSTANTS ── */
const PX=()=>W*0.22;
const GRAVITY=0.55,JUMP_V=-13.5,SLIDE_DUR=38;

/* ── STATE ── */
let screen='start';
let score,dist,coins,mult,maxMult,bestScore,frame,speed,lives;
let pl,obs=[],coinList=[],particles=[],floats=[],pwrList=[];
let bgX=0,bgX2=0,groundX=0;
let shieldOn=false,magnetOn=false,slowOn=false;
let shieldT=0,magnetT=0,slowT=0;
bestScore=parseInt(localStorage.getItem('tr_hs')||'0');

/* ── CHEETAH ── */
let cheetah={gap:300,targetGap:300,runFrame:0,state:'chase',obsCleared:0,x:0,y:0};
let cheetahCaught=false;
const CHEETAH_NORMAL_GAP=300;
const CHEETAH_SURGE_GAP=75;

/* ── CLOUDS / HILLS ── */
const CLOUDS=Array.from({length:6},(_,i)=>({x:i*(W/5),y:H*.08+Math.random()*H*.18,w:70+Math.random()*60,spd:0.4+Math.random()*.3}));
const HILLS=Array.from({length:4},(_,i)=>({x:i*(W/3.5),h:H*.12+Math.random()*H*.1,w:W*.25+Math.random()*W*.1}));

/* ── INIT ── */
function initGame(){
  ac();
  pl={x:PX(),y:GY,vy:0,onGround:true,jumping:false,slideTimer:0,runFrame:0,invincible:0,w:36,h:58};
  obs=[];coinList=[];particles=[];floats=[];pwrList=[];
  score=0;dist=0;coins=0;mult=1;maxMult=1;frame=0;speed=4.5;lives=5;
  shieldOn=false;magnetOn=false;slowOn=false;shieldT=0;magnetT=0;slowT=0;
  bgX=0;bgX2=0;groundX=0;
  moodIdx=0;moodFade=0;moodChanging=false;moodText='';moodTextT=0;rainDrops=[];
  cheetah={gap:CHEETAH_NORMAL_GAP,targetGap:CHEETAH_NORMAL_GAP,runFrame:0,state:'chase',obsCleared:0,x:PX()-CHEETAH_NORMAL_GAP,y:GY};
  cheetahCaught=false;
  screen='playing';
}

/* ── CONTROLS ── */
function doJump(){if(!pl.onGround||pl.slideTimer>0)return;pl.vy=JUMP_V;pl.onGround=false;pl.jumping=true;SND.jump();}
function doSlide(){if(!pl.onGround)return;pl.slideTimer=SLIDE_DUR;SND.slide();}

let keys={};
document.addEventListener('keydown',e=>{
  if(screen==='start'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen==='dead'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen!=='playing')return;
  if(e.key==='ArrowUp'||e.key==='ArrowDown'||e.key===' ')e.preventDefault();
  if((e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')&&!keys[e.key])doJump();
  if((e.key==='ArrowDown'||e.key==='s'||e.key==='S')&&!keys[e.key])doSlide();
  keys[e.key]=true;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{ac();const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-tx,dy=t.clientY-ty,dist2=Math.sqrt(dx*dx+dy*dy);
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){if(window._retryBtn){const b=window._retryBtn;if(t.clientX>=b.x&&t.clientX<=b.x+b.w&&t.clientY>=b.y&&t.clientY<=b.y+b.h){initGame();return;}}initGame();return;}
  if(screen!=='playing')return;
  if(dist2<18){doJump();return;}
  if(Math.abs(dy)>Math.abs(dx)){dy<-20?doJump():doSlide();}else doJump();
},{passive:true});
cv.addEventListener('click',e=>{
  ac();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){if(window._retryBtn&&inBox(window._retryBtn,mx,my)){initGame();return;}initGame();}
});

/* ── SPAWNING ── */
let spawnClock=0;
function spawnWave(){
  const r=Math.random(),sx=W+60;
  if(r<0.28)obs.push({x:sx,y:GY,w:30,h:42,type:'short',c:'#c0392b',ct:'#e74c3c'});
  else if(r<0.46)obs.push({x:sx+W*0.3,y:GY,w:28,h:55,type:'tall',c:'#27ae60',ct:'#2ecc71'});
  else if(r<0.62)obs.push({x:sx+W*0.3,y:GY-H*.14,w:90,h:18,type:'low',c:'#ff6600',ct:'#ffcc00',fy:GY-H*.14});
  else if(r<0.76){obs.push({x:sx,y:GY,w:28,h:40,type:'short',c:'#c0392b',ct:'#e74c3c'});obs.push({x:sx+115,y:GY,w:28,h:40,type:'short',c:'#c0392b',ct:'#e74c3c'});}
  else if(r<0.88)obs.push({x:sx,y:GY,w:28,h:38,type:'fire',c:'#7f1d1d',ct:'#dc2626'});
  else{obs.push({x:sx,y:GY,w:28,h:40,type:'short',c:'#c0392b',ct:'#e74c3c'});obs.push({x:sx+150,y:GY-H*.15,w:80,h:16,type:'low',c:'#e67e22',ct:'#f39c12',fy:GY-H*.15});}

  /* cheetah wave-clear tracking */
  if(cheetah.state==='surging'){
    cheetah.obsCleared++;
    if(cheetah.obsCleared>=2){cheetah.state='chase';cheetah.targetGap=CHEETAH_NORMAL_GAP;cheetah.obsCleared=0;}
  }

  const numCoins=3+Math.floor(Math.random()*4);
  for(let i=0;i<numCoins;i++)coinList.push({x:sx+20+i*42,y:GY-H*.20-Math.sin(i*.8)*H*.06,r:10,anim:i*.4,done:false});
  if(Math.random()<0.12){const types=['shield','magnet','slow'];pwrList.push({x:sx+60,y:GY-H*.3,type:types[Math.floor(Math.random()*3)],anim:0,r:16});}
}

function spawnPfx(x,y,col,n=10){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:-(Math.random()*4+1),life:1,col,r:2+Math.random()*4});}
function spawnFloat(x,y,txt,col='#ffd700'){floats.push({x,y,txt,col,life:1,vy:-1.2});}

/* ── UPDATE ── */
function update(){
  frame++;
  const spd=slowOn?speed*0.45:speed;
  if(frame%360===0)speed=Math.min(9,speed+0.2);
  score+=Math.round(spd*0.6*mult);
  dist+=spd*0.04;
  if(frame%20===0){mult=Math.min(8,1+Math.floor(coins/10));maxMult=Math.max(maxMult,mult);}

  const dm=Math.floor(dist/100);
  if(dm>0&&Math.floor((dist-spd*.04)/100)<dm){SND.milestone();spawnFloat(PX(),GY-80,dm*100+'m! ⭐','#ffd700');triggerMood(dm);}
  if(moodChanging){moodFade=Math.min(1,moodFade+0.018);if(moodFade>=1)moodChanging=false;}
  if(moodTextT>0)moodTextT--;
  if(rainDrops.length)rainDrops.forEach(r=>{r.y+=r.spd;if(r.y>H){r.y=0;r.x=Math.random()*W;}});

  /* cheetah movement */
  cheetah.runFrame+=spd*0.28;
  cheetah.gap+=(cheetah.targetGap-cheetah.gap)*0.04;
  cheetah.x=PX()-cheetah.gap;
  cheetah.y=GY;

  bgX-=spd*0.18;bgX2-=spd*0.32;groundX-=spd;
  if(bgX<-W)bgX+=W;if(bgX2<-W)bgX2+=W;
  if(groundX<-80)groundX+=80;
  CLOUDS.forEach(c=>{c.x-=c.spd*(slowOn?.45:1);if(c.x+c.w+60<0)c.x=W+c.w;});
  HILLS.forEach(h=>{h.x-=spd*0.4;if(h.x+h.w<0)h.x=W+Math.random()*100;});

  if(pl.slideTimer>0)pl.slideTimer--;
  pl.y+=pl.vy;pl.vy+=GRAVITY;
  if(pl.y>=GY){pl.y=GY;pl.vy=0;if(!pl.onGround){pl.onGround=true;pl.jumping=false;SND.land();}}else pl.onGround=false;
  if(pl.invincible>0)pl.invincible--;
  pl.runFrame+=spd*0.22;

  obs=obs.filter(o=>{o.x-=spd;return o.x+o.w>-20;});
  coinList=coinList.filter(c=>{c.x-=spd;c.anim+=0.1;return c.x+c.r>-20&&!c.done;});
  pwrList=pwrList.filter(p=>{p.x-=spd;p.anim+=0.06;return p.x+p.r>-20;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;return p.life>0;});
  floats=floats.filter(f=>{f.y+=f.vy;f.life-=0.022;return f.life>0;});

  if(magnetOn)coinList.forEach(c=>{const dx=pl.x-c.x,dy=(pl.y-pl.h*.5)-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<160){c.x+=dx*0.1;c.y+=dy*0.1;}});

  const ph=pl.slideTimer>0?pl.h*0.48:pl.h;
  coinList.forEach(c=>{if(c.done)return;if(Math.abs(c.x-pl.x)<(pl.w*0.5+c.r)&&Math.abs(c.y-(pl.y-ph*0.5))<(ph*0.5+c.r)){c.done=true;coins++;const pts=30*mult;score+=pts;spawnPfx(c.x,c.y,'#ffd700',6);spawnFloat(c.x,c.y-10,'+'+pts);SND.coin();if(coins%10===0){mult=Math.min(8,mult+1);maxMult=Math.max(maxMult,mult);spawnFloat(c.x,c.y-30,'MULT x'+mult,'#ff6b6b');}}});

  for(let i=pwrList.length-1;i>=0;i--){const p=pwrList[i];if(Math.abs(p.x-pl.x)<pl.w*0.5+p.r&&Math.abs(p.y-(pl.y-ph*0.5))<ph*0.5+p.r){SND.power();if(p.type==='shield'){shieldOn=true;shieldT=420;}if(p.type==='magnet'){magnetOn=true;magnetT=420;}if(p.type==='slow'){slowOn=true;slowT=280;}spawnPfx(p.x,p.y,'#00e5ff',14);spawnFloat(p.x,p.y-20,p.type.toUpperCase(),'#00e5ff');pwrList.splice(i,1);}}
  if(shieldOn){shieldT--;if(shieldT<=0)shieldOn=false;}
  if(magnetOn){magnetT--;if(magnetT<=0)magnetOn=false;}
  if(slowOn){slowT--;if(slowT<=0)slowOn=false;}

  if(pl.invincible===0){
    const plTop=pl.y-(pl.slideTimer>0?pl.h*0.48:pl.h);
    const plLeft=pl.x-pl.w*0.38,plRight=pl.x+pl.w*0.38;
    for(const o of obs){
      const oTop=o.type==='low'?o.y:o.y-o.h;
      const oBot=o.type==='low'?o.y+o.h:o.y;
      if(plRight>o.x&&plLeft<o.x+o.w&&pl.y>oTop&&plTop<oBot){
        if(shieldOn){shieldOn=false;shieldT=0;pl.invincible=90;spawnPfx(pl.x,pl.y-30,'#00e5ff',18);}
        else{
          spawnPfx(pl.x,pl.y-30,'#ff4444',20);SND.hit();lives--;
          spawnFloat(pl.x,pl.y-50,lives>0?'❤️ -1 Life!':'💀 CAUGHT!','#ff4444');
          /* cheetah surges on every hit */
          cheetah.targetGap=CHEETAH_SURGE_GAP;cheetah.state='surging';cheetah.obsCleared=0;
          if(lives<=0){
            if(score>bestScore){bestScore=score;localStorage.setItem('tr_hs',bestScore);}
            /* cheetah catches player */
            cheetah.targetGap=-80;cheetah.state='catching';
            screen='dying';return;
          }
          pl.invincible=150;return;
        }
      }
    }
  }

  spawnClock+=spd;
  if(spawnClock>620+Math.random()*280){spawnClock=0;spawnWave();}
}

function updateDying(){
  frame++;
  cheetah.runFrame+=speed*0.5;
  cheetah.gap+=(cheetah.targetGap-cheetah.gap)*0.07;
  cheetah.x=PX()-cheetah.gap;
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;return p.life>0;});
  floats=floats.filter(f=>{f.y+=f.vy;f.life-=0.022;return f.life>0;});
  if(cheetah.gap<18&&!cheetahCaught){
    cheetahCaught=true;
    for(let i=0;i<40;i++)particles.push({x:pl.x+(Math.random()-.5)*40,y:pl.y-30+(Math.random()-.5)*30,vx:(Math.random()-.5)*8,vy:-(Math.random()*6+2),life:1,col:['#ff4400','#ff8800','#ffcc00'][Math.floor(Math.random()*3)],r:3+Math.random()*5});
    SND.roar();
    setTimeout(()=>{screen='dead';},1600);
  }
}

/* ── DRAW BACKGROUND ── */
function drawBg(){
  const curBg=MOOD_BGS[moodIdx];
  if(curBg.complete&&curBg.naturalWidth)ctx.drawImage(curBg,0,0,W,H);
  if(moodChanging&&moodFade>0){ctx.globalAlpha=moodFade;if(curBg.complete&&curBg.naturalWidth)ctx.drawImage(curBg,0,0,W,H);ctx.globalAlpha=1;}
  ctx.fillStyle=MOOD_OVERLAYS[moodIdx];ctx.fillRect(0,0,W,H);
  if(rainDrops.length){ctx.strokeStyle='rgba(180,200,255,0.45)';ctx.lineWidth=1.2;rainDrops.forEach(r=>{ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-2,r.y+r.len);ctx.stroke();});}
  if(moodTextT>0){ctx.globalAlpha=Math.min(1,moodTextT/20);ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W/2-160,H*0.18-28,320,46);ctx.fillStyle='#ffd700';ctx.font='bold 26px sans-serif';ctx.textAlign='center';ctx.fillText('⚡ '+moodText,W/2,H*0.18+8);ctx.textAlign='left';ctx.globalAlpha=1;}
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(0,GY,W,H-GY);
}

function drawGround(){
  const dg=ctx.createLinearGradient(0,GY,0,H);
  dg.addColorStop(0,'#c8841c');dg.addColorStop(0.15,'#a0621a');dg.addColorStop(1,'#7a4810');
  ctx.fillStyle=dg;ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#5ba05b';ctx.fillRect(0,GY-8,W,16);
  ctx.fillStyle='#72c472';ctx.fillRect(0,GY-8,W,5);
  ctx.fillStyle='#3d7a3d';ctx.fillRect(0,GY+6,W,4);
  const BW=52,BH=18;
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;
  for(let row=0;row<Math.ceil((H-GY)/BH);row++){const offset=row%2===0?0:BW/2;for(let col=(groundX%BW)-BW+offset;col<W+BW;col+=BW)ctx.strokeRect(col,GY+row*BH+8,BW,BH);}
}

/* ── DRAW CHEETAH ── */
function drawCheetah(){
  const cx2=cheetah.x, cy2=cheetah.y;
  if(cx2>W+60)return; /* off right */

  const catching=cheetah.state==='catching';
  const surging=cheetah.state==='surging';
  const cycle=cheetah.runFrame*0.14;
  const sc=0.78+Math.min(0.25,(CHEETAH_NORMAL_GAP-cheetah.gap)/CHEETAH_NORMAL_GAP*0.25); /* bigger as closer */

  ctx.save();
  ctx.translate(cx2,cy2);
  ctx.scale(sc,sc);

  /* shadow */
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(0,6,38,9,0,0,Math.PI*2);ctx.fill();

  /* whole cheetah tilts forward when surging */
  const bodyLean=catching?-0.28:surging?-0.18:-0.1;
  ctx.rotate(bodyLean);

  const legCycle1=Math.sin(cycle),legCycle2=Math.sin(cycle+Math.PI);
  const gallop=Math.abs(Math.sin(cycle*2))*4; /* body bounce */

  /* ── TAIL ── */
  const tailWag=Math.sin(cycle*1.8)*14;
  ctx.lineWidth=7;ctx.strokeStyle='#c8a030';
  ctx.beginPath();ctx.moveTo(-28,-18);ctx.quadraticCurveTo(-50,-28+tailWag*.5,-52,-50+tailWag);ctx.stroke();
  ctx.lineWidth=4;ctx.strokeStyle='#2a1a00';
  ctx.beginPath();ctx.moveTo(-38,-36+tailWag*.6);ctx.lineTo(-52,-50+tailWag);ctx.stroke();
  ctx.fillStyle='#2a1a00';ctx.beginPath();ctx.arc(-52,-50+tailWag,6,0,Math.PI*2);ctx.fill();

  /* ── BACK LEGS ── */
  [-20,-10].forEach((lx,i)=>{
    const ang=(i===0?legCycle1:legCycle2)*0.55;
    ctx.fillStyle='#c8a030';
    ctx.save();ctx.translate(lx,-2+gallop);ctx.rotate(ang);
    ctx.beginPath();ctx.roundRect(-4,0,9,22,3);ctx.fill();
    ctx.save();ctx.translate(0,22);ctx.rotate(-ang*1.6);
    ctx.beginPath();ctx.roundRect(-4,0,8,20,3);ctx.fill();
    ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,22,7,4,0,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.restore();
  });

  /* ── BODY ── */
  const bodyG=ctx.createRadialGradient(0,-20+gallop,4,0,-20+gallop,36);
  bodyG.addColorStop(0,'#f0d060');bodyG.addColorStop(0.5,'#d4a840');bodyG.addColorStop(1,'#a07820');
  ctx.fillStyle=bodyG;
  ctx.beginPath();ctx.ellipse(0,-18+gallop,36,17,0,0,Math.PI*2);ctx.fill();

  /* belly lighter */
  ctx.fillStyle='rgba(255,245,190,0.55)';
  ctx.beginPath();ctx.ellipse(0,-13+gallop,28,11,0,0,Math.PI*2);ctx.fill();

  /* spots */
  const spots=[[-16,-30,4.5],[-5,-35,3.5],[8,-33,4.5],[22,-27,3.5],[-25,-20,3],[6,-22,4],[-12,-16,3.5],[20,-16,3],[28,-12,3]];
  ctx.fillStyle='#2a1a00';
  spots.forEach(([sx,sy,sr])=>{ctx.save();ctx.translate(sx,sy+gallop);ctx.rotate(Math.random()*.8-.4);ctx.beginPath();ctx.ellipse(0,0,sr,sr*.75,0,0,Math.PI*2);ctx.fill();ctx.restore();});

  /* ── FRONT LEGS ── */
  [8,18].forEach((lx,i)=>{
    const ang=(i===0?legCycle2:legCycle1)*0.55;
    ctx.fillStyle='#c8a030';
    ctx.save();ctx.translate(lx,-8+gallop);ctx.rotate(ang);
    ctx.beginPath();ctx.roundRect(-4,0,9,20,3);ctx.fill();
    ctx.save();ctx.translate(0,20);ctx.rotate(-ang*1.6);
    ctx.beginPath();ctx.roundRect(-4,0,8,18,3);ctx.fill();
    ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,20,7,4,0,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.restore();
  });

  /* ── NECK ── */
  ctx.fillStyle='#d4a840';
  ctx.save();ctx.translate(24,-24+gallop);ctx.rotate(0.3);
  ctx.beginPath();ctx.roundRect(-6,0,12,20,4);ctx.fill();
  ctx.restore();

  /* ── HEAD ── */
  const hby=-22+gallop+Math.sin(cycle*2)*2.5;
  const hbx=32;
  const hg=ctx.createRadialGradient(hbx,hby,1,hbx,hby,15);
  hg.addColorStop(0,'#f0d060');hg.addColorStop(1,'#c8a030');
  ctx.fillStyle=hg;
  ctx.beginPath();ctx.ellipse(hbx,hby,15,13,0.2,0,Math.PI*2);ctx.fill();

  /* ears */
  [[hbx-6,hby-14],[hbx+5,hby-14]].forEach(([ex,ey])=>{
    ctx.fillStyle='#c8a030';ctx.beginPath();ctx.moveTo(ex-5,ey+5);ctx.lineTo(ex,ey-7);ctx.lineTo(ex+5,ey+5);ctx.fill();
    ctx.fillStyle='#ff9090';ctx.beginPath();ctx.moveTo(ex-3,ey+3);ctx.lineTo(ex,ey-3);ctx.lineTo(ex+3,ey+3);ctx.fill();
  });

  /* cheetah tear-marks */
  ctx.strokeStyle='#1a0a00';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(hbx-5,hby-2);ctx.quadraticCurveTo(hbx-9,hby+6,hbx-7,hby+12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hbx+7,hby-2);ctx.quadraticCurveTo(hbx+11,hby+6,hbx+9,hby+12);ctx.stroke();

  /* head spots */
  ctx.fillStyle='#2a1a00';
  [[hbx-9,hby-6,2],[hbx+9,hby-7,2],[hbx,hby-12,2]].forEach(([fx,fy,fr])=>{ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();});

  /* eyes — glow intensifies when close */
  const eyeCol=catching?'#ff3300':cheetah.gap<120?'#ff8800':'#ffcc00';
  [[hbx-4,hby-1],[hbx+5,hby-1]].forEach(([ex,ey])=>{
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex,ey,3.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=eyeCol;ctx.beginPath();ctx.arc(ex,ey,2.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex,ey,1.4,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=eyeCol;ctx.shadowBlur=catching?16:6;
    ctx.strokeStyle=eyeCol;ctx.lineWidth=1;ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  });

  /* nose */
  ctx.fillStyle='#2a1a00';ctx.beginPath();ctx.arc(hbx+13,hby+2,3,0,Math.PI*2);ctx.fill();

  /* open mouth / fangs when close or catching */
  if(catching||cheetah.gap<150){
    ctx.fillStyle='#8b1a00';
    ctx.beginPath();ctx.ellipse(hbx+11,hby+8,7,5,0.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(hbx+7,hby+5);ctx.lineTo(hbx+8,hby+13);ctx.lineTo(hbx+11,hby+6);ctx.fill();
    ctx.beginPath();ctx.moveTo(hbx+13,hby+5);ctx.lineTo(hbx+14,hby+13);ctx.lineTo(hbx+17,hby+5);ctx.fill();
    /* growl roar text effect */
    if(catching&&frame%18<9){
      ctx.fillStyle='rgba(255,80,0,0.8)';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText('RRAWR!',hbx,hby-28);ctx.textAlign='left';
    }
  }

  /* speed lines when surging */
  if(surging||catching){
    ctx.globalAlpha=0.35;
    [-10,-20,-30].forEach((dy,i)=>{
      ctx.globalAlpha=0.35-i*0.08;
      ctx.strokeStyle='#e8c860';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-32,dy);ctx.lineTo(-55-i*8,dy);ctx.stroke();
    });
    ctx.globalAlpha=1;
  }

  /* distance indicator bar when surging */
  if(!catching&&cheetah.gap<180){
    ctx.globalAlpha=0.7;
    const barW=60,filled=1-(cheetah.gap/CHEETAH_NORMAL_GAP);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-30,-75,barW,8);
    ctx.fillStyle=cheetah.gap<100?'#ff3300':'#ff8800';
    ctx.fillRect(-30,-75,barW*Math.min(1,filled+0.15),8);
    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText('⚡',0,-68);ctx.textAlign='left';
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

/* ── DRAW PLAYER ── */
function drawPlayer(){
  const sliding=pl.slideTimer>0;
  const ph=sliding?pl.h*0.48:pl.h;
  const px=pl.x,py=pl.y;
  const blink=pl.invincible>0&&Math.floor(pl.invincible*.2)%2===0;
  if(blink)return;

  const t=ctx;
  t.fillStyle='rgba(0,0,0,.28)';t.beginPath();t.ellipse(px,py+4,22,7,0,0,Math.PI*2);t.fill();

  if(sliding){
    t.save();t.translate(px,py-14);
    const bodyG=t.createLinearGradient(-22,-8,22,8);bodyG.addColorStop(0,'#d4b070');bodyG.addColorStop(1,'#a07840');
    t.fillStyle=bodyG;t.beginPath();t.ellipse(0,0,24,13,-0.2,0,Math.PI*2);t.fill();
    t.fillStyle='#c8a060';t.beginPath();t.ellipse(-18,2,8,5,0.3,0,Math.PI*2);t.fill();
    t.beginPath();t.ellipse(18,-2,8,5,-0.3,0,Math.PI*2);t.fill();
    const fG=t.createRadialGradient(10,-8,0,10,-8,11);fG.addColorStop(0,'#f5c87a');fG.addColorStop(1,'#e0a855');
    t.fillStyle=fG;t.beginPath();t.arc(10,-8,10,0,Math.PI*2);t.fill();
    t.fillStyle='#222';t.beginPath();t.arc(14,-9,2,0,Math.PI*2);t.fill();
    t.fillStyle='rgba(255,255,255,0.8)';t.beginPath();t.arc(15,-10,0.8,0,Math.PI*2);t.fill();
    t.fillStyle='#5c3a1a';t.fillRect(-4,-22,26,6);t.fillRect(0,-34,20,13);
    t.fillStyle='#3a2000';t.fillRect(0,-21,20,2);
    t.restore();
  } else {
    const cycle=pl.runFrame*0.1;
    const legAngle=Math.sin(cycle)*0.44;
    const armAngle=Math.sin(cycle)*0.5;
    const bob=Math.sin(cycle*2)*2.5;

    t.save();t.translate(px,py);

    /* ── BACK LEG ── */
    t.save();t.fillStyle='#8b6914';t.translate(4,-2+bob);t.rotate(-legAngle);
    t.beginPath();t.roundRect(-5,0,10,28,3);t.fill();
    t.save();t.translate(0,28);t.rotate(legAngle*1.5);
    t.beginPath();t.roundRect(-4,0,8,24,3);t.fill();
    t.fillStyle='#4a2800';t.fillRect(-6,22,14,8);t.restore();t.restore();

    /* ── FRONT LEG ── */
    t.save();t.fillStyle='#8b6914';t.translate(-4,-2+bob);t.rotate(legAngle);
    t.beginPath();t.roundRect(-5,0,10,28,3);t.fill();
    t.save();t.translate(0,28);t.rotate(-legAngle*1.5);
    t.beginPath();t.roundRect(-4,0,8,24,3);t.fill();
    t.fillStyle='#4a2800';t.fillRect(-6,22,14,8);t.restore();t.restore();

    /* ── BODY ── */
    const bG=t.createLinearGradient(-15,-68+bob,15,-24+bob);
    bG.addColorStop(0,'#d4b070');bG.addColorStop(0.5,'#c8a060');bG.addColorStop(1,'#a07840');
    t.fillStyle=bG;t.beginPath();t.roundRect(-14,-68+bob,28,44,5);t.fill();
    /* shirt detail */
    t.strokeStyle='rgba(0,0,0,0.12)';t.lineWidth=1;t.beginPath();t.roundRect(-14,-68+bob,28,44,5);t.stroke();
    /* chest pocket */
    t.fillStyle='rgba(0,0,0,0.1)';t.fillRect(-10,-58+bob,10,8);
    /* belt */
    t.fillStyle='#5c3a1a';t.fillRect(-14,-26+bob,28,5);
    t.fillStyle='#c8a000';t.fillRect(-5,-28+bob,10,8);

    /* ── BACK ARM ── */
    t.save();t.translate(14,-58+bob);t.rotate(-armAngle);
    t.fillStyle='#c8a060';t.beginPath();t.roundRect(-4,0,9,22,3);t.fill();
    t.save();t.translate(0,22);t.rotate(armAngle*1.2+0.3);
    t.beginPath();t.roundRect(-4,0,9,18,3);t.fill();
    const faceG2=t.createRadialGradient(0,18,0,0,18,6);faceG2.addColorStop(0,'#f0c878');faceG2.addColorStop(1,'#d4a040');
    t.fillStyle=faceG2;t.beginPath();t.arc(0,18,5,0,Math.PI*2);t.fill();
    t.restore();t.restore();

    /* ── FRONT ARM + WHIP ── */
    t.save();t.translate(-14,-58+bob);t.rotate(armAngle);
    t.fillStyle='#c8a060';t.beginPath();t.roundRect(-4,0,9,22,3);t.fill();
    t.save();t.translate(0,22);t.rotate(-armAngle*1.2+0.3);
    t.beginPath();t.roundRect(-4,0,9,18,3);t.fill();
    t.fillStyle=faceG2;t.beginPath();t.arc(0,18,5,0,Math.PI*2);t.fill();
    /* whip */
    const whipSway=Math.sin(cycle*0.7)*8;
    t.strokeStyle='#8b4513';t.lineWidth=2.2;
    t.beginPath();t.moveTo(2,18);t.quadraticCurveTo(18+whipSway,-8,14+whipSway,8);t.stroke();
    t.lineWidth=1;t.strokeStyle='#6b3010';
    t.beginPath();t.moveTo(14+whipSway,8);t.quadraticCurveTo(22+whipSway,16,18+whipSway,24);t.stroke();
    t.restore();t.restore();

    /* ── HEAD ── */
    const headY=-86+bob;
    t.fillStyle='#f0c878';t.fillRect(-5,-70+bob,10,12); /* neck */
    const hG=t.createRadialGradient(2,headY,0,2,headY,14);
    hG.addColorStop(0,'#f5c87a');hG.addColorStop(1,'#d4a055');
    t.fillStyle=hG;t.beginPath();t.ellipse(2,headY,12,13,0,0,Math.PI*2);t.fill();
    /* ear */
    t.fillStyle='#e8b860';t.beginPath();t.ellipse(-10,headY+2,4,5,0.2,0,Math.PI*2);t.fill();
    /* eyes */
    t.fillStyle='#222';t.beginPath();t.arc(5,headY-2,3,0,Math.PI*2);t.fill();
    t.beginPath();t.arc(-3,headY-1,2.6,0,Math.PI*2);t.fill();
    t.fillStyle='rgba(255,255,255,0.88)';t.beginPath();t.arc(6,headY-3,1.1,0,Math.PI*2);t.fill();
    /* eyebrows furrowed — intense run */
    t.strokeStyle='#5c3a1a';t.lineWidth=2.2;
    t.beginPath();t.moveTo(-5,headY-6);t.lineTo(1,headY-7);t.stroke();
    t.beginPath();t.moveTo(2,headY-6);t.lineTo(8,headY-5);t.stroke();
    /* nose */
    t.fillStyle='#c89050';t.beginPath();t.arc(3,headY+3,2,0,Math.PI*2);t.fill();
    /* mouth — grimace */
    t.strokeStyle='#8b5020';t.lineWidth=1.5;
    t.beginPath();t.moveTo(-1,headY+7);t.lineTo(7,headY+6);t.stroke();
    /* sweat drop when cheetah close */
    if(cheetah.gap<160){
      t.fillStyle='rgba(100,180,255,0.8)';
      t.beginPath();t.arc(-10,headY-5,3,0,Math.PI*2);t.fill();
      t.beginPath();t.arc(-13,headY+4,2,0,Math.PI*2);t.fill();
    }
    /* hair */
    t.fillStyle='#2c1a0a';
    t.beginPath();t.arc(2,headY-8,10,Math.PI,0);t.fill();
    t.beginPath();t.arc(-6,headY-6,6,-Math.PI*0.8,0);t.fill();
    const hairFlit=Math.sin(cycle*1.5)*4;
    t.strokeStyle='#2c1a0a';t.lineWidth=2.2;
    t.beginPath();t.moveTo(-8,headY-10);t.quadraticCurveTo(-14,headY-14,-12-hairFlit,headY-19);t.stroke();
    t.beginPath();t.moveTo(-5,headY-12);t.quadraticCurveTo(-10,headY-17,-9-hairFlit*.6,headY-22);t.stroke();

    /* ── HAT ── */
    t.fillStyle='#5c3a1a';
    t.beginPath();t.ellipse(2,headY-16,19,5,0,0,Math.PI*2);t.fill();
    const hatG=t.createLinearGradient(-13,headY-38,14,headY-16);
    hatG.addColorStop(0,'#7a5030');hatG.addColorStop(1,'#5c3a1a');
    t.fillStyle=hatG;t.beginPath();t.roundRect(-12,headY-38,26,22,[4,4,0,0]);t.fill();
    t.fillStyle='#3a2000';t.fillRect(-12,headY-17,26,3);
    t.restore();

    /* jump glow */
    if(!pl.onGround){
      const gg=ctx.createRadialGradient(px,py-ph*.5,0,px,py-ph*.5,40);
      gg.addColorStop(0,'rgba(255,220,80,.25)');gg.addColorStop(1,'rgba(255,180,0,0)');
      ctx.fillStyle=gg;ctx.beginPath();ctx.arc(px,py-ph*.5,40,0,Math.PI*2);ctx.fill();
    }
  }

  /* shield */
  if(shieldOn){
    const pulse=.6+Math.sin(frame*.1)*.35;
    ctx.strokeStyle=`rgba(0,229,255,${pulse})`;ctx.lineWidth=3;
    ctx.shadowColor='#00e5ff';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(px,py-ph*.5,38,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
}

/* ── OBSTACLES ── */
function drawObs(o){
  const ox=o.x,ow=o.w;ctx.save();
  if(o.type==='low'){
    const oy=o.fy,oh=o.h,cx2=ox+ow/2,cy2=oy+oh/2,rx=ow/2,ry=oh/2,spin=frame*0.06;
    const bg=ctx.createRadialGradient(cx2-rx*.3,cy2-ry*.3,1,cx2,cy2,Math.max(rx,ry));
    bg.addColorStop(0,'#888');bg.addColorStop(0.5,'#555');bg.addColorStop(1,'#222');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(cx2,cy2,rx,ry,0,0,Math.PI*2);ctx.fill();
    ctx.save();ctx.translate(cx2,cy2);ctx.rotate(spin);
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-ry*.6);ctx.lineTo(rx*.4,ry*.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-rx*.5,0);ctx.lineTo(0,ry*.5);ctx.stroke();
    ctx.restore();
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(cx2,cy2,rx,ry,0,0,Math.PI*2);ctx.stroke();
    ctx.font='bold 12px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.shadowColor='#000';ctx.shadowBlur=6;ctx.fillText('⚠ SLIDE!',cx2,oy-6);ctx.shadowBlur=0;
  } else {
    const oh=o.h,oy=o.y-oh;
    if(o.type==='tall'){
      const bg=ctx.createLinearGradient(ox,0,ox+ow,0);bg.addColorStop(0,'#4a7c20');bg.addColorStop(0.4,'#6ab830');bg.addColorStop(0.7,'#3d6618');bg.addColorStop(1,'#5a9428');
      ctx.fillStyle=bg;ctx.fillRect(ox,oy,ow,oh);
      ctx.strokeStyle='#2d5010';ctx.lineWidth=2;
      for(let sy=oy+18;sy<oy+oh;sy+=18){ctx.beginPath();ctx.moveTo(ox,sy);ctx.lineTo(ox+ow,sy);ctx.stroke();}
      ctx.strokeStyle='#2d6e10';ctx.lineWidth=1.5;
      for(let vx=ox+4;vx<ox+ow-2;vx+=8){ctx.beginPath();ctx.moveTo(vx,oy);ctx.quadraticCurveTo(vx+6,oy+oh*.3,vx-3,oy+oh*.6);ctx.quadraticCurveTo(vx+5,oy+oh*.8,vx,oy+oh);ctx.stroke();}
      ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(ox+3,oy,ow*.22,oh);
      ctx.fillStyle='#ffee00';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.shadowColor='#005500';ctx.shadowBlur=8;ctx.fillText('⚠ SLIDE ↓',ox+ow/2,oy-10);ctx.shadowBlur=0;
    } else if(o.type==='fire'){
      const stG=ctx.createLinearGradient(ox,oy,ox,oy+oh);stG.addColorStop(0,'#8b7355');stG.addColorStop(1,'#5c4a28');
      ctx.fillStyle=stG;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,4);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;ctx.strokeRect(ox+3,oy+4,ow-6,oh-8);
      const flick=Math.sin(frame*.18)*4,flick2=Math.sin(frame*.27+1)*3;
      const fg=ctx.createLinearGradient(ox,oy-28+flick,ox,oy+oh);fg.addColorStop(0,'rgba(255,50,0,0)');fg.addColorStop(0.4,'rgba(255,140,0,0.9)');fg.addColorStop(1,'rgba(200,30,0,0.7)');
      ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(ox,oy+oh);ctx.quadraticCurveTo(ox+ow*.2,oy-20+flick,ox+ow*.35,oy-32+flick2);ctx.quadraticCurveTo(ox+ow*.5,oy-18+flick,ox+ow*.65,oy-30+flick);ctx.quadraticCurveTo(ox+ow*.8,oy-16+flick2,ox+ow,oy+oh);ctx.fill();
      ctx.fillStyle=`rgba(255,230,50,${0.7+Math.sin(frame*.2)*.3})`;ctx.beginPath();ctx.moveTo(ox+ow*.2,oy+oh);ctx.quadraticCurveTo(ox+ow*.35,oy-8+flick,ox+ow*.5,oy-18+flick2);ctx.quadraticCurveTo(ox+ow*.65,oy-8+flick,ox+ow*.8,oy+oh);ctx.fill();
      ctx.shadowColor='#ff6600';ctx.shadowBlur=18+flick*2;ctx.strokeStyle='rgba(255,100,0,0.4)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(ox,oy+oh);ctx.lineTo(ox+ow,oy+oh);ctx.stroke();ctx.shadowBlur=0;
      if(o.x>W*0.55){ctx.fillStyle='rgba(255,255,80,.9)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('JUMP ↑',ox+ow/2,oy-36);}
    } else {
      ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(ox+4,GY,ow,7);
      const baseG=ctx.createLinearGradient(ox,oy+oh-10,ox,oy+oh);baseG.addColorStop(0,'#7a5c2a');baseG.addColorStop(1,'#5c3e18');
      ctx.fillStyle=baseG;ctx.fillRect(ox-3,oy+oh-10,ow+6,10);
      const bG=ctx.createLinearGradient(ox,oy,ox+ow,oy);bG.addColorStop(0,'#a0742a');bG.addColorStop(0.4,'#c8963c');bG.addColorStop(1,'#8b6020');
      ctx.fillStyle=bG;ctx.fillRect(ox,oy+12,ow,oh-22);
      ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1.2;for(let ly=oy+20;ly<oy+oh-12;ly+=8){ctx.beginPath();ctx.moveTo(ox+4,ly);ctx.lineTo(ox+ow-4,ly);ctx.stroke();}
      ctx.fillStyle='#c8963c';ctx.beginPath();ctx.arc(ox+ow/2,oy+12,ow/2+2,Math.PI,0);ctx.fill();
      ctx.fillStyle='#d4aa40';ctx.beginPath();ctx.moveTo(ox-2,oy+12);ctx.lineTo(ox+ow/2,oy-4);ctx.lineTo(ox+ow+2,oy+12);ctx.fill();
      ctx.fillStyle=`rgba(255,200,0,${0.7+Math.sin(frame*.08)*.3})`;ctx.beginPath();ctx.arc(ox+ow*.3,oy+10,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ox+ow*.7,oy+10,3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#d4aa40';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy+12,ow,oh-22);
      if(o.x>W*0.55){ctx.fillStyle='rgba(255,255,80,.9)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('JUMP ↑',ox+ow/2,oy-10);}
    }
  }
  ctx.restore();
}

function drawCoin(c){
  const pulse=0.88+Math.sin(c.anim*2.5)*.12,r=c.r*pulse;
  const cg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*2.2);cg.addColorStop(0,'rgba(255,215,0,.4)');cg.addColorStop(1,'rgba(255,165,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y,r*2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0a000';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#92400e';ctx.font=`bold ${Math.floor(r*1.3)}px sans-serif`;ctx.textAlign='center';ctx.fillText('$',c.x,c.y+r*.38);
}

function drawPowerup(p){
  const bob=Math.sin(p.anim*3)*5,icons={shield:'🛡️',magnet:'🧲',slow:'⚡'},cols={shield:'#00e5ff',magnet:'#c084fc',slow:'#fde047'},col=cols[p.type];
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.globalAlpha=0.5+Math.sin(p.anim*4)*.4;
  ctx.beginPath();ctx.arc(p.x,p.y+bob,p.r+6,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  ctx.font=`${Math.floor(p.r*1.9)}px sans-serif`;ctx.textAlign='center';ctx.fillText(icons[p.type],p.x,p.y+bob+p.r*.6);
}

/* ── HUD ── */
function drawHUD(){
  /* cheetah warning bar */
  if(screen==='playing'&&cheetah.gap<CHEETAH_NORMAL_GAP*0.85){
    const danger=1-(cheetah.gap/CHEETAH_NORMAL_GAP);
    const bw=W*0.35,bx=(W-bw)/2,by=H-28;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(bx-60,by-16,bw+120,22,8);ctx.fill();
    ctx.fillStyle=danger>0.7?'#ff2200':danger>0.4?'#ff8800':'#ffcc00';
    ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('🐆 CHEETAH '+Math.round(danger*100)+'%',W/2,by-1);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.roundRect(bx,by+4,bw,6,3);ctx.fill();
    ctx.fillStyle=danger>0.7?'#ff2200':danger>0.4?'#ff8800':'#ffcc00';
    ctx.beginPath();ctx.roundRect(bx,by+4,bw*danger,6,3);ctx.fill();
    ctx.textAlign='left';
  }

  ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(8,8,W-16,52,10);ctx.fill();
  const items=[{l:'SCORE',v:score.toLocaleString(),c:'#ffd700',x:.12},{l:'DISTANCE',v:Math.round(dist)+'m',c:'#00e5ff',x:.32},{l:'COINS',v:coins,c:'#fb923c',x:.52},{l:'MULT',v:'x'+mult,c:'#f87171',x:.7}];
  items.forEach(it=>{
    ctx.font='bold 8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.45)';ctx.fillText(it.l,W*it.x,26);
    ctx.font=`bold ${Math.min(22,W*.045)}px Segoe UI,sans-serif`;ctx.fillStyle=it.c;ctx.fillText(it.v,W*it.x,47);
  });
  ctx.font='bold 8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.45)';ctx.fillText('LIVES',W*.88,26);
  const heartSize=Math.min(14,W*.028),totalHW=heartSize*5+4*3,hStartX=W*.88-totalHW/2;
  for(let i=0;i<5;i++){
    ctx.fillStyle=i<lives?'#ff3355':'rgba(255,255,255,.2)';ctx.beginPath();
    const hx=hStartX+i*(heartSize+3)+heartSize/2,hy=39;
    ctx.arc(hx-heartSize*.22,hy-heartSize*.12,heartSize*.25,Math.PI,0);
    ctx.arc(hx+heartSize*.22,hy-heartSize*.12,heartSize*.25,Math.PI,0);
    ctx.lineTo(hx,hy+heartSize*.35);ctx.closePath();ctx.fill();
  }
  if(frame<280){const a=Math.min(1,(280-frame)/60);ctx.globalAlpha=a*.7;ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(W/2-120,H-55,240,36,10);ctx.fill();ctx.fillStyle='#fff';ctx.font='13px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('↑/Space=Jump   ↓/S=Slide',W/2,H-32);ctx.globalAlpha=1;}
  let ap=null;
  if(shieldOn)ap={l:'🛡 SHIELD',t:shieldT,m:420,c:'#00e5ff'};
  else if(magnetOn)ap={l:'🧲 MAGNET',t:magnetT,m:420,c:'#c084fc'};
  else if(slowOn)ap={l:'⚡ SLOW MO',t:slowT,m:280,c:'#fde047'};
  if(ap){const bw=180,bh=10,bx=(W-bw)/2,by2=H-32;ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(bx-52,by2-18,bw+104,bh+24,8);ctx.fill();ctx.font='bold 11px sans-serif';ctx.fillStyle=ap.c;ctx.textAlign='center';ctx.fillText(ap.l,W/2,by2-4);ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,5);ctx.fill();ctx.fillStyle=ap.c;ctx.beginPath();ctx.roundRect(bx,by2,bw*(ap.t/ap.m),bh,5);ctx.fill();}
}

function drawPfx(){
  particles.forEach(p=>{ctx.globalAlpha=p.life*.8;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();});
  floats.forEach(f=>{ctx.globalAlpha=f.life;ctx.font=`bold ${Math.floor(13+f.life*8)}px Segoe UI,sans-serif`;ctx.textAlign='center';ctx.fillStyle=f.col;ctx.shadowColor=f.col;ctx.shadowBlur=8;ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;});
  ctx.globalAlpha=1;
}

/* ── CATCH SCREEN OVERLAY ── */
function drawCatchOverlay(){
  if(!cheetahCaught)return;
  const t=(Date.now()%1000)/1000;
  ctx.fillStyle=`rgba(255,40,0,${0.15+Math.sin(t*Math.PI*2)*0.1})`;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(W/2-180,H*0.35,360,70,14);ctx.fill();
  ctx.fillStyle='#ff3300';ctx.font=`bold ${Math.min(38,W*.08)}px Segoe UI,sans-serif`;ctx.textAlign='center';ctx.shadowColor='#ff0000';ctx.shadowBlur=20;
  ctx.fillText('🐆 CAUGHT!',W/2,H*0.35+46);ctx.shadowBlur=0;ctx.textAlign='left';
}

function drawStartScreen(){
  ctx.fillStyle='#5c94fc';ctx.fillRect(0,0,W,H);
  [[W*.2,H*.75,W*.35,H*.2],[W*.65,H*.78,W*.28,H*.15]].forEach(([hx,hy,hw,hh])=>{ctx.fillStyle='#5ba05b';ctx.beginPath();ctx.ellipse(hx,hy,hw/2,hh,0,Math.PI,0);ctx.fill();ctx.fillStyle='#6dbf6d';ctx.beginPath();ctx.ellipse(hx,hy-hh*.85,hw*.35,hh*.3,0,Math.PI,0);ctx.fill();});
  ctx.fillStyle='#5ba05b';ctx.fillRect(0,H*.8,W,H*.06);ctx.fillStyle='#72c472';ctx.fillRect(0,H*.8,W,H*.02);
  const dg=ctx.createLinearGradient(0,H*.86,0,H);dg.addColorStop(0,'#c8841c');dg.addColorStop(1,'#7a4810');ctx.fillStyle=dg;ctx.fillRect(0,H*.86,W,H);
  [[W*.15,H*.12,80],[W*.55,H*.08,100],[W*.82,H*.16,70]].forEach(([cx2,cy2,cw])=>{ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(cx2,cy2,cw*.5,17,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx2-cw*.28,cy2+6,cw*.3,12,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx2+cw*.28,cy2+6,cw*.28,11,0,0,Math.PI*2);ctx.fill();});
  ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.strokeStyle='#c0392b';ctx.lineWidth=6;ctx.font=`900 ${Math.min(68,W*.13)}px Segoe UI,sans-serif`;ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=12;
  ctx.strokeText('🏃 TEMPLE RUN',W/2,H*.26);
  const tg=ctx.createLinearGradient(W*.2,0,W*.8,0);tg.addColorStop(0,'#e74c3c');tg.addColorStop(.5,'#ffd200');tg.addColorStop(1,'#e74c3c');ctx.fillStyle=tg;ctx.fillText('🏃 TEMPLE RUN',W/2,H*.26);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font=`${Math.min(17,W*.037)}px Segoe UI,sans-serif`;ctx.fillText('RUN FROM THE CHEETAH!',W/2,H*.33);
  const cw2=Math.min(400,W*.8),cx2=(W-cw2)/2,cy2=H*.37;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(cx2,cy2,cw2,H*.25,14);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(cx2,cy2,cw2,H*.25,14);ctx.stroke();
  const tips=[['⬆ / Space / Tap','Jump over obstacles'],['⬇ / S / Swipe Down','Slide under barriers'],['🐆 Cheetah chases you!','Don\'t let it catch you'],['🛡️ 🧲 ⚡ Power-ups','Shield · Magnet · Slow Mo']];
  ctx.font=`${Math.min(14,W*.03)}px Segoe UI,sans-serif`;
  tips.forEach((tip,i)=>{const ry=cy2+26+i*H*.052;ctx.fillStyle='#ffd700';ctx.textAlign='left';ctx.fillText(tip[0],cx2+18,ry);ctx.fillStyle='rgba(255,255,255,.65)';ctx.textAlign='right';ctx.fillText(tip[1],cx2+cw2-18,ry);});
  const pulse=.94+Math.sin(frame*.07)*.06,bw=Math.min(220,W*.44),bh=54,bx=(W-bw)/2,by2=H*.7;
  ctx.save();ctx.translate(W/2,by2+bh/2);ctx.scale(pulse,pulse);ctx.translate(-W/2,-by2-bh/2);
  const bg=ctx.createLinearGradient(bx,by2,bx+bw,by2+bh);bg.addColorStop(0,'#e74c3c');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(231,76,60,.6)';ctx.shadowBlur=22;ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,28);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(21,W*.046)}px Segoe UI,sans-serif`;ctx.textAlign='center';ctx.fillText('▶  START!',W/2,by2+bh*.66);ctx.restore();
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font=`${Math.min(13,W*.027)}px Segoe UI,sans-serif`;ctx.fillText('Tap anywhere or press Space to start',W/2,H*.87);
}

function drawDeadScreen(){
  ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.font=`${Math.min(66,W*.12)}px sans-serif`;ctx.fillText('🐆',W/2,H*.2);
  ctx.fillStyle='#e74c3c';ctx.shadowColor='#ff0000';ctx.shadowBlur=28;
  ctx.font=`900 ${Math.min(54,W*.1)}px Segoe UI,sans-serif`;ctx.fillText('GAME OVER',W/2,H*.32);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,80,0,0.8)';ctx.font=`${Math.min(20,W*.043)}px Segoe UI,sans-serif`;ctx.fillText('The cheetah got you!',W/2,H*.41);
  const bw=Math.min(340,W*.82),bx=(W-bw)/2;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.roundRect(bx,H*.44,bw,H*.33,16);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,H*.44,bw,H*.33,16);ctx.stroke();
  if(score>=bestScore&&score>0){ctx.fillStyle='#ffd700';ctx.font=`bold ${Math.min(16,W*.034)}px Segoe UI,sans-serif`;ctx.fillText('🏆 NEW BEST!',W/2,H*.5);}
  ctx.fillStyle='#ffd700';ctx.font=`900 ${Math.min(58,W*.11)}px Segoe UI,sans-serif`;ctx.fillText(score.toLocaleString(),W/2,H*.575);
  const rows=[['Distance',Math.round(dist)+'m'],['Coins',coins],['Best Mult','x'+maxMult],['Best Score',bestScore.toLocaleString()]];
  ctx.font=`${Math.min(15,W*.032)}px Segoe UI,sans-serif`;
  rows.forEach((r,i)=>{const ry=H*.62+i*H*.044;ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='left';ctx.fillText(r[0],bx+22,ry);ctx.fillStyle='#ffd700';ctx.textAlign='right';ctx.fillText(r[1],bx+bw-22,ry);});
  const b1w=Math.min(200,W*.44),b1h=54,b1x=W/2-b1w/2,by3=H*.85;
  const bg=ctx.createLinearGradient(b1x,by3,b1x+b1w,by3+b1h);bg.addColorStop(0,'#e74c3c');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(231,76,60,.45)';ctx.shadowBlur=18;ctx.beginPath();ctx.roundRect(b1x,by3,b1w,b1h,27);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(18,W*.04)}px Segoe UI,sans-serif`;ctx.textAlign='center';ctx.fillText('▶ Play Again',b1x+b1w/2,by3+b1h*.66);
  window._retryBtn={x:b1x,y:by3,w:b1w,h:b1h};
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`${Math.min(12,W*.026)}px Segoe UI,sans-serif`;ctx.fillText('or tap anywhere to retry',W/2,H*.96);
}

function inBox(btn,x,y){return btn&&x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h;}

/* ── MAIN LOOP ── */
function draw(){
  ctx.clearRect(0,0,W,H);
  if(screen==='start'){drawStartScreen();return;}
  drawBg();drawGround();
  obs.forEach(drawObs);coinList.forEach(drawCoin);pwrList.forEach(drawPowerup);
  drawPfx();
  drawCheetah();
  drawPlayer();
  drawHUD();
  if(screen==='dying')drawCatchOverlay();
  if(screen==='dead')drawDeadScreen();
}

function loop(){
  if(screen==='playing')update();
  else if(screen==='dying')updateDying();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body></html>

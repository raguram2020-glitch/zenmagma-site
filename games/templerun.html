<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Temple Run - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
#cv{display:block;position:fixed;top:0;left:0}
</style>
</head><body>
<canvas id="cv"></canvas>
<script>
/* ══════════════════════════════════════════
   SETUP
══════════════════════════════════════════ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GY; // GY = ground Y
function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  GY=H*0.72; // ground line
}
resize();
window.addEventListener('resize',resize);

/* ══════════════════════════════════════════
   AUDIO
══════════════════════════════════════════ */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(f,d,v=.12,t='sine',f2=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;
  o.frequency.setValueAtTime(f,a.currentTime);
  if(f2)o.frequency.linearRampToValueAtTime(f2,a.currentTime+d);
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const SND={
  jump:()=>beep(280,.18,.11,'sine',520),
  land:()=>beep(110,.07,.09,'square'),
  slide:()=>beep(180,.13,.07,'sawtooth',90),
  coin:()=>{beep(780,.06,.1,'sine');setTimeout(()=>beep(1050,.06,.08,'sine'),55);},
  hit:()=>{beep(160,.4,.18,'sawtooth');setTimeout(()=>beep(90,.45,.17,'sawtooth'),180);},
  power:()=>beep(550,.22,.12,'sine',880),
  milestone:()=>{beep(660,.08,.1);setTimeout(()=>beep(880,.08,.1),90);setTimeout(()=>beep(1100,.15,.1),180);}
};
document.addEventListener('pointerdown',()=>ac(),{once:true});

/* ══════════════════════════════════════════
   GAME CONSTANTS
══════════════════════════════════════════ */
const PX=()=>W*0.22;   // player fixed X
const GRAVITY=0.55;
const JUMP_V=-13.5;
const SLIDE_DUR=38;

/* ══════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════ */
let screen='start'; // 'start'|'playing'|'dead'
let score,dist,coins,mult,maxMult,bestScore,frame,speed;
let pl,obs=[],coinList=[],particles=[],floats=[],pwrList=[];
let bgX=0,bgX2=0,groundX=0;
let shieldOn=false,magnetOn=false,slowOn=false;
let shieldT=0,magnetT=0,slowT=0;
bestScore=parseInt(localStorage.getItem('tr_hs')||'0');

/* parallax layers */
const CLOUDS=Array.from({length:8},(_,i)=>({x:i*(W/6),y:Math.random()*H*.28+H*.05,w:80+Math.random()*80,spd:0.3+Math.random()*.3,a:0.55+Math.random()*.3}));
const RUINS=Array.from({length:5},(_,i)=>({x:i*(W/4),h:60+Math.random()*100,w:30+Math.random()*50}));

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function initGame(){
  ac();
  pl={
    x:PX(), y:GY,      // bottom of player = GY
    vy:0,
    onGround:true,
    jumping:false,
    slideTimer:0,
    runFrame:0,
    invincible:0,
    w:36, h:58,        // collision box
  };
  obs=[];coinList=[];particles=[];floats=[];pwrList=[];
  score=0;dist=0;coins=0;mult=1;maxMult=1;frame=0;speed=4.5;
  shieldOn=false;magnetOn=false;slowOn=false;
  shieldT=0;magnetT=0;slowT=0;
  bgX=0;bgX2=0;groundX=0;
  screen='playing';
}

/* ══════════════════════════════════════════
   CONTROLS
══════════════════════════════════════════ */
function doJump(){
  if(!pl.onGround||pl.slideTimer>0) return;
  pl.vy=JUMP_V;pl.onGround=false;pl.jumping=true;
  SND.jump();
}
function doSlide(){
  if(!pl.onGround) return;
  pl.slideTimer=SLIDE_DUR;
  SND.slide();
}

let keys={};
document.addEventListener('keydown',e=>{
  if(screen==='start'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen==='dead'){if(e.key===' '||e.key==='Enter'){initGame();return;}if(e.key==='Escape'){screen='start';return;}}
  if(screen!=='playing') return;
  if((e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')&&!keys[e.key]){doJump();e.preventDefault();}
  if((e.key==='ArrowDown'||e.key==='s'||e.key==='S')&&!keys[e.key]){doSlide();}
  keys[e.key]=true;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch swipe + tap
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{
  ac();const t=e.touches[0];tx=t.clientX;ty=t.clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-tx,dy=t.clientY-ty,dist2=Math.sqrt(dx*dx+dy*dy);
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){
    const bx=W/2-90,by=H*.78;
    if(t.clientX>=bx&&t.clientX<=bx+180&&t.clientY>=by&&t.clientY<=by+50){initGame();return;}
    screen='start';return;
  }
  if(screen!=='playing') return;
  if(dist2<18){doJump();return;}
  if(Math.abs(dy)>Math.abs(dx)){dy<-20?doJump():doSlide();}
  else{doJump();}
},{passive:true});

/* ══════════════════════════════════════════
   SPAWNING
══════════════════════════════════════════ */
let spawnClock=0;
function spawnWave(){
  const r=Math.random();
  const sx=W+60;

  if(r<0.25){
    // Short barrier — jump over
    obs.push({x:sx,y:GY,w:45,h:65,type:'short',c:'#e74c3c',ct:'#ff6b6b'});
  } else if(r<0.46){
    // Tall barrier — must slide (can't jump over, too tall)
    obs.push({x:sx,y:GY,w:40,h:110,type:'tall',c:'#8e44ad',ct:'#a855f7'});
  } else if(r<0.62){
    // Low bar (floating) — slide under it
    obs.push({x:sx,y:GY-H*.14,w:120,h:28,type:'low',c:'#d35400',ct:'#e67e22',fy:GY-H*.14});
  } else if(r<0.75){
    // Double short — gap to jump through (jump over first)
    obs.push({x:sx,y:GY,w:40,h:60,type:'short',c:'#c0392b',ct:'#e74c3c'});
    obs.push({x:sx+110,y:GY,w:40,h:60,type:'short',c:'#c0392b',ct:'#e74c3c'});
  } else if(r<0.86){
    // Fire trap — short with flame on top
    obs.push({x:sx,y:GY,w:42,h:55,type:'fire',c:'#7f1d1d',ct:'#dc2626'});
  } else {
    // Combo: short then low bar
    obs.push({x:sx,y:GY,w:40,h:58,type:'short',c:'#1e3a5f',ct:'#3b82f6'});
    obs.push({x:sx+140,y:GY-H*.15,w:110,h:26,type:'low',c:'#1e3a5f',ct:'#3b82f6',fy:GY-H*.15});
  }

  // spawn coin row above safe path
  const numCoins=3+Math.floor(Math.random()*4);
  for(let i=0;i<numCoins;i++){
    coinList.push({x:sx+20+i*42,y:GY-H*.20-Math.sin(i*.8)*H*.06,r:10,anim:i*.4,done:false});
  }

  // power-up occasionally
  if(Math.random()<0.12){
    const types=['shield','magnet','slow'];
    pwrList.push({x:sx+60,y:GY-H*.3,type:types[Math.floor(Math.random()*3)],anim:0,r:16});
  }
}

/* ══════════════════════════════════════════
   PARTICLES & FLOATS
══════════════════════════════════════════ */
function spawnPfx(x,y,col,n=10){
  for(let i=0;i<n;i++) particles.push({
    x,y,vx:(Math.random()-0.5)*5,vy:-(Math.random()*4+1),
    life:1,col,r:2+Math.random()*4
  });
}
function spawnFloat(x,y,txt,col='#ffd700'){
  floats.push({x,y,txt,col,life:1,vy:-1.2});
}

/* ══════════════════════════════════════════
   UPDATE
══════════════════════════════════════════ */
function update(){
  frame++;
  const spd=slowOn?speed*0.45:speed;

  // speed ramp — very gentle
  if(frame%360===0) speed=Math.min(9,speed+0.2);

  // score
  score+=Math.round(spd*0.6*mult);
  dist+=spd*0.04;
  if(frame%20===0){ mult=Math.min(8,1+Math.floor(coins/10)); maxMult=Math.max(maxMult,mult); }

  // milestones
  const dm=Math.floor(dist/100);
  if(dm>0&&Math.floor((dist-spd*.04)/100)<dm){ SND.milestone(); spawnFloat(PX(),GY-80,dm*100+'m! 🏛️','#00e5ff'); }

  // scrolling
  bgX-=spd*0.18;bgX2-=spd*0.32;groundX-=spd;
  if(bgX<-W) bgX+=W;if(bgX2<-W) bgX2+=W;
  if(groundX<-80) groundX+=80;
  CLOUDS.forEach(c=>{ c.x-=c.spd*(slowOn?.45:1); if(c.x+c.w<0) c.x=W+c.w; });
  RUINS.forEach(r=>{ r.x-=spd*0.5; if(r.x+r.w<0) r.x=W+Math.random()*200; });

  // player physics
  if(pl.slideTimer>0) pl.slideTimer--;
  pl.y+=pl.vy;
  pl.vy+=GRAVITY;
  if(pl.y>=GY){ pl.y=GY; pl.vy=0; if(!pl.onGround){pl.onGround=true;pl.jumping=false;SND.land();} }
  else pl.onGround=false;
  if(pl.invincible>0) pl.invincible--;
  pl.runFrame+=spd*0.22;

  // scroll obstacles, coins, power-ups
  obs=obs.filter(o=>{o.x-=spd;return o.x+o.w>-20;});
  coinList=coinList.filter(c=>{c.x-=spd;c.anim+=0.1;return c.x+c.r>-20&&!c.done;});
  pwrList=pwrList.filter(p=>{p.x-=spd;p.anim+=0.06;return p.x+p.r>-20;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;return p.life>0;});
  floats=floats.filter(f=>{f.y+=f.vy;f.life-=0.022;return f.life>0;});

  // magnet
  if(magnetOn) coinList.forEach(c=>{
    const dx=pl.x-c.x,dy=(pl.y-pl.h*.5)-c.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<160){c.x+=dx*0.1;c.y+=dy*0.1;}
  });

  // coin collect
  const ph=pl.slideTimer>0?pl.h*0.48:pl.h;
  const py=pl.y-ph;
  coinList.forEach(c=>{
    if(c.done) return;
    if(Math.abs(c.x-pl.x)<(pl.w*0.5+c.r)&&Math.abs(c.y-(pl.y-ph*0.5))<(ph*0.5+c.r)){
      c.done=true;coins++;const pts=30*mult;score+=pts;
      spawnPfx(c.x,c.y,'#ffd700',6);spawnFloat(c.x,c.y-10,'+'+pts);
      SND.coin();
      if(coins%10===0){mult=Math.min(8,mult+1);maxMult=Math.max(maxMult,mult);spawnFloat(c.x,c.y-30,'MULT x'+mult,'#ff6b6b');}
    }
  });

  // power-up collect
  for(let i=pwrList.length-1;i>=0;i--){
    const p=pwrList[i];
    if(Math.abs(p.x-pl.x)<pl.w*0.5+p.r&&Math.abs(p.y-(pl.y-ph*0.5))<ph*0.5+p.r){
      SND.power();
      if(p.type==='shield'){shieldOn=true;shieldT=420;}
      if(p.type==='magnet'){magnetOn=true;magnetT=420;}
      if(p.type==='slow'){slowOn=true;slowT=280;}
      spawnPfx(p.x,p.y,'#00e5ff',14);spawnFloat(p.x,p.y-20,p.type.toUpperCase(),'#00e5ff');
      pwrList.splice(i,1);
    }
  }

  // power timers
  if(shieldOn){shieldT--;if(shieldT<=0)shieldOn=false;}
  if(magnetOn){magnetT--;if(magnetT<=0)magnetOn=false;}
  if(slowOn){slowT--;if(slowT<=0)slowOn=false;}

  // collision
  if(pl.invincible===0){
    const plTop=pl.y-(pl.slideTimer>0?pl.h*0.48:pl.h);
    const plLeft=pl.x-pl.w*0.4,plRight=pl.x+pl.w*0.4;
    for(const o of obs){
      const oTop = o.type==='low'?o.y:o.y-o.h;
      const oBot = o.type==='low'?o.y+o.h:o.y;
      const oL=o.x,oR=o.x+o.w;
      // AABB
      if(plRight>oL&&plLeft<oR&&pl.y>oTop&&plTop<oBot){
        if(shieldOn){shieldOn=false;shieldT=0;pl.invincible=90;spawnPfx(pl.x,pl.y-30,'#00e5ff',18);}
        else{
          spawnPfx(pl.x,pl.y-30,'#ff4444',20);
          if(score>bestScore){bestScore=score;localStorage.setItem('tr_hs',bestScore);}
          SND.hit();
          setTimeout(()=>{screen='dead';},700);
          screen='dying'; // freeze controls
          return;
        }
      }
    }
  }

  // spawn
  spawnClock+=spd;
  if(spawnClock>340+Math.random()*120){spawnClock=0;spawnWave();}
}

/* ══════════════════════════════════════════
   DRAW HELPERS
══════════════════════════════════════════ */
function drawBg(){
  // Sky gradient — vivid dusk
  const sky=ctx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#0d0628');
  sky.addColorStop(0.3,'#3b1278');
  sky.addColorStop(0.6,'#c2410c');
  sky.addColorStop(0.85,'#fb923c');
  sky.addColorStop(1,'#fcd34d');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GY);

  // sun
  const sunX=W*0.75,sunY=GY*0.6;
  const sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,W*0.18);
  sg.addColorStop(0,'rgba(255,245,150,.9)');
  sg.addColorStop(0.3,'rgba(255,180,50,.6)');
  sg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sunX,sunY,W*0.18,0,Math.PI*2);ctx.fill();

  // sun disc
  ctx.fillStyle='rgba(255,255,200,.85)';ctx.beginPath();ctx.arc(sunX,sunY,W*0.055,0,Math.PI*2);ctx.fill();

  // clouds
  CLOUDS.forEach(c=>{
    ctx.globalAlpha=c.a*0.65;
    ctx.fillStyle='rgba(255,200,180,1)';
    ctx.beginPath();ctx.ellipse(c.x,c.y,c.w,18,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x-c.w*.3,c.y+5,c.w*.55,14,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x+c.w*.35,c.y+4,c.w*.45,12,0,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // temple silhouette far back
  const tx2=W*0.5,ty2=GY;
  ctx.globalAlpha=0.18;ctx.fillStyle='#1a0a00';
  ctx.beginPath();ctx.moveTo(tx2-60,ty2);ctx.lineTo(tx2,ty2-160);ctx.lineTo(tx2+60,ty2);ctx.closePath();ctx.fill();
  for(let i=-1;i<=1;i++){const px=tx2+i*90;ctx.fillRect(px-7,ty2-70,14,70);}
  ctx.globalAlpha=1;

  // ruin silhouettes (mid layer)
  ctx.globalAlpha=0.35;ctx.fillStyle='#2d1505';
  RUINS.forEach(r=>{
    ctx.fillRect(r.x,GY-r.h,r.w,r.h);
    // battlements
    for(let b=0;b<3;b++) ctx.fillRect(r.x+b*(r.w/3),GY-r.h-14,r.w/3-4,14);
  });
  ctx.globalAlpha=1;
}

function drawGround(){
  // ground fill
  const gg=ctx.createLinearGradient(0,GY,0,H);
  gg.addColorStop(0,'#92400e');gg.addColorStop(0.3,'#78350f');gg.addColorStop(1,'#451a03');
  ctx.fillStyle=gg;ctx.fillRect(0,GY,W,H-GY);

  // stone tile track
  ctx.fillStyle='#a16207';
  const TW=80,TH=18;
  for(let tx3=groundX%TW-TW;tx3<W+TW;tx3+=TW){
    ctx.fillRect(tx3,GY,TW-3,TH);
    // highlight
    ctx.fillStyle='rgba(255,220,100,.15)';ctx.fillRect(tx3,GY,TW-3,4);
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(tx3,GY+14,TW-3,4);
    ctx.fillStyle='#a16207';
  }

  // ground edge highlight
  ctx.fillStyle='#fbbf24';ctx.fillRect(0,GY-2,W,3);
  // moss/crack strip
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(0,GY+TH,W,4);
}

function drawObs(o){
  const ox=o.x,ow=o.w;
  if(o.type==='low'){
    // floating bar with posts
    const oy=o.fy,oh=o.h;
    // posts
    ctx.fillStyle='#7c3a00';
    ctx.fillRect(ox+6,oy,8,GY-oy);ctx.fillRect(ox+ow-14,oy,8,GY-oy);
    // bar
    const bg=ctx.createLinearGradient(ox,oy,ox,oy+oh);
    bg.addColorStop(0,o.ct);bg.addColorStop(1,o.c);
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,5);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,5);ctx.stroke();
    // label
    ctx.font='bold 13px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.fillText('SLIDE →',ox+ow/2,oy+oh/2+5);
  } else {
    const oh=o.h;
    const oy=o.y-oh;
    // shadow
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(ox+6,GY,ow-4,10);
    // body
    const bg=ctx.createLinearGradient(ox,oy,ox+ow,oy+oh);
    bg.addColorStop(0,o.ct);bg.addColorStop(1,o.c);
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,6);ctx.fill();
    // highlight
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.roundRect(ox+4,oy+4,ow-8,oh*0.35,4);ctx.fill();
    // outline
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,6);ctx.stroke();
    // fire on top if fire type
    if(o.type==='fire'){
      ctx.font=`${Math.floor(ow*0.7)}px sans-serif`;ctx.textAlign='center';
      ctx.fillText('🔥',ox+ow/2,oy-4);
    }
    // jump arrow hint (only when far away, give player a hint)
    if(o.x>W*0.55&&o.type!=='tall'){
      ctx.fillStyle='rgba(255,255,100,.7)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
      ctx.fillText('JUMP ↑',ox+ow/2,oy-8);
    }
    if(o.type==='tall'&&o.x>W*0.55){
      ctx.fillStyle='rgba(255,200,100,.7)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
      ctx.fillText('SLIDE ↓',ox+ow/2,oy-8);
    }
  }
}

function drawCoin(c){
  const pulse=0.88+Math.sin(c.anim*2.5)*.12;
  const r=c.r*pulse;
  // glow
  const cg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*2.2);
  cg.addColorStop(0,'rgba(255,215,0,.4)');cg.addColorStop(1,'rgba(255,165,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y,r*2.2,0,Math.PI*2);ctx.fill();
  // coin body
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0a000';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.stroke();
  // $ symbol
  ctx.fillStyle='#92400e';ctx.font=`bold ${Math.floor(r*1.3)}px sans-serif`;ctx.textAlign='center';
  ctx.fillText('$',c.x,c.y+r*.38);
}

function drawPowerup(p){
  const bob=Math.sin(p.anim*3)*5;
  const icons={shield:'🛡️',magnet:'🧲',slow:'⚡'};
  const cols={shield:'#00e5ff',magnet:'#c084fc',slow:'#fde047'};
  const col=cols[p.type];
  // glow ring
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.globalAlpha=0.5+Math.sin(p.anim*4)*.4;
  ctx.beginPath();ctx.arc(p.x,p.y+bob,p.r+6,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;
  // icon
  ctx.font=`${Math.floor(p.r*1.9)}px sans-serif`;ctx.textAlign='center';
  ctx.fillText(icons[p.type],p.x,p.y+bob+p.r*.6);
}

function drawPlayer(){
  const sliding=pl.slideTimer>0;
  const ph=sliding?pl.h*0.48:pl.h;
  const px=pl.x,py=pl.y;
  const blink=pl.invincible>0&&Math.floor(pl.invincible*.2)%2===0;
  if(blink) return;

  ctx.save();
  const run=pl.runFrame;

  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(px,py+4,22,7,0,0,Math.PI*2);ctx.fill();

  if(sliding){
    // slide pose — character ducked low
    ctx.fillStyle='#7d4e1a';ctx.beginPath();ctx.ellipse(px,py-12,30,14,-.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f5cfa0';ctx.beginPath();ctx.arc(px-18,py-18,10,0,Math.PI*2);ctx.fill();
    // hat
    ctx.fillStyle='#5a3510';ctx.beginPath();ctx.roundRect(px-28,py-26,22,8,3);ctx.fill();
  } else {
    // LEGS
    const lSwing=Math.sin(run)*18;
    ctx.lineCap='round';ctx.lineWidth=10;ctx.strokeStyle='#8b5e3c';
    // left leg
    ctx.beginPath();ctx.moveTo(px-6,py-22);ctx.lineTo(px-6+lSwing,py+2);ctx.stroke();
    // right leg
    ctx.beginPath();ctx.moveTo(px+6,py-22);ctx.lineTo(px+6-lSwing,py+2);ctx.stroke();

    // BODY
    const bodyG=ctx.createLinearGradient(px-14,py-ph,px+14,py-ph+ph*.55);
    bodyG.addColorStop(0,'#d4863c');bodyG.addColorStop(1,'#a05c20');
    ctx.fillStyle=bodyG;ctx.beginPath();ctx.roundRect(px-14,py-ph+18,28,ph-18,5);ctx.fill();

    // ARMS
    const armSwing=Math.sin(run+Math.PI)*14;
    ctx.lineWidth=8;ctx.strokeStyle='#c4752e';
    ctx.beginPath();ctx.moveTo(px-14,py-ph+24);ctx.lineTo(px-28,py-ph+38+armSwing);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+14,py-ph+24);ctx.lineTo(px+28,py-ph+38-armSwing);ctx.stroke();

    // SCARF
    ctx.fillStyle='#dc2626';ctx.beginPath();ctx.roundRect(px-15,py-ph+16,30,8,3);ctx.fill();

    // HEAD
    const hg=ctx.createRadialGradient(px-2,py-ph+10,0,px,py-ph+12,12);
    hg.addColorStop(0,'#f9d8a0');hg.addColorStop(1,'#d4936e');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(px,py-ph+12,12,0,Math.PI*2);ctx.fill();

    // HAT brim + crown
    ctx.fillStyle='#7d4e1a';ctx.beginPath();ctx.roundRect(px-16,py-ph+2,32,7,2);ctx.fill();
    ctx.fillStyle='#5a3510';ctx.beginPath();ctx.roundRect(px-10,py-ph-8,20,12,3);ctx.fill();

    // EYES
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px-4,py-ph+12,2.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+4,py-ph+12,2.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(px-4,py-ph+12,1.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+4,py-ph+12,1.4,0,Math.PI*2);ctx.fill();

    // Glow when in air
    if(!pl.onGround){
      const gg2=ctx.createRadialGradient(px,py-ph*.5,0,px,py-ph*.5,40);
      gg2.addColorStop(0,'rgba(255,180,50,.25)');gg2.addColorStop(1,'rgba(255,120,0,0)');
      ctx.fillStyle=gg2;ctx.beginPath();ctx.arc(px,py-ph*.5,40,0,Math.PI*2);ctx.fill();
    }
  }

  // Shield bubble
  if(shieldOn){
    const pulse=.6+Math.sin(frame*.1)*.35;
    ctx.strokeStyle=`rgba(0,229,255,${pulse})`;ctx.lineWidth=3;
    ctx.shadowColor='#00e5ff';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(px,py-ph*.5,38,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function drawHUD(){
  // top bar
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.beginPath();ctx.roundRect(8,8,W-16,52,10);ctx.fill();
  const items=[
    {l:'SCORE',v:score.toLocaleString(),c:'#ffd700',x:.14},
    {l:'DISTANCE',v:Math.round(dist)+'m',c:'#00e5ff',x:.38},
    {l:'COINS',v:coins,c:'#fb923c',x:.62},
    {l:'MULT',v:'x'+mult,c:'#f87171',x:.86},
  ];
  items.forEach(it=>{
    ctx.font='bold 8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.45)';
    ctx.fillText(it.l,W*it.x,26);
    ctx.font=`bold ${Math.min(22,W*.045)}px Segoe UI,sans-serif`;ctx.fillStyle=it.c;
    ctx.fillText(it.v,W*it.x,47);
  });

  // controls hint (fade after 5s)
  if(frame<280){
    const a=Math.min(1,(280-frame)/60);
    ctx.globalAlpha=a*.7;ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(W/2-120,H-55,240,36,10);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='13px Segoe UI,sans-serif';ctx.textAlign='center';
    ctx.fillText('↑ / Space = Jump     ↓ / S = Slide',W/2,H-32);
    ctx.globalAlpha=1;
  }

  // power bar
  let ap=null;
  if(shieldOn)ap={l:'🛡 SHIELD',t:shieldT,m:420,c:'#00e5ff'};
  else if(magnetOn)ap={l:'🧲 MAGNET',t:magnetT,m:420,c:'#c084fc'};
  else if(slowOn)ap={l:'⚡ SLOW MO',t:slowT,m:280,c:'#fde047'};
  if(ap){
    const bw=180,bh=10,bx=(W-bw)/2,by2=H-32;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(bx-52,by2-18,bw+104,bh+24,8);ctx.fill();
    ctx.font='bold 11px sans-serif';ctx.fillStyle=ap.c;ctx.textAlign='center';ctx.fillText(ap.l,W/2,by2-4);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,5);ctx.fill();
    ctx.fillStyle=ap.c;ctx.beginPath();ctx.roundRect(bx,by2,bw*(ap.t/ap.m),bh,5);ctx.fill();
  }
}

function drawStartScreen(){
  // sky bg
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0628');sky.addColorStop(0.4,'#3b1278');sky.addColorStop(0.7,'#c2410c');sky.addColorStop(1,'#fbbf24');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // sun glow
  const sunX=W*0.7,sunY=H*0.55;
  const sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,W*0.25);
  sg.addColorStop(0,'rgba(255,240,120,.7)');sg.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sunX,sunY,W*.25,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,200,.8)';ctx.beginPath();ctx.arc(sunX,sunY,W*.055,0,Math.PI*2);ctx.fill();

  // temple
  ctx.globalAlpha=0.5;ctx.fillStyle='#1a0a00';
  ctx.beginPath();ctx.moveTo(W*.5-70,H*.75);ctx.lineTo(W*.5,H*.35);ctx.lineTo(W*.5+70,H*.75);ctx.closePath();ctx.fill();
  for(let i=-1;i<=1;i++){ctx.fillRect(W*.5+i*100-8,H*.75-80,16,80);}
  ctx.globalAlpha=1;

  // title
  ctx.textAlign='center';
  const tg=ctx.createLinearGradient(W*.2,0,W*.8,0);
  tg.addColorStop(0,'#f7971e');tg.addColorStop(.5,'#ffd200');tg.addColorStop(1,'#ff6b6b');
  ctx.fillStyle=tg;ctx.shadowColor='rgba(255,180,0,.5)';ctx.shadowBlur=25;
  ctx.font=`900 ${Math.min(72,W*.13)}px Segoe UI,sans-serif`;
  ctx.fillText('🏛️ TEMPLE RUN',W/2,H*.28);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font=`${Math.min(18,W*.04)}px Segoe UI,sans-serif`;
  ctx.fillText('ENDLESS SIDE RUNNER',W/2,H*.35);

  // controls card
  const cw=Math.min(400,W*.8),cx=(W-cw)/2,cy=H*.4;
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.roundRect(cx,cy,cw,H*.26,14);ctx.fill();
  ctx.strokeStyle='rgba(255,200,80,.3)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(cx,cy,cw,H*.26,14);ctx.stroke();
  const tips=[['⬆ / Space / Tap','Jump over obstacles'],['⬇ / S / Swipe Down','Slide under barriers'],['🪙 Collect coins','Boost score multiplier'],['🛡️ 🧲 ⚡ Power-ups','Shield · Magnet · Slow Mo']];
  ctx.font=`${Math.min(14,W*.03)}px Segoe UI,sans-serif`;
  tips.forEach((t,i)=>{
    const ry=cy+28+i*H*.055;
    ctx.fillStyle='#ffd700';ctx.textAlign='left';ctx.fillText(t[0],cx+20,ry);
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.textAlign='right';ctx.fillText(t[1],cx+cw-20,ry);
  });

  // play button
  const pulse=.94+Math.sin(frame*.07)*.06;
  const bw=Math.min(200,W*.42),bh=54,bx=(W-bw)/2,by2=H*.72;
  ctx.save();ctx.translate(W/2,by2+bh/2);ctx.scale(pulse,pulse);ctx.translate(-W/2,-by2-bh/2);
  const bg=ctx.createLinearGradient(bx,by2,bx+bw,by2+bh);
  bg.addColorStop(0,'#f7971e');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(247,151,30,.55)';ctx.shadowBlur=22;
  ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,27);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#1a0005';ctx.font=`bold ${Math.min(20,W*.045)}px Segoe UI,sans-serif`;ctx.textAlign='center';
  ctx.fillText('▶  RUN!',W/2,by2+bh*.66);
  ctx.restore();

  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`${Math.min(13,W*.028)}px Segoe UI,sans-serif`;
  ctx.fillText('Tap anywhere or press Space to start',W/2,H*.89);
}

function drawDeadScreen(){
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  ctx.font=`${Math.min(70,W*.12)}px sans-serif`;ctx.fillText('💀',W/2,H*.2);
  ctx.fillStyle='#ff4444';ctx.shadowColor='#ff0000';ctx.shadowBlur=28;
  ctx.font=`900 ${Math.min(58,W*.1)}px Segoe UI,sans-serif`;ctx.fillText('GAME OVER',W/2,H*.32);
  ctx.shadowBlur=0;

  // score box
  const bw=Math.min(340,W*.8),bx=(W-bw)/2;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.roundRect(bx,H*.35,bw,H*.34,16);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,H*.35,bw,H*.34,16);ctx.stroke();

  if(score>=bestScore&&score>0){
    ctx.fillStyle='#00e5ff';ctx.font=`bold ${Math.min(16,W*.034)}px Segoe UI,sans-serif`;
    ctx.fillText('🏆 NEW BEST!',W/2,H*.41);
  }
  ctx.fillStyle='#ffd700';ctx.font=`900 ${Math.min(60,W*.11)}px Segoe UI,sans-serif`;
  ctx.fillText(score.toLocaleString(),W/2,H*.535);

  const rows=[['Distance',Math.round(dist)+'m'],['Coins',coins],['Best Mult','x'+maxMult],['Best Score',bestScore.toLocaleString()]];
  ctx.font=`${Math.min(15,W*.032)}px Segoe UI,sans-serif`;
  rows.forEach((r,i)=>{
    const ry=H*.59+i*H*.046;
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='left';ctx.fillText(r[0],bx+22,ry);
    ctx.fillStyle='#ffd700';ctx.textAlign='right';ctx.fillText(r[1],bx+bw-22,ry);
  });

  // buttons
  const b1w=Math.min(160,W*.34),b1h=50,gap=18;
  const totalBW=b1w*2+gap,b1x=W/2-totalBW/2,b2x=b1x+b1w+gap,by3=H*.82;
  const bg=ctx.createLinearGradient(b1x,by3,b1x+b1w,by3+b1h);
  bg.addColorStop(0,'#f7971e');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(247,151,30,.4)';ctx.shadowBlur=12;
  ctx.beginPath();ctx.roundRect(b1x,by3,b1w,b1h,25);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#1a0005';ctx.font=`bold ${Math.min(17,W*.038)}px Segoe UI,sans-serif`;
  ctx.textAlign='center';ctx.fillText('▶ Retry',b1x+b1w/2,by3+b1h*.66);

  ctx.fillStyle='rgba(255,255,255,.1)';ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(b2x,by3,b1w,b1h,25);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.fillText('🏠 Menu',b2x+b1w/2,by3+b1h*.66);

  // store btn coords for click
  window._retryBtn={x:b1x,y:by3,w:b1w,h:b1h};
  window._menuBtn={x:b2x,y:by3,w:b1w,h:b1h};
}

function inBox(btn,x,y){return btn&&x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h;}
cv.addEventListener('click',e=>{
  ac();
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){
    if(inBox(window._retryBtn,mx,my)){initGame();return;}
    if(inBox(window._menuBtn,mx,my)){screen='start';return;}
  }
});

/* ══════════════════════════════════════════
   DRAW PARTICLES + FLOATS
══════════════════════════════════════════ */
function drawPfx(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*.8;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  });
  floats.forEach(f=>{
    ctx.globalAlpha=f.life;ctx.font=`bold ${Math.floor(13+f.life*8)}px Segoe UI,sans-serif`;
    ctx.textAlign='center';ctx.fillStyle=f.col;ctx.shadowColor=f.col;ctx.shadowBlur=8;
    ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════ */
function draw(){
  ctx.clearRect(0,0,W,H);
  if(screen==='start'){drawStartScreen();return;}

  drawBg();
  drawGround();

  // game objects
  obs.forEach(drawObs);
  coinList.forEach(drawCoin);
  pwrList.forEach(drawPowerup);
  drawPfx();
  drawPlayer();

  // HUD on top
  drawHUD();

  if(screen==='dead'||screen==='dying') drawDeadScreen();
}

function loop(){
  if(screen==='playing') update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

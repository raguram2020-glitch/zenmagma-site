<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Temple Run - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#5c94fc;touch-action:none}
#cv{display:block;position:fixed;top:0;left:0}
</style>
</head><body>
<canvas id="cv"></canvas>
<script>
/* ══════════════════════════════════════════
   SETUP
══════════════════════════════════════════ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GY;
function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  GY=H*0.72;
}
resize();
window.addEventListener('resize',resize);

/* ══════════════════════════════════════════
   AUDIO
══════════════════════════════════════════ */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(f,d,v=.12,t='sine',f2=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;
  o.frequency.setValueAtTime(f,a.currentTime);
  if(f2)o.frequency.linearRampToValueAtTime(f2,a.currentTime+d);
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const SND={
  jump:()=>beep(280,.18,.11,'sine',520),
  land:()=>beep(110,.07,.09,'square'),
  slide:()=>beep(180,.13,.07,'sawtooth',90),
  coin:()=>{beep(780,.06,.1,'sine');setTimeout(()=>beep(1050,.06,.08,'sine'),55);},
  hit:()=>{beep(160,.4,.18,'sawtooth');setTimeout(()=>beep(90,.45,.17,'sawtooth'),180);},
  power:()=>beep(550,.22,.12,'sine',880),
  milestone:()=>{beep(660,.08,.1);setTimeout(()=>beep(880,.08,.1),90);setTimeout(()=>beep(1100,.15,.1),180);}
};
document.addEventListener('pointerdown',()=>ac(),{once:true});

/* ══════════════════════════════════════════
   GAME CONSTANTS
══════════════════════════════════════════ */
const PX=()=>W*0.22;
const GRAVITY=0.55;
const JUMP_V=-13.5;
const SLIDE_DUR=38;

/* ══════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════ */
let screen='start';
let score,dist,coins,mult,maxMult,bestScore,frame,speed;
let pl,obs=[],coinList=[],particles=[],floats=[],pwrList=[];
let bgX=0,bgX2=0,groundX=0;
let shieldOn=false,magnetOn=false,slowOn=false;
let shieldT=0,magnetT=0,slowT=0;
bestScore=parseInt(localStorage.getItem('tr_hs')||'0');

/* Mario-style clouds */
const CLOUDS=Array.from({length:6},(_,i)=>({x:i*(W/5),y:H*.08+Math.random()*H*.18,w:70+Math.random()*60,spd:0.4+Math.random()*.3}));

/* Green hills in background */
const HILLS=Array.from({length:4},(_,i)=>({x:i*(W/3.5),h:H*.12+Math.random()*H*.1,w:W*.25+Math.random()*W*.1}));

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function initGame(){
  ac();
  pl={
    x:PX(), y:GY,
    vy:0,
    onGround:true,
    jumping:false,
    slideTimer:0,
    runFrame:0,
    invincible:0,
    w:36, h:58,
  };
  obs=[];coinList=[];particles=[];floats=[];pwrList=[];
  score=0;dist=0;coins=0;mult=1;maxMult=1;frame=0;speed=4.5;
  shieldOn=false;magnetOn=false;slowOn=false;
  shieldT=0;magnetT=0;slowT=0;
  bgX=0;bgX2=0;groundX=0;
  screen='playing';
}

/* ══════════════════════════════════════════
   CONTROLS
══════════════════════════════════════════ */
function doJump(){
  if(!pl.onGround||pl.slideTimer>0) return;
  pl.vy=JUMP_V;pl.onGround=false;pl.jumping=true;
  SND.jump();
}
function doSlide(){
  if(!pl.onGround) return;
  pl.slideTimer=SLIDE_DUR;
  SND.slide();
}

let keys={};
document.addEventListener('keydown',e=>{
  if(screen==='start'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen==='dead'){if(e.key===' '||e.key==='Enter'){initGame();return;}}
  if(screen!=='playing') return;
  if((e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')&&!keys[e.key]){doJump();e.preventDefault();}
  if((e.key==='ArrowDown'||e.key==='s'||e.key==='S')&&!keys[e.key]){doSlide();}
  keys[e.key]=true;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

/* Touch — swipe/tap */
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{
  ac();const t=e.touches[0];tx=t.clientX;ty=t.clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-tx,dy=t.clientY-ty,dist2=Math.sqrt(dx*dx+dy*dy);
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){
    /* check retry button by stored coords */
    if(window._retryBtn){
      const b=window._retryBtn;
      if(t.clientX>=b.x&&t.clientX<=b.x+b.w&&t.clientY>=b.y&&t.clientY<=b.y+b.h){initGame();return;}
    }
    initGame(); /* tap anywhere else also retries */
    return;
  }
  if(screen!=='playing') return;
  if(dist2<18){doJump();return;}
  if(Math.abs(dy)>Math.abs(dx)){dy<-20?doJump():doSlide();}
  else{doJump();}
},{passive:true});

/* Canvas click for dead screen retry */
cv.addEventListener('click',e=>{
  ac();
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(screen==='start'){initGame();return;}
  if(screen==='dead'){
    if(window._retryBtn&&inBox(window._retryBtn,mx,my)){initGame();return;}
    initGame(); /* click anywhere retries */
  }
});

/* ══════════════════════════════════════════
   SPAWNING  — tall obstacles capped to safe height
══════════════════════════════════════════ */
let spawnClock=0;
function spawnWave(){
  const r=Math.random();
  const sx=W+60;

  if(r<0.28){
    /* Short barrier — jump over */
    obs.push({x:sx,y:GY,w:45,h:62,type:'short',c:'#c0392b',ct:'#e74c3c'});
  } else if(r<0.46){
    /* Tall barrier — must SLIDE (height capped so player CAN slide under) */
    obs.push({x:sx,y:GY,w:40,h:82,type:'tall',c:'#27ae60',ct:'#2ecc71'});
  } else if(r<0.62){
    /* Low bar — slide under */
    obs.push({x:sx,y:GY-H*.14,w:120,h:26,type:'low',c:'#e67e22',ct:'#f39c12',fy:GY-H*.14});
  } else if(r<0.76){
    /* Double short */
    obs.push({x:sx,y:GY,w:40,h:58,type:'short',c:'#c0392b',ct:'#e74c3c'});
    obs.push({x:sx+115,y:GY,w:40,h:58,type:'short',c:'#c0392b',ct:'#e74c3c'});
  } else if(r<0.88){
    /* Fire trap */
    obs.push({x:sx,y:GY,w:42,h:55,type:'fire',c:'#7f1d1d',ct:'#dc2626'});
  } else {
    /* Short + low bar combo */
    obs.push({x:sx,y:GY,w:40,h:58,type:'short',c:'#c0392b',ct:'#e74c3c'});
    obs.push({x:sx+150,y:GY-H*.15,w:110,h:24,type:'low',c:'#e67e22',ct:'#f39c12',fy:GY-H*.15});
  }

  /* coins */
  const numCoins=3+Math.floor(Math.random()*4);
  for(let i=0;i<numCoins;i++){
    coinList.push({x:sx+20+i*42,y:GY-H*.20-Math.sin(i*.8)*H*.06,r:10,anim:i*.4,done:false});
  }

  /* power-up */
  if(Math.random()<0.12){
    const types=['shield','magnet','slow'];
    pwrList.push({x:sx+60,y:GY-H*.3,type:types[Math.floor(Math.random()*3)],anim:0,r:16});
  }
}

/* ══════════════════════════════════════════
   PARTICLES & FLOATS
══════════════════════════════════════════ */
function spawnPfx(x,y,col,n=10){
  for(let i=0;i<n;i++) particles.push({
    x,y,vx:(Math.random()-0.5)*5,vy:-(Math.random()*4+1),
    life:1,col,r:2+Math.random()*4
  });
}
function spawnFloat(x,y,txt,col='#ffd700'){
  floats.push({x,y,txt,col,life:1,vy:-1.2});
}

/* ══════════════════════════════════════════
   UPDATE
══════════════════════════════════════════ */
function update(){
  frame++;
  const spd=slowOn?speed*0.45:speed;

  if(frame%360===0) speed=Math.min(9,speed+0.2);

  score+=Math.round(spd*0.6*mult);
  dist+=spd*0.04;
  if(frame%20===0){ mult=Math.min(8,1+Math.floor(coins/10)); maxMult=Math.max(maxMult,mult); }

  const dm=Math.floor(dist/100);
  if(dm>0&&Math.floor((dist-spd*.04)/100)<dm){ SND.milestone(); spawnFloat(PX(),GY-80,dm*100+'m! ⭐','#ffd700'); }

  bgX-=spd*0.18;bgX2-=spd*0.32;groundX-=spd;
  if(bgX<-W) bgX+=W;if(bgX2<-W) bgX2+=W;
  if(groundX<-80) groundX+=80;
  CLOUDS.forEach(c=>{ c.x-=c.spd*(slowOn?.45:1); if(c.x+c.w+60<0) c.x=W+c.w; });
  HILLS.forEach(h=>{ h.x-=spd*0.4; if(h.x+h.w<0) h.x=W+Math.random()*100; });

  if(pl.slideTimer>0) pl.slideTimer--;
  pl.y+=pl.vy;
  pl.vy+=GRAVITY;
  if(pl.y>=GY){ pl.y=GY; pl.vy=0; if(!pl.onGround){pl.onGround=true;pl.jumping=false;SND.land();} }
  else pl.onGround=false;
  if(pl.invincible>0) pl.invincible--;
  pl.runFrame+=spd*0.22;

  obs=obs.filter(o=>{o.x-=spd;return o.x+o.w>-20;});
  coinList=coinList.filter(c=>{c.x-=spd;c.anim+=0.1;return c.x+c.r>-20&&!c.done;});
  pwrList=pwrList.filter(p=>{p.x-=spd;p.anim+=0.06;return p.x+p.r>-20;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;return p.life>0;});
  floats=floats.filter(f=>{f.y+=f.vy;f.life-=0.022;return f.life>0;});

  if(magnetOn) coinList.forEach(c=>{
    const dx=pl.x-c.x,dy=(pl.y-pl.h*.5)-c.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<160){c.x+=dx*0.1;c.y+=dy*0.1;}
  });

  const ph=pl.slideTimer>0?pl.h*0.48:pl.h;
  coinList.forEach(c=>{
    if(c.done) return;
    if(Math.abs(c.x-pl.x)<(pl.w*0.5+c.r)&&Math.abs(c.y-(pl.y-ph*0.5))<(ph*0.5+c.r)){
      c.done=true;coins++;const pts=30*mult;score+=pts;
      spawnPfx(c.x,c.y,'#ffd700',6);spawnFloat(c.x,c.y-10,'+'+pts);
      SND.coin();
      if(coins%10===0){mult=Math.min(8,mult+1);maxMult=Math.max(maxMult,mult);spawnFloat(c.x,c.y-30,'MULT x'+mult,'#ff6b6b');}
    }
  });

  for(let i=pwrList.length-1;i>=0;i--){
    const p=pwrList[i];
    if(Math.abs(p.x-pl.x)<pl.w*0.5+p.r&&Math.abs(p.y-(pl.y-ph*0.5))<ph*0.5+p.r){
      SND.power();
      if(p.type==='shield'){shieldOn=true;shieldT=420;}
      if(p.type==='magnet'){magnetOn=true;magnetT=420;}
      if(p.type==='slow'){slowOn=true;slowT=280;}
      spawnPfx(p.x,p.y,'#00e5ff',14);spawnFloat(p.x,p.y-20,p.type.toUpperCase(),'#00e5ff');
      pwrList.splice(i,1);
    }
  }

  if(shieldOn){shieldT--;if(shieldT<=0)shieldOn=false;}
  if(magnetOn){magnetT--;if(magnetT<=0)magnetOn=false;}
  if(slowOn){slowT--;if(slowT<=0)slowOn=false;}

  if(pl.invincible===0){
    const plTop=pl.y-(pl.slideTimer>0?pl.h*0.48:pl.h);
    const plLeft=pl.x-pl.w*0.38,plRight=pl.x+pl.w*0.38;
    for(const o of obs){
      const oTop=o.type==='low'?o.y:o.y-o.h;
      const oBot=o.type==='low'?o.y+o.h:o.y;
      const oL=o.x,oR=o.x+o.w;
      if(plRight>oL&&plLeft<oR&&pl.y>oTop&&plTop<oBot){
        if(shieldOn){shieldOn=false;shieldT=0;pl.invincible=90;spawnPfx(pl.x,pl.y-30,'#00e5ff',18);}
        else{
          spawnPfx(pl.x,pl.y-30,'#ff4444',20);
          if(score>bestScore){bestScore=score;localStorage.setItem('tr_hs',bestScore);}
          SND.hit();
          setTimeout(()=>{screen='dead';},700);
          screen='dying';
          return;
        }
      }
    }
  }

  spawnClock+=spd;
  if(spawnClock>340+Math.random()*120){spawnClock=0;spawnWave();}
}

/* ══════════════════════════════════════════
   DRAW — MARIO THEME BACKGROUND
══════════════════════════════════════════ */
function drawBg(){
  /* Mario blue sky */
  ctx.fillStyle='#5c94fc';
  ctx.fillRect(0,0,W,GY);

  /* Distant green hills */
  HILLS.forEach(h=>{
    ctx.fillStyle='#5ba05b';
    ctx.beginPath();
    ctx.ellipse(h.x+h.w/2, GY, h.w/2, h.h, 0, Math.PI, 0);
    ctx.fill();
    /* lighter hilltop */
    ctx.fillStyle='#6dbf6d';
    ctx.beginPath();
    ctx.ellipse(h.x+h.w/2, GY-h.h*.85, h.w*.35, h.h*.3, 0, Math.PI, 0);
    ctx.fill();
  });

  /* White puffy Mario clouds */
  CLOUDS.forEach(c=>{
    const cx=c.x, cy=c.y, cw=c.w;
    ctx.fillStyle='#fff';
    /* main body */
    ctx.beginPath();ctx.ellipse(cx,cy,cw*.5,18,0,0,Math.PI*2);ctx.fill();
    /* left puff */
    ctx.beginPath();ctx.ellipse(cx-cw*.28,cy+6,cw*.3,13,0,0,Math.PI*2);ctx.fill();
    /* right puff */
    ctx.beginPath();ctx.ellipse(cx+cw*.28,cy+6,cw*.28,12,0,0,Math.PI*2);ctx.fill();
    /* top bump */
    ctx.beginPath();ctx.ellipse(cx,cy-8,cw*.3,14,0,0,Math.PI*2);ctx.fill();
  });
}

function drawGround(){
  /* Brown dirt body */
  const dg=ctx.createLinearGradient(0,GY,0,H);
  dg.addColorStop(0,'#c8841c');dg.addColorStop(0.15,'#a0621a');dg.addColorStop(1,'#7a4810');
  ctx.fillStyle=dg;ctx.fillRect(0,GY,W,H-GY);

  /* Green grass strip on top */
  ctx.fillStyle='#5ba05b';ctx.fillRect(0,GY-8,W,16);
  /* lighter grass highlight */
  ctx.fillStyle='#72c472';ctx.fillRect(0,GY-8,W,5);
  /* dark grass bottom edge */
  ctx.fillStyle='#3d7a3d';ctx.fillRect(0,GY+6,W,4);

  /* Brick pattern on dirt */
  const BW=52,BH=18;
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;
  for(let row=0;row<Math.ceil((H-GY)/BH);row++){
    const offset=row%2===0?0:BW/2;
    for(let col=(groundX%BW)-BW+offset;col<W+BW;col+=BW){
      ctx.strokeRect(col, GY+row*BH+8, BW, BH);
    }
  }
}

function drawObs(o){
  const ox=o.x,ow=o.w;
  if(o.type==='low'){
    /* Floating pipe / bar — Mario pipe style */
    const oy=o.fy,oh=o.h;
    /* posts */
    ctx.fillStyle='#1d6e1d';ctx.fillRect(ox+8,oy+oh,8,GY-oy-oh);ctx.fillRect(ox+ow-16,oy+oh,8,GY-oy-oh);
    /* pipe body */
    const bg=ctx.createLinearGradient(ox,0,ox+ow,0);
    bg.addColorStop(0,'#2ecc71');bg.addColorStop(0.4,'#27ae60');bg.addColorStop(0.7,'#1e8449');bg.addColorStop(1,'#27ae60');
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(ox+4,oy+3,ow*.25,oh-6);
    ctx.strokeStyle='#1a7a42';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,4);ctx.stroke();
    ctx.font='bold 12px sans-serif';ctx.fillStyle='rgba(0,0,0,0.5)';ctx.textAlign='center';
    ctx.fillText('SLIDE →',ox+ow/2,oy+oh/2+5);
  } else {
    const oh=o.h;
    const oy=o.y-oh;

    if(o.type==='tall'){
      /* Green Mario pipe (tall — slide under) */
      /* pipe cap */
      const capH=18;
      const capG=ctx.createLinearGradient(ox-4,0,ox+ow+4,0);
      capG.addColorStop(0,'#2ecc71');capG.addColorStop(0.35,'#27ae60');capG.addColorStop(0.7,'#1a7a3a');capG.addColorStop(1,'#27ae60');
      ctx.fillStyle=capG;ctx.beginPath();ctx.roundRect(ox-5,oy,ow+10,capH,4);ctx.fill();
      ctx.strokeStyle='#1a7a42';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(ox-5,oy,ow+10,capH,4);ctx.stroke();
      /* pipe body */
      const bodyG=ctx.createLinearGradient(ox,0,ox+ow,0);
      bodyG.addColorStop(0,'#27ae60');bodyG.addColorStop(0.35,'#239855');bodyG.addColorStop(0.7,'#1a7a3a');bodyG.addColorStop(1,'#239855');
      ctx.fillStyle=bodyG;ctx.fillRect(ox,oy+capH,ow,oh-capH);
      ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(ox+4,oy+capH,ow*.28,oh-capH-4);
      ctx.strokeStyle='#1a7a42';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy+capH,ow,oh-capH);
      /* hint */
      if(o.x>W*0.55){
        ctx.fillStyle='rgba(255,240,80,.9)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
        ctx.fillText('SLIDE ↓',ox+ow/2,oy-8);
      }
    } else {
      /* Brick wall obstacle */
      /* shadow */
      ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(ox+5,GY,ow,8);
      /* brick body */
      const bg=ctx.createLinearGradient(ox,oy,ox,oy+oh);
      bg.addColorStop(0,'#e74c3c');bg.addColorStop(1,'#c0392b');
      ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,4);ctx.fill();
      /* brick lines */
      ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1.5;
      const BW2=16,BH2=12;
      for(let row=0;row<Math.ceil(oh/BH2);row++){
        const off=row%2===0?0:BW2/2;
        for(let col=off;col<ow;col+=BW2){
          ctx.strokeRect(ox+col,oy+row*BH2,BW2,BH2);
        }
      }
      /* highlight */
      ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(ox+3,oy+3,ow-6,oh*.28,3);ctx.fill();
      if(o.type==='fire'){
        ctx.font=`${Math.floor(ow*0.7)}px sans-serif`;ctx.textAlign='center';
        ctx.fillText('🔥',ox+ow/2,oy-4);
      }
      if(o.x>W*0.55&&o.type!=='tall'){
        ctx.fillStyle='rgba(255,255,80,.9)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
        ctx.fillText('JUMP ↑',ox+ow/2,oy-8);
      }
    }
  }
}

function drawCoin(c){
  const pulse=0.88+Math.sin(c.anim*2.5)*.12;
  const r=c.r*pulse;
  /* glow */
  const cg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*2.2);
  cg.addColorStop(0,'rgba(255,215,0,.4)');cg.addColorStop(1,'rgba(255,165,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y,r*2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0a000';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#92400e';ctx.font=`bold ${Math.floor(r*1.3)}px sans-serif`;ctx.textAlign='center';
  ctx.fillText('$',c.x,c.y+r*.38);
}

function drawPowerup(p){
  const bob=Math.sin(p.anim*3)*5;
  const icons={shield:'🛡️',magnet:'🧲',slow:'⚡'};
  const cols={shield:'#00e5ff',magnet:'#c084fc',slow:'#fde047'};
  const col=cols[p.type];
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.globalAlpha=0.5+Math.sin(p.anim*4)*.4;
  ctx.beginPath();ctx.arc(p.x,p.y+bob,p.r+6,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;
  ctx.font=`${Math.floor(p.r*1.9)}px sans-serif`;ctx.textAlign='center';
  ctx.fillText(icons[p.type],p.x,p.y+bob+p.r*.6);
}

function drawPlayer(){
  const sliding=pl.slideTimer>0;
  const ph=sliding?pl.h*0.48:pl.h;
  const px=pl.x,py=pl.y;
  const blink=pl.invincible>0&&Math.floor(pl.invincible*.2)%2===0;
  if(blink) return;

  ctx.save();
  const run=pl.runFrame;

  /* shadow */
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(px,py+4,22,7,0,0,Math.PI*2);ctx.fill();

  if(sliding){
    /* slide — ducked Mario style */
    ctx.fillStyle='#1a5cc4';ctx.beginPath();ctx.ellipse(px,py-10,30,13,-.12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f5cfa0';ctx.beginPath();ctx.arc(px-18,py-16,10,0,Math.PI*2);ctx.fill();
    /* red hat */
    ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.roundRect(px-28,py-24,22,8,3);ctx.fill();
  } else {
    /* LEGS — blue overalls */
    const lSwing=Math.sin(run)*18;
    ctx.lineCap='round';ctx.lineWidth=11;ctx.strokeStyle='#1a5cc4';
    ctx.beginPath();ctx.moveTo(px-6,py-22);ctx.lineTo(px-6+lSwing,py+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+6,py-22);ctx.lineTo(px+6-lSwing,py+2);ctx.stroke();
    /* shoes */
    ctx.strokeStyle='#5c3a1a';ctx.lineWidth=12;
    ctx.beginPath();ctx.moveTo(px-6+lSwing,py+2);ctx.lineTo(px-4+lSwing+4,py+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+6-lSwing,py+2);ctx.lineTo(px+4-lSwing+4,py+4);ctx.stroke();

    /* BODY — red shirt */
    const bodyG=ctx.createLinearGradient(px-14,py-ph,px+14,py-ph+ph*.55);
    bodyG.addColorStop(0,'#e74c3c');bodyG.addColorStop(1,'#c0392b');
    ctx.fillStyle=bodyG;ctx.beginPath();ctx.roundRect(px-14,py-ph+18,28,ph-18,5);ctx.fill();
    /* overalls bib */
    ctx.fillStyle='#1a5cc4';ctx.beginPath();ctx.roundRect(px-8,py-ph+20,16,20,3);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(px,py-ph+24,3,0,Math.PI*2);ctx.fill();

    /* ARMS */
    const armSwing=Math.sin(run+Math.PI)*14;
    ctx.lineWidth=9;ctx.strokeStyle='#e74c3c';
    ctx.beginPath();ctx.moveTo(px-14,py-ph+24);ctx.lineTo(px-27,py-ph+38+armSwing);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+14,py-ph+24);ctx.lineTo(px+27,py-ph+38-armSwing);ctx.stroke();
    /* white gloves */
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(px-27,py-ph+38+armSwing,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+27,py-ph+38-armSwing,5,0,Math.PI*2);ctx.fill();

    /* HEAD */
    const hg=ctx.createRadialGradient(px-2,py-ph+10,0,px,py-ph+12,12);
    hg.addColorStop(0,'#f9d8a0');hg.addColorStop(1,'#e0a87a');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(px,py-ph+12,12,0,Math.PI*2);ctx.fill();

    /* MUSTACHE */
    ctx.fillStyle='#5c3a1a';
    ctx.beginPath();ctx.ellipse(px-3,py-ph+16,5,2.5,-.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px+3,py-ph+16,5,2.5,.2,0,Math.PI*2);ctx.fill();

    /* RED HAT brim + crown */
    ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.roundRect(px-16,py-ph+2,32,7,2);ctx.fill();
    ctx.fillStyle='#c0392b';ctx.beginPath();ctx.roundRect(px-11,py-ph-9,22,13,4);ctx.fill();
    /* hat highlight */
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.roundRect(px-9,py-ph-7,8,5,2);ctx.fill();

    /* EYES */
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px-4,py-ph+12,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+4,py-ph+12,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(px-3.5,py-ph+12,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+4.5,py-ph+12,1.5,0,Math.PI*2);ctx.fill();

    /* Jump glow */
    if(!pl.onGround){
      const gg2=ctx.createRadialGradient(px,py-ph*.5,0,px,py-ph*.5,40);
      gg2.addColorStop(0,'rgba(255,220,80,.25)');gg2.addColorStop(1,'rgba(255,180,0,0)');
      ctx.fillStyle=gg2;ctx.beginPath();ctx.arc(px,py-ph*.5,40,0,Math.PI*2);ctx.fill();
    }
  }

  /* Shield bubble */
  if(shieldOn){
    const pulse=.6+Math.sin(frame*.1)*.35;
    ctx.strokeStyle=`rgba(0,229,255,${pulse})`;ctx.lineWidth=3;
    ctx.shadowColor='#00e5ff';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(px,py-ph*.5,38,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(8,8,W-16,52,10);ctx.fill();
  const items=[
    {l:'SCORE',v:score.toLocaleString(),c:'#ffd700',x:.14},
    {l:'DISTANCE',v:Math.round(dist)+'m',c:'#00e5ff',x:.38},
    {l:'COINS',v:coins,c:'#fb923c',x:.62},
    {l:'MULT',v:'x'+mult,c:'#f87171',x:.86},
  ];
  items.forEach(it=>{
    ctx.font='bold 8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.45)';
    ctx.fillText(it.l,W*it.x,26);
    ctx.font=`bold ${Math.min(22,W*.045)}px Segoe UI,sans-serif`;ctx.fillStyle=it.c;
    ctx.fillText(it.v,W*it.x,47);
  });

  if(frame<280){
    const a=Math.min(1,(280-frame)/60);
    ctx.globalAlpha=a*.7;ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(W/2-120,H-55,240,36,10);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='13px Segoe UI,sans-serif';ctx.textAlign='center';
    ctx.fillText('↑ / Space = Jump     ↓ / S = Slide',W/2,H-32);
    ctx.globalAlpha=1;
  }

  let ap=null;
  if(shieldOn)ap={l:'🛡 SHIELD',t:shieldT,m:420,c:'#00e5ff'};
  else if(magnetOn)ap={l:'🧲 MAGNET',t:magnetT,m:420,c:'#c084fc'};
  else if(slowOn)ap={l:'⚡ SLOW MO',t:slowT,m:280,c:'#fde047'};
  if(ap){
    const bw=180,bh=10,bx=(W-bw)/2,by2=H-32;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(bx-52,by2-18,bw+104,bh+24,8);ctx.fill();
    ctx.font='bold 11px sans-serif';ctx.fillStyle=ap.c;ctx.textAlign='center';ctx.fillText(ap.l,W/2,by2-4);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,5);ctx.fill();
    ctx.fillStyle=ap.c;ctx.beginPath();ctx.roundRect(bx,by2,bw*(ap.t/ap.m),bh,5);ctx.fill();
  }
}

function drawStartScreen(){
  /* Mario blue sky */
  ctx.fillStyle='#5c94fc';ctx.fillRect(0,0,W,H);

  /* hills */
  [[W*.2,H*.75,W*.35,H*.2],[W*.65,H*.78,W*.28,H*.15]].forEach(([hx,hy,hw,hh])=>{
    ctx.fillStyle='#5ba05b';ctx.beginPath();ctx.ellipse(hx,hy,hw/2,hh,0,Math.PI,0);ctx.fill();
    ctx.fillStyle='#6dbf6d';ctx.beginPath();ctx.ellipse(hx,hy-hh*.85,hw*.35,hh*.3,0,Math.PI,0);ctx.fill();
  });

  /* ground */
  ctx.fillStyle='#5ba05b';ctx.fillRect(0,H*.8,W,H*.06);
  ctx.fillStyle='#72c472';ctx.fillRect(0,H*.8,W,H*.02);
  const dg=ctx.createLinearGradient(0,H*.86,0,H);
  dg.addColorStop(0,'#c8841c');dg.addColorStop(1,'#7a4810');
  ctx.fillStyle=dg;ctx.fillRect(0,H*.86,W,H);

  /* clouds */
  [[W*.15,H*.12,80],[W*.55,H*.08,100],[W*.82,H*.16,70]].forEach(([cx,cy,cw])=>{
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(cx,cy,cw*.5,17,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-cw*.28,cy+6,cw*.3,12,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+cw*.28,cy+6,cw*.28,11,0,0,Math.PI*2);ctx.fill();
  });

  /* title */
  ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.strokeStyle='#c0392b';ctx.lineWidth=6;
  ctx.font=`900 ${Math.min(68,W*.13)}px Segoe UI,sans-serif`;
  ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=12;
  ctx.strokeText('🏃 TEMPLE RUN',W/2,H*.26);
  const tg=ctx.createLinearGradient(W*.2,0,W*.8,0);
  tg.addColorStop(0,'#e74c3c');tg.addColorStop(.5,'#ffd200');tg.addColorStop(1,'#e74c3c');
  ctx.fillStyle=tg;ctx.fillText('🏃 TEMPLE RUN',W/2,H*.26);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.font=`${Math.min(17,W*.037)}px Segoe UI,sans-serif`;
  ctx.fillText('ENDLESS SIDE RUNNER',W/2,H*.33);

  /* controls card */
  const cw2=Math.min(400,W*.8),cx2=(W-cw2)/2,cy2=H*.37;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(cx2,cy2,cw2,H*.25,14);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(cx2,cy2,cw2,H*.25,14);ctx.stroke();
  const tips=[['⬆ / Space / Tap','Jump over obstacles'],['⬇ / S / Swipe Down','Slide under barriers'],['🪙 Collect coins','Boost score multiplier'],['🛡️ 🧲 ⚡ Power-ups','Shield · Magnet · Slow Mo']];
  ctx.font=`${Math.min(14,W*.03)}px Segoe UI,sans-serif`;
  tips.forEach((t,i)=>{
    const ry=cy2+26+i*H*.052;
    ctx.fillStyle='#ffd700';ctx.textAlign='left';ctx.fillText(t[0],cx2+18,ry);
    ctx.fillStyle='rgba(255,255,255,.65)';ctx.textAlign='right';ctx.fillText(t[1],cx2+cw2-18,ry);
  });

  /* play button */
  const pulse=.94+Math.sin(frame*.07)*.06;
  const bw=Math.min(220,W*.44),bh=54,bx=(W-bw)/2,by2=H*.7;
  ctx.save();ctx.translate(W/2,by2+bh/2);ctx.scale(pulse,pulse);ctx.translate(-W/2,-by2-bh/2);
  const bg=ctx.createLinearGradient(bx,by2,bx+bw,by2+bh);
  bg.addColorStop(0,'#e74c3c');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(231,76,60,.6)';ctx.shadowBlur=22;
  ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,28);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(21,W*.046)}px Segoe UI,sans-serif`;ctx.textAlign='center';
  ctx.fillText('▶  START!',W/2,by2+bh*.66);
  ctx.restore();

  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font=`${Math.min(13,W*.027)}px Segoe UI,sans-serif`;
  ctx.fillText('Tap anywhere or press Space to start',W/2,H*.87);
}

function drawDeadScreen(){
  ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  ctx.font=`${Math.min(66,W*.12)}px sans-serif`;ctx.fillText('💀',W/2,H*.2);
  ctx.fillStyle='#e74c3c';ctx.shadowColor='#ff0000';ctx.shadowBlur=28;
  ctx.font=`900 ${Math.min(54,W*.1)}px Segoe UI,sans-serif`;ctx.fillText('GAME OVER',W/2,H*.32);
  ctx.shadowBlur=0;

  /* score card */
  const bw=Math.min(340,W*.82),bx=(W-bw)/2;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.roundRect(bx,H*.35,bw,H*.36,16);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,H*.35,bw,H*.36,16);ctx.stroke();

  if(score>=bestScore&&score>0){
    ctx.fillStyle='#ffd700';ctx.font=`bold ${Math.min(16,W*.034)}px Segoe UI,sans-serif`;
    ctx.fillText('🏆 NEW BEST!',W/2,H*.41);
  }
  ctx.fillStyle='#ffd700';ctx.font=`900 ${Math.min(58,W*.11)}px Segoe UI,sans-serif`;
  ctx.fillText(score.toLocaleString(),W/2,H*.535);

  const rows=[['Distance',Math.round(dist)+'m'],['Coins',coins],['Best Mult','x'+maxMult],['Best Score',bestScore.toLocaleString()]];
  ctx.font=`${Math.min(15,W*.032)}px Segoe UI,sans-serif`;
  rows.forEach((r,i)=>{
    const ry=H*.59+i*H*.047;
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='left';ctx.fillText(r[0],bx+22,ry);
    ctx.fillStyle='#ffd700';ctx.textAlign='right';ctx.fillText(r[1],bx+bw-22,ry);
  });

  /* Single RETRY button — centered */
  const b1w=Math.min(200,W*.44),b1h=54,b1x=W/2-b1w/2,by3=H*.83;
  const bg=ctx.createLinearGradient(b1x,by3,b1x+b1w,by3+b1h);
  bg.addColorStop(0,'#e74c3c');bg.addColorStop(1,'#ffd200');
  ctx.fillStyle=bg;ctx.shadowColor='rgba(231,76,60,.45)';ctx.shadowBlur=18;
  ctx.beginPath();ctx.roundRect(b1x,by3,b1w,b1h,27);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(18,W*.04)}px Segoe UI,sans-serif`;
  ctx.textAlign='center';ctx.fillText('▶ Play Again',b1x+b1w/2,by3+b1h*.66);

  /* store coords for touch/click detection */
  window._retryBtn={x:b1x,y:by3,w:b1w,h:b1h};

  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`${Math.min(12,W*.026)}px Segoe UI,sans-serif`;
  ctx.fillText('or tap anywhere to retry',W/2,H*.95);
}

function inBox(btn,x,y){return btn&&x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h;}

/* ══════════════════════════════════════════
   PARTICLES + FLOATS
══════════════════════════════════════════ */
function drawPfx(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*.8;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  });
  floats.forEach(f=>{
    ctx.globalAlpha=f.life;ctx.font=`bold ${Math.floor(13+f.life*8)}px Segoe UI,sans-serif`;
    ctx.textAlign='center';ctx.fillStyle=f.col;ctx.shadowColor=f.col;ctx.shadowBlur=8;
    ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════ */
function draw(){
  ctx.clearRect(0,0,W,H);
  if(screen==='start'){drawStartScreen();return;}
  drawBg();
  drawGround();
  obs.forEach(drawObs);
  coinList.forEach(drawCoin);
  pwrList.forEach(drawPowerup);
  drawPfx();
  drawPlayer();
  drawHUD();
  if(screen==='dead'||screen==='dying') drawDeadScreen();
}

function loop(){
  if(screen==='playing') update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

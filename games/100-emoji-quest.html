<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Emoji Quest - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0800;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f9d423,#ff4e50);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #f9d423}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f9d423,#ff4e50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Pairs:<b id="pr"> 0</b></span><span class="hv">Time:<b id="tm"> 60</b>s</span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="400" height="420" style="cursor:pointer"></canvas>
<div id="result" style="font-size:1.1em;height:28px;padding:4px;text-align:center"></div></div>
<div id="ov"><div id="ob"><h2>Emoji Quest</h2><p>Find matching emoji pairs! Click two cards to flip them. Match all pairs before time runs out. More pairs each level!</p><button class="btn" onclick="go()">Quest!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=400,H=420;
const ALL_EMOJIS=["🦁","🐯","🦊","🐺","🦝","🐻","🐼","🐨","🦘","🦙","🦒","🦓","🦏","🦛","🐘","🦣","🐬","🐳","🦈","🐙","🦑","🦐","🦀","🦞","🐡","🐟","🐠","🦭","🦦","🦥"];
let cards=[],flipped=[],matched=[],score=0,pairs=0,level=1,timeLeft=60,timer,running=false,frame=0;
function mkGrid(){
  const n=Math.min(6+level*2,16);const cols=Math.ceil(Math.sqrt(n*2)),rows=Math.ceil(n*2/cols);
  const emojis=ALL_EMOJIS.slice(0,n);const pool=[...emojis,...emojis].sort(()=>Math.random()-.5);
  cards=pool.map((e,i)=>({e,x:10+(i%cols)*(W-20)/cols,y:20+Math.floor(i/cols)*(H-40)/rows,w:(W-20)/cols-6,h:(H-40)/rows-6,revealed:false,matched:false}));
  flipped=[];matched=[];
}
function draw(){
  ctx.fillStyle="#0a0800";ctx.fillRect(0,0,W,H);
  cards.forEach((c,i)=>{
    const isFlipped=c.revealed||c.matched||flipped.includes(i);
    ctx.fillStyle=c.matched?"#1a3a1a":isFlipped?"#1a1a3a":"#2a2a1a";ctx.beginPath();ctx.roundRect(c.x,c.y,c.w,c.h,8);ctx.fill();ctx.strokeStyle=c.matched?"#2ecc71":isFlipped?"#667eea":"#444";ctx.lineWidth=2;ctx.stroke();
    if(isFlipped){ctx.font=`${Math.min(c.w,c.h)*.5}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(c.e,c.x+c.w/2,c.y+c.h/2);}
    else{ctx.fillStyle="#444";ctx.font=`${Math.min(c.w,c.h)*.4}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("?",c.x+c.w/2,c.y+c.h/2);}
  });
}
let checking=false;
cv.addEventListener("click",e=>{
  if(!running||checking)return;
  const mx=e.offsetX,my=e.offsetY;
  const i=cards.findIndex(c=>!c.matched&&!flipped.includes(cards.indexOf(c))&&mx>c.x&&mx<c.x+c.w&&my>c.y&&my<c.y+c.h);
  if(i<0||flipped.includes(i)||cards[i].matched)return;
  flipped.push(i);draw();
  if(flipped.length===2){checking=true;setTimeout(()=>{
    const[a,b]=flipped;if(cards[a].e===cards[b].e){cards[a].matched=cards[b].matched=true;pairs++;score+=timeLeft*level*5;document.getElementById("pr").textContent=pairs;document.getElementById("sc").textContent=score;document.getElementById("result").innerHTML='<span style="color:#2ecc71">Match!</span>';}
    else{document.getElementById("result").innerHTML='<span style="color:#e74c3c">No match</span>';}
    flipped=[];checking=false;draw();
    if(cards.every(c=>c.matched)){clearInterval(timer);score+=timeLeft*10;level++;document.getElementById("lv").textContent=level;document.getElementById("sc").textContent=score;setTimeout(()=>{timeLeft=60;document.getElementById("tm").textContent=60;mkGrid();draw();timer=setInterval(tick,1000);},800);}
  },800);}
});
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;setTimeout(()=>window._showMod("Time up! Score: "+score),200);}else timeLeft--;}
function go(){document.getElementById("ov").style.display="none";running=true;mkGrid();draw();timer=setInterval(tick,1000);}
mkGrid();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById(''_gmod'').style.display=''none''" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
</body></html>

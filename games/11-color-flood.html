<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Color Flood - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000814;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00b4db,#0083b0);color:#fff;transition:.2s}
.btn:hover{transform:scale(1.05)}
#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}
#ob{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #00b4db}
#ob h2{font-size:2em;margin-bottom:8px;background:linear-gradient(135deg,#00b4db,#0083b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#ob p{color:#aaa;margin-bottom:22px;line-height:1.5}
#hm{position:fixed;top:10px;left:10px;padding:6px 14px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.8em;z-index:100}
</style></head><body>


<div id="hud"><span class="hval">Moves:<b id="mv"> 0</b>/<b id="mx">25</b></span><span class="hval">Score:<b id="sc"> 0</b></span><span class="hval">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="360" height="360"></canvas>
<div style="display:flex;gap:10px;justify-content:center;padding:8px" id="clrs"></div>
<div id="ov"><div id="ob"><h2>Color Flood</h2><p>Click a color to flood the top-left corner outward. Fill the entire board in limited moves!</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const N=12,SZ=30;
const COLORS=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c"];
let grid=[],moves=0,maxMoves=25,score=0,level=1,running=false;
function mkGrid(){grid=[];for(let r=0;r<N;r++){grid[r]=[];for(let c=0;c<N;c++)grid[r][c]=Math.floor(Math.random()*COLORS.length);}}
function flood(newC){
  const oldC=grid[0][0];if(oldC===newC)return;
  const stack=[[0,0]],visited=new Set(["0,0"]);
  while(stack.length){const[r,c]=stack.pop();grid[r][c]=newC;[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{const k=`${nr},${nc}`;if(nr>=0&&nr<N&&nc>=0&&nc<N&&!visited.has(k)&&grid[nr][nc]===oldC){visited.add(k);stack.push([nr,nc]);}});}
  moves++;document.getElementById("mv").textContent=moves;
  draw();
  const all=grid.flat().every(v=>v===grid[0][0]);
  if(all){score+=Math.max(0,(maxMoves-moves))*level*10+100;level++;maxMoves=Math.max(15,25-level*2);moves=0;document.getElementById("sc").textContent=score;document.getElementById("lv").textContent=level;document.getElementById("mx").textContent=maxMoves;document.getElementById("mv").textContent=0;setTimeout(()=>{mkGrid();draw();},600);}
  else if(moves>=maxMoves){setTimeout(()=>{if(confirm("Out of moves! Restart?"))ng();},200);}
}
function draw(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){ctx.fillStyle=COLORS[grid[r][c]];ctx.fillRect(c*SZ,r*SZ,SZ-1,SZ-1);}
  ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.strokeRect(0,0,SZ,SZ);
}
function mkBtns(){
  const d=document.getElementById("clrs");d.innerHTML="";
  COLORS.forEach((cl,i)=>{const b=document.createElement("button");b.style.cssText=`width:44px;height:44px;border-radius:50%;border:3px solid #fff;background:${cl};cursor:pointer;`;b.onclick=()=>{if(running)flood(i);};d.appendChild(b);});
}
function go(){document.getElementById("ov").style.display="none";running=true;draw();}
function ng(){moves=0;level=1;maxMoves=25;score=0;document.getElementById("mv").textContent=0;document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;document.getElementById("mx").textContent=25;mkGrid();if(running)draw();}
mkGrid();mkBtns();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script></body></html>

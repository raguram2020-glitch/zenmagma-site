<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Dash</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='px_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120;
const stars=Array.from({length:90},()=>({x:Math.random(),y:Math.random()*0.65,s:Math.floor(Math.random()*3)+1,b:Math.random()>0.7}));
const mnts=Array.from({length:7},(x,i)=>({x:i/7,w:0.12+Math.random()*0.1,h:0.12+Math.random()*0.1}));
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',e=>{
  if(state==='start'||state==='over'){startGame();return;}
});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#ffff00',5);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:30,col,s:Math.floor(Math.random()*4)+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=60;w=40;oy=GY-h;}else if(t==='tall'){h=105;w=50;oy=GY-h;}else{h=18;w=120;oy=GY-80;}obs.push({x:W+60,y:oy,w,h,type:t,hint:false});}
function spawnCoin(x){coll.push({x,y:GY-40-Math.random()*80,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function drawPlayer(x,y,sl){
  const bx=Math.floor(x-16),bob=Math.sin(fr*0.2)*1.5;
  if(!sl){
    cx.fillStyle='#0000aa';cx.fillRect(bx+2,y-38+bob,28,8);cx.fillRect(bx+6,y-50+bob,20,14);
    cx.fillStyle='#ffcc88';cx.fillRect(bx+4,y-32+bob,24,20);
    cx.fillStyle='#000';cx.fillRect(bx+8,y-26+bob,4,4);cx.fillRect(bx+20,y-26+bob,4,4);
    cx.fillStyle='#cc0000';cx.fillRect(bx+2,y-12+bob,28,20);
    const lg=Math.sin(fr*0.25)*6;
    cx.fillStyle='#880000';cx.fillRect(bx+4,y+8,10,16-lg);cx.fillRect(bx+18,y+8,10,16+lg);
    cx.fillStyle='#000';cx.fillRect(bx+2,y+22-lg,14,6);cx.fillRect(bx+16,y+22+lg,14,6);
  }else{
    cx.fillStyle='#0000aa';cx.fillRect(bx-4,y-12,16,8);
    cx.fillStyle='#ffcc88';cx.fillRect(bx+8,y-16,20,14);
    cx.fillStyle='#000';cx.fillRect(bx+12,y-12,4,4);cx.fillRect(bx+20,y-12,4,4);
    cx.fillStyle='#cc0000';cx.fillRect(bx+4,y-4,36,12);
    cx.fillStyle='#880000';cx.fillRect(bx+28,y+6,16,8);
  }
}
function drawObs(o){
  if(o.type==='short'){
    for(let bx=o.x;bx<o.x+o.w;bx+=20)for(let by=o.y;by<o.y+o.h;by+=20){cx.fillStyle=((bx-o.x)/20+(by-o.y)/20)%2<1?'#888':'#555';cx.fillRect(Math.floor(bx),Math.floor(by),19,19);}
    cx.fillStyle='#aaa';cx.fillRect(Math.floor(o.x),Math.floor(o.y),o.w,3);
  }else if(o.type==='tall'){
    for(let bx=o.x;bx<o.x+o.w;bx+=25)for(let by=o.y;by<o.y+o.h;by+=25){cx.fillStyle=((bx-o.x)/25+(by-o.y)/25)%2<1?'#666':'#444';cx.fillRect(Math.floor(bx),Math.floor(by),24,24);}
    cx.fillStyle='#888';cx.fillRect(Math.floor(o.x),Math.floor(o.y),o.w,3);
  }else{
    cx.fillStyle='#cc4400';cx.fillRect(Math.floor(o.x),Math.floor(o.y),o.w,o.h);
    cx.fillStyle='#ff6600';cx.fillRect(Math.floor(o.x),Math.floor(o.y),o.w,4);
    cx.fillStyle='#992200';cx.fillRect(Math.floor(o.x),Math.floor(o.y+o.h-4),o.w,4);
    for(let i=0;i<o.w;i+=16){cx.fillStyle='#aa3300';cx.fillRect(Math.floor(o.x+i),Math.floor(o.y+6),8,6);}
  }
}
function drawCoin(c){
  const sz=12+Math.sin(c.a*0.2)*2;
  cx.fillStyle='#ccaa00';cx.fillRect(Math.floor(c.x-sz/2-1),Math.floor(c.y-sz/2+1),sz,sz);
  cx.fillStyle='#ffff00';cx.fillRect(Math.floor(c.x-sz/2),Math.floor(c.y-sz/2),sz,sz);
  cx.fillStyle='#fff';cx.fillRect(Math.floor(c.x-sz/2+2),Math.floor(c.y-sz/2+2),Math.floor(sz/3),Math.floor(sz/3));
}
function drawBG(){
  cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{const b=s.b?(Math.sin(fr*0.05+s.x*10)>0?1:0.3):1;cx.fillStyle=`rgba(255,255,255,${b})`;cx.fillRect(Math.floor(s.x*W),Math.floor(s.y*H),s.s,s.s);});
  cx.fillStyle='#0d3b1a';
  mnts.forEach(m=>{const mx=((m.x-bgOff*0.0003)%1.2-0.1)*W,mw=m.w*W,mh=m.h*H;for(let i=0;i<mw;i+=8){const ht=mh*Math.sin(i/mw*Math.PI);cx.fillRect(Math.floor(mx+i),Math.floor(GY-ht),8,ht);}});
  // Castle
  const cx2=((0.75-bgOff*0.0002)%1)*W;
  cx.fillStyle='#0a2010';cx.fillRect(Math.floor(cx2),Math.floor(GY-80),100,80);
  for(let i=0;i<5;i++)cx.fillRect(Math.floor(cx2+i*20),Math.floor(GY-96),12,16);
  cx.fillStyle='#000';cx.fillRect(Math.floor(cx2+38),Math.floor(GY-30),24,30);
  // Ground
  cx.fillStyle='#228b22';cx.fillRect(0,GY,W,H-GY);
  cx.fillStyle='#145214';
  const gs=32;
  for(let gx=(bgOff*2)%gs-gs;gx<W;gx+=gs)cx.fillRect(Math.floor(gx),GY,2,H-GY);
  for(let gy=GY;gy<H;gy+=gs)cx.fillRect(0,Math.floor(gy),W,2);
  cx.fillStyle='#55dd55';cx.fillRect(0,GY,W,6);
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';const pulse=Math.sin(p.a*0.1)*3;cx.fillStyle=col;cx.fillRect(Math.floor(p.x-10-pulse/2),Math.floor(p.y-10-pulse/2),20+pulse,20+pulse);cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t==='shield'?'S':p.t==='magnet'?'M':'SL',Math.floor(p.x),Math.floor(p.y+4));cx.textAlign='left';}
function drawHUD(){
  cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,44);
  cx.font='bold 14px monospace';
  cx.fillStyle='#ffff00';cx.fillText('SCORE: '+sc,16,28);
  cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);
  cx.fillStyle='#ffff00';cx.fillText('COINS: '+coins,W*0.5,28);
  cx.fillStyle='#ff88ff';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);
  if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}
  if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}
}
function drawStart(){
  cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.fillStyle='#fff';cx.fillRect(Math.floor(s.x*W),Math.floor(s.y*H),s.s,s.s);});
  cx.fillStyle='#228b22';cx.fillRect(0,GY,W,H-GY);
  cx.fillStyle='#ffff00';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('PIXEL DASH',W/2,H*0.35);
  cx.fillStyle='#fff';cx.font='20px monospace';cx.fillText('RETRO 8-BIT RUNNER',W/2,H*0.45);
  cx.fillStyle='#00ff00';cx.font='18px monospace';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#0000aa';cx.fillRect(W/2-80,H*0.66,160,44);cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.66+28);
  if(best>0){cx.fillStyle='#ffff00';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){
  cx.fillStyle='rgba(0,0,0,0.78)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#ff0000';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);
  cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);
  cx.fillStyle='#ffff00';cx.fillText('BEST:  '+best,W/2,H*0.54);
  cx.fillStyle='#0000aa';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);
  cx.textAlign='left';
}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;
  if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?50:30,ph=sliding?18:60,phY=sliding?py-18:py-60;
  if(!dead&&!inv){
    for(let o of obs){
      if(hit(PX-pw/2,phY,pw,ph,o)){
        if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00aaff',15);addFT(PX,py-60,'SHIELD!','#00aaff');}
        else{dead=true;spawnP(PX,py-30,'#ff0000',20);if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}
        break;
      }
    }
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-30)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffff00');spawnP(c.x,c.y,'#ffff00',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-30)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.col;cx.fillRect(Math.floor(p.x),Math.floor(p.y),p.s,p.s);cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.fillStyle='rgba(0,170,255,0.2)';cx.fillRect(Math.floor(W*0.22-26),Math.floor(py-66),52,74);}
    drawPlayer(W*0.22,py,sliding);
  }
  // Hints
  for(let o of obs){
    if(o.x-W*0.22<320&&o.x-W*0.22>60){
      cx.font='bold 16px monospace';cx.textAlign='center';
      if(o.type==='short'){cx.fillStyle='#00ff00';cx.fillText('JUMP ↑',W*0.22,GY-95);}
      else{cx.fillStyle='#ff8800';cx.fillText('SLIDE ↓',W*0.22,GY-95);}
      cx.textAlign='left';
    }
  }
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){
  update();
  if(state==='start')drawStart();
  else if(state==='over'){draw();drawOver();}
  else draw();
  requestAnimationFrame(loop);
}
init();loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Pixel Dash</title>
    <meta name="description" content="8-bit retro endless runner. Jump and slide through pixel worlds!">
    <link rel="canonical" href="https://zenmagma.com/games/46-pixel-dash">
    <meta property="og:title" content="Pixel Dash - ZenMagma">
    <meta property="og:description" content="8-bit retro endless runner. Jump and slide through pixel worlds!">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/46-pixel-dash">
    <meta property="og:image" content="https://zenmagma.com/assets/thumbs/pixel-dash.jpg">
    <meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="../css/game-fx.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#cv3d{z-index:0}#c{z-index:1;background:transparent}
#touch-btns{display:none;position:fixed;bottom:18px;left:0;width:100%;z-index:10;pointer-events:none}
#touch-btns button{pointer-events:all;width:110px;height:72px;font-size:18px;font-weight:bold;font-family:monospace;border:3px solid rgba(255,255,255,0.5);border-radius:14px;background:rgba(0,0,0,0.55);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#btn-jump{position:absolute;left:24px;bottom:0;background:rgba(0,0,100,0.7);border-color:#4488ff}
#btn-slide{position:absolute;right:24px;bottom:0;background:rgba(100,0,0,0.7);border-color:#ff8844}
@media(hover:none)and(pointer:coarse){#touch-btns{display:block}}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<canvas id="cv3d"></canvas>
<canvas id="c"></canvas>
<div id="touch-btns">
  <button id="btn-jump">⬆️ JUMP</button>
  <button id="btn-slide">⬇️ SLIDE</button>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const BG=new Image(); BG.src='../assets/backgrounds/pixel-dash-bg.jpg';
const MOOD_LABELS=['PIXEL DAWN','GLITCH STORM','MATRIX MODE','RETRO NIGHT'];
const MOOD_OVERLAYS=['rgba(255,255,100,0.04)','rgba(0,255,0,0.12)','rgba(0,50,0,0.35)','rgba(0,0,60,0.4)'];
let moodIdx=0,moodFade=0,moodChanging=false,moodText='',moodTextT=0;
function triggerMood(n){moodIdx=n%MOOD_LABELS.length;moodFade=0;moodChanging=true;moodText=MOOD_LABELS[moodIdx];moodTextT=120;}
let W,H,GY;
function resize(){
  W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;
  const c3=document.getElementById('cv3d');
  if(c3){c3.width=window.innerWidth;c3.height=window.innerHeight;}
}
resize();window.addEventListener('resize',resize);

/* ── 3D ENVIRONMENT (WebGL ground/sky) ── */
let shell3d=null;
(async function initShell3d(){
  try{
    const shellMod=await import('../js/game-three-shell.js');
    if(!shellMod.supportsWebGL2())return;
    const THREE=await import('../js/vendor/three.module.min.js');
    shell3d=new shellMod.RunnerShell(document.getElementById('cv3d'),{sky:0x1a1a2e,camHeight:4.2,camDistance:8.5,lookHeight:1.4,fov:60});
    shell3d.setGroundTexture('../assets/game-art/pixel-dash/ground.jpg',{width:14,length:500,repeatY:60});
    shell3d.scene.fog=new THREE.Fog(0x1a1a2e,30,150);
  }catch(e){shell3d=null;}
})();
const PD_MOOD_HEX=[0x1a1a2e,0x0a2a0a,0x001a00,0x00003c];
function render3D(){
  if(!shell3d){drawBG();return;}
  cx.clearRect(0,0,W,H);
  const hex=PD_MOOD_HEX[moodIdx];
  shell3d.setSkyColor(hex);
  if(shell3d.scene.fog)shell3d.scene.fog.color.set(hex);
  shell3d.scrollGround(spd*0.0035);
  shell3d.render();
}
const LSK='px_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120,MAX_LIVES=5;
const stars=Array.from({length:90},()=>({x:Math.random(),y:Math.random()*0.65,s:Math.floor(Math.random()*3)+1,b:Math.random()>0.7}));
const mnts=Array.from({length:7},(x,i)=>({x:i/7,w:0.12+Math.random()*0.1,h:0.12+Math.random()*0.1}));
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT,lives;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');lives=MAX_LIVES;moodIdx=0;moodFade=0;moodChanging=false;moodText='';moodTextT=0;}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',e=>{
  if(state==='start'||state==='over'){startGame();return;}
});

// ── Touch controls ───────────────────────────────────────────────────────────
let _ty0=null,_tx0=null;
function _onTouchStart(e){
  e.preventDefault();
  const t=e.changedTouches[0];
  _ty0=t.clientY;_tx0=t.clientX;
  if(state==='start'||state==='over'){startGame();}
}
function _onTouchEnd(e){
  e.preventDefault();
  if(_ty0===null)return;
  const dy=e.changedTouches[0].clientY-_ty0;
  _ty0=null;_tx0=null;
  if(state==='start'||state==='over'){return;}
  if(state==='play'){
    if(dy>40) doSlide();   // swipe down → slide
    else doJump();          // tap → jump
  }
}
document.addEventListener('touchstart',_onTouchStart,{passive:false});
document.addEventListener('touchend',_onTouchEnd,{passive:false});

// On-screen buttons (prevent event bubbling to document handler)
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doJump();else startGame();},{passive:false});
document.getElementById('btn-slide').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doSlide();else startGame();},{passive:false});
document.getElementById('btn-jump').addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();},{passive:false});
document.getElementById('btn-slide').addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();},{passive:false});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#ffff00',5);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:30,col,s:Math.floor(Math.random()*4)+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=40;w=28;oy=GY-h;}else if(t==='tall'){h=70;w=32;oy=GY-h;}else{h=12;w=90;oy=GY-80;}obs.push({x:W+60,y:oy,w,h,type:t,hint:false});}
function spawnCoin(x){coll.push({x,y:GY-40-Math.random()*80,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function drawPlayer(x,y,sl){
  const t=cx, bx=Math.floor(x-14), bob=Math.sin(fr*0.2)*2;
  if(sl){
    // Sliding robot - flat mode
    t.fillStyle='#00ccff'; t.fillRect(bx-6,y-14,40,14); // body flat
    t.fillStyle='#0066aa'; t.fillRect(bx-6,y-14,40,5); // top stripe
    t.fillStyle='#ffff00'; t.fillRect(bx+24,y-12,8,8); // eye visor
    t.fillStyle='#333'; t.fillRect(bx-6,y,40,6); // wheels/skid
  } else {
    const lk=Math.sin(fr*0.25)*8;
    // Legs
    t.fillStyle='#0055aa';
    t.fillRect(bx+2,y-lk*0.5,10,18+lk); // left leg
    t.fillRect(bx+16,y+lk*0.5,10,18-lk); // right leg
    // Feet
    t.fillStyle='#00ccff'; t.fillRect(bx,y+16,13,6); t.fillRect(bx+15,y+16,13,6);
    // Body
    t.fillStyle='#0088cc'; t.fillRect(bx,y-40+bob,28,42);
    // Chest light
    const pulse=0.5+Math.sin(fr*0.1)*0.5;
    t.fillStyle=`rgba(0,255,255,${pulse})`; t.fillRect(bx+8,y-30+bob,12,10);
    // Arms
    t.fillStyle='#0055aa';
    t.fillRect(bx-10,y-38+bob+lk*0.3,10,22);
    t.fillRect(bx+28,y-38+bob-lk*0.3,10,22);
    // Hands glow
    t.fillStyle='#ffff00'; t.fillRect(bx-10,y-18+bob,10,8); t.fillRect(bx+28,y-18+bob,10,8);
    // Head
    t.fillStyle='#00aaee'; t.fillRect(bx-2,y-58+bob,32,20);
    // Visor
    t.fillStyle='#003366'; t.fillRect(bx+2,y-56+bob,24,12);
    t.fillStyle='rgba(0,255,255,0.8)'; t.fillRect(bx+4,y-54+bob,20,8);
    // Antenna
    t.fillStyle='#00ccff'; t.fillRect(bx+12,y-66+bob,4,10);
    t.fillStyle='#ff0066'; t.beginPath(); t.arc(bx+14,y-68+bob,4,0,Math.PI*2); t.fill();
  }
}
function drawObs(o){
  const t=cx;
  t.save();
  if(o.type==='short'){
    // Pixel alien — green square body, antennae, red eyes
    const ax=Math.floor(o.x), ay=Math.floor(o.y), aw=o.w, ah=o.h;
    // body
    t.fillStyle='#22cc44'; t.fillRect(ax,ay,aw,ah);
    // darker side panels
    t.fillStyle='#118822'; t.fillRect(ax,ay,4,ah); t.fillRect(ax+aw-4,ay,4,ah);
    // top highlight
    t.fillStyle='#55ff77'; t.fillRect(ax+4,ay,aw-8,4);
    // pixel eyes (red, blinking)
    const eyeOn=Math.floor(fr*0.05)%3!==0;
    t.fillStyle=eyeOn?'#ff2222':'#880000';
    t.fillRect(ax+4,ay+8,6,6); t.fillRect(ax+aw-10,ay+8,6,6);
    // mouth (jagged pixel)
    t.fillStyle='#003300';
    for(let i=0;i<4;i++) t.fillRect(ax+4+i*6,ay+ah-10+(i%2)*4,5,4);
    // antennae
    t.fillStyle='#22cc44';
    t.fillRect(ax+4,ay-10,4,10); t.fillRect(ax+aw-8,ay-10,4,10);
    t.fillStyle='#ffff00';
    t.fillRect(ax+2,ay-14,8,6); t.fillRect(ax+aw-10,ay-14,8,6);
    // outline
    t.strokeStyle='#005500'; t.lineWidth=2; t.strokeRect(ax,ay,aw,ah);

  }else if(o.type==='tall'){
    // Pixel skyscraper fragment — blue/purple building chunk with lit windows
    const bx=Math.floor(o.x), by=Math.floor(o.y), bw=o.w, bh=o.h;
    // building body gradient
    const bg=t.createLinearGradient(bx,by,bx+bw,by);
    bg.addColorStop(0,'#1a1a4e'); bg.addColorStop(0.5,'#2a2a6e'); bg.addColorStop(1,'#1a1a4e');
    t.fillStyle=bg; t.fillRect(bx,by,bw,bh);
    // windows (some lit yellow/white, some dark)
    const ww=7, wh=6, wgx=4, wgy=8;
    for(let wy=by+10;wy<by+bh-8;wy+=wh+wgy){
      for(let wx=bx+wgx;wx<bx+bw-ww;wx+=ww+wgx){
        const lit=(Math.floor((wx-bx)/11)+(Math.floor((wy-by)/14)))%3!==0;
        const flicker=lit&&Math.sin(fr*0.07+(wx+wy)*0.3)>0.6;
        t.fillStyle=flicker?'#ffffff':lit?'#ffffaa':'#0a0a2a';
        t.fillRect(Math.floor(wx),Math.floor(wy),ww,wh);
      }
    }
    // top ledge
    t.fillStyle='#4444aa'; t.fillRect(bx-3,by,bw+6,6);
    // side highlight
    t.fillStyle='rgba(255,255,255,0.07)'; t.fillRect(bx,by,4,bh);
    // outline
    t.strokeStyle='#6666cc'; t.lineWidth=1.5; t.strokeRect(bx,by,bw,bh);

  }else{
    // Laser beam — bright cyan/red horizontal beam with glow
    const lx=Math.floor(o.x), ly=Math.floor(o.y), lw=o.w, lh=o.h;
    const pulse=0.6+Math.sin(fr*0.2)*0.4;
    // support posts
    t.fillStyle='#555';
    t.fillRect(lx+4,ly+lh,6,GY-ly-lh);
    t.fillRect(lx+lw-10,ly+lh,6,GY-ly-lh);
    // outer glow
    t.shadowColor='#00ffff'; t.shadowBlur=18*pulse;
    t.fillStyle=`rgba(0,255,255,${0.25*pulse})`;
    t.fillRect(lx,ly-6,lw,lh+12);
    // core beam
    const lg=t.createLinearGradient(lx,ly,lx,ly+lh);
    lg.addColorStop(0,'#ff0044'); lg.addColorStop(0.5,'#ff88aa'); lg.addColorStop(1,'#ff0044');
    t.fillStyle=lg; t.fillRect(lx,ly,lw,lh);
    // bright center line
    t.fillStyle=`rgba(255,255,255,${pulse})`;
    t.fillRect(lx,ly+Math.floor(lh/2)-1,lw,2);
    t.shadowBlur=0;
    // emitter caps
    t.fillStyle='#888'; t.fillRect(lx,ly-3,10,lh+6); t.fillRect(lx+lw-10,ly-3,10,lh+6);
    t.fillStyle='#00ffff'; t.fillRect(lx+2,ly-1,6,lh+2); t.fillRect(lx+lw-8,ly-1,6,lh+2);
  }
  t.restore();
}
function drawCoin(c){
  const sz=12+Math.sin(c.a*0.2)*2;
  cx.fillStyle='#ccaa00';cx.fillRect(Math.floor(c.x-sz/2-1),Math.floor(c.y-sz/2+1),sz,sz);
  cx.fillStyle='#ffff00';cx.fillRect(Math.floor(c.x-sz/2),Math.floor(c.y-sz/2),sz,sz);
  cx.fillStyle='#fff';cx.fillRect(Math.floor(c.x-sz/2+2),Math.floor(c.y-sz/2+2),Math.floor(sz/3),Math.floor(sz/3));
}
function drawBG(){
  cx.drawImage(BG,0,0,W,H);
  cx.fillStyle=MOOD_OVERLAYS[moodIdx];cx.fillRect(0,0,W,H);
  if(moodTextT>0){cx.globalAlpha=Math.min(1,moodTextT/20);cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(W/2-160,H*0.18-28,320,46);cx.fillStyle='#ffff00';cx.font='bold 26px monospace';cx.textAlign='center';cx.fillText('⚡ '+moodText,W/2,H*0.18+8);cx.textAlign='left';cx.globalAlpha=1;}
  cx.fillStyle='rgba(0,0,0,0.3)'; cx.fillRect(0,GY,W,H-GY);
  cx.fillStyle='#55dd55';cx.fillRect(0,GY,W,6);
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';const pulse=Math.sin(p.a*0.1)*3;cx.fillStyle=col;cx.fillRect(Math.floor(p.x-10-pulse/2),Math.floor(p.y-10-pulse/2),20+pulse,20+pulse);cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t==='shield'?'S':p.t==='magnet'?'M':'SL',Math.floor(p.x),Math.floor(p.y+4));cx.textAlign='left';}
function drawHUD(){
  cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,44);
  cx.font='bold 14px monospace';
  cx.fillStyle='#ffff00';cx.fillText('SCORE: '+sc,16,28);
  cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);
  cx.fillStyle='#ffff00';cx.fillText('COINS: '+coins,W*0.5,28);
  cx.fillStyle='#ff88ff';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);
  if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}
  if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}
  for(let i=0;i<MAX_LIVES;i++){cx.fillStyle=i<lives?'#ff4444':'#444';cx.fillRect(W-20-i*22,12,14,14);}
}
function drawStart(){
  cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.fillStyle='#fff';cx.fillRect(Math.floor(s.x*W),Math.floor(s.y*H),s.s,s.s);});
  cx.fillStyle='#228b22';cx.fillRect(0,GY,W,H-GY);
  cx.fillStyle='#ffff00';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('PIXEL DASH',W/2,H*0.35);
  cx.fillStyle='#fff';cx.font='20px monospace';cx.fillText('RETRO 8-BIT RUNNER',W/2,H*0.45);
  const isMob=window.matchMedia('(hover:none)and(pointer:coarse)').matches;
  cx.fillStyle='#00ff00';cx.font='18px monospace';cx.fillText(isMob?'TAP: JUMP  SWIPE DOWN: SLIDE':'↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#0000aa';cx.fillRect(W/2-80,H*0.66,160,44);cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.66+28);
  if(best>0){cx.fillStyle='#ffff00';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){
  cx.fillStyle='rgba(0,0,0,0.78)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#ff0000';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);
  cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);
  cx.fillStyle='#ffff00';cx.fillText('BEST:  '+best,W/2,H*0.54);
  cx.fillStyle='#0000aa';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#fff';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);
  cx.textAlign='left';
}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  const _dm=Math.floor(dist/100);if(_dm>0&&Math.floor((dist-spd*0.05)/100)<_dm){triggerMood(_dm);}
  if(moodChanging){moodFade=Math.min(1,moodFade+0.018);if(moodFade>=1)moodChanging=false;}
  if(moodTextT>0)moodTextT--;
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;
  if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?50:30,ph=sliding?18:60,phY=sliding?py-18:py-60;
  if(!dead&&!inv){
    for(let o of obs){
      if(hit(PX-pw/2,phY,pw,ph,o)){
        if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00aaff',15);addFT(PX,py-60,'SHIELD!','#00aaff');}
        lives--;spawnP(PX,py-30,'#ff4444',15);if(lives<=0){dead=true;if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}else{inv=true;invT=120;obs=[];addFT(PX,py-60,'❤ '+lives+' LEFT!','#ff4444');}
        break;
      }
    }
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-30)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffff00');spawnP(c.x,c.y,'#ffff00',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-30)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  render3D();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.col;cx.fillRect(Math.floor(p.x),Math.floor(p.y),p.s,p.s);cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.fillStyle='rgba(0,170,255,0.2)';cx.fillRect(Math.floor(W*0.22-26),Math.floor(py-66),52,74);}
    drawPlayer(W*0.22,py,sliding);
  }
  // Hints
  for(let o of obs){
    if(o.x-W*0.22<320&&o.x-W*0.22>60){
      cx.font='bold 16px monospace';cx.textAlign='center';
      if(o.type==='short'){cx.fillStyle='#00ff00';cx.fillText('JUMP ↑',W*0.22,GY-95);}
      else{cx.fillStyle='#ff8800';cx.fillText('SLIDE ↓',W*0.22,GY-95);}
      cx.textAlign='left';
    }
  }
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){const isMob=window.matchMedia('(hover:none)and(pointer:coarse)').matches;cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText(isMob?'TAP: JUMP  SWIPE ↓: SLIDE':'↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){
  update();
  if(state==='start')drawStart();
  else if(state==='over'){draw();drawOver();}
  else draw();
  requestAnimationFrame(loop);
}
init();loop();
</script>

/* ── Page-level overrides ── */
#layout { display: block; } /* no sidebar on this page */

/* ── Hero ── */
.games-page-hero {
  padding: 52px 32px 44px;

  background: var(--c-card-h);
}
.games-page-hero-icon { font-size: 60px; display: block; margin-bottom: 14px; }
.games-page-hero h1 {

  color: var(--c-text);

}
.games-page-hero p {

  color: var(--c-muted);

}
.hero-stats {

  justify-content: center;
  gap: 36px;
  flex-wrap: wrap;
}
.hero-stat-val {
  font-family: var(--font-game, 'Nunito', sans-serif);
  font-size: 24px;
  font-weight: 900;
  color: var(--c-text);
}
.hero-stat-label {
  font-size: 11px;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 3px;
}

/* ── Breadcrumb ── */
.sub-breadcrumb {
  padding: 10px 24px;
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  font-size: 12px;
  color: var(--c-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.sub-breadcrumb a { color: var(--c-muted); text-decoration: none; }
.sub-breadcrumb a:hover { color: var(--c-accent); }
.bc-sep { opacity: .5; }
.bc-cur { color: var(--c-text); font-weight: 700; }

/* ── Toolbar ── */
.games-toolbar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 24px;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}

/* Search */
.toolbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--c-card-h);
  border: 1px solid var(--c-border);
  border-radius: 12px;
  padding: 0 14px;
  flex: 1;
  min-width: 200px;
  max-width: 320px;
  transition: border-color .2s, box-shadow .2s;
}
.toolbar-search:focus-within {
  border-color: var(--c-accent);
  background: var(--c-surface);
  box-shadow: 0 0 0 3px rgba(108,92,231,.12);
}
.toolbar-search input {
  background: none;
  border: none;
  outline: none;
  color: var(--c-text);
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  padding: 11px 0;
  width: 100%;
}
.toolbar-search input::placeholder { color: var(--c-muted); }
.toolbar-search-icon { font-size: 15px; opacity: .5; flex-shrink: 0; }

/* Sort */
.toolbar-sort {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.sort-label { font-size: 12px; font-weight: 700; color: var(--c-muted); white-space: nowrap; }
.sort-btn {
  padding: 7px 14px;
  border-radius: 20px;
  background: var(--c-card-h);
  border: 1px solid var(--c-border);
  color: var(--c-muted);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  white-space: nowrap;
}
.sort-btn:hover, .sort-btn.active {
  background: rgba(108,92,231,.1);
  border-color: var(--c-accent);
  color: var(--c-accent);
}

/* Count */
.game-count-badge {
  margin-left: auto;
  font-size: 12px;
  font-weight: 800;
  color: var(--c-muted);
  white-space: nowrap;
}
.game-count-badge span { color: var(--c-accent); }

/* ── Category filter pills ── */
.cat-filter-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 28px;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-filter-wrap::-webkit-scrollbar { display: none; }
.cat-filter-pills {
  display: flex;
  gap: 10px;
  width: max-content;
}
.cat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 24px;
  background: var(--c-card);
  border: 1px solid var(--c-border);
  color: var(--c-muted);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  user-select: none;
}
.cat-pill:hover {
  border-color: var(--c-border-h);
  color: var(--c-text);
  transform: translateY(-1px);
}
.cat-pill.active {
  color: #fff;
  border-color: transparent;
  transform: translateY(-1px);
  box-shadow: var(--shadow-card);
}
.cat-pill-count {
  font-size: 10px;
  background: rgba(0,0,0,.08);
  border-radius: 10px;
  padding: 1px 6px;
  font-weight: 800;
}
.cat-pill.active .cat-pill-count { background: rgba(255,255,255,.25); }

/* ── Grid wrapper ── */
.all-games-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Empty state ── */
.no-results {

  text-align: center;
  padding: 80px 24px;

}
.no-results-icon { font-size: 64px; margin-bottom: 16px; }
.no-results-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--c-text); }

/* ── Back to top ── */
#back-top {
  position: fixed;
  bottom: 80px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--c-accent);

  color: #fff;
  font-size: 18px;
  cursor: pointer;
  box-shadow: var(--shadow-card-hover);
  display: none;

  justify-content: center;
  transition: transform .2s, opacity .2s;
  z-index: 200;
}
#back-top:hover { transform: scale(1.1); }
#back-top.visible { display: flex; }

@media (max-width: 600px) {

  </div>

<script>
/* ══════════════════════════════════════════════
   ZENMAGMA — /games/ Browse Page
   Renders the full GAMES catalog with live
   search, category filter, and sort controls.
══════════════════════════════════════════════ */

let _activeCat  = 'all';
let _activeSort = 'popular';
let _query      = '';
let _allGames   = [];

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => {
  if (typeof GAMES === 'undefined' || !GAMES.length) return;
  _allGames = GAMES;

  buildCatPills();
  bindSort();
  bindSearch();
  bindBackTop();
  render();

  document.getElementById('total-count').textContent = GAMES.length + '+';
  document.getElementById('cat-count').textContent   = (CATEGORIES.length - 1); // exclude 'all'
});

/* ── Category pills ── */
function buildCatPills() {
  const wrap = document.getElementById('cat-pills');
  if (!wrap) return;

  /* Count games per category */
  const counts = {};
  GAMES.forEach(g => {
    counts[g.category] = (counts[g.category] || 0) + 1;
    (g.tags || []).forEach(t => { if (t !== g.category) counts[t] = (counts[t] || 0); });
  });

  const pills = CATEGORIES.map(cat => {
    const n = cat.id === 'all' ? GAMES.length : (counts[cat.id] || 0);
    const emoji = cat.label.match(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u)?.[0] || '';
    const text  = cat.label.replace(/\S+\s/, ''); // strip emoji prefix
    return `<button class="cat-pill${cat.id === 'all' ? ' active' : ''}"
                    data-cat="${cat.id}"
                    style="${cat.id === 'all' ? `background:${cat.color};border-color:${cat.color}` : ''}"
                    data-color="${cat.color}">
      ${emoji} ${text}
      <span class="cat-pill-count">${n}</span>
    </button>`;
  }).join('');

  wrap.innerHTML = pills;

  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.cat-pill');
    if (!btn) return;
    _activeCat = btn.dataset.cat;
    wrap.querySelectorAll('.cat-pill').forEach(b => {
      b.classList.remove('active');
      b.style.background = '';
      b.style.borderColor = '';
    });
    btn.classList.add('active');
    btn.style.background  = btn.dataset.color;
    btn.style.borderColor = btn.dataset.color;
    render();
  });
}

/* ── Sort buttons ── */
function bindSort() {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _activeSort = btn.dataset.sort;
      render();
    });
  });
}

/* ── Search ── */
function bindSearch() {
  const input = document.getElementById('search-input');
  if (!input) return;
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => { _query = input.value.trim().toLowerCase(); render(); }, 180);
  });
}

/* ── Back to top ── */
function bindBackTop() {
  const btn = document.getElementById('back-top');
  if (!btn) return;
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 600);
  }, { passive: true });
}

/* ── Filtered + sorted game list ── */
function filteredGames() {
  let list = _allGames;

  /* Category filter */
  if (_activeCat !== 'all') {
    list = list.filter(g => g.category === _activeCat || (g.tags || []).includes(_activeCat));
  }

  /* Search filter */
  if (_query) {
    list = list.filter(g =>
      g.title.toLowerCase().includes(_query) ||
      (g.desc  || '').toLowerCase().includes(_query) ||
      (g.tags  || []).some(t => t.includes(_query)) ||
      g.category.includes(_query)
    );
  }

  /* Sort */
  return [...list].sort((a, b) => {
    if (_activeSort === 'rating') return b.rating - a.rating;
    if (_activeSort === 'new')    return (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0);
    if (_activeSort === 'az')     return a.title.localeCompare(b.title);
    return b.plays - a.plays; // popular (default)
  });
}

/* ── Render grid ── */
function render() {
  const grid    = document.getElementById('games-grid');
  const noRes   = document.getElementById('no-results');
  const counter = document.getElementById('showing-count');
  if (!grid) return;

  const games = filteredGames();
  if (counter) counter.textContent = games.length;

  if (!games.length) {
    grid.innerHTML = '';
    if (noRes) noRes.style.display = 'block';
    return;
  }
  if (noRes) noRes.style.display = 'none';

  grid.innerHTML = games.map((g, i) => cardHTML(g, i)).join('');

  /* Trigger scroll-reveal on newly injected cards */
  if (window.ScrollReveal?.init) ScrollReveal.init();
}

/* ── Card HTML ── */
function cardHTML(g, i) {
  const delay = Math.min(i * 30, 400);

  const thumb = g.thumb
    ? `<img src="${g.thumb}" alt="${g.title}" loading="lazy"
            style="width:100%;height:100%;object-fit:cover;"
            onerror="this.style.display='none'">`
    : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${g.color}dd,${g.color}55);
                   display:flex;align-items:center;justify-content:center;font-size:48px">${g.emoji}</div>`;

  const catInfo  = CATEGORIES.find(c => c.id === g.category);
  const catLabel = catInfo ? catInfo.label.replace(/\S+\s/, '') : g.category;

  const badges = [
    g.isNew     ? '<span class="badge new">✨ New</span>'  : '',
    g.trending  ? '<span class="badge hot">🔥 Hot</span>' : '',
  ].filter(Boolean).join('');

  return `
    <a class="game-card will-reveal"
       href="../game.html?id=${g.slug}"
       style="animation-delay:${delay}ms"
       title="${g.title}">
      <div class="card-thumb" style="background:${g.color}33">
        ${thumb}
        <div class="card-overlay"><div class="card-play-label">▶ Play Now</div></div>
        <div class="card-badges">${badges}</div>
      </div>
      <div class="card-info">
        <div class="card-title">${g.title}</div>
        <div class="card-meta">
          <span class="card-cat-badge" style="background:${g.color}22;color:${g.color}">${catLabel}</span>
          <span class="card-rating">⭐ ${g.rating}</span>
        </div>
        <div class="card-plays-row">
          ${formatPlays(g.plays)} plays
        </div>
      </div>
    </a>`;
}

/* ── Helpers ── */
</script>

<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ninja Slash - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0500;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff4b1f,#ff9068);color:#fff;transition:.2s}
.btn:hover{transform:scale(1.05)}
#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}
#ob{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #ff4b1f}
#ob h2{font-size:2em;margin-bottom:8px;background:linear-gradient(135deg,#ff4b1f,#ff9068);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#ob p{color:#aaa;margin-bottom:22px;line-height:1.5}
#hm{position:fixed;top:10px;left:10px;padding:6px 14px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.8em;z-index:100}
</style></head><body>


<div id="hud"><span class="hval">Score:<b id="sc"> 0</b></span><span class="hval">Lives:<b id="lf"> 3</b></span><span class="hval">Combo:<b id="cb"> x1</b></span><button class="btn" onclick="ng()">Restart</button></div>
<canvas id="c" width="420" height="480"></canvas>
<div id="goov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid #ff4b1f;"><div style="font-size:3em;margin-bottom:10px;">🥷</div><div style="font-size:1.6em;font-weight:800;color:#ff4b1f;margin-bottom:8px;">Game Over</div><div id="gomsg" style="color:#aaa;margin-bottom:20px;font-size:.95em;"></div><button class="btn" onclick="doRestart()">▶ Play Again</button></div></div>
<div id="ov"><div id="ob"><h2>Ninja Slash</h2><p>Slash flying fruits by clicking or swiping across them! Avoid the bombs or lose a life. Build combos for bonus points!</p><button class="btn" onclick="go()">Slice!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const W=420,H=480;
const FRUITS=[{emoji:"🍉",pts:10},{emoji:"🍊",pts:15},{emoji:"🍋",pts:12},{emoji:"🍎",pts:10},{emoji:"🍇",pts:20},{emoji:"🥭",pts:25}];
let items=[],trail=[],score=0,lives=3,combo=1,timer,running=false,frame=0;
function spawnItem(){
  const bomb=Math.random()<0.15+frame*.0001;
  const x=50+Math.random()*(W-100);
  items.push({x,y:H+40,dx:(Math.random()-.5)*3,dy:-(8+Math.random()*5),gy:.15,r:28,bomb,sliced:false,emoji:bomb?"💣":FRUITS[Math.floor(Math.random()*FRUITS.length)].emoji,pts:bomb?0:FRUITS[Math.floor(Math.random()*FRUITS.length)].pts,alpha:1});
}
function draw(){
  ctx.fillStyle="#0a0500";ctx.fillRect(0,0,W,H);
  // Trail
  if(trail.length>1){ctx.strokeStyle="rgba(255,150,0,.6)";ctx.lineWidth=4;ctx.beginPath();trail.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();}
  // Items
  items.forEach(it=>{
    if(it.sliced){ctx.globalAlpha=it.alpha;ctx.font=`${it.r*1.5}px sans-serif`;ctx.textAlign="center";ctx.fillText(it.emoji.replace(/./,"✨"),it.x,it.y);ctx.globalAlpha=1;return;}
    ctx.font=`${it.r*2}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(it.emoji,it.x,it.y);
  });
}
function update(){
  frame++;
  items.forEach(it=>{it.x+=it.dx;it.y+=it.dy;it.dy+=it.gy;if(it.sliced)it.alpha-=0.05;});
  if(!items.find(it=>!it.sliced&&it.y<H+60)&&Math.random()<0.03+frame*.0001)spawnItem();
  items.forEach(it=>{if(!it.sliced&&it.y>H+60){if(!it.bomb){combo=1;document.getElementById("cb").textContent="x"+combo;}items.splice(items.indexOf(it),1);}});
  items=items.filter(it=>it.alpha>0||!it.sliced);
}
function checkSlice(mx,my){
  items.forEach(it=>{if(it.sliced||it.y>H+60)return;if(Math.hypot(mx-it.x,my-it.y)<it.r+5){it.sliced=true;if(it.bomb){lives--;document.getElementById("lf").textContent=lives;combo=1;document.getElementById("cb").textContent="x1";if(lives<=0){running=false;showGameOver("Score: "+score);}}else{score+=it.pts*combo;combo++;document.getElementById("sc").textContent=score;document.getElementById("cb").textContent="x"+combo;}}});
}
let mx=0,my=0;
cv.addEventListener("mousemove",e=>{const r=cv.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;trail.push({x:mx,y:my});if(trail.length>15)trail.shift();checkSlice(mx,my);});
cv.addEventListener("touchmove",e=>{e.preventDefault();const r=cv.getBoundingClientRect(),t=e.touches[0];mx=t.clientX-r.left;my=t.clientY-r.top;trail.push({x:mx,y:my});if(trail.length>15)trail.shift();checkSlice(mx,my);},{passive:false});
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){score=0;lives=3;combo=1;items=[];trail=[];frame=0;document.getElementById("sc").textContent=0;document.getElementById("lf").textContent=3;document.getElementById("cb").textContent="x1";if(running){running=false;}setTimeout(go,100);}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  ng();
}
</script></body></html>

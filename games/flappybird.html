<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#87ceeb; }
  canvas { display:block; position:fixed; top:0; left:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ══════════════════════════════════════════════════
   FLAPPY BIRD — Full-screen responsive canvas
══════════════════════════════════════════════════ */
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

/* ── Resize ── */
let W, H, GY; // GY = ground Y
function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
  GY = H - H * 0.12;
}
resize();
window.addEventListener('resize', () => { resize(); if (!running) drawStart(); });

/* ── Constants (scaled to screen) ── */
const GRAVITY   = () => H * 0.0008;
const FLAP_PWR  = () => -H * 0.015;
const PIPE_SPD  = () => W * 0.004;
const PIPE_GAP  = () => H * 0.26;
const PIPE_W    = () => W * 0.1;
const PIPE_INT  = () => W * 0.55;   // horizontal gap between pipes
const BIRD_R    = () => H * 0.038;  // bird radius
const BIRD_X    = () => W * 0.22;

/* ── State ── */
let bird, pipes, score, hiScore, vy, running, started, animId, lives, invTimer;

hiScore = +localStorage.getItem('fb_hi') || 0;

/* ── Init game ── */
function init() {
  bird    = { x: BIRD_X(), y: H * 0.42, r: BIRD_R() };
  pipes   = [];
  score   = 0;
  vy      = 0;
  running = false;
  started = false;
  lives   = 3;
  invTimer= 0;
}
init();

/* ── Input ── */
function handleInput() {
  if (!started) { started = true; running = true; vy = FLAP_PWR(); loop(); return; }
  if (running) { vy = FLAP_PWR(); sound('flap'); }
}
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput(); }
});
cv.addEventListener('click', handleInput);
cv.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, { passive:false });

/* ── Game loop ── */
function loop() {
  if (!running) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

/* ── Update ── */
function update() {
  // Physics
  vy += GRAVITY();
  bird.y += vy;

  // Invincibility frames
  if (invTimer > 0) invTimer--;

  // Ground / ceiling collision
  if (bird.y + bird.r > GY) {
    bird.y = GY - bird.r;
    loseLife();
    return;
  }
  if (bird.y - bird.r < 0) {
    bird.y = bird.r;
    vy = 0;
  }

  // Spawn pipes
  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - PIPE_INT()) {
    const minTop = H * 0.12;
    const maxTop = GY - PIPE_GAP() - H * 0.12;
    const topH   = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: W, topH, scored: false });
  }

  // Move & check pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPD();

    // Score
    if (!p.scored && bird.x > p.x + PIPE_W()) {
      p.scored = true;
      score++;
      sound('score');
    }

    // Collision (shrunk hitbox: 75% of visual radius)
    if (invTimer === 0) {
      const hr = bird.r * 0.75;
      const bx = bird.x, by = bird.y;
      const px = p.x, pw = PIPE_W();
      const gap_top = p.topH, gap_bot = p.topH + PIPE_GAP();
      if (bx + hr > px && bx - hr < px + pw) {
        if (by - hr < gap_top || by + hr > gap_bot) {
          loseLife();
          return;
        }
      }
    }

    // Remove off-screen
    if (p.x + PIPE_W() < 0) pipes.splice(i, 1);
  }
}

/* ── Lose a life ── */
function loseLife() {
  lives--;
  sound('hit');
  if (lives <= 0) {
    gameOver();
  } else {
    // Respawn bird, brief invincibility, clear nearby pipes
    bird.y = H * 0.42;
    vy = 0;
    invTimer = 80;
    pipes = pipes.filter(p => p.x > W * 0.4);
  }
}

/* ── Game Over ── */
function gameOver() {
  running = false;
  cancelAnimationFrame(animId);
  if (score > hiScore) { hiScore = score; localStorage.setItem('fb_hi', hiScore); }
  sound('gameover');
  drawGameOver();
}

/* ══ DRAW ════════════════════════════════════════ */
function draw() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GY);
  sky.addColorStop(0, '#4ec5f1');
  sky.addColorStop(1, '#a8e6ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Clouds (pseudo-random, based on scroll)
  drawClouds();

  // Pipes
  pipes.forEach(p => drawPipe(p));

  // Ground
  drawGround();

  // Bird (blink when invincible)
  const blink = invTimer > 0 && Math.floor(invTimer / 5) % 2 === 0;
  if (!blink) drawBird();

  // HUD
  drawHUD();
}

function drawBird() {
  const { x, y, r } = bird;
  ctx.save();
  // Tilt based on velocity
  const tilt = Math.min(Math.max(vy * 0.08, -0.5), 1.2);
  ctx.translate(x, y);
  ctx.rotate(tilt);

  // Body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#e6a800';
  ctx.lineWidth = r * 0.12;
  ctx.stroke();

  // Wing
  ctx.fillStyle = '#FFC200';
  ctx.beginPath();
  ctx.ellipse(-r * 0.2, r * 0.2, r * 0.55, r * 0.3, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(r * 0.4, -r * 0.2, r * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(r * 0.48, -r * 0.18, r * 0.18, 0, Math.PI * 2);
  ctx.fill();
  // Shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(r * 0.54, -r * 0.25, r * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FF8C00';
  ctx.beginPath();
  ctx.moveTo(r * 0.6, r * 0.05);
  ctx.lineTo(r * 1.1, r * 0.15);
  ctx.lineTo(r * 0.6, r * 0.3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawPipe(p) {
  const pw   = PIPE_W();
  const gap  = PIPE_GAP();
  const capH = H * 0.045;
  const capW = pw * 1.12;
  const capX = p.x - (capW - pw) / 2;

  // Green gradient
  const grad = ctx.createLinearGradient(p.x, 0, p.x + pw, 0);
  grad.addColorStop(0,   '#2d8c2d');
  grad.addColorStop(0.35,'#3db33d');
  grad.addColorStop(0.7, '#2d8c2d');
  grad.addColorStop(1,   '#1a5c1a');

  ctx.fillStyle = grad;

  // Top pipe body
  ctx.fillRect(p.x, 0, pw, p.topH - capH);
  // Top pipe cap
  ctx.fillRect(capX, p.topH - capH, capW, capH);

  // Bottom pipe body
  const botY = p.topH + gap;
  ctx.fillRect(p.x, botY + capH, pw, GY - botY - capH);
  // Bottom pipe cap
  ctx.fillRect(capX, botY, capW, capH);

  // Highlight strip
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(p.x + pw * 0.15, 0, pw * 0.2, p.topH - capH);
  ctx.fillRect(p.x + pw * 0.15, botY + capH, pw * 0.2, GY - botY - capH);
}

let cloudOffset = 0;
function drawClouds() {
  cloudOffset = (cloudOffset + PIPE_SPD() * 0.3) % W;
  const clouds = [
    { ox:0.1, oy:0.07, w:0.14 },
    { ox:0.4, oy:0.05, w:0.10 },
    { ox:0.65,oy:0.10, w:0.16 },
    { ox:0.85,oy:0.06, w:0.12 },
  ];
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  clouds.forEach(c => {
    const cx = ((c.ox * W - cloudOffset * 0.5) % W + W) % W;
    const cy = c.oy * H;
    const cw = c.w * W;
    ctx.beginPath();
    ctx.ellipse(cx,        cy,      cw*0.5, cw*0.22, 0, 0, Math.PI*2);
    ctx.ellipse(cx-cw*0.2, cy+cw*0.1, cw*0.3, cw*0.18, 0, 0, Math.PI*2);
    ctx.ellipse(cx+cw*0.2, cy+cw*0.1, cw*0.3, cw*0.18, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawGround() {
  const gh = H - GY;
  const g = ctx.createLinearGradient(0, GY, 0, H);
  g.addColorStop(0, '#8BC34A');
  g.addColorStop(0.3, '#6aaa35');
  g.addColorStop(1, '#5a9a25');
  ctx.fillStyle = g;
  ctx.fillRect(0, GY, W, gh);
  // Dirt stripe
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(0, GY + gh * 0.35, W, gh * 0.65);
  // Grass line
  ctx.fillStyle = '#7CB342';
  ctx.fillRect(0, GY, W, gh * 0.12);
}

function drawHUD() {
  const fs = Math.min(W, H) * 0.07;
  // Score
  ctx.textAlign = 'center';
  ctx.font = `bold ${fs}px Arial`;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillText(score, W / 2 + 2, H * 0.1 + 2);
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W / 2, H * 0.1);

  // Lives (hearts)
  const hs = fs * 0.7;
  ctx.font = `${hs}px Arial`;
  ctx.textAlign = 'left';
  const heartStr = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
  ctx.fillText(heartStr, W * 0.04, H * 0.08);

  // Best
  ctx.font = `bold ${fs * 0.45}px Arial`;
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText(`BEST: ${hiScore}`, W * 0.96, H * 0.07);
}

/* ── Start Screen ── */
function drawStart() {
  draw();
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.fillRect(0, 0, W, H);

  const fs = Math.min(W, H) * 0.07;
  ctx.textAlign = 'center';

  // Title
  ctx.font = `bold ${fs * 1.1}px Arial`;
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 8;
  ctx.fillText('🐦 FLAPPY BIRD', W / 2, H * 0.3);

  // Sub
  ctx.font = `${fs * 0.55}px Arial`;
  ctx.fillStyle = '#fff';
  ctx.fillText('Tap / Click / Space to Flap', W / 2, H * 0.42);
  ctx.fillText(`🏆 Best Score: ${hiScore}`, W / 2, H * 0.52);

  // Big bird preview
  const savedBird = { ...bird };
  bird.x = W / 2; bird.y = H * 0.66; bird.r = BIRD_R() * 1.5;
  ctx.shadowBlur = 0;
  drawBird();
  bird = savedBird;

  ctx.font = `${fs * 0.45}px Arial`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('3 Lives • Avoid the pipes!', W / 2, H * 0.82);
  ctx.shadowBlur = 0;
}

/* ── Game Over Screen ── */
function drawGameOver() {
  draw();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  const fs  = Math.min(W, H) * 0.065;
  const bw  = W * 0.75;
  const bh  = H * 0.52;
  const bx  = (W - bw) / 2;
  const by  = (H - bh) / 2;

  // Panel
  ctx.fillStyle = 'rgba(20,30,50,0.92)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 20);
  ctx.fill();
  ctx.strokeStyle = '#667eea';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.textAlign = 'center';
  const cx = W / 2;

  ctx.font = `bold ${fs * 1.1}px Arial`;
  ctx.fillStyle = '#f093fb';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.fillText('Game Over!', cx, by + bh * 0.22);

  ctx.font = `bold ${fs * 1.8}px Arial`;
  ctx.fillStyle = '#667eea';
  ctx.fillText(score, cx, by + bh * 0.48);

  ctx.font = `${fs * 0.5}px Arial`;
  ctx.fillStyle = '#aaa';
  ctx.shadowBlur = 0;
  const msg = score === 0 ? 'Hit something straight away!' :
              score < 5  ? 'Keep practicing! 💪' :
              score < 10 ? 'Getting better! 🚀' :
              score < 20 ? 'Great job! 🌟' : 'Incredible! 🏆';
  ctx.fillText(msg, cx, by + bh * 0.6);

  if (score >= hiScore && score > 0) {
    ctx.font = `bold ${fs * 0.55}px Arial`;
    ctx.fillStyle = '#FFD700';
    ctx.fillText('🏆 New Best Score!', cx, by + bh * 0.72);
  } else {
    ctx.font = `${fs * 0.48}px Arial`;
    ctx.fillStyle = '#888';
    ctx.fillText(`Best: ${hiScore}`, cx, by + bh * 0.72);
  }

  // Play again button
  const btnW = bw * 0.55, btnH = bh * 0.14;
  const btnX = cx - btnW / 2, btnY = by + bh * 0.82;
  const gr = ctx.createLinearGradient(btnX, 0, btnX + btnW, 0);
  gr.addColorStop(0, '#667eea'); gr.addColorStop(1, '#764ba2');
  ctx.fillStyle = gr;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY - btnH * 0.7, btnW, btnH, 10);
  ctx.fill();
  ctx.font = `bold ${fs * 0.55}px Arial`;
  ctx.fillStyle = '#fff';
  ctx.fillText('▶ PLAY AGAIN', cx, btnY);

  // Store button area for click
  cv._restartBtn = { x: btnX, y: btnY - btnH * 0.7, w: btnW, h: btnH };
}

/* ── Restart on game over click ── */
cv.addEventListener('click', e => {
  if (!running && !started && cv._restartBtn) {
    const r  = cv.getBoundingClientRect();
    const mx = (e.clientX - r.left) * (W / r.width);
    const my = (e.clientY - r.top)  * (H / r.height);
    const b  = cv._restartBtn;
    if (mx > b.x && mx < b.x + b.w && my > b.y && my < b.y + b.h) {
      cv._restartBtn = null;
      init();
      drawStart();
    }
  }
});

/* ── Sound ── */
let actx;
function sound(type) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime;
    if (type === 'flap') {
      o.frequency.setValueAtTime(380, t);
      o.frequency.exponentialRampToValueAtTime(620, t + 0.1);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t); o.stop(t + 0.12);
    } else if (type === 'score') {
      o.frequency.setValueAtTime(800, t);
      o.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      o.start(t); o.stop(t + 0.1);
    } else if (type === 'hit') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.2);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.start(t); o.stop(t + 0.22);
    } else if (type === 'gameover') {
      [440, 370, 300, 220].forEach((f, i) => {
        const o2 = actx.createOscillator(), g2 = actx.createGain();
        o2.connect(g2); g2.connect(actx.destination);
        o2.type = 'triangle'; o2.frequency.value = f;
        g2.gain.setValueAtTime(0.2, t + i * 0.1);
        g2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.15);
        o2.start(t + i * 0.1); o2.stop(t + i * 0.1 + 0.2);
      });
    }
  } catch(e) {}
}

/* ── Boot ── */
drawStart();
</script>
</body>
</html>

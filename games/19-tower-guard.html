<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tower Guard - ZenMagma</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0000;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #c0392b}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#c0392b,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>

<div id="hud"><span class="hv">HP:<b id="hp"> 20</b></span><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Wave:<b id="wv"> 1</b></span><span class="hv">Gold:<b id="gd"> 50</b></span><button class="btn" onclick="buyUpg()">Upgrade (25g)</button><button class="btn" onclick="ng()">Restart</button></div>
<canvas id="c" width="420" height="460"></canvas>
<div id="goov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid #e74c3c;"><div style="font-size:3em;margin-bottom:10px;">🏰</div><div style="font-size:1.6em;font-weight:800;color:#e74c3c;margin-bottom:8px;">Tower Fell!</div><div id="gomsg" style="color:#aaa;margin-bottom:20px;font-size:.95em;"></div><button class="btn" onclick="doRestart()">▶ Play Again</button></div></div>
<div id="ov"><div id="ob"><h2>Tower Guard</h2><p>Enemies walk toward your tower! Tower auto-shoots — click on enemies for bonus shots! Buy upgrades to increase firepower.</p><button class="btn" onclick="go()">Defend!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=420,H=460;
let hp,score,wave,gold,enemies,bullets,explosions,autoShoot,frame,running,dmg,fireRate,waveActive;
function init(){hp=20;score=0;wave=1;gold=80;enemies=[];bullets=[];explosions=[];autoShoot=0;frame=0;dmg=15;fireRate=45;waveActive=false;document.getElementById("hp").textContent=hp;document.getElementById("sc").textContent=score;document.getElementById("wv").textContent=wave;document.getElementById("gd").textContent=gold;}
function spawnWave(){
  waveActive=true;
  const n=3+wave*2;
  let spawned=0;
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      if(!running)return;
      enemies.push({x:-30-i*10,y:180+Math.sin(i*0.8)*55,hp:wave*10+15,maxHp:wave*10+15,spd:0.7+wave*0.08,r:16});
      spawned++;
      if(spawned===n) waveActive=false;
    },i*600);
  }
}
function draw(){
  ctx.fillStyle="#0a0000";ctx.fillRect(0,0,W,H);
  // Path
  ctx.fillStyle="#1a0a00";ctx.fillRect(0,160,W-80,80);ctx.fillRect(W-80,0,80,H);
  // Tower
  ctx.fillStyle="#8B0000";ctx.fillRect(W-80,40,60,H-40);ctx.fillStyle="#c0392b";ctx.fillRect(W-90,40,80,30);ctx.fillStyle="#e74c3c";ctx.fillRect(W-68,20,40,25);
  // HP bar
  ctx.fillStyle="#333";ctx.fillRect(W-76,H-30,56,12);ctx.fillStyle="#e74c3c";ctx.fillRect(W-76,H-30,56*(hp/20),12);
  // Enemies
  enemies.forEach(e=>{
    ctx.fillStyle=`hsl(${30-e.hp/e.maxHp*30},80%,50%)`;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#e74c3c";ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,5);ctx.fillStyle="#2ecc71";ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*(e.hp/e.maxHp),5);
  });
  bullets.forEach(b=>{ctx.fillStyle="#f1c40f";ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();});
  explosions.forEach(p=>{ctx.globalAlpha=p.life/20;ctx.fillStyle="#f39c12";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
}
function update(){
  frame++;autoShoot++;
  if(autoShoot>=fireRate&&enemies.length>0){const t=enemies[0];const angle=Math.atan2(t.y-(H/2),t.x-(W-50));bullets.push({x:W-50,y:H/2,dx:Math.cos(angle)*10,dy:Math.sin(angle)*10});autoShoot=0;}
  bullets=bullets.filter(b=>{b.x+=b.dx;b.y+=b.dy;let hit=false;enemies=enemies.filter(e=>{if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+4){e.hp-=dmg;explosions.push({x:e.x,y:e.y,r:15,life:20});if(e.hp<=0){score+=10*wave;gold+=5;document.getElementById("sc").textContent=score;document.getElementById("gd").textContent=gold;hit=true;return false;}hit=true;return true;}return true;});return !hit&&b.x>0&&b.x<W&&b.y>0&&b.y<H;});
  enemies=enemies.filter(e=>{e.x+=e.spd;if(e.x>W-50){hp-=2;document.getElementById("hp").textContent=hp;if(hp<=0){running=false;showGameOver("Tower fell! Score: "+score);}return false;}return true;});
  explosions=explosions.filter(p=>{p.life--;return p.life>0;});
  if(!waveActive&&enemies.length===0&&frame>60){wave++;document.getElementById("wv").textContent=wave;frame=0;spawnWave();}
}
function buyUpg(){if(gold>=25){gold-=25;dmg+=8;fireRate=Math.max(12,fireRate-6);document.getElementById("gd").textContent=gold;}}
// Click on canvas = manual bonus shot at nearest enemy
cv.addEventListener("click",e=>{
  if(!running||enemies.length===0)return;
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  // shoot at clicked position
  const angle=Math.atan2(my-(H/2),mx-(W-50));
  bullets.push({x:W-50,y:H/2,dx:Math.cos(angle)*12,dy:Math.sin(angle)*12});
});
function go(){document.getElementById("ov").style.display="none";running=true;frame=0;spawnWave();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){init();if(running){running=false;}setTimeout(go,100);}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  ng();
}
</script></body></html>

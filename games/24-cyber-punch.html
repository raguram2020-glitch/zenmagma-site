<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cyber Punch - ZenMagma</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05000f;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f953c6,#b91d73);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #f953c6}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f953c6,#b91d73);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">HP:<b id="hp"> 100</b></span><span class="hv">Wave:<b id="wv"> 1</b></span><button class="btn" onclick="ng()">Restart</button></div>
<canvas id="c" width="480" height="400"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Click enemies to punch them! Move: arrow keys</p>
<div id="ov"><div id="ob"><h2>Cyber Punch</h2><p>You're a cyber warrior in neon streets! Click on enemies to punch them. Move to dodge their attacks.</p><button class="btn" onclick="go()">Fight!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=400;
let player,enemies,effects,score,hp,wave,frame,running,paused=false,waveClearTimer=0;
const keys={};
function init(){player={x:W/2,y:H-80,r:18,spd:4};enemies=[];effects=[];score=0;hp=100;wave=1;frame=0;}
function spawnWave(){const n=2+wave*2;for(let i=0;i<n;i++){const side=Math.random()<0.5?-30:W+30;enemies.push({x:side,y:100+Math.random()*(H-200),r:16,hp:30+wave*10,maxHp:30+wave*10,spd:1+wave*.3,attack:0,color:`hsl(${Math.floor(Math.random()*360)},70%,50%)`});}}
document.addEventListener("keydown",e=>{if(e.key===' '&&running){e.preventDefault();paused=!paused;}keys[e.key]=true;});document.addEventListener("keyup",e=>keys[e.key]=false);
cv.addEventListener("click",e=>{
  if(!running)return;
  const mx=e.offsetX,my=e.offsetY;
  enemies.forEach(en=>{if(Math.hypot(mx-en.x,my-en.y)<en.r+12){en.hp-=20+Math.random()*15;score+=5*wave;document.getElementById("sc").textContent=score;effects.push({x:en.x,y:en.y-20,text:"PUNCH!",life:25,color:"#f953c6"});if(en.hp<=0){effects.push({x:en.x,y:en.y,text:"KO!",life:40,color:"#f1c40f"});score+=50*wave;document.getElementById("sc").textContent=score;}}});
});
function update(){
  if(paused)return;
  frame++;
  if(keys["ArrowLeft"])player.x=Math.max(player.r,player.x-player.spd);
  if(keys["ArrowRight"])player.x=Math.min(W-player.r,player.x+player.spd);
  if(keys["ArrowUp"])player.y=Math.max(50,player.y-player.spd);
  if(keys["ArrowDown"])player.y=Math.min(H-player.r,player.y+player.spd);
  enemies=enemies.filter(e=>e.hp>0);
  enemies.forEach(e=>{const a=Math.atan2(player.y-e.y,player.x-e.x);e.x+=Math.cos(a)*e.spd;e.y+=Math.sin(a)*e.spd;e.attack++;if(e.attack>90+Math.random()*30){if(Math.hypot(e.x-player.x,e.y-player.y)<60){hp-=3;document.getElementById("hp").textContent=Math.max(0,Math.round(hp));}e.attack=0;}});
  effects=effects.filter(p=>{p.life--;return p.life>0;});
  if(hp<=0){running=false;setTimeout(()=>window._showMod("Knocked out! Score: "+score),200);}
  if(enemies.length===0&&waveClearTimer===0){waveClearTimer=120;effects.push({x:W/2,y:H/2,text:"Wave "+(wave)+" Cleared! 🎉",life:120,color:"#f1c40f"});setTimeout(()=>{wave++;document.getElementById("wv").textContent=wave;spawnWave();waveClearTimer=0;},2000);}
}
function draw(){
  ctx.fillStyle="#05000f";ctx.fillRect(0,0,W,H);
  // Neon floor
  ctx.fillStyle="#0a0018";ctx.fillRect(0,H-60,W,60);
  for(let i=0;i<W;i+=40){ctx.strokeStyle=`rgba(249,83,198,${.1+Math.sin(frame*.05+i)*.05})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i,H-60);ctx.lineTo(i,H);ctx.stroke();}
  // Buildings bg
  [50,150,250,350,450].forEach((x,i)=>{ctx.fillStyle=`rgba(249,83,198,0.05)`;ctx.fillRect(x-20,20,40,H-80);});
  enemies.forEach(e=>{
    ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle="#333";ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,5);ctx.fillStyle="#e74c3c";ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*(e.hp/e.maxHp),5);
    ctx.fillStyle="#fff";ctx.font="bold 12px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("👊",e.x,e.y);
  });
  ctx.fillStyle="#f953c6";ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();ctx.fillStyle="#fff";ctx.font="18px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("😤",player.x,player.y);
  effects.forEach(ef=>{ctx.globalAlpha=ef.life/Math.max(ef.life,40);ctx.fillStyle=ef.color;ctx.font=ef.life>80?"bold 26px sans-serif":"bold 18px sans-serif";ctx.textAlign="center";ctx.fillText(ef.text,ef.x,ef.y-((40-Math.min(ef.life,40))*.5));ctx.globalAlpha=1;});
  if(paused){ctx.fillStyle="rgba(0,0,0,.55)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#fff";ctx.font="bold 32px sans-serif";ctx.textAlign="center";ctx.fillText("⏸ PAUSED",W/2,H/2);ctx.font="14px sans-serif";ctx.fillStyle="#aaa";ctx.fillText("Press Space to resume",W/2,H/2+36);}
  ctx.fillStyle="#1a001a";ctx.fillRect(10,H-18,200,12);ctx.fillStyle="#e74c3c";ctx.fillRect(10,H-18,200*(hp/100),12);
}
function go(){document.getElementById("ov").style.display="none";running=true;spawnWave();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){init();if(running)running=false;setTimeout(go,100);}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none'" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
</body></html>

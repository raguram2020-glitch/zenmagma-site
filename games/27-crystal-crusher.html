<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#05000f;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #a855f7}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Shots:<b id="sh"> 20</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="480" height="480"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Click to shoot at crystals! Destroy all to advance.</p>
<div id="goov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid #ef4444;"><div style="font-size:3em;margin-bottom:10px;">💎</div><div style="font-size:1.6em;font-weight:800;color:#ef4444;margin-bottom:8px;">Game Over</div><div id="gomsg" style="color:#aaa;margin-bottom:20px;font-size:.95em;"></div><button class="btn" onclick="doRestart()" style="margin-right:8px;">▶ Play Again</button></div></div>
<div id="ov"><div id="ob"><h2>Crystal Crusher</h2><p>Aim and shoot at the magical crystals to shatter them! Each crystal takes multiple hits. Clear the field to advance!</p><button class="btn" onclick="go()">Smash!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=480;
let crystals,shots,particles,score,level,shotsLeft,running;
function mkLevel(){
  crystals=[];shotsLeft=20+level*3;
  const n=5+level*2;
  for(let i=0;i<n;i++){const a=i*Math.PI*2/n,r=80+Math.random()*100;crystals.push({x:W/2+Math.cos(a)*r,y:H/2+Math.sin(a)*r,r:20+Math.random()*15,hp:1+Math.floor(level/2),maxHp:1+Math.floor(level/2),color:`hsl(${260+i*20},80%,60%)`});}
  document.getElementById("sh").textContent=shotsLeft;
}
function shoot(tx,ty){
  if(shotsLeft<=0)return;
  const angle=Math.atan2(ty-H+80,tx-W/2);
  let bx=W/2,by=H-60,dx=Math.cos(angle)*10,dy=Math.sin(angle)*10;
  let hit=false;const steps=60;
  for(let s=0;s<steps&&!hit;s++){bx+=dx;by+=dy;crystals.forEach(c=>{if(!c.dead&&Math.hypot(bx-c.x,by-c.y)<c.r){c.hp--;if(c.hp<=0){c.dead=true;score+=50*level;for(let i=0;i<12;i++)particles.push({x:c.x,y:c.y,dx:(Math.random()-.5)*5,dy:(Math.random()-.5)*5,life:30,color:c.color});}hit=true;}});}
  shots.push({x:W/2,y:H-60,tx,ty,prog:0});shotsLeft--;document.getElementById("sh").textContent=shotsLeft;document.getElementById("sc").textContent=score;
  crystals=crystals.filter(c=>!c.dead);
  if(crystals.length===0){level++;document.getElementById("lv").textContent=level;setTimeout(()=>{mkLevel();draw();},600);}
  else if(shotsLeft<=0){setTimeout(()=>{showGameOver("No shots left! Score: "+score);},200);}
}
cv.addEventListener("click",e=>{if(running)shoot(e.offsetX,e.offsetY);});
function draw(){
  ctx.fillStyle="#05000f";ctx.fillRect(0,0,W,H);
  for(let i=0;i<50;i++){ctx.fillStyle="rgba(168,85,247,.3)";ctx.fillRect((i*137)%W,(i*97)%H,1,1);}
  crystals.forEach(c=>{
    ctx.fillStyle=c.color;ctx.save();ctx.translate(c.x,c.y);
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(Math.cos(a)*c.r,Math.sin(a)*c.r);ctx.lineTo(Math.cos(a+Math.PI/6)*c.r*.5,Math.sin(a+Math.PI/6)*c.r*.5);}ctx.closePath();ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.3)";ctx.beginPath();ctx.moveTo(-c.r*.3,- c.r*.6);ctx.lineTo(c.r*.1,-c.r*.3);ctx.lineTo(-c.r*.1,c.r*.1);ctx.closePath();ctx.fill();
    ctx.restore();
    for(let i=0;i<c.maxHp;i++){ctx.fillStyle=i<c.hp?c.color:"#333";ctx.fillRect(c.x-c.maxHp*6+i*13,c.y-c.r-10,10,5);}
  });
  // Cannon
  ctx.fillStyle="#555";ctx.fillRect(W/2-10,H-40,20,40);ctx.fillStyle="#888";ctx.fillRect(W/2-8,H-60,16,30);
  shots.forEach(s=>{ctx.fillStyle="#f1c40f";ctx.beginPath();ctx.arc(s.x+s.prog*(s.tx-s.x),s.y+s.prog*(s.ty-s.y),5,0,Math.PI*2);ctx.fill();s.prog+=0.1;});
  shots=shots.filter(s=>s.prog<1.1);
  particles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.life--;ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);ctx.globalAlpha=1;});
  particles=particles.filter(p=>p.life>0);
}
shots=[];particles=[];score=0;level=1;shotsLeft=20;running=false;
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;requestAnimationFrame(lp);draw();})();}
function ng(){score=0;level=1;shots=[];particles=[];document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;mkLevel();if(!running)go();else draw();}
mkLevel();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  score=0;level=1;shots=[];particles=[];
  document.getElementById('sc').textContent=0;
  document.getElementById('lv').textContent=1;
  mkLevel();
  if(!running){running=true;(function lp(){if(!running)return;requestAnimationFrame(lp);draw();})();}
}
</script>    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body></html>

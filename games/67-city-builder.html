<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>City Builder - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001428;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;transition:.2s;margin:4px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #4facfe}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center;max-width:600px;margin:0 auto">
<div style="padding:8px"><span class="hv">💰<b id="gd"> 200</b></span><span class="hv">👥<b id="pop"> 0</b></span><span class="hv">😊<b id="hap"> 100</b>%</span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="480" height="320" style="cursor:pointer"></canvas>
<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:8px">
<button class="btn" onclick="setTool('house')" id="t-house">🏠 House (30g)</button>
<button class="btn" onclick="setTool('shop')" id="t-shop">🏪 Shop (50g)</button>
<button class="btn" onclick="setTool('park')" id="t-park">🌳 Park (20g)</button>
<button class="btn" onclick="setTool('road')" id="t-road">🛣 Road (10g)</button>
</div>
<div id="log" style="color:#aaa;font-size:.85em;height:24px;padding:4px"></div>
</div>
<div id="ov"><div id="ob"><h2>City Builder</h2><p>Build a thriving city! Place houses for population, shops for income, parks for happiness, and roads to connect everything.</p><button class="btn" onclick="go()">Build!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),COLS=12,ROWS=8,CS=40;
const TYPES={empty:{e:"",cost:0},house:{e:"🏠",cost:30,pop:5,happy:0},shop:{e:"🏪",cost:50,pop:0,happy:-5,income:20},park:{e:"🌳",cost:20,pop:0,happy:15},road:{e:"🛣",cost:10,pop:0,happy:2}};
let grid,tool="house",gold=200,score=0,day=0,income_timer;
function init(){grid=Array.from({length:ROWS},()=>Array(COLS).fill("empty"));}
function draw(){
  ctx.fillStyle="#001428";ctx.fillRect(0,0,480,320);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=grid[r][c],x=c*CS,y=r*CS;
    ctx.fillStyle=t==="empty"?"#0a1a2a":"#0d2040";ctx.fillRect(x+1,y+1,CS-2,CS-2);
    ctx.strokeStyle="rgba(79,172,254,.15)";ctx.lineWidth=1;ctx.strokeRect(x,y,CS,CS);
    if(t!=="empty"){ctx.font="22px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(TYPES[t].e,x+CS/2,y+CS/2);}
  }
  // Update stats
  let pop=0,happy=100;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const t=TYPES[grid[r][c]];pop+=t.pop||0;happy+=t.happy||0;}
  happy=Math.max(0,Math.min(100,happy));
  document.getElementById("pop").textContent=pop;document.getElementById("hap").textContent=happy;score=pop*happy/10;document.getElementById("sc").textContent=Math.round(score);
}
function setTool(t){tool=t;Object.keys(TYPES).forEach(k=>{const b=document.getElementById("t-"+k);if(b)b.style.opacity=k===t?"1":".6";});}
cv.addEventListener("click",e=>{
  const c=Math.floor(e.offsetX/CS),r=Math.floor(e.offsetY/CS);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  const cost=TYPES[tool].cost;
  if(gold<cost){document.getElementById("log").textContent="Not enough gold!";return;}
  gold-=cost;grid[r][c]=tool;document.getElementById("gd").textContent=gold;draw();
});
function go(){document.getElementById("ov").style.display="none";income_timer=setInterval(()=>{let inc=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(grid[r][c]==="shop")inc+=20;}gold+=inc;document.getElementById("gd").textContent=gold;if(inc>0)document.getElementById("log").textContent=`+${inc}g income!`;},5000);draw();}
init();draw();setTool("house");

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script></body></html>

<!DOCTYPE html><html lang="en"><head>
<script>
// roundRect polyfill for Chrome <99, Firefox <112, Safari <15.4
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    else if(r.length===1)r=[r[0],r[0],r[0],r[0]];
    else if(r.length===2)r=[r[0],r[1],r[0],r[1]];
    else if(r.length===3)r=[r[0],r[1],r[2],r[1]];
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);
    this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
    this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);
    this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);
    this.closePath();
    return this;
  };
}
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Memory Matrix - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#100010;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);touch-action:none}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#fc5c7d,#6a3093);color:#fff;transition:.2s}
.btn:hover{transform:scale(1.05);opacity:.9}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}
#obox{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #fc5c7d}
#obox h2{font-size:2.2em;margin-bottom:8px;background:linear-gradient(135deg,#fc5c7d,#6a3093);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#obox p{color:#aaa;margin-bottom:22px;line-height:1.5}
#home{position:fixed;top:10px;left:10px;padding:6px 14px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.8em;z-index:100}
</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>


<div id="hud"><span class="hval">Score: <b id="sc">0</b></span><span class="hval">Level: <b id="lv">1</b></span><span class="hval" id="phase">Memorize!</span><button class="btn" onclick="newGame()">Restart</button></div>
<canvas id="c" width="360" height="360"></canvas>
<div id="overlay"><div id="obox"><h2>Memory Matrix</h2><p>Watch the flashing cells, then tap them in the same pattern!<br>Each level adds more cells to remember.</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),SZ=4;
let pattern=[],guesses=[],showing=false,score=0,level=1,running=false;
const TILE=90;
function mkPattern(){pattern=[];const count=level+2;const all=[];for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)all.push([r,c]);all.sort(()=>Math.random()-.5);for(let i=0;i<count&&i<all.length;i++)pattern.push(all[i]);}
function draw(highlights=[]){
  ctx.fillStyle="#100010";ctx.fillRect(0,0,360,360);
  for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){
    const x=c*TILE+5,y=r*TILE+5,w=TILE-10;
    const inPat=highlights.some(p=>p[0]===r&&p[1]===c);
    const guessed=guesses.some(p=>p[0]===r&&p[1]===c);
    ctx.fillStyle=inPat?"#fc5c7d":guessed?"#6a3093":"#2a1a2a";
    ctx.beginPath();ctx.roundRect(x,y,w,w,10);ctx.fill();
    if(inPat){ctx.fillStyle="rgba(255,255,255,.3)";ctx.beginPath();ctx.ellipse(x+w*.35,y+w*.25,w*.15,w*.1,0,0,Math.PI*2);ctx.fill();}
  }
}
async function showPattern(){
  showing=true;document.getElementById("phase").textContent="Memorize!";
  draw([]);await sleep(500);
  for(let i=0;i<pattern.length;i++){draw(pattern.slice(0,i+1));await sleep(400+level*40);}
  await sleep(600);draw([]);showing=false;guesses=[];document.getElementById("phase").textContent="Recall!";
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
cv.addEventListener("click",e=>{
  if(!running||showing)return;
  const c=Math.floor(e.offsetX/TILE),r=Math.floor(e.offsetY/TILE);
  if(r<0||r>=SZ||c<0||c>=SZ)return;
  if(guesses.some(p=>p[0]===r&&p[1]===c))return;
  guesses.push([r,c]);
  const ok=guesses.every(g=>pattern.some(p=>p[0]===g[0]&&p[1]===g[1]));
  if(!ok){draw(guesses);document.getElementById("phase").textContent="Wrong! -1 life";setTimeout(()=>newRound(),1000);return;}
  draw(guesses);
  if(guesses.length===pattern.length){score+=level*50;level++;document.getElementById("sc").textContent=score;document.getElementById("lv").textContent=level;document.getElementById("phase").textContent="Correct!";setTimeout(newRound,800);}
});
function newRound(){mkPattern();showPattern();}
function go(){document.getElementById("overlay").style.display="none";running=true;newRound();}
function newGame(){score=0;level=1;document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;if(running)newRound();}
draw([]);

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>
</body></html>

<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bug Zapper - ZenMagma</title>

    <link rel="canonical" href="https://zenmagma.com/games/30-bug-zapper">
    <meta property="og:title" content="Bug Zapper - ZenMagma">
    <meta property="og:description" content="Zap bugs before they invade your garden! Fast reflexes needed.">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/30-bug-zapper">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000505;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f9d423,#e040fb);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #f9d423}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f9d423,#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Time:<b id="tm"> 60</b>s</span><span class="hv">Combo:<b id="cb"> x1</b></span><button class="btn" onclick="ng()">Restart</button></div>
<canvas id="c" width="480" height="460"></canvas>
<div id="ov"><div id="ob"><h2>Bug Zapper</h2><p>Zap the flying bugs by clicking on them! Don't miss - combos multiply your score. Avoid zapping ladybugs (red with spots)!</p><button class="btn" onclick="go()">Zap!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=460;
let bugs,zapFX,score,combo,timer,timeLeft,running;
const BUG_TYPES=[{emoji:"🦟",pts:10,good:true},{emoji:"🦗",pts:15,good:true},{emoji:"🦋",pts:5,good:true},{emoji:"🐛",pts:20,good:true},{emoji:"🐞",pts:-10,good:false}];
function spawnBug(){const t=BUG_TYPES[Math.floor(Math.random()*BUG_TYPES.length)];bugs.push({x:Math.random()*W,y:Math.random()*H,dx:(Math.random()-.5)*3,dy:(Math.random()-.5)*3,r:20,type:t,wobble:Math.random()*Math.PI*2,life:0});}
function init(){bugs=[];zapFX=[];score=0;combo=1;timeLeft=60;document.getElementById("sc").textContent=0;document.getElementById("tm").textContent=60;document.getElementById("cb").textContent="x1";}
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;setTimeout(()=>window._showMod("Time up! Score: "+score),100);}else{timeLeft--;}}
cv.addEventListener("click",e=>{
  if(!running)return;
  const mx=e.offsetX,my=e.offsetY;let hit=false;
  bugs=bugs.filter(b=>{if(Math.hypot(mx-b.x,my-b.y)<b.r+8){hit=true;if(!b.type.good){combo=1;score=Math.max(0,score+b.type.pts);zapFX.push({x:b.x,y:b.y,text:"WRONG! -10",color:"#e74c3c",life:30});}else{score+=b.type.pts*combo;combo++;zapFX.push({x:b.x,y:b.y,text:"+"+b.type.pts*combo+"  x"+combo,color:"#f9d423",life:30});if(combo>=5)zapFX.push({x:W/2,y:H/2,text:"🔥 COMBO x"+combo+"!",color:"#ff6b35",life:50});}document.getElementById("sc").textContent=score;document.getElementById("cb").textContent="x"+combo;return false;}return true;});
  if(!hit){combo=1;document.getElementById("cb").textContent="x1";}
});
function update(){
  bugs.forEach(b=>{b.x+=b.dx+Math.sin(b.wobble+=0.05)*.5;b.y+=b.dy+Math.cos(b.wobble)*.5;if(b.x<-30)b.x=W+30;if(b.x>W+30)b.x=-30;if(b.y<-30)b.y=H+30;if(b.y>H+30)b.y=-30;b.life++;});
  const spawnChance=0.02+(60-timeLeft)/60*0.1;
  if(bugs.length<8&&Math.random()<spawnChance)spawnBug();
  zapFX=zapFX.filter(z=>{z.life--;return z.life>0;});
}
function draw(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);g.addColorStop(0,"#050a0a");g.addColorStop(1,"#000505");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Electric grid
  ctx.strokeStyle="rgba(249,212,35,.05)";ctx.lineWidth=1;for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}for(let i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
  bugs.forEach(b=>{ctx.font="32px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(b.type.emoji,b.x,b.y);});
  zapFX.forEach(z=>{ctx.globalAlpha=z.life/30;ctx.fillStyle=z.color;ctx.font="bold 16px sans-serif";ctx.textAlign="center";ctx.fillText(z.text,z.x,z.y-(30-z.life));ctx.globalAlpha=1;});
}
function go(){document.getElementById("ov").style.display="none";running=true;for(let i=0;i<6;i++)spawnBug();timer=setInterval(tick,1000);(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){clearInterval(timer);init();if(running)running=false;setTimeout(go,100);}
init();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById(''_gmod'').style.display=''none''" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
    <script src="../js/mobile-controls.js" defer></script>
</body></html>

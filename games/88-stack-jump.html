<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Stack Jump - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0008;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b6b,#feca57);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #ff6b6b}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#ff6b6b,#feca57);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Height:<b id="ht"> 0</b></span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="360" height="480"></canvas>
<p style="color:#aaa;font-size:.8em">Tap/click when block aligns to stack it!</p></div>
<div id="ov"><div id="ob"><h2>Stack Jump</h2><p>Click when the moving block is aligned with the stack below! Perfect alignment = wider block and bonus points!</p><button class="btn" onclick="go()">Jump!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=360,H=480;
let stack=[],moving,score=0,height=0,running=false,offset=0;
const COLORS=["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#54a0ff","#5f27cd","#1dd1a1","#ee5a24"];
function init(){stack=[{x:W/2-60,w:120,y:H-50}];moving={x:-120,w:120,spd:3.5,dir:1};score=0;height=0;offset=0;}
function drop(){
  const top=stack[stack.length-1];const oy=top.y-40;
  const ox=Math.max(moving.x,top.x),oend=Math.min(moving.x+moving.w,top.x+top.w),ow=oend-ox;
  if(ow<=0){running=false;setTimeout(()=>alert("Stack fell! Height: "+height),200);return;}
  const perfect=Math.abs(ow-top.w)<4;score+=perfect?30:Math.round(ow);height++;
  stack.push({x:ox,w:Math.min(ow+( perfect?2:0),120),y:oy,color:COLORS[height%COLORS.length]});
  document.getElementById("sc").textContent=score;document.getElementById("ht").textContent=height;
  if(stack.length>10){offset+=40;}
  moving={x:Math.random()<.5?-120:W+40,w:Math.min(ow+(perfect?2:0),120),spd:Math.min(9,3.5+height*.1),dir:Math.random()<.5?1:-1};
}
cv.addEventListener("click",()=>{if(running)drop();});
cv.addEventListener("touchstart",e=>{e.preventDefault();if(running)drop();},{passive:false});
function update(){moving.x+=moving.spd*moving.dir;if(moving.x>W+40||moving.x+moving.w<-40)moving.dir*=-1;}
function draw(){
  ctx.fillStyle="#0a0008";ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(0,offset);
  stack.forEach((s,i)=>{ctx.fillStyle=s.color||COLORS[i%COLORS.length];ctx.fillRect(s.x,s.y,s.w,36);ctx.fillStyle="rgba(255,255,255,.25)";ctx.fillRect(s.x,s.y,s.w,10);});
  ctx.restore();
  ctx.fillStyle="#feca57";ctx.fillRect(moving.x,H-90+offset%40,moving.w,36);ctx.fillStyle="rgba(255,255,255,.3)";ctx.fillRect(moving.x,H-90+offset%40,moving.w,10);
}
function go(){document.getElementById("ov").style.display="none";running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script></body></html>

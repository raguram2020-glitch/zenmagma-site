<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1000;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);touch-action:none}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;transition:.2s}
.btn:hover{transform:scale(1.05);opacity:.9}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}
#obox{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #f7971e}
#obox h2{font-size:2.2em;margin-bottom:8px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#obox p{color:#aaa;margin-bottom:22px;line-height:1.5}
#home{position:fixed;top:10px;left:10px;padding:6px 14px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.8em;z-index:100}
</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>


<div id="hud"><span class="hval">Score: <b id="sc">0</b></span><span class="hval">Round: <b id="rnd">1</b></span><button class="btn" onclick="newRound()">Skip</button></div>
<canvas id="c" width="400" height="400"></canvas>
<div id="overlay"><div id="obox"><h2>Shadow Match</h2><p>Rotate the colored shape to match the grey shadow.<br>Click arrows or use arrow keys to rotate!</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const shapes=["triangle","square","pentagon","hexagon","star"];
let shape,targetAngle,currentAngle,score=0,round=1,running=false;
function rnd(){return Math.random()*Math.PI*2;}
function drawShape(x,y,type,angle,color,size){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.fillStyle=color;ctx.beginPath();
  if(type==="triangle"){const s=size;ctx.moveTo(0,-s);ctx.lineTo(s*.866,s*.5);ctx.lineTo(-s*.866,s*.5);ctx.closePath();}
  else if(type==="square"){ctx.rect(-size/2,-size/2,size,size);}
  else if(type==="pentagon"){for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);}ctx.closePath();}
  else if(type==="hexagon"){for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);}ctx.closePath();}
  else{for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r=i%2===0?size:size*.4;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();}
  ctx.fill();ctx.restore();
}
function draw(){
  ctx.fillStyle="#1a1000";ctx.fillRect(0,0,400,400);
  ctx.fillStyle="#333";ctx.font="14px Segoe UI";ctx.textAlign="center";
  ctx.fillText("Shadow (target)",100,30);ctx.fillText("Your Shape",300,30);
  drawShape(100,220,shape,targetAngle,"rgba(255,255,255,.15)",80);
  drawShape(300,220,shape,currentAngle,"#f7971e",80);
  const diff=Math.abs(((currentAngle-targetAngle+Math.PI*3)%(Math.PI*2))-Math.PI);
  const pct=Math.max(0,1-diff/0.5);
  ctx.fillStyle=`hsl(${pct*120},80%,55%)`;ctx.font="bold 16px Segoe UI";
  ctx.fillText(Math.round(pct*100)+"% match",200,380);
  ctx.fillStyle="#555";ctx.fillRect(50,360,300,16);ctx.borderRadius=8;
  ctx.fillStyle=`hsl(${pct*120},80%,55%)`;ctx.fillRect(50,360,300*pct,16);
}
function check(){
  const diff=Math.abs(((currentAngle-targetAngle+Math.PI*3)%(Math.PI*2))-Math.PI);
  if(diff<0.15){score+=Math.round((1-diff/0.15)*100*(round));document.getElementById("sc").textContent=score;setTimeout(newRound,400);}
}
document.addEventListener("keydown",e=>{
  if(!running)return;
  if(e.key==="ArrowLeft")currentAngle-=0.1;
  if(e.key==="ArrowRight")currentAngle+=0.1;
  draw();check();
});
cv.addEventListener("click",e=>{
  if(!running)return;
  const cx=cv.width/2;
  currentAngle+=(e.offsetX<cx)?-0.15:0.15;
  draw();check();
});
function newRound(){shape=shapes[Math.floor(Math.random()*shapes.length)];targetAngle=rnd();currentAngle=rnd();round++;document.getElementById("rnd").textContent=round;draw();}
function go(){document.getElementById("overlay").style.display="none";running=true;newRound();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>
    <script src="../js/mobile-controls.js" defer></script>
</body></html>

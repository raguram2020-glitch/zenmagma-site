<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Whack-a-Mole - ZenMagma</title>    <meta name="description" content="Whack the moles before they go back underground! Test your reflexes.">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001a00;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #27ae60}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#27ae60,#1e8449);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a id="hm" href="../index.html" style="position:fixed;top:12px;left:14px;z-index:200;color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.4);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Time:<b id="tm"> 60</b>s</span><span class="hv">Combo:<b id="cb"> x1</b></span></div>
<canvas id="c" width="420" height="380" style="cursor:pointer"></canvas></div>
<div id="ov"><div id="ob"><h2>Whack-a-Mole</h2><p>Moles pop up from holes — click them fast! Some are golden (bonus) or angry (danger). Build combos for multipliers!</p><button class="btn" onclick="go()">Whack!</button></div></div>
<div id="end-ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid #27ae60"><div style="font-size:52px;margin-bottom:8px">🔨</div><h2 style="font-size:1.8em;margin-bottom:12px;background:linear-gradient(135deg,#27ae60,#1e8449);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Time's Up!</h2><p style="color:#aaa;margin-bottom:8px">Final Score</p><p style="font-size:2.4em;font-weight:800;color:#fff;margin-bottom:20px" id="end-sc">0</p><button class="btn" onclick="document.getElementById('end-ov').style.display='none';timeLeft=60;score=0;combo=1;document.getElementById('sc').textContent=0;document.getElementById('cb').textContent='x1';document.getElementById('ov').style.display='flex';">Play Again</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=420,H=380;
const HOLES=[[70,120],[210,120],[350,120],[70,250],[210,250],[350,250],[140,185],[280,185]];
let moles=[],hits=[],score=0,combo=1,timeLeft=60,timer,running=false,frame=0;
function popMole(){if(moles.length>=4)return;const hole=HOLES[Math.floor(Math.random()*HOLES.length)];if(moles.find(m=>m.hx===hole[0]&&m.hy===hole[1]))return;const type=Math.random()<0.15?"gold":Math.random()<0.1?"bomb":"normal";moles.push({hx:hole[0],hy:hole[1],y:hole[1]+60,vy:-1.8,visible:0,up:true,type,emoji:type==="gold"?"✨":type==="bomb"?"💣":"🐹",ttl:80});}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#001a00");g.addColorStop(1,"#003300");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=40){ctx.fillStyle="rgba(0,100,0,.1)";ctx.fillRect(i,0,1,H);}
  HOLES.forEach(([x,y])=>{ctx.fillStyle="#1a0a00";ctx.beginPath();ctx.ellipse(x,y,28,14,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#2d1a00";ctx.lineWidth=2;ctx.stroke();});
  moles.forEach(m=>{if(m.y>m.hy+10)return;ctx.save();ctx.beginPath();ctx.ellipse(m.hx,m.hy,28,14,0,0,Math.PI*2);ctx.clip();ctx.font="40px sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText(m.emoji,m.hx,m.y+20);ctx.restore();});
  hits=hits.filter(h=>{h.life--;ctx.globalAlpha=h.life/20;ctx.fillStyle=h.color;ctx.font="bold 18px Segoe UI";ctx.textAlign="center";ctx.fillText(h.text,h.x,h.y-=(40-h.life)*.3);ctx.globalAlpha=1;return h.life>0;});
}
function update(){
  frame++;if(frame%25===0)popMole();
  moles.forEach(m=>{m.ttl--;if(m.up){m.y+=m.vy;if(m.y<=m.hy-40){m.up=false;m.vy=1.2;}}else{m.y+=m.vy;}});
  moles=moles.filter(m=>m.y<m.hy+70&&m.ttl>0);
}
cv.addEventListener("click",e=>{
  if(!running)return;const mx=e.offsetX,my=e.offsetY;let hit=false;
  moles=moles.filter(m=>{if(Math.hypot(mx-m.hx,my-m.y)<30&&m.y<m.hy){hit=true;if(m.type==="bomb"){combo=1;score=Math.max(0,score-30);hits.push({x:m.hx,y:m.hy,text:"-30 BOMB!",color:"#e74c3c",life:25});}else{const pts=(m.type==="gold"?50:10)*combo;score+=pts;combo++;hits.push({x:m.hx,y:m.hy,text:"+"+pts+(combo>2?" x"+combo:""),color:m.type==="gold"?"#f1c40f":"#2ecc71",life:25});}document.getElementById("sc").textContent=score;document.getElementById("cb").textContent="x"+combo;return false;}return true;});
  if(!hit){combo=1;document.getElementById("cb").textContent="x1";}
});
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;setTimeout(()=>{document.getElementById('end-sc').textContent=score;document.getElementById('end-ov').style.display='flex';},200);}else timeLeft--;}
function go(){document.getElementById("ov").style.display="none";running=true;popMole();popMole();timer=setInterval(tick,1000);(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>    <script src="../js/mobile-controls.js" defer></script>
</body></html>

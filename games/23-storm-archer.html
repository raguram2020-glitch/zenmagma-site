<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Storm Archer - ZenMagma</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000800;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#56ab2f,#a8e063);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #56ab2f}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#56ab2f,#a8e063);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Arrows:<b id="ar"> 10</b></span><span class="hv">Wind:<b id="wd"> 0</b></span><span class="hv">Level:<b id="lv"> 1</b></span><button class="btn" onclick="ng()">New Round</button></div>
<canvas id="c" width="480" height="420"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Click to aim and shoot! Wind affects arrow path. Hit all targets to advance.</p>
<div id="ov"><div id="ob"><h2>Storm Archer</h2><p>Aim and shoot arrows at targets. Watch out for wind that curves your shots! The wind changes each round.</p><button class="btn" onclick="go()">Shoot!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=420;
let archer,targets,arrow,wind,score=0,level=1,arrows,running;
function mkLevel(){wind=(Math.random()-.5)*0.3*level;arrows=10+level;targets=[];for(let i=0;i<3+level;i++)targets.push({x:300+Math.random()*140,y:40+Math.random()*(H-80),r:20-level*1.5,hit:false});archer={x:60,y:H/2};document.getElementById("wd").textContent=(wind>0?"+":"")+wind.toFixed(2);document.getElementById("ar").textContent=arrows;}
let aimX=W/2,aimY=H/2;
cv.addEventListener("mousemove",e=>{aimX=e.offsetX;aimY=e.offsetY;if(!arrow)draw();});
cv.addEventListener("click",e=>{
  if(!running||arrow||arrows<=0)return;
  const angle=Math.atan2(e.offsetY-archer.y,e.offsetX-archer.x);
  arrow={x:archer.x,y:archer.y,dx:Math.cos(angle)*12,dy:Math.sin(angle)*12,trail:[]};
  arrows--;document.getElementById("ar").textContent=arrows;
});
function draw(){
  ctx.fillStyle="#000800";ctx.fillRect(0,0,W,H);
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#001100");g.addColorStop(1,"#002200");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Wind indicator
  ctx.strokeStyle=wind>0?"#3498db":"#e74c3c";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W/2-wind*500,H-30);ctx.lineTo(W/2,H-30);ctx.stroke();ctx.fillStyle=ctx.strokeStyle;ctx.font="14px sans-serif";ctx.textAlign="center";ctx.fillText("Wind: "+(wind>0?"→":"←"),W/2,H-10);
  // Targets
  targets.forEach(t=>{if(t.hit)return;ctx.strokeStyle="#e74c3c";ctx.lineWidth=4;[t.r+10,t.r,t.r-8].forEach((r,i)=>{ctx.strokeStyle=["#e74c3c","#f39c12","#f1c40f"][i];ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.stroke();});});
  // Archer
  ctx.fillStyle="#8B4513";ctx.beginPath();ctx.arc(archer.x,archer.y,12,0,Math.PI*2);ctx.fill();
  if(!arrow){// Aim line
    ctx.strokeStyle="rgba(255,255,255,.3)";ctx.lineWidth=1;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(archer.x,archer.y);ctx.lineTo(aimX,aimY);ctx.stroke();ctx.setLineDash([]);}
  // Arrow
  if(arrow){
    if(arrow.trail.length>1){ctx.strokeStyle="rgba(139,90,43,.4)";ctx.lineWidth=2;ctx.beginPath();arrow.trail.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));ctx.stroke();}
    const angle=Math.atan2(arrow.dy,arrow.dx);ctx.save();ctx.translate(arrow.x,arrow.y);ctx.rotate(angle);ctx.fillStyle="#8B4513";ctx.fillRect(-15,-2,30,4);ctx.fillStyle="#f1c40f";ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(8,-6);ctx.lineTo(8,6);ctx.closePath();ctx.fill();ctx.restore();
  }
}
function update(){
  if(!arrow)return;
  arrow.trail.push([arrow.x,arrow.y]);if(arrow.trail.length>20)arrow.trail.shift();
  arrow.dx+=wind;arrow.dy+=0.1;arrow.x+=arrow.dx;arrow.y+=arrow.dy;
  targets.forEach(t=>{if(!t.hit&&Math.hypot(arrow.x-t.x,arrow.y-t.y)<t.r+6){t.hit=true;score+=Math.round(100/t.r)*level;document.getElementById("sc").textContent=score;}});
  if(arrow.x>W||arrow.y>H||arrow.y<0){arrow=null;if(targets.every(t=>t.hit)){level++;document.getElementById("lv").textContent=level;setTimeout(()=>{mkLevel();draw();},600);}else if(arrows<=0){setTimeout(()=>{showGameOver("Out of arrows! Score: "+score);},200);}}
}
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){score=0;level=1;arrow=null;document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;mkLevel();if(!running){go();}else draw();}
mkLevel();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script></body></html>

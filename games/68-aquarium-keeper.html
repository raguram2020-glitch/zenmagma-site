<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Aquarium Keeper - ZenMagma</title>    <meta name="description" content="Design and manage your own aquarium! Feed fish and keep the water clean.">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000a20;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0072ff,#00c6ff);color:#fff;transition:.2s;margin:4px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #0072ff}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#0072ff,#00c6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center;max-width:600px;margin:0 auto">
<div style="padding:8px"><span class="hv">Fish:<b id="fc"> 0</b></span><span class="hv">Health:<b id="hl"> 100</b>%</span><span class="hv">Gold:<b id="gd"> 100</b></span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="480" height="340"></canvas>
<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px">
<button class="btn" onclick="addFish()">🐠 Add Fish (20g)</button>
<button class="btn" onclick="feed()">🍤 Feed (5g)</button>
<button class="btn" onclick="clean()">🧹 Clean (10g)</button>
<button class="btn" onclick="addPlant()">🌿 Plant (8g)</button>
</div>
<div id="log" style="color:#aaa;font-size:.85em;height:24px;padding:4px;text-align:center"></div>
</div>
<div id="ov"><div id="ob"><h2>Aquarium Keeper</h2><p>Manage your aquarium! Add fish, feed them, keep the tank clean. Happy fish earn you gold over time!</p><button class="btn" onclick="go()">Dive In!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=340;
const FISH_E=["🐠","🐟","🐡","🦈","🐙","🦑"];
let fish=[],plants=[],bubbles=[],gold=100,health=100,score=0,frame=0,hunger=0,dirt=0,running=false;
function init(){fish=[];plants=[];bubbles=[];gold=100;health=100;score=0;frame=0;hunger=0;dirt=0;}
function draw(){
  // Tank bg
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#001428");g.addColorStop(1,"#002850");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Sand
  ctx.fillStyle="#c9a84c";ctx.fillRect(0,H-30,W,30);for(let i=0;i<W;i+=20)ctx.fillRect(i+Math.sin(i)*(3),H-35,8,8);
  // Dirt overlay
  if(dirt>50){ctx.fillStyle=`rgba(100,50,0,${(dirt-50)/200})`;ctx.fillRect(0,0,W,H);}
  // Plants
  plants.forEach(p=>{ctx.font="30px sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText("🌿",p.x,H-28);});
  // Bubbles
  bubbles=bubbles.filter(b=>{b.y-=b.spd;b.x+=Math.sin(b.wobble+=0.05)*0.5;ctx.fillStyle="rgba(255,255,255,.2)";ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();return b.y>10;});
  // Fish
  fish.forEach(f=>{f.x+=f.dx;f.y+=Math.sin(frame*.03+f.phase)*.5;if(f.x<20||f.x>W-20)f.dx*=-1;ctx.save();ctx.translate(f.x,f.y);if(f.dx<0)ctx.scale(-1,1);ctx.font="28px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(f.emoji,0,0);ctx.restore();});
  // Tank walls
  ctx.strokeStyle="rgba(0,198,255,.4)";ctx.lineWidth=6;ctx.strokeRect(3,3,W-6,H-6);
  if(Math.random()<0.05&&fish.length>0)bubbles.push({x:fish[0].x,y:fish[0].y,r:3+Math.random()*3,spd:0.5+Math.random()*.5,wobble:0});
}
function addFish(){if(gold<20){log("Not enough gold!");return;}gold-=20;fish.push({x:W/2,y:H/2,dx:1+Math.random()*1.5,emoji:FISH_E[Math.floor(Math.random()*FISH_E.length)],phase:Math.random()*Math.PI*2});document.getElementById("fc").textContent=fish.length;document.getElementById("gd").textContent=gold;log("Fish added!");}
function feed(){if(gold<5){log("Not enough gold!");return;}gold-=5;hunger=Math.max(0,hunger-30);health=Math.min(100,health+5);document.getElementById("gd").textContent=gold;log("Fish fed! Hunger down.");}
function clean(){if(gold<10){log("Not enough gold!");return;}gold-=10;dirt=Math.max(0,dirt-40);health=Math.min(100,health+8);document.getElementById("gd").textContent=gold;log("Tank cleaned!");}
function addPlant(){if(gold<8){log("Not enough gold!");return;}gold-=8;plants.push({x:30+Math.random()*(W-60)});document.getElementById("gd").textContent=gold;log("Plant added!");}
function log(m){document.getElementById("log").textContent=m;}
function go(){
  document.getElementById("ov").style.display="none";running=true;
  setInterval(()=>{
    hunger=Math.min(100,hunger+5);dirt=Math.min(100,dirt+3);
    if(hunger>70||dirt>70)health=Math.max(0,health-3);
    else if(fish.length>0)health=Math.min(100,health+1);
    if(fish.length>0&&health>50){const earn=fish.length*2;gold+=earn;score+=earn;document.getElementById("gd").textContent=gold;document.getElementById("sc").textContent=score;}
    document.getElementById("hl").textContent=Math.round(health);
  },3000);
  (function lp(){if(!running)return;frame++;draw();requestAnimationFrame(lp);})();
}
init();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script>    <script src="../js/mobile-controls.js" defer></script>
</body></html>

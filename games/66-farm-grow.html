<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Farm Grow - ZenMagma</title>    <meta name="description" content="Grow your own farm! Plant crops, water them and harvest for profit.">
    <link rel="canonical" href="https://zenmagma.com/games/66-farm-grow">
    <meta property="og:title" content="Farm Grow - ZenMagma">
    <meta property="og:description" content="Grow your own farm! Plant crops, water them and harvest for profit.">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/66-farm-grow">
    <meta property="og:image" content="https://zenmagma.com/assets/thumbs/farm-grow.jpg">
    <meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="../css/game-fx.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001a00;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#56ab2f,#a8e063);color:#fff;transition:.2s;margin:4px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #56ab2f}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#56ab2f,#a8e063);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center;max-width:600px;margin:0 auto">
<div style="padding:8px"><span class="hv">Gold:<b id="gd"> 50</b></span><span class="hv">Day:<b id="dy"> 1</b></span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="480" height="320"></canvas>
<div style="padding:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
<button class="btn" onclick="plant()">🌱 Plant (5g)</button>
<button class="btn" onclick="water()">💧 Water (2g)</button>
<button class="btn" onclick="harvest()">🌾 Harvest</button>
<button class="btn" onclick="nextDay()">Next Day ⏭</button>
</div>
<div id="log" style="color:#aaa;font-size:.85em;padding:6px;height:28px"></div>
</div>
<div id="ov"><div id="ob"><h2>Farm Grow</h2><p>Manage your farm! Plant seeds (5g), water them (2g), and harvest when ready to earn gold. Click a plot to select it!</p><button class="btn" onclick="go()">Farm!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),COLS=6,ROWS=4,SW=80,SH=80;
const farmlandBg=new Image();farmlandBg.src='../assets/game-art/farm-grow/farmland.jpg';
const STAGES=["bare","planted","sprouted","grown","ready"];
const STAGE_E=["","🌱","🌿","🌾","✨🌾"];
let plots=[],gold=50,day=1,score=0,selected=null,running=false;
function init(){plots=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)plots.push({r,c,stage:0,watered:false,days:0});}
function draw(){
  if(window.GameFX)GameFX.fxImage(ctx,farmlandBg,()=>{ctx.fillStyle="#001a00";ctx.fillRect(0,0,480,320);},0,0,480,320);
  else{ctx.fillStyle="#001a00";ctx.fillRect(0,0,480,320);}
  plots.forEach(p=>{
    const x=p.c*SW,y=p.r*SH;
    ctx.fillStyle=p.stage>0?"rgba(45,90,27,.55)":"rgba(0,0,0,.15)";ctx.fillRect(x+2,y+2,SW-4,SH-4);
    if(p.watered&&p.stage>0){ctx.fillStyle="rgba(0,100,255,.2)";ctx.fillRect(x+2,y+2,SW-4,SH-4);}
    if(selected===p){ctx.strokeStyle="#f1c40f";ctx.lineWidth=3;ctx.strokeRect(x+2,y+2,SW-4,SH-4);}
    ctx.font="32px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(STAGE_E[p.stage]||"",x+SW/2,y+SH/2);
    if(p.stage>0){ctx.fillStyle="#aaa";ctx.font="10px sans-serif";ctx.fillText(STAGES[p.stage],x+SW/2,y+SH-8);}
  });
}
cv.addEventListener("click",e=>{if(!running)return;const c=Math.floor(e.offsetX/SW),r=Math.floor(e.offsetY/SH);selected=plots.find(p=>p.r===r&&p.c===c)||null;draw();});
function plant(){if(!selected||selected.stage>0){log("Select an empty plot!");return;}if(gold<5){log("Not enough gold!");return;}selected.stage=1;gold-=5;upd();draw();log("Planted a crop!");}
function water(){if(!selected||selected.stage===0){log("Select a planted crop!");return;}if(gold<2){log("Not enough gold!");return;}if(selected.watered){log("Already watered today!");return;}selected.watered=true;gold-=2;upd();draw();log("Watered the crop!");}
function harvest(){if(!selected||selected.stage!==4){log("Crop not ready!");return;}const earn=20+selected.days*5;gold+=earn;score+=earn;if(window.GameFX)GameFX.burst(cv,selected.c*SW+SW/2,selected.r*SH+SH/2,{count:14,colors:['#f1c40f','#2ecc71','#fff'],spread:2.5,life:0.4});selected.stage=0;selected.watered=false;selected.days=0;upd();draw();log(`Harvested! +${earn}g`);}
function nextDay(){day++;document.getElementById("dy").textContent=day;plots.forEach(p=>{if(p.stage>0&&p.stage<4){if(p.watered)p.stage++;p.days++;p.watered=false;}});upd();draw();log("New day! Water your crops.");}
function upd(){document.getElementById("gd").textContent=gold;document.getElementById("sc").textContent=score;}
function log(msg){document.getElementById("log").textContent=msg;}
function go(){document.getElementById("ov").style.display="none";running=true;draw();}
init();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script>    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body></html>

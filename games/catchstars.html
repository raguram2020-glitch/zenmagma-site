<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Stars - Kids Game</title>
        <meta name="description" content="Catch falling stars before they hit the ground! Score as many as you can.">
    <link rel="canonical" href="https://zenmagma.com/games/catchstars">
    <meta property="og:title" content="Catch Stars - ZenMagma">
    <meta property="og:description" content="Catch falling stars before they hit the ground! Score as many as you can.">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/catchstars">
    <meta property="og:image" content="https://zenmagma.com/assets/thumbs/catch-stars.jpg">
    <meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="../css/game-fx.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffd93d;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.5);
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 15px;
        }

        .info-box {
            background: rgba(255, 217, 61, 0.2);
            border: 3px solid #ffd93d;
            padding: 15px 25px;
            border-radius: 10px;
            color: #ffd93d;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        #gameCanvas {
            border: 4px solid #ffd93d;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 15px;
            display: block;
            margin: 0 auto 30px;
            width: 100%;
            max-width: 600px;
            height: auto;
            box-shadow: 0 0 30px rgba(255, 217, 61, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd93d 0%, #ffb347 100%);
            color: #333;
        }

        .btn-secondary {
            background: rgba(255, 217, 61, 0.2);
            color: #ffd93d;
            border: 2px solid #ffd93d;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #ffd93d;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            color: #ffd93d;
        }

        .modal-title {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal-score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
    <div class="container">
        <h1>⭐ CATCH THE STARS ⭐</h1>

        <div class="info">
            <div class="info-box">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="info-box">
                <div>Time: <span id="time">30</span>s</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div class="controls">
            <button class="btn-primary" onclick="startGame()">Start Game</button>
            
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title">Time's Up! ⏰</div>
            <div class="modal-score" id="finalScore">0</div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="startGame()">Play Again</button>
                
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameLoopId = null;
        let timerInterval = null;

        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            width: 50,
            height: 50,
            speed: 8
        };

        let stars = [];
        let keys = {};

        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === ' ') {
                    e.preventDefault();
                    if (!gameRunning) startGame();
                }
            });
            document.addEventListener('keyup', (e) => keys[e.key] = false);

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                player.x = e.clientX - rect.left - player.width / 2;
                player.x = Math.max(0, Math.min(player.x, canvas.width - player.width));
            });

            drawStartScreen();
        });

        function startGame() {
            score = 0;
            timeLeft = 30;
            stars = [];
            gameRunning = true;
            document.getElementById('gameOverModal').classList.remove('active');

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function update() {
            if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(0, player.x - player.speed);
            if (keys['ArrowRight'] || keys['d']) player.x = Math.min(canvas.width - player.width, player.x + player.speed);

            if (Math.random() < 0.08) {
                stars.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    radius: 15,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 3 + 2,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 50%)`
                });
            }

            stars = stars.filter((star, index) => {
                star.x += star.vx;
                star.y += star.vy;

                if (star.x < 0 || star.x > canvas.width) {
                    star.vx *= -1;
                }

                if (star.x < player.x + player.width &&
                    star.x > player.x &&
                    star.y < player.y + player.height &&
                    star.y > player.y) {
                    score += Math.floor(star.radius);
                    return false;
                }

                return star.y < canvas.height;
            });

            document.getElementById('score').textContent = score;
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars background
            ctx.fillStyle = '#ffd93d';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73 + Math.floor(Date.now() / 50)) % canvas.width;
                const y = (i * 97) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }

            // Draw player (basket)
            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#44a08d';
            ctx.beginPath();
            ctx.moveTo(player.x + 5, player.y);
            ctx.lineTo(player.x + 15, player.y);
            ctx.lineTo(player.x + 20, player.y - 10);
            ctx.lineTo(player.x + 30, player.y - 10);
            ctx.lineTo(player.x + 35, player.y);
            ctx.lineTo(player.x + 45, player.y);
            ctx.fill();

            // Draw stars
            stars.forEach(star => {
                ctx.fillStyle = star.color;
                ctx.shadowColor = star.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowColor = 'none';
            });
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearTimeout(gameLoopId);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverModal').classList.add('active');
        }

        function drawStartScreen() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffd93d';
            ctx.font = 'bold 40px Comic Sans MS';
            ctx.textAlign = 'center';
            ctx.fillText('⭐ CATCH THE STARS ⭐', canvas.width / 2, 100);
            ctx.font = '20px Comic Sans MS';
            ctx.fillText('Move your basket with the mouse', canvas.width / 2, 200);
            ctx.fillText('or arrow keys to catch the stars!', canvas.width / 2, 240);
            ctx.fillText('30 seconds of fun!', canvas.width / 2, 280);
        }
    </script>
    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body>
</html>

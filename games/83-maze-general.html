<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Maze General - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001a14;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#1abc9c,#16a085);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #1abc9c}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#1abc9c,#16a085);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Level:<b id="lv"> 1</b></span><span class="hv">Resources:<b id="rs"> 100</b></span></div>
<canvas id="c" width="480" height="380"></canvas>
<div style="padding:8px"><button class="btn" onclick="action1()">⚔️ Attack (20r)</button><button class="btn" onclick="action2()">🛡 Defend (10r)</button><button class="btn" onclick="gather()">💰 Gather</button></div>
<div id="log" style="color:#aaa;font-size:.85em;height:24px;padding:4px;text-align:center"></div></div>
<div id="ov"><div id="ob"><h2>Maze General</h2><p>Navigate armies through procedural mazes!</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=380;
let score=0,level=1,resources=100,enemyHp=100,playerHp=100,running=false,frame=0;
const units=[],effects=[];
function draw(){
  ctx.fillStyle="#001a14";ctx.fillRect(0,0,W,H);
  // Field
  ctx.fillStyle="rgba(255,255,255,.03)";for(let i=0;i<W;i+=40){ctx.fillRect(i,0,1,H);}for(let i=0;i<H;i+=40){ctx.fillRect(0,i,W,1);}
  // Player base
  ctx.fillStyle="#1abc9c";ctx.fillRect(10,H/2-40,60,80);ctx.fillStyle="#fff";ctx.font="14px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🗺️",40,H/2);
  ctx.fillText("You",40,H/2+25);
  // Enemy base
  ctx.fillStyle="#e74c3c";ctx.fillRect(W-70,H/2-40,60,80);ctx.fillStyle="#fff";ctx.fillText("Enemy",W-40,H/2+25);
  // HP bars
  ctx.fillStyle="#333";ctx.fillRect(10,H-30,200,12);ctx.fillStyle="#1abc9c";ctx.fillRect(10,H-30,200*(playerHp/100),12);
  ctx.fillRect(W-210,H-30,200,12);ctx.fillStyle="#333";ctx.fillRect(W-210,H-30,200,12);ctx.fillStyle="#e74c3c";ctx.fillRect(W-210,H-30,200*(enemyHp/100),12);
  ctx.fillStyle="#fff";ctx.font="10px sans-serif";ctx.textAlign="left";ctx.fillText("Your HP: "+Math.round(playerHp),12,H-35);ctx.textAlign="right";ctx.fillText("Enemy HP: "+Math.round(enemyHp),W-12,H-35);
  frame++;
  effects.forEach(e=>{e.x+=e.dx;e.y+=e.dy;e.life--;ctx.globalAlpha=e.life/30;ctx.fillStyle=e.color;ctx.font="20px sans-serif";ctx.textAlign="center";ctx.fillText(e.t,e.x,e.y);ctx.globalAlpha=1;});
  effects.splice(0,effects.findIndex(e=>e.life>0));
}
function action1(){if(!running||resources<20){log("Not enough resources!");return;}resources-=20;const dmg=5+Math.random()*10+level*2;enemyHp=Math.max(0,enemyHp-dmg);score+=Math.round(dmg)*level;effects.push({x:W*.7,y:H/2,dx:-1,dy:-1,life:30,color:"#1abc9c",t:"⚔️ -"+Math.round(dmg)});document.getElementById("rs").textContent=resources;document.getElementById("sc").textContent=score;if(enemyHp<=0){score+=100*level;level++;enemyHp=100+level*20;log("Enemy defeated! Level "+level);document.getElementById("lv").textContent=level;}draw();}
function action2(){if(!running||resources<10){log("Not enough resources!");return;}resources-=10;playerHp=Math.min(100,playerHp+10);document.getElementById("rs").textContent=resources;log("Defended! HP restored.");draw();}
function gather(){if(!running)return;const gain=10+Math.floor(Math.random()*10)+level*2;resources+=gain;log("Gathered "+gain+" resources!");document.getElementById("rs").textContent=resources;// Enemy attacks back
const edm=3+Math.random()*5+level;playerHp=Math.max(0,playerHp-edm);if(playerHp<=0){running=false;setTimeout(()=>alert("Defeated! Score: "+score),200);}draw();}
function log(m){document.getElementById("log").textContent=m;}
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;frame++;draw();requestAnimationFrame(lp);})();}
draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script></body></html>

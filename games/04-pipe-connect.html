<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#001122;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);touch-action:none}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}

.btn:hover{transform:scale(1.05);opacity:.9}

#obox{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #43cea2}

</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>


<div id="hud"><span class="hval">Score: <b id="sc">0</b></span><span class="hval">Level: <b id="lv">1</b></span><span class="hval">Moves: <b id="mv">0</b></span><button class="btn" onclick="newGame()">New Game</button></div>
<canvas id="c" width="360" height="360"></canvas>
<div id="overlay"><div id="obox"><h2>Pipe Connect</h2><p>Click pipes to rotate them. Connect the blue source to all endpoints!<br>Water must flow through all pipes.</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d");
const SZ=60,COLS=6;
// Pipe types: 0=straight H, 1=straight V, 2=corner TL, 3=corner TR, 4=corner BR, 5=corner BL, 6=T-up, 7=cross
// Each pipe has connections [N,E,S,W]
const PIPES=[[false,true,false,true],[true,false,true,false],[true,true,false,false],[false,true,true,false],[false,false,true,true],[true,false,false,true],[true,true,true,false],[true,true,true,true]];
let grid=[],score=0,level=1,moves=0,running=false;
function mkGrid(){
  grid=[];
  for(let r=0;r<COLS;r++){grid[r]=[];for(let c=0;c<COLS;c++){const t=Math.floor(Math.random()*6);const rot=Math.floor(Math.random()*4);grid[r][c]={t,rot,flow:false};}}
  grid[0][0]={t:7,rot:0,flow:true};// source = cross at 0,0
}
function getConns(cell){const base=PIPES[cell.t];const r=cell.rot;const arr=[...base];for(let i=0;i<r;i++){const[n,e,s,w]=[arr[0],arr[1],arr[2],arr[3]];arr[0]=w;arr[1]=n;arr[2]=e;arr[3]=s;}return arr;}// rotate CCW actually
function flood(){
  grid.forEach(row=>row.forEach(c=>c.flow=false));
  grid[0][0].flow=true;
  let changed=true;
  while(changed){changed=false;for(let r=0;r<COLS;r++)for(let c=0;c<COLS;c++){if(!grid[r][c].flow)continue;const cn=getConns(grid[r][c]);const dirs=[[r-1,c,2,0],[r,c+1,3,1],[r+1,c,0,2],[r,c-1,1,3]];dirs.forEach(([nr,nc,myOut,theirIn])=>{if(nr<0||nr>=COLS||nc<0||nc>=COLS)return;if(cn[myOut]&&getConns(grid[nr][nc])[theirIn]&&!grid[nr][nc].flow){grid[nr][nc].flow=true;changed=true;}});}}
}
function draw(){
  ctx.fillStyle="#001122";ctx.fillRect(0,0,360,360);
  for(let r=0;r<COLS;r++)for(let c=0;c<COLS;c++){
    const cell=grid[r][c],x=c*SZ,y=r*SZ;
    const cn=getConns(cell);
    ctx.fillStyle=cell.flow?"#0a3a2a":"#0a1a2a";
    ctx.fillRect(x+1,y+1,SZ-2,SZ-2);
    const mx=x+SZ/2,my=y+SZ/2,hw=8;
    ctx.fillStyle=cell.flow?"#43cea2":"#185a9d";
    ctx.fillRect(mx-hw,my-hw,hw*2,hw*2);
    if(cn[0]){ctx.fillRect(mx-hw,y,hw*2,my-hw-y);}
    if(cn[1]){ctx.fillRect(mx+hw,my-hw,x+SZ-mx-hw,hw*2);}
    if(cn[2]){ctx.fillRect(mx-hw,my+hw,hw*2,y+SZ-my-hw);}
    if(cn[3]){ctx.fillRect(x,my-hw,mx-hw-x,hw*2);}
    if(r===0&&c===0){ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.strokeRect(x+2,y+2,SZ-4,SZ-4);}
  }
  const total=COLS*COLS,flowed=grid.flat().filter(c=>c.flow).length;
  if(flowed===total){score+=level*100;level++;document.getElementById("sc").textContent=score;document.getElementById("lv").textContent=level;setTimeout(()=>{mkGrid();flood();draw();},600);}
}
cv.addEventListener("click",e=>{
  if(!running)return;
  const c=Math.floor(e.offsetX/SZ),r=Math.floor(e.offsetY/SZ);
  if(r<0||r>=COLS||c<0||c>=COLS)return;
  if(r===0&&c===0)return;
  grid[r][c].rot=(grid[r][c].rot+1)%4;moves++;document.getElementById("mv").textContent=moves;
  flood();draw();
});
function go(){document.getElementById("overlay").style.display="none";running=true;flood();draw();}
function newGame(){score=0;level=1;moves=0;document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;document.getElementById("mv").textContent=0;mkGrid();if(running){flood();draw();}}
mkGrid();draw();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>

</body></html>

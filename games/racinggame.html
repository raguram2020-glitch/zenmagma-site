<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Game - Kids Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', Arial;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: white;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 15px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid white;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        #gameCanvas {
            border: 4px solid white;
            background: #87ceeb;
            border-radius: 15px;
            display: block;
            margin: 0 auto 30px;
            width: 100%;
            max-width: 600px;
            height: auto;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Comic Sans MS', Arial;
        }

        .btn-primary {
            background: white;
            color: #4ecdc4;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            color: #333;
        }

        .modal-title {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal-score {
            font-size: 48px;
            font-weight: bold;
            color: #4ecdc4;
            margin: 20px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏎️ RACING GAME 🏁</h1>

        <div class="info">
            <div class="info-box">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="info-box">
                <div>Lives: <span id="lives">3</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div class="controls">
            <button class="btn-primary" onclick="startGame()">Start Game</button>
            
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title">Game Over!</div>
            <div class="modal-score" id="finalScore">0</div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="startGame()">Play Again</button>
                
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let gameLoopId = null;

        const player = {
            x: canvas.width / 2 - 30,
            y: canvas.height - 60,
            width: 60,
            height: 50
        };

        let obstacles = [];
        let keys = {};
        let speed = 2;

        document.addEventListener('DOMContentLoaded', () => {
            document.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === ' ') {
                    e.preventDefault();
                    if (!gameRunning) startGame();
                }
            });
            document.addEventListener('keyup', (e) => keys[e.key] = false);
            drawStartScreen();
        });

        function startGame() {
            score = 0;
            lives = 3;
            obstacles = [];
            gameRunning = true;
            speed = 2;
            document.getElementById('gameOverModal').classList.remove('active');
            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function update() {
            if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(0, player.x - 8);
            if (keys['ArrowRight'] || keys['d']) player.x = Math.min(canvas.width - player.width, player.x + 8);

            speed += 0.001;

            if (Math.random() < 0.02) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 60),
                    y: -60,
                    width: 60,
                    height: 60
                });
            }

            obstacles = obstacles.filter((obs, index) => {
                obs.y += speed;

                if (obs.x < player.x + player.width &&
                    obs.x + obs.width > player.x &&
                    obs.y < player.y + player.height &&
                    obs.y + obs.height > player.y) {
                    lives--;
                    obstacles.splice(index, 1);
                    if (lives <= 0) endGame();
                    return false;
                }

                if (obs.y > player.y && obs.y < player.y + 10) {
                    score += 10;
                }

                return obs.y < canvas.height;
            });

            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('lives').textContent = lives;
        }

        function draw() {
            // Sky
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Road
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Road lines
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw player car
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(player.x + 10, player.y + 10, 15, 20);
            ctx.fillRect(player.x + 35, player.y + 10, 15, 20);

            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = '#0000ff';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(obs.x + 10, obs.y + 10, 15, 20);
                ctx.fillRect(obs.x + 35, obs.y + 10, 15, 20);
            });

            // HUD
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Comic Sans MS';
            ctx.fillText(`Speed: ${speed.toFixed(1)}x`, 20, 30);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverModal').classList.add('active');
        }

        function drawStartScreen() {
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 40px Comic Sans MS';
            ctx.textAlign = 'center';
            ctx.fillText('🏎️ RACING GAME 🏁', canvas.width / 2, 100);
            ctx.font = '20px Comic Sans MS';
            ctx.fillText('Arrow Keys to Dodge', canvas.width / 2, 200);
            ctx.fillText('Avoid Blue Cars!', canvas.width / 2, 240);
        }
    </script>
</body>
</html>

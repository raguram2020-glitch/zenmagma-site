<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack a Mole - Kids Game</title>
        <meta name="description" content="Another whack-a-mole variant with faster moles and bonus rounds!">
    <link rel="canonical" href="https://zenmagma.com/games/whackamole">
    <meta property="og:title" content="Whack-a-Mole 2 - ZenMagma">
    <meta property="og:description" content="Another whack-a-mole variant with faster moles and bonus rounds!">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/whackamole">
    <meta property="og:image" content="https://zenmagma.com/assets/thumbs/whack-a-mole2.jpg">
    <meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="../css/game-fx.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
            color: white;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid white;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1) url('../assets/game-art/whack-a-mole/garden.jpg') center/cover;
            border-radius: 15px;
        }

        .hole {
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle, #8B4513 0%, #654321 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            border: 5px solid #654321;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .hole:active {
            transform: scale(0.95);
        }

        .mole {
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, #8B6914 0%, #6B4914 100%);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .mole.active {
            display: flex;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
        }

        .btn-secondary {
            background: white;
            color: #ff6b6b;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            color: #333;
        }

        .modal-title {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal-score {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            margin: 20px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
    <div class="container">
        <h1>🔨 WHACK A MOLE 🧌</h1>

        <div class="info">
            <div class="info-box">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="info-box">
                <div>Time: <span id="time">30</span>s</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="hole" onclick="hitMole(0)">
                <div class="mole" id="mole0">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(1)">
                <div class="mole" id="mole1">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(2)">
                <div class="mole" id="mole2">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(3)">
                <div class="mole" id="mole3">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(4)">
                <div class="mole" id="mole4">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(5)">
                <div class="mole" id="mole5">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(6)">
                <div class="mole" id="mole6">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(7)">
                <div class="mole" id="mole7">🧌</div>
            </div>
            <div class="hole" onclick="hitMole(8)">
                <div class="mole" id="mole8">🧌</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="startGame()">Start Game</button>
            
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title">Time's Up! ⏰</div>
            <div class="modal-score" id="finalScore">0</div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="startGame()">Play Again</button>
                
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let activeMole = -1;
        let goldenMole = -1;
        let timerInterval = null;
        let moleInterval = null;
        let moleDelay = 800;

        function getMoleDelay() {
            if (score >= 150) return 400;
            if (score >= 100) return 500;
            if (score >= 50) return 650;
            return 800;
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameRunning = true;
            moleDelay = 800;
            document.getElementById('score').textContent = 0;
            document.getElementById('gameOverModal').classList.remove('active');

            hideMole();
            resetMoleInterval();

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            showRandomMole();
        }

        function resetMoleInterval() {
            clearInterval(moleInterval);
            moleInterval = setInterval(() => {
                if (gameRunning) showRandomMole();
            }, getMoleDelay());
        }

        function showRandomMole() {
            hideMole();
            goldenMole = Math.random() < 0.12 ? Math.floor(Math.random() * 9) : -1;
            activeMole = Math.floor(Math.random() * 9);
            const el = document.getElementById(`mole${activeMole}`);
            el.classList.add('active');
            el.textContent = goldenMole === activeMole ? '⭐' : '🧌';
            if (goldenMole === activeMole) el.style.filter = 'drop-shadow(0 0 8px gold)';
            else el.style.filter = '';
        }

        function hideMole() {
            for (let i = 0; i < 9; i++) {
                const el = document.getElementById(`mole${i}`);
                el.classList.remove('active');
                el.style.filter = '';
            }
        }

        function hitMole(index) {
            if (!gameRunning) return;
            if (activeMole !== index) {
                // Miss penalty
                score = Math.max(0, score - 5);
                document.getElementById('score').textContent = score;
                return;
            }
            const pts = goldenMole === index ? 30 : 10;
            score += pts;
            document.getElementById('score').textContent = score;
            if (window.GameFX) {
                const holeEl = document.getElementById('mole' + index).parentElement;
                const r = holeEl.getBoundingClientRect();
                GameFX.burst(holeEl, r.width / 2, r.height / 2, { count: 10, colors: [goldenMole === index ? '#FFD700' : '#8B6914', '#fff'], spread: 2, life: 0.35 });
            }
            // Speed up on milestones
            const newDelay = getMoleDelay();
            if (newDelay !== moleDelay) { moleDelay = newDelay; resetMoleInterval(); }
            hideMole();
            showRandomMole();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearInterval(moleInterval);
            hideMole();
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverModal').classList.add('active');
        }
    </script>
    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thunder Bird</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2a;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='tb_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120;
// Rain streaks
const rainS=Array.from({length:100},()=>({x:Math.random(),y:Math.random(),speed:0.018+Math.random()*0.01}));
// Storm clouds
const stormC=Array.from({length:5},(x,i)=>({x:i/5,y:0.05+Math.random()*0.15,w:0.2+Math.random()*0.15}));
let lightningTimer=0,lightningFlash=0;
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;lightningTimer=0;lightningFlash=0;best=parseInt(localStorage.getItem(LSK)||'0');}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#ff8800',8);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-1)*5,life:35,col,s:Math.random()*6+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=65;w=55;oy=GY-h;}else if(t==='tall'){h=108;w=50;oy=GY-h;}else{h=16;w=130;oy=GY-80;}obs.push({x:W+60,y:oy,w,h,type:t});}
function spawnCoin(x){coll.push({x,y:GY-40-Math.random()*80,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function drawPlayer(x,y,sl){
  const bob=Math.sin(fr*0.22)*3;
  const wingFlap=Math.sin(fr*0.3)*20;
  if(!sl){
    // Fiery wings
    cx.fillStyle='rgba(255,80,0,0.8)';
    cx.beginPath();cx.moveTo(x-5,y-30+bob);cx.lineTo(x-60,y-50+bob+wingFlap);cx.lineTo(x-40,y-20+bob);cx.closePath();cx.fill();
    cx.fillStyle='rgba(255,160,0,0.7)';
    cx.beginPath();cx.moveTo(x-5,y-28+bob);cx.lineTo(x-55,y-40+bob+wingFlap);cx.lineTo(x-35,y-18+bob);cx.closePath();cx.fill();
    // Right wing
    cx.fillStyle='rgba(255,80,0,0.8)';
    cx.beginPath();cx.moveTo(x+5,y-30+bob);cx.lineTo(x+60,y-50+bob-wingFlap);cx.lineTo(x+40,y-20+bob);cx.closePath();cx.fill();
    cx.fillStyle='rgba(255,160,0,0.7)';
    cx.beginPath();cx.moveTo(x+5,y-28+bob);cx.lineTo(x+55,y-40+bob-wingFlap);cx.lineTo(x+35,y-18+bob);cx.closePath();cx.fill();
    // Flame trail
    for(let i=0;i<5;i++){cx.fillStyle=`rgba(255,${100+i*30},0,${0.6-i*0.1})`;cx.beginPath();cx.arc(x+Math.sin(fr*0.3+i)*8,y+i*5+bob,6-i,0,Math.PI*2);cx.fill();}
    // Body - eagle/phoenix
    cx.fillStyle='#cc6600';cx.beginPath();cx.ellipse(x,y-22+bob,14,20,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ff8c00';cx.beginPath();cx.ellipse(x,y-22+bob,10,16,0,0,Math.PI*2);cx.fill();
    // Head
    cx.fillStyle='#ffffcc';cx.beginPath();cx.arc(x,y-42+bob,11,0,Math.PI*2);cx.fill();
    // Beak
    cx.fillStyle='#ffcc00';cx.beginPath();cx.moveTo(x+11,y-44+bob);cx.lineTo(x+22,y-42+bob);cx.lineTo(x+11,y-40+bob);cx.closePath();cx.fill();
    // Eye
    cx.fillStyle='#ffee00';cx.beginPath();cx.arc(x+5,y-44+bob,3,0,Math.PI*2);cx.fill();
    cx.fillStyle='#000';cx.beginPath();cx.arc(x+6,y-44+bob,2,0,Math.PI*2);cx.fill();
    // Talons
    const talonFlap=Math.sin(fr*0.25)*6;
    cx.fillStyle='#884400';cx.fillRect(x-10,y-2+bob,8,16-talonFlap);cx.fillRect(x+2,y-2+bob,8,16+talonFlap);
    cx.fillStyle='#cc6600';cx.fillRect(x-14,y+12-talonFlap+bob,14,5);cx.fillRect(x+2,y+12+talonFlap+bob,14,5);
  }else{
    // Gliding flat
    cx.fillStyle='rgba(255,80,0,0.8)';
    cx.beginPath();cx.moveTo(x-10,y-12);cx.lineTo(x-70,y-5);cx.lineTo(x-50,y+5);cx.lineTo(x-10,y);cx.closePath();cx.fill();
    cx.beginPath();cx.moveTo(x+10,y-12);cx.lineTo(x+70,y-5);cx.lineTo(x+50,y+5);cx.lineTo(x+10,y);cx.closePath();cx.fill();
    cx.fillStyle='#cc6600';cx.beginPath();cx.ellipse(x,y-8,14,10,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ffffcc';cx.beginPath();cx.arc(x-8,y-12,9,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ffcc00';cx.beginPath();cx.moveTo(x-17,y-14);cx.lineTo(x-28,y-12);cx.lineTo(x-17,y-10);cx.closePath();cx.fill();
  }
}
function drawObs(o){
  if(o.type==='short'){
    // Tornado
    const spin=fr*0.1;
    cx.fillStyle='rgba(100,80,130,0.8)';
    for(let i=0;i<o.h;i+=8){
      const taper=i/o.h,tw=o.w*(0.1+taper*0.9);
      cx.beginPath();cx.ellipse(o.x+o.w/2,o.y+i,tw/2,5,spin+i*0.1,0,Math.PI*2);cx.fill();
    }
    cx.fillStyle='rgba(150,120,180,0.6)';cx.beginPath();cx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w*0.3,o.h*0.4,0,0,Math.PI*2);cx.fill();
  }else if(o.type==='tall'){
    // Storm cloud
    cx.fillStyle='#3a3a5a';
    cx.beginPath();cx.ellipse(o.x+o.w*0.3,o.y+o.h*0.4,o.w*0.3,o.h*0.35,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(o.x+o.w*0.65,o.y+o.h*0.35,o.w*0.28,o.h*0.32,0,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(o.x+o.w*0.5,o.y+o.h*0.25,o.w*0.35,o.h*0.38,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#2a2a4a';cx.fillRect(o.x+o.w*0.15,o.y+o.h*0.4,o.w*0.7,o.h*0.6);
    // Lightning inside
    const lf=Math.sin(fr*0.3)>0.5;
    if(lf){cx.strokeStyle='#ffee44';cx.lineWidth=2;cx.beginPath();cx.moveTo(o.x+o.w*0.5,o.y+o.h*0.5);cx.lineTo(o.x+o.w*0.35,o.y+o.h*0.7);cx.lineTo(o.x+o.w*0.55,o.y+o.h*0.7);cx.lineTo(o.x+o.w*0.3,o.y+o.h);cx.stroke();}
  }else{
    // Horizontal lightning bolt
    cx.fillStyle='#ffffaa';cx.fillRect(o.x,o.y,o.w,o.h);
    const lz=Math.sin(fr*0.4)*3;
    cx.fillStyle='#ffee00';cx.fillRect(o.x,o.y+lz,o.w,o.h-2);
    cx.fillStyle='#fff';cx.fillRect(o.x,o.y+o.h/2-1,o.w,3);
    cx.shadowBlur=15;cx.shadowColor='#ffee44';cx.fillRect(o.x,o.y+o.h/2-1,o.w,3);cx.shadowBlur=0;
  }
}
function drawCoin(c){
  // Lightning bolt charge
  const pulse=Math.sin(c.a*0.2)*2;
  cx.fillStyle='rgba(255,220,50,0.3)';cx.beginPath();cx.arc(c.x,c.y,12+pulse,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ffee44';
  cx.beginPath();
  cx.moveTo(c.x+4,c.y-10);cx.lineTo(c.x-3,c.y);cx.lineTo(c.x+2,c.y);cx.lineTo(c.x-4,c.y+10);cx.lineTo(c.x+3,c.y);cx.lineTo(c.x-2,c.y);cx.closePath();cx.fill();
  cx.shadowBlur=10;cx.shadowColor='#ffee44';cx.fill();cx.shadowBlur=0;
}
function drawBG(){
  // Dark storm sky
  const alpha=lightningFlash*0.4;
  cx.fillStyle=`rgba(10,5,20,${1-alpha})`;cx.fillRect(0,0,W,H);
  if(alpha>0){cx.fillStyle=`rgba(200,200,255,${alpha})`;cx.fillRect(0,0,W,H);}
  // Storm clouds bg
  stormC.forEach(c=>{
    const scx2=((c.x-bgOff*0.0004)%1.2-0.1)*W;
    cx.fillStyle='rgba(30,25,50,0.85)';
    cx.beginPath();cx.ellipse(scx2,c.y*H,c.w*W*0.5,H*0.07,0,0,Math.PI*2);cx.fill();
  });
  // Rain
  rainS.forEach(r=>{
    r.y+=r.speed;if(r.y>1){r.y=-0.05;r.x=Math.random();}
    cx.strokeStyle='rgba(150,180,220,0.4)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(r.x*W,r.y*H);cx.lineTo(r.x*W-5,r.y*H+r.speed*H*3);cx.stroke();
  });
  // Lightning bg
  lightningTimer--;
  if(lightningTimer<=0){lightningTimer=120+Math.random()*180;lightningFlash=8;}
  if(lightningFlash>0){
    lightningFlash--;
    if(lightningFlash>4){
      cx.strokeStyle='rgba(220,220,255,0.7)';cx.lineWidth=2;
      const lx=Math.random()*W*0.7+W*0.15;
      cx.beginPath();cx.moveTo(lx,0);
      let ly=0;while(ly<GY*0.8){ly+=15+Math.random()*20;cx.lineTo(lx+(Math.random()-0.5)*30,ly);}
      cx.stroke();
    }
  }
  // Cliff ground
  cx.fillStyle='#1a1422';cx.fillRect(0,GY,W,H-GY);
  // Rock edge
  for(let i=0;i<W;i+=40){const rh=4+Math.sin(i*0.15+bgOff*0.05)*4;cx.fillStyle='#2a2030';cx.fillRect(i,GY,42,rh);}
  cx.fillStyle='#251a30';cx.fillRect(0,GY,W,8);
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';cx.strokeStyle=col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,12+Math.sin(p.a*0.1)*3,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(0,0,0,0.5)';cx.fill();cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t[0].toUpperCase(),p.x,p.y+4);cx.textAlign='left';}
function drawHUD(){cx.fillStyle='rgba(10,5,20,0.75)';cx.fillRect(0,0,W,44);cx.font='bold 14px monospace';cx.fillStyle='#ffee44';cx.fillText('SCORE: '+sc,16,28);cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);cx.fillStyle='#ffcc00';cx.fillText('COINS: '+coins,W*0.5,28);cx.fillStyle='#ff8800';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}}
function drawStart(){
  drawBG();
  cx.fillStyle='rgba(10,5,20,0.7)';cx.fillRect(W/2-230,H*0.28,460,H*0.55);
  cx.fillStyle='#ffee44';cx.font='bold 44px monospace';cx.textAlign='center';cx.fillText('THUNDER BIRD',W/2,H*0.38);
  cx.fillStyle='#ff8800';cx.font='18px monospace';cx.fillText('STORM EAGLE RUNNER',W/2,H*0.47);
  cx.fillStyle='#ccc';cx.font='16px monospace';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#330044';cx.fillRect(W/2-80,H*0.65,160,44);cx.fillStyle='#ffee44';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.65+28);
  if(best>0){cx.fillStyle='#ffcc00';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){cx.fillStyle='rgba(10,5,20,0.85)';cx.fillRect(0,0,W,H);cx.fillStyle='#ff8844';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);cx.fillStyle='#ffcc00';cx.fillText('BEST:  '+best,W/2,H*0.54);cx.fillStyle='#330044';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#ffee44';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);cx.textAlign='left';}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?60:30,ph=sliding?16:68,phY=sliding?py-16:py-68;
  if(!dead&&!inv){
    for(let o of obs){if(hit(PX-pw/2,phY,pw,ph,o)){if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00aaff',15);addFT(PX,py-60,'SHIELD!','#00aaff');}else{dead=true;spawnP(PX,py-30,'#ff8844',20);if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}break;}}
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<24&&Math.abs((py-34)-c.y)<34){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffee44');spawnP(c.x,c.y,'#ffee44',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-34)-p.y)<34){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/35;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.s/2,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.strokeStyle='rgba(0,170,255,0.5)';cx.lineWidth=3;cx.beginPath();cx.arc(W*0.22,py-34,52,0,Math.PI*2);cx.stroke();}
    drawPlayer(W*0.22,py,sliding);
  }
  for(let o of obs){if(o.x-W*0.22<320&&o.x-W*0.22>60){cx.font='bold 16px monospace';cx.textAlign='center';if(o.type==='short'){cx.fillStyle='#ffcc44';cx.fillText('JUMP ↑',W*0.22,GY-100);}else{cx.fillStyle='#ff8800';cx.fillText('SLIDE ↓',W*0.22,GY-100);}cx.textAlign='left';}}
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(10,5,20,0.6)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){update();if(state==='start')drawStart();else if(state==='over'){draw();drawOver();}else draw();requestAnimationFrame(loop);}
init();loop();
</script>
</body>
</html>

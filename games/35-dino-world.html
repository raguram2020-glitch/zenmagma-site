<script>
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    else if(r.length===1)r=[r[0],r[0],r[0],r[0]];
    else if(r.length===2)r=[r[0],r[1],r[0],r[1]];
    else if(r.length===3)r=[r[0],r[1],r[2],r[1]];
    this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);
    this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
    this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);
    this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);this.closePath();return this;
  };
}
</script>

<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndJump(){beep(320,0.1,0.12,'sine');setTimeout(()=>beep(440,0.08,0.08,'sine'),50);}
function sndCollect(){beep(880,0.05,0.12,'sine');setTimeout(()=>beep(1100,0.07,0.1,'sine'),60);}
function sndHit(){beep(150,0.25,0.2,'sawtooth');}
function sndLose(){beep(220,0.3,0.2,'sawtooth');setTimeout(()=>beep(160,0.4,0.2,'sawtooth'),200);setTimeout(()=>beep(110,0.5,0.2,'sawtooth'),450);}
function sndLevelUp(){beep(660,0.08,0.15);setTimeout(()=>beep(880,0.08,0.15),100);setTimeout(()=>beep(1100,0.15,0.15),200);}
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=480,H=420;
let player,platforms,gems,enemies,score,lives,level,camera,frame,running,keys={};
let particles=[],shakeF=0,shakeM=6,gemsTotal=0,gemsLeft=0;

// Parallax background layers
const CLOUDS=Array.from({length:6},(_,i)=>({x:i*160,y:30+Math.random()*60,w:80+Math.random()*60,spd:0.15+Math.random()*0.1}));
const MTNS1=Array.from({length:8},(_,i)=>({x:i*320,h:80+Math.random()*60}));
const TREES=Array.from({length:14},(_,i)=>({x:i*240+Math.random()*80,h:80+Math.random()*60,w:30+Math.random()*20}));

function mkLevel(){
  platforms=[];gems=[];enemies=[];camera=0;
  const ww=W*3+level*200;
  const base=[{x:-100,y:H-30,w:ww+200,h:30,base:true}];
  const floaters=[];
  for(let i=0;i<10+level*2;i++){
    floaters.push({x:120+i*190+Math.random()*60,y:90+Math.random()*(H-200),w:80+Math.random()*70,h:18,base:false});
  }
  platforms=[...base,...floaters];

  floaters.forEach(p=>{
    if(Math.random()<0.7) gems.push({x:p.x+p.w/2,y:p.y-24,r:10,collected:false,pulse:Math.random()*Math.PI*2});
  });
  // Extra gems on ground
  for(let i=0;i<4+level;i++){
    gems.push({x:150+i*280+Math.random()*120,y:H-60,r:10,collected:false,pulse:Math.random()*Math.PI*2});
  }

  gemsTotal=gems.length;gemsLeft=gemsTotal;
  document.getElementById('gm').textContent=`${gemsTotal-gemsLeft}/${gemsTotal}`;

  for(let i=0;i<2+level;i++){
    const px=300+i*400;
    enemies.push({x:px,y:H-60,r:16,dx:0.8+level*0.15,patrolMin:px-100,patrolMax:px+160,frame:0,invincible:0});
  }

  player={x:60,y:H-80,w:30,h:38,vx:0,vy:0,onGround:false,dir:1,legAnim:0,jumpParticleCooldown:0,invincible:0};
}

const keys2={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key]=false);

let touchDir=0,touchJump=false;
document.getElementById('tl').addEventListener('touchstart',e=>{e.preventDefault();touchDir=-1;},{passive:false});
document.getElementById('tl').addEventListener('touchend',()=>touchDir=0);
document.getElementById('tr').addEventListener('touchstart',e=>{e.preventDefault();touchDir=1;},{passive:false});
document.getElementById('tr').addEventListener('touchend',()=>touchDir=0);
document.getElementById('tj').addEventListener('touchstart',e=>{e.preventDefault();touchJump=true;},{passive:false});
document.getElementById('tj').addEventListener('touchend',()=>touchJump=false);

function spawnParticles(x,y,count,col,spd=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const v=spd*(0.4+Math.random());
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:1,maxLife:1,col,size:3+Math.random()*4});
  }
}

function drawDino(x,y,w,h,dir,legAnim,frame){
  const cx=x+w/2,cy=y+h/2;
  ctx.save();
  ctx.translate(cx,cy);
  if(dir<0)ctx.scale(-1,1);

  // Tail
  ctx.fillStyle='#27ae60';
  ctx.beginPath();
  ctx.moveTo(-w/2,-4);
  ctx.quadraticCurveTo(-w*1.1,0,-w*0.9,8);
  ctx.quadraticCurveTo(-w*0.7,10,-w/2,6);
  ctx.closePath();ctx.fill();

  // Spines
  ctx.fillStyle='#1a8a50';
  for(let i=0;i<4;i++){
    const sx=-w/4+i*(w/6),sy=-h/2-6+i*3;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+4,sy-8+i*2);ctx.lineTo(sx+8,sy);ctx.closePath();ctx.fill();
  }

  // Body gradient
  const bg=ctx.createRadialGradient(-2,-4,2,0,0,w*0.6);
  bg.addColorStop(0,'#4cd964');bg.addColorStop(1,'#27ae60');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.roundRect(-w/2,-h/2+4,w,h-4,6);ctx.fill();

  // Belly
  ctx.fillStyle='rgba(150,255,180,.35)';
  ctx.beginPath();ctx.ellipse(2,4,w*0.25,h*0.22,0,0,Math.PI*2);ctx.fill();

  // Legs
  const legBob=Math.sin(legAnim)*5;
  ctx.fillStyle='#1a8a50';
  ctx.fillRect(-8,h/2-8,10,12+legBob);
  ctx.fillRect(2,h/2-8,10,12-legBob);
  // Feet (3-toed)
  ctx.fillStyle='#27ae60';
  [[-8+5,h/2+4+legBob],[2+5,h/2+4-legBob]].forEach(([fx,fy])=>{
    for(let t=-1;t<=1;t++){
      ctx.beginPath();ctx.ellipse(fx+t*4,fy+6,3,4,t*0.3,0,Math.PI*2);ctx.fill();
    }
  });

  // Head
  ctx.fillStyle='#4cd964';
  ctx.beginPath();ctx.roundRect(w/3,-h/2-4,w/2+4,h/2,8);ctx.fill();

  // Eye
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(w/2+6,-h/2+8,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(w/2+7,-h/2+8,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(w/2+8,-h/2+7,1,0,Math.PI*2);ctx.fill();

  // Nostril
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.arc(w/2+12,-h/2+15,2,0,Math.PI*2);ctx.fill();

  // Smile
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.5;ctx.beginPath();
  ctx.arc(w/2+8,-h/2+20,5,0.1,Math.PI-0.1);ctx.stroke();

  // Invincible flash
  if(player.invincible>0&&Math.floor(frame/4)%2===0){
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,6);ctx.fill();
  }

  ctx.restore();
}

function drawPlatform(p){
  if(p.base){
    // Ground: grass top, dirt below
    const gg=ctx.createLinearGradient(0,p.y,0,p.y+p.h);
    gg.addColorStop(0,'#2ecc71');gg.addColorStop(0.25,'#27ae60');gg.addColorStop(1,'#8B5E3C');
    ctx.fillStyle=gg;ctx.fillRect(p.x,p.y,p.w,p.h);
    // Grass blades
    ctx.strokeStyle='#43e97b';ctx.lineWidth=1.5;
    for(let gx=p.x+6;gx<p.x+p.w;gx+=12){
      ctx.beginPath();ctx.moveTo(gx,p.y);ctx.lineTo(gx-2,p.y-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(gx+3,p.y);ctx.lineTo(gx+5,p.y-6);ctx.stroke();
    }
    return;
  }
  // Floating platform
  const pg=ctx.createLinearGradient(0,p.y,0,p.y+p.h);
  pg.addColorStop(0,'#3a7d44');pg.addColorStop(1,'#2a5c34');
  ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,5);ctx.fill();
  // Grass top
  ctx.fillStyle='#43e97b';ctx.fillRect(p.x+2,p.y,p.w-4,4);
  ctx.strokeStyle='rgba(100,255,140,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(p.x+2,p.y+6);ctx.lineTo(p.x+p.w-2,p.y+6);ctx.stroke();
}

function drawGem(g){
  if(g.collected)return;
  const pulse=Math.sin(g.pulse)*2;
  const r=g.r+pulse;

  ctx.save();ctx.translate(g.x,g.y);
  // Glow
  ctx.shadowColor='#00ffaa';ctx.shadowBlur=14;
  // Diamond shape
  ctx.fillStyle='#00ffaa';
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.6,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.6,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.6,0);ctx.lineTo(0,-r*0.2);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);
  if(e.dx<0)ctx.scale(-1,1);

  // Body (T-Rex style predator)
  const eg=ctx.createRadialGradient(0,-4,2,0,0,e.r*0.9);
  eg.addColorStop(0,'#e74c3c');eg.addColorStop(1,'#c0392b');
  ctx.fillStyle=eg;
  ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();

  // Eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(e.r*0.35,-e.r*0.3,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(e.r*0.35,-e.r*0.3,2.5,0,Math.PI*2);ctx.fill();

  // Teeth
  ctx.fillStyle='#fff';
  for(let t=0;t<3;t++){ctx.beginPath();ctx.moveTo(e.r*0.3+t*4,e.r*0.1);ctx.lineTo(e.r*0.3+t*4+2,e.r*0.45);ctx.lineTo(e.r*0.3+t*4+4,e.r*0.1);ctx.closePath();ctx.fill();}

  // Glow
  ctx.shadowColor='#ff4444';ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(255,80,80,.5)';ctx.lineWidth=2;ctx.stroke();
  ctx.shadowBlur=0;

  ctx.restore();
}

function drawBG(cam){
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#001a3a');sky.addColorStop(0.5,'#003355');sky.addColorStop(1,'#005522');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Moon
  ctx.save();ctx.shadowColor='#ffffaa';ctx.shadowBlur=20;
  ctx.fillStyle='#ffffdd';ctx.beginPath();ctx.arc(W-60,50,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f5e8a0';ctx.beginPath();ctx.arc(W-54,45,18,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();

  // Stars
  ctx.fillStyle='rgba(255,255,255,.7)';
  for(let i=0;i<30;i++){
    const sx=(i*83+17)%(W);const sy=(i*61+11)%100;
    ctx.beginPath();ctx.arc(sx,sy,0.8+((i*7)%3)*0.5,0,Math.PI*2);ctx.fill();
  }

  // Background mountains (parallax 0.2)
  const mOff=(cam*0.2)%(W+100);
  ctx.fillStyle='#0a3020';
  MTNS1.forEach(m=>{
    const mx=((m.x-mOff)%(W+400)+W+400)%(W+400)-100;
    ctx.beginPath();ctx.moveTo(mx,H-30);ctx.lineTo(mx+80,H-30-m.h);ctx.lineTo(mx+160,H-30);ctx.closePath();ctx.fill();
  });

  // Midground trees (parallax 0.5)
  const tOff=(cam*0.5)%(W*2+200);
  ctx.fillStyle='#072214';
  TREES.forEach(t=>{
    const tx=((t.x-tOff)%(W*2+400)+W*2+400)%(W*2+400)-100;
    // Trunk
    ctx.fillStyle='#3d2200';ctx.fillRect(tx+t.w/2-4,H-30-t.h*0.4,8,t.h*0.4);
    // Canopy
    ctx.fillStyle='#072214';
    ctx.beginPath();ctx.arc(tx+t.w/2,H-30-t.h,t.w/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a3319';
    ctx.beginPath();ctx.arc(tx+t.w/2,H-30-t.h-6,t.w*0.4,0,Math.PI*2);ctx.fill();
  });

  // Clouds (parallax 0.15)
  const cOff=cam*0.15;
  ctx.fillStyle='rgba(0,60,40,.4)';
  CLOUDS.forEach(cl=>{
    const cx=((cl.x-cOff)%(W+200)+W+200)%(W+200);
    ctx.beginPath();ctx.ellipse(cx,cl.y,cl.w/2,16,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-20,cl.y+6,cl.w*0.35,12,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+22,cl.y+4,cl.w*0.3,10,0,0,Math.PI*2);ctx.fill();
  });
}

function update(){
  if(!running)return;
  frame++;
  const spd=5;
  let moved=false;
  if(keys['ArrowLeft']||keys['a']||touchDir<0){player.vx=-spd;player.dir=-1;moved=true;}
  else if(keys['ArrowRight']||keys['d']||touchDir>0){player.vx=spd;player.dir=1;moved=true;}
  else player.vx*=0.75;

  if(moved&&player.onGround) player.legAnim+=0.25;
  else if(!player.onGround) player.legAnim+=0.1;

  if((keys['ArrowUp']||keys['w']||keys[' ']||touchJump)&&player.onGround){
    player.vy=-13;player.onGround=false;sndJump();
    spawnParticles(player.x+player.w/2,player.y+player.h,8,'#43e97b',2);
  }

  player.vy+=0.55;player.x+=player.vx;player.y+=player.vy;player.onGround=false;
  if(player.invincible>0)player.invincible--;

  platforms.forEach(p=>{
    const inX=player.x+player.w>p.x&&player.x<p.x+p.w;
    if(inX&&player.y+player.h>p.y&&player.y+player.h<p.y+p.h+Math.abs(player.vy)+2&&player.vy>=0){
      player.y=p.y-player.h;player.vy=0;player.onGround=true;
    }
    if(inX&&player.vy<0&&player.y<p.y+p.h&&player.y+player.h>p.y){
      player.y=p.y+p.h;player.vy=0;
    }
  });

  camera=Math.max(0,player.x-W/3);

  // Gem collection
  gems.forEach(g=>{
    if(!g.collected){
      g.pulse+=0.07;
      if(Math.abs(player.x+player.w/2-g.x)<g.r+12&&Math.abs(player.y+player.h/2-g.y)<g.r+12){
        g.collected=true;gemsLeft--;score+=10*level;
        document.getElementById('sc').textContent=score;
        document.getElementById('gm').textContent=`${gemsTotal-gemsLeft}/${gemsTotal}`;
        sndCollect();
        spawnParticles(g.x,g.y,10,'#00ffaa',3);
      }
    }
  });

  // Enemy update
  enemies.forEach(e=>{
    e.frame++;
    e.x+=e.dx;
    if(e.x<e.patrolMin||e.x>e.patrolMax)e.dx*=-1;

    if(player.invincible===0&&Math.abs(player.x+player.w/2-e.x)<e.r+14&&Math.abs(player.y+player.h/2-e.y)<e.r+18){
      lives--;document.getElementById('lf').textContent=lives;
      player.x=60;player.y=H-100;player.vy=0;player.invincible=80;
      shakeF=14;sndHit();
      spawnParticles(player.x+player.w/2,player.y+player.h/2,12,'#ff4444',4);
      if(lives<=0){running=false;sndLose();document.getElementById('gomsg').textContent='Score: '+score;document.getElementById('goov').style.display='flex';}
    }
  });

  // Fall pit
  if(player.y>H+60){
    lives--;player.x=60;player.y=H-100;player.vy=0;player.invincible=60;
    document.getElementById('lf').textContent=lives;sndHit();
    if(lives<=0){running=false;sndLose();document.getElementById('gomsg').textContent='Score: '+score;document.getElementById('goov').style.display='flex';}
  }

  // Level complete
  if(gemsLeft===0){
    level++;document.getElementById('lv').textContent=level;
    score+=level*50;document.getElementById('sc').textContent=score;
    sndLevelUp();spawnParticles(player.x+player.w/2,player.y,20,'#ffe000',4);
    mkLevel();
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.035;});
  particles=particles.filter(p=>p.life>0);
}

function draw(){
  const cam=Math.round(camera);
  const shake=shakeF>0?shakeM*(shakeF/14):0;
  if(shakeF>0)shakeF--;

  ctx.save();
  if(shake)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

  drawBG(cam);

  ctx.save();ctx.translate(-cam,0);

  // Platforms
  platforms.forEach(p=>drawPlatform(p));

  // Gems
  gems.forEach(g=>drawGem(g));

  // Enemies
  enemies.forEach(e=>drawEnemy(e));

  // Dino
  drawDino(player.x,player.y,player.w,player.h,player.dir,player.legAnim,frame);

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.shadowColor=p.col;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  ctx.restore();
  ctx.restore();
}

function go(){
  score=0;lives=3;level=1;frame=0;particles=[];
  document.getElementById('sc').textContent=0;
  document.getElementById('lf').textContent=3;
  document.getElementById('lv').textContent=1;
  document.getElementById('ov').style.display='none';
  mkLevel();running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}

function doRestart(){
  document.getElementById('goov').style.display='none';
  go();
}
</script>    <script src="../js/mobile-controls.js" defer></script>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Breakout Plus - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0800;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #f7971e}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Lives:<b id="lf"> 3</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="480" height="460"></canvas>
<p style="color:#aaa;font-size:.8em">Mouse/touch to move paddle. Break all bricks!</p></div>
<div id="ov"><div id="ob"><h2>Breakout Plus</h2><p>Break all the bricks with your ball! Collect power-ups that fall from broken bricks. Clear the board to advance!</p><button class="btn" onclick="go()">Break!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=460;
let paddle,ball,bricks,powerups,score,lives,level,frame,running;
const BRICK_COLORS=["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#9b59b6"];
function mkBricks(){bricks=[];const rows=3+level,cols=10;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)bricks.push({x:c*46+10,y:r*28+40,w:42,h:22,hp:1+Math.floor(level/3),maxHp:1+Math.floor(level/3),color:BRICK_COLORS[(r+c)%BRICK_COLORS.length]});}
function init(){paddle={x:W/2-50,y:H-30,w:100,h:14};ball={x:W/2,y:H-60,vx:4*(Math.random()>.5?1:-1),vy:-5,r:9,attached:true};powerups=[];score=0;lives=3;level=1;mkBricks();}
cv.addEventListener("mousemove",e=>{const r=cv.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-paddle.w,e.clientX-r.left-paddle.w/2));if(ball.attached)ball.x=paddle.x+paddle.w/2;});
cv.addEventListener("touchmove",e=>{e.preventDefault();const r=cv.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-paddle.w,e.touches[0].clientX-r.left-paddle.w/2));if(ball.attached)ball.x=paddle.x+paddle.w/2;},{passive:false});
cv.addEventListener("click",()=>{if(ball.attached){ball.attached=false;ball.vx=4*(Math.random()>.5?1:-1);ball.vy=-6;}});
function update(){
  frame++;
  if(ball.attached)return;
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.x<ball.r||ball.x>W-ball.r)ball.vx*=-1;
  if(ball.y<ball.r)ball.vy*=-1;
  // Paddle
  if(ball.y+ball.r>paddle.y&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&ball.vy>0){ball.vy*=-1;ball.vx+=(ball.x-(paddle.x+paddle.w/2))*.08;}
  // Bricks
  bricks=bricks.filter(b=>{if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){b.hp--;if(ball.y+ball.r<b.y+5||ball.y-ball.r>b.y+b.h-5)ball.vy*=-1;else ball.vx*=-1;score+=10*level;document.getElementById("sc").textContent=score;if(b.hp<=0){if(Math.random()<0.2)powerups.push({x:b.x+b.w/2,y:b.y,dy:2,type:Math.random()<.5?"wide":"life",color:Math.random()<.5?"#2ecc71":"#e74c3c"});return false;}return true;}return true;});
  powerups=powerups.filter(pu=>{pu.y+=pu.dy;if(pu.y>pu.y+20>paddle.y&&pu.x>paddle.x&&pu.x<paddle.x+paddle.w&&pu.y>paddle.y){if(pu.type==="wide"){paddle.w=Math.min(160,paddle.w+20);}else{lives++;document.getElementById("lf").textContent=lives;}return false;}return pu.y<H;});
  // Lost
  if(ball.y>H+20){lives--;document.getElementById("lf").textContent=lives;ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-20;ball.attached=true;if(lives<=0){running=false;showGameOver("Score: "+score);}}
  if(bricks.length===0){level++;document.getElementById("lv").textContent=level;mkBricks();ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-20;ball.attached=true;ball.vy=-(5+level*.3);}
}
function draw(){
  ctx.fillStyle="#0a0800";ctx.fillRect(0,0,W,H);
  bricks.forEach(b=>{const frac=b.hp/b.maxHp;ctx.fillStyle=b.color;ctx.globalAlpha=0.4+frac*.6;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=1;ctx.fillStyle="rgba(255,255,255,.15)";ctx.fillRect(b.x,b.y,b.w,6);ctx.strokeStyle="rgba(0,0,0,.3)";ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);});
  powerups.forEach(pu=>{ctx.fillStyle=pu.color;ctx.fillRect(pu.x-10,pu.y,20,10);ctx.fillStyle="#fff";ctx.font="bold 9px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(pu.type==="wide"?"W":"❤",pu.x,pu.y+5);});
  ctx.fillStyle="#f7971e";ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);ctx.fillStyle="rgba(255,255,255,.3)";ctx.fillRect(paddle.x,paddle.y,paddle.w,4);
  ctx.fillStyle="#ffd200";ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ball.x-3,ball.y-3,3,0,Math.PI*2);ctx.fill();
}
function go(){document.getElementById("ov").style.display="none";running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script></body></html>

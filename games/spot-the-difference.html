<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot the Difference - Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 15px;
            max-width: 1000px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .game-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-indicator {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }

        .stats-bar {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .hearts {
            font-size: 24px;
        }

        .timer {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .timer.warning {
            background: #ffe0e0;
            color: #ff6b6b;
            animation: pulse-warning 0.6s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .score {
            color: #764ba2;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-hint {
            background: #ff6b6b;
            color: white;
        }

        .btn-hint:hover:not(:disabled) {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-hint:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-restart {
            background: #4ecdc4;
            color: white;
        }

        .btn-restart:hover {
            background: #45b8af;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }

        .btn-next {
            background: #667eea;
            color: white;
        }

        .btn-next:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .game-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .image-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-wrapper canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .image-wrapper canvas:hover {
            transform: scale(1.01);
        }

        .image-wrapper canvas:active {
            transform: scale(0.99);
        }

        .image-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .difference-indicator {
            position: absolute;
            pointer-events: none;
        }

        @keyframes foundPulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(78, 205, 196, 0.6), inset 0 0 15px rgba(78, 205, 196, 0.2);
            }
            50% {
                box-shadow: 0 0 25px rgba(78, 205, 196, 0.9), inset 0 0 20px rgba(78, 205, 196, 0.4);
            }
        }

        .zoom-area {
            position: absolute;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.1);
            display: none;
            pointer-events: none;
        }

        .zoom-box {
            position: fixed;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 250px;
            height: 250px;
            overflow: hidden;
        }

        .zoom-box canvas {
            width: 100%;
            height: 100%;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popUp {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-title.win {
            color: #4ecdc4;
        }

        .modal-title.lose {
            color: #ff6b6b;
        }

        .modal-stats {
            font-size: 18px;
            margin: 20px 0;
            color: #666;
        }

        .modal-stats div {
            margin: 10px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn-modal {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-modal-continue {
            background: #667eea;
            color: white;
        }

        .btn-modal-continue:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-modal-restart {
            background: #4ecdc4;
            color: white;
        }

        .btn-modal-restart:hover {
            background: #45b8af;
            transform: translateY(-2px);
        }

        .difficulty-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-difficulty {
            padding: 30px 25px;
            border: 2px solid transparent;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            font-weight: bold;
        }

        .difficulty-icon {
            font-size: 32px;
        }

        .difficulty-name {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .difficulty-desc {
            font-size: 12px;
            color: #999;
            font-weight: normal;
        }

        .btn-easy {
            border-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
            color: #4ecdc4;
        }

        .btn-easy:hover {
            background: rgba(78, 205, 196, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.3);
        }

        .btn-medium {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .btn-medium:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-hard {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
        }

        .btn-hard:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .difference-count {
            font-size: 16px;
            color: #667eea;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }

        .level-selector {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .level-selector:hover {
            background: #f0f0f0;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .level-selector:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
        }

        .hearts-display {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 28px;
        }

        .heart {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: default;
        }

        .heart.found {
            animation: heartPulse 0.6s ease-out;
        }

        @keyframes heartPulse {
            0% {
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .success-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #4ecdc4;
            z-index: 1500;
            animation: popupAnimation 1s ease-out;
            pointer-events: none;
        }

        @keyframes popupAnimation {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -150%) scale(1);
                opacity: 0;
            }
        }

        @media (max-width: 900px) {
            .game-container {
                padding: 15px;
            }

            .game-content {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-bar {
                width: 100%;
                gap: 20px;
            }

            .button-group {
                width: 100%;
            }

            .game-title {
                font-size: 24px;
            }

            button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 600px) {
            .game-title {
                font-size: 20px;
            }

            .stats-bar {
                gap: 15px;
                font-size: 14px;
            }

            .stat {
                font-size: 16px;
            }

            button {
                padding: 8px 12px;
                font-size: 11px;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .modal-title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">🔍 Spot the Difference</div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="level-indicator" id="levelIndicator">Level 1</div>
                <select class="level-selector" id="levelSelector">
                    <option value="">Jump to Level...</option>
                </select>
            </div>
            <div class="stats-bar">
                <div class="stat score">
                    Score: <span id="score">0</span>
                </div>
                <div class="stat timer" id="timerDisplay">
                    Time: <span id="timer">30</span>s
                </div>
            </div>
            <div class="button-group">
                <button class="btn-hint" id="hintBtn">💡 Hint (<span id="hintCount">3</span>)</button>
                <button class="btn-restart" id="restartBtn">🔄 Restart</button>
            </div>
        </div>

        <div class="hearts-display" id="heartsDisplay">
            <!-- Hearts will be generated by JavaScript -->
        </div>

        <div class="game-content">
            <div class="image-wrapper">
                <div class="image-label">Original</div>
                <canvas id="canvas1"></canvas>
                <img id="image1" style="display: none; width: 100%; height: auto; cursor: pointer;">
                <div class="zoom-area" id="zoomArea1"></div>
            </div>
            <div class="image-wrapper">
                <div class="image-label">Modified</div>
                <canvas id="canvas2"></canvas>
                <img id="image2" style="display: none; width: 100%; height: auto; cursor: pointer;">
                <div class="zoom-area" id="zoomArea2"></div>
            </div>
        </div>

    </div>

    <!-- Difficulty Selection Modal -->
    <div class="modal" id="difficultyModal">
        <div class="modal-content">
            <div class="modal-title" style="color: #667eea; margin-bottom: 10px;">🎮 Select Difficulty</div>
            <p style="color: #666; margin-bottom: 30px; font-size: 14px;">Choose your preferred difficulty level</p>

            <div class="difficulty-buttons">
                <button class="btn-difficulty btn-easy" id="easyBtn">
                    <div class="difficulty-icon">⭐</div>
                    <div class="difficulty-name">EASY</div>
                    <div class="difficulty-desc">Relaxed Pace</div>
                </button>
                <button class="btn-difficulty btn-medium" id="mediumBtn">
                    <div class="difficulty-icon">⭐⭐</div>
                    <div class="difficulty-name">MEDIUM</div>
                    <div class="difficulty-desc">Balanced Challenge</div>
                </button>
                <button class="btn-difficulty btn-hard" id="hardBtn">
                    <div class="difficulty-icon">⭐⭐⭐</div>
                    <div class="difficulty-name">HARD</div>
                    <div class="difficulty-desc">Intense Challenge</div>
                </button>
            </div>
        </div>
    </div>

    <!-- Win/Lose Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">You Won!</div>
            <div class="modal-stats">
                <div>Final Score: <strong id="finalScore">0</strong></div>
                <div>Time: <strong id="finalTime">00:00</strong></div>
            </div>
            <div class="modal-buttons">
                <button class="btn-modal btn-modal-restart" id="modalRestartBtn">Play Again</button>
                <button class="btn-modal btn-modal-continue" id="modalNextBtn">Next Level</button>
            </div>
        </div>
    </div>

    <script>
        // ========== GAME STATE ==========
        let gameState = {
            currentLevel: 1,
            score: 0,
            timer: 30,
            hints: 3,
            foundDifferences: 0,
            totalDifferences: 0,
            gameActive: true,
            isHinting: false,
            timeUp: false
        };

        const LEVEL_CONFIGS = {
            easy: {
                1: { differences: 1, hints: 5 },
                2: { differences: 2, hints: 5 },
                3: { differences: 3, hints: 5 },
                4: { differences: 2, hints: 5 },
                5: { differences: 2, hints: 5 },
                6: { differences: 2, hints: 5 },
                7: { differences: 2, hints: 5 },
                8: { differences: 2, hints: 5 },
                9: { differences: 2, hints: 5 },
                10: { differences: 2, hints: 5 },
                11: { differences: 2, hints: 5 },
                12: { differences: 2, hints: 5 },
                13: { differences: 2, hints: 5 },
                14: { differences: 2, hints: 5 },
                15: { differences: 2, hints: 5 },
                16: { differences: 2, hints: 5 },
                17: { differences: 2, hints: 5 },
                18: { differences: 2, hints: 5 },

            },
            medium: {
                1: { differences: 2, hints: 3 },
                2: { differences: 4, hints: 3 },
                3: { differences: 5, hints: 3 },
                4: { differences: 3, hints: 3 },
                5: { differences: 3, hints: 3 },
                6: { differences: 3, hints: 3 },
                7: { differences: 3, hints: 3 },
                8: { differences: 3, hints: 3 },
                9: { differences: 3, hints: 3 },

                14: { differences: 3, hints: 3 },

            },
            hard: {
                1: { differences: 3, hints: 2 },
                2: { differences: 5, hints: 2 },
                3: { differences: 5, hints: 2 },
                4: { differences: 4, hints: 2 },
                5: { differences: 4, hints: 2 },

                7: { differences: 4, hints: 2 },

                9: { differences: 4, hints: 2 },

                17: { differences: 4, hints: 2 },

                19: { differences: 4, hints: 2 },
                20: { differences: 4, hints: 2 },
                21: { differences: 4, hints: 2 },
                22: { differences: 4, hints: 2 },
                23: { differences: 4, hints: 2 },
                24: { differences: 4, hints: 2 },
                25: { differences: 4, hints: 2 },
                26: { differences: 4, hints: 2 },
                27: { differences: 4, hints: 2 },
                28: { differences: 4, hints: 2 },
                29: { differences: 4, hints: 2 },
                30: { differences: 4, hints: 2 }
            }
        };

        let differences = [];
        let timerInterval;
        let foundCircles = [];
        let difficulty = null;

        // ========== SOUND EFFECTS ==========
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            switch(type) {
                case 'success':
                    oscillator.frequency.value = 800;
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'error':
                    oscillator.frequency.value = 300;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
                case 'levelup':
                    oscillator.frequency.value = 1200;
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
            }
        }

        // ========== IMAGE GENERATION ==========
        function drawScene(canvas, differences, withDifferences) {
            const ctx = canvas.getContext('2d');
            const width = 500;
            const height = 600;
            canvas.width = width;
            canvas.height = height;

            // Background gradient
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, '#e8f4f8');
            grad.addColorStop(1, '#b3d9ff');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // Draw scene based on level
            const level = gameState.currentLevel;
            if (level === 1) drawLevel1Scene(ctx, width, height, withDifferences, differences);
            else if (level === 2) drawLevel2Scene(ctx, width, height, withDifferences, differences);
            else if (level === 3) drawLevel3Scene(ctx, width, height, withDifferences, differences);
            else if (level === 4) drawLevel4Scene(ctx, width, height, withDifferences, differences);
            else if (level === 5) drawLevel5Scene(ctx, width, height, withDifferences, differences);
            else if (level === 6) drawLevel6Scene(ctx, width, height, withDifferences, differences);
            else if (level === 7) drawLevel7Scene(ctx, width, height, withDifferences, differences);
            else if (level === 8) drawLevel8Scene(ctx, width, height, withDifferences, differences);
            else if (level === 9) drawLevel9Scene(ctx, width, height, withDifferences, differences);
            else if (level === 10) drawLevel10Scene(ctx, width, height, withDifferences, differences);
            else if (level === 11) drawLevel11Scene(ctx, width, height, withDifferences, differences);
            else if (level === 12) drawLevel12Scene(ctx, width, height, withDifferences, differences);
            else if (level === 13) drawLevel13Scene(ctx, width, height, withDifferences, differences);
            else if (level === 14) drawLevel14Scene(ctx, width, height, withDifferences, differences);

        // Helper drawing functions
        function drawCloud(ctx, x, y, size) {
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.9, 0, Math.PI * 2);
            ctx.arc(x + size * 1.6, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawTree(ctx, x, y) {
            // Trunk
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 10, y, 20, 60);
            // Foliage
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.arc(x, y - 5, 35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFlower(ctx, x, y) {
            ctx.fillStyle = '#2ECC71';
            ctx.fillRect(x - 2, y, 4, 15);
            ctx.fillStyle = '#FF69B4';
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(x + Math.cos(angle) * 8, y + Math.sin(angle) * 8, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBird(ctx, x, y) {
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x - 8, y);
            ctx.lineTo(x - 15, y - 5);
            ctx.moveTo(x + 8, y);
            ctx.lineTo(x + 15, y - 5);
            ctx.stroke();
        }

        function drawCoral(ctx, x, y) {
            ctx.strokeStyle = '#FF6347';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 15, y - 40);
            ctx.moveTo(x, y);
            ctx.lineTo(x + 15, y - 40);
            ctx.stroke();
        }

        function drawSeaweed(ctx, x, y) {
            ctx.strokeStyle = '#228B22';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(x, y);
            for (let i = 0; i < 5; i++) {
                x += Math.sin(i) * 10;
                y -= 20;
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawFish(ctx, x, y) {
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse(x, y, 20, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.moveTo(x + 20, y);
            ctx.lineTo(x + 35, y - 10);
            ctx.lineTo(x + 35, y + 10);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x - 5, y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBubble(ctx, x, y) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawStar(ctx, x, y, size) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                const px = x + Math.cos(angle) * size;
                const py = y + Math.sin(angle) * size;
                if (i === 0) {
                    ctx.moveTo(px, py);
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawSwing(ctx, x, y) {
            // Swing frame
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x - 30, y);
            ctx.lineTo(x - 30, y + 100);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 30, y);
            ctx.lineTo(x + 30, y + 100);
            ctx.stroke();

            // Rope
            ctx.beginPath();
            ctx.moveTo(x - 20, y + 10);
            ctx.lineTo(x - 20, y + 60);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 20, y + 10);
            ctx.lineTo(x + 20, y + 60);
            ctx.stroke();

            // Seat
            ctx.fillStyle = '#FF6347';
            ctx.fillRect(x - 20, y + 60, 40, 15);
        }

        function drawButterfly(ctx, x, y) {
            // Wings
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.ellipse(x - 15, y, 10, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 15, y, 10, 15, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = '#000000';
            ctx.fillRect(x - 3, y - 10, 6, 20);
        }

        function drawCow(ctx, x, y) {
            // Body
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(x - 20, y, 40, 30);

            // Head
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x - 20, y + 10, 12, 0, Math.PI * 2);
            ctx.fill();

            // Horns
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - 28, y);
            ctx.lineTo(x - 32, y - 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x - 12, y);
            ctx.lineTo(x - 8, y - 8);
            ctx.stroke();

            // Eyes
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x - 24, y + 8, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 16, y + 8, 2, 0, Math.PI * 2);
            ctx.fill();

            // Spots
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x - 10, y + 8, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 5, y + 15, 5, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(x - 15 + i * 10, y + 30);
                ctx.lineTo(x - 15 + i * 10, y + 45);
                ctx.stroke();
            }
        }

        function drawTiger(ctx, x, y) {
            // Body
            ctx.fillStyle = '#FF8C00';
            ctx.fillRect(x - 25, y + 10, 50, 35);

            // Head
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.arc(x - 25, y + 15, 15, 0, Math.PI * 2);
            ctx.fill();

            // Stripes
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(x - 20 + i * 10, y + 10);
                ctx.lineTo(x - 15 + i * 10, y + 45);
                ctx.stroke();
            }

            // Eyes
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x - 32, y + 12, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 18, y + 12, 3, 0, Math.PI * 2);
            ctx.fill();

            // Tail
            ctx.strokeStyle = '#FF8C00';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(x + 25, y + 25);
            ctx.quadraticCurveTo(x + 40, y + 15, x + 50, y + 30);
            ctx.stroke();
        }

        function drawLion(ctx, x, y) {
            // Body
            ctx.fillStyle = '#CD853F';
            ctx.fillRect(x - 20, y + 15, 40, 25);

            // Head
            ctx.fillStyle = '#CD853F';
            ctx.beginPath();
            ctx.arc(x - 20, y + 15, 12, 0, Math.PI * 2);
            ctx.fill();

            // Mane
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(x - 20, y, 18, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x - 26, y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 14, y - 2, 2, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            ctx.fillStyle = '#CD853F';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(x - 15 + i * 10, y + 40, 6, 20);
            }

            // Tail
            ctx.strokeStyle = '#CD853F';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x + 20, y + 25);
            ctx.quadraticCurveTo(x + 35, y + 20, x + 45, y + 35);
            ctx.stroke();
        }

        function drawGiraffe(ctx, x, y) {
            // Legs
            ctx.fillStyle = '#F4A460';
            ctx.fillRect(x - 8, y + 50, 5, 40);
            ctx.fillRect(x + 3, y + 50, 5, 40);

            // Body
            ctx.fillStyle = '#DAA520';
            ctx.fillRect(x - 10, y + 25, 20, 25);

            // Neck
            ctx.fillStyle = '#DAA520';
            ctx.fillRect(x - 3, y - 10, 6, 35);

            // Head
            ctx.fillStyle = '#DAA520';
            ctx.beginPath();
            ctx.arc(x, y - 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Horns
            ctx.fillStyle = '#DAA520';
            ctx.fillRect(x - 3, y - 25, 2, 10);
            ctx.fillRect(x + 1, y - 25, 2, 10);

            // Spots
            ctx.fillStyle = '#8B7355';
            ctx.beginPath();
            ctx.arc(x - 5, y + 35, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 3, y + 40, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawZebra(ctx, x, y) {
            // Body
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(x - 20, y + 10, 40, 30);

            // Head
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x - 20, y + 15, 12, 0, Math.PI * 2);
            ctx.fill();

            // Stripes
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.moveTo(x - 18 + i * 5, y + 10);
                ctx.lineTo(x - 18 + i * 5, y + 40);
                ctx.stroke();
            }

            // Eyes
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(x - 26, y + 12, 2, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            ctx.fillStyle = '#FFFFFF';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(x - 15 + i * 10, y + 40, 5, 20);
            }
        }

        function drawPalmTree(ctx, x, y) {
            // Trunk
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 8, y + 30, 16, 80);

            // Leaves
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(x, y + 30);
                ctx.lineTo(x + Math.cos(angle) * 40, y + 30 + Math.sin(angle) * 40);
                ctx.lineWidth = 5;
                ctx.strokeStyle = '#228B22';
                ctx.stroke();
            }
        }

        function drawCage(ctx, x, y) {
            // Frame
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, 80, 100);

            // Bars
            ctx.lineWidth = 2;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(x + i * 20, y);
                ctx.lineTo(x + i * 20, y + 100);
                ctx.stroke();
            }

            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(x, y + i * 20);
                ctx.lineTo(x + 80, y + i * 20);
                ctx.stroke();
            }
        }

        // ========== GAME FUNCTIONS ==========
        function initLevel() {
            // Clear found circles from previous level
            foundCircles.forEach(circle => circle.remove());
            foundCircles = [];

            gameState.currentLevel = gameState.currentLevel || 1;
            gameState.timer = 30;

            // Get config based on difficulty
            const levelConfig = LEVEL_CONFIGS[difficulty][gameState.currentLevel];
            gameState.hints = levelConfig.hints;
            gameState.foundDifferences = 0;
            gameState.totalDifferences = levelConfig.differences;
            gameState.gameActive = true;
            gameState.isHinting = false;
            gameState.timeUp = false;

            generateDifferences();
            renderCanvases();
            updateUI();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState.gameActive) {
                    gameState.timer--;
                    updateTimer();

                    if (gameState.timer <= 0) {
                        gameState.timeUp = true;
                        gameState.gameActive = false;
                        clearInterval(timerInterval);
                        endLevel(false);
                    }
                }
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timer').textContent = Math.max(0, gameState.timer);

            // Change color and add animation when time is running out
            const timerDisplay = document.getElementById('timerDisplay');
            if (gameState.timer <= 10) {
                timerDisplay.classList.add('warning');
            } else {
                timerDisplay.classList.remove('warning');
            }
        }

        function updateUI() {
            document.getElementById('levelIndicator').textContent = `Level ${gameState.currentLevel}`;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('hintCount').textContent = gameState.hints;
            updateHearts();
        }

        function updateHearts() {
            const heartsDisplay = document.getElementById('heartsDisplay');
            heartsDisplay.innerHTML = '';

            const total = gameState.totalDifferences;
            const found = gameState.foundDifferences;

            for (let i = 0; i < total; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart';

                if (i < found) {
                    heart.textContent = '❤️';
                    heart.classList.add('found');
                } else {
                    heart.textContent = '🤍';
                }

                heartsDisplay.appendChild(heart);
            }
        }

        function handleCanvasClick(event, canvas) {
            if (!gameState.gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (event.clientX - rect.left) * scaleX;
            const y = (event.clientY - rect.top) * scaleY;

            checkDifference(x, y, canvas);
        }

        function handleImageClick(event, image) {
            if (!gameState.gameActive) return;

            const rect = image.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            checkDifference(x, y, image);
        }

        function checkDifference(x, y, element) {
            let foundDifference = false;

            for (let diff of differences) {
                if (!diff.found) {
                    const distance = Math.sqrt((diff.x - x) ** 2 + (diff.y - y) ** 2);
                    // Increased tolerance to 60 pixels for easier detection
                    if (distance < diff.radius + 60) {
                        foundDifference = true;
                        diff.found = true;
                        gameState.foundDifferences++;

                        playSound('success');
                        showSuccessPopup();
                        showDifferenceCircle(element, diff);

                        // Calculate score based on remaining time
                        gameState.score += Math.max(50, gameState.timer * 10);

                        updateUI();

                        // Check if all differences are found
                        if (gameState.foundDifferences >= gameState.totalDifferences) {
                            setTimeout(() => {
                                gameState.gameActive = false;
                                clearInterval(timerInterval);
                                endLevel(true);
                            }, 500);
                        }

                        break;
                    }
                }
            }
        }

        function showDifferenceCircle(canvas, diff) {
            const wrapper = canvas.parentElement;
            const rect = canvas.getBoundingClientRect();
            const circle = document.createElement('div');
            circle.className = 'difference-indicator';

            // Scale canvas coordinates to display coordinates
            const scaleX = rect.width / canvas.width;
            const scaleY = rect.height / canvas.height;

            const displayX = diff.x * scaleX;
            const displayY = diff.y * scaleY;

            // Make circle larger and properly centered
            const circleSize = Math.max(70, diff.radius * 4);
            circle.style.width = circleSize + 'px';
            circle.style.height = circleSize + 'px';
            circle.style.left = (displayX - circleSize / 2) + 'px';
            circle.style.top = (displayY - circleSize / 2) + 'px';
            circle.style.position = 'absolute';
            circle.style.border = '4px solid #4ecdc4';
            circle.style.borderRadius = '50%';
            circle.style.background = 'rgba(78, 205, 196, 0.15)';
            circle.style.boxShadow = '0 0 20px rgba(78, 205, 196, 0.8), inset 0 0 15px rgba(78, 205, 196, 0.3)';
            circle.style.animation = 'foundPulse 0.6s ease-out forwards, glow 2s ease-in-out infinite 0.6s';
            circle.style.pointerEvents = 'none';

            wrapper.appendChild(circle);
            foundCircles.push(circle);
        }

        function showSuccessPopup() {
            const popup = document.createElement('div');
            popup.className = 'success-popup';
            popup.textContent = '✓ Found!';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function useHint() {
            if (gameState.hints === 0) return;

            gameState.hints--;
            gameState.isHinting = true;

            // Find unfound difference
            const unfoundDifferences = differences.filter(d => !d.found);
            if (unfoundDifferences.length > 0) {
                const hint = unfoundDifferences[Math.floor(Math.random() * unfoundDifferences.length)];

                playSound('success');
                showHintCircle(hint);
            }

            setTimeout(() => {
                gameState.isHinting = false;
            }, 100);

            updateUI();
        }

        function showHintCircle(diff) {
            const canvas2 = document.getElementById('canvas2');
            const wrapper = canvas2.parentElement;
            const circle = document.createElement('div');
            circle.className = 'difference-indicator';
            circle.style.width = diff.radius * 2 + 'px';
            circle.style.height = diff.radius * 2 + 'px';
            circle.style.left = diff.x - diff.radius + 'px';
            circle.style.top = diff.y - diff.radius + 'px';
            circle.style.border = '2px dashed #FFD700';
            circle.style.borderRadius = '50%';
            circle.style.animation = 'none';

            wrapper.appendChild(circle);
            setTimeout(() => circle.remove(), 3000);
        }

        function endLevel(won) {
            gameState.gameActive = false;
            clearInterval(timerInterval);

            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const finalScore = document.getElementById('finalScore');
            const finalTime = document.getElementById('finalTime');
            const nextBtn = document.getElementById('modalNextBtn');

            if (!modal || !modalTitle) {
                console.error('Modal elements not found');
                return;
            }

            // Update scores
            if (finalScore) finalScore.textContent = gameState.score;
            if (finalTime) finalTime.textContent = gameState.timer >= 0 ? gameState.timer : 0;

            if (won) {
                playSound('levelup');
                modalTitle.textContent = '🎉 Level Complete!';
                modalTitle.className = 'modal-title win';
                if (nextBtn) {
                    nextBtn.style.display = gameState.currentLevel < 30 ? 'block' : 'none';
                }
            } else {
                modalTitle.textContent = '⏰ Time\'s Up! Try Again';
                modalTitle.className = 'modal-title lose';
                if (nextBtn) nextBtn.style.display = 'none';
            }

            // Show modal with slight delay to ensure DOM is ready
            setTimeout(() => {
                modal.classList.add('active');
            }, 100);
        }

        function restartLevel() {
            clearInterval(timerInterval);
            const modal = document.getElementById('modal');
            if (modal) {
                modal.classList.remove('active');
            }

            // Reset game state for current level
            gameState.currentLevel = gameState.currentLevel || 1;
            gameState.score = Math.max(0, gameState.score - 50);
            gameState.foundDifferences = 0;
            gameState.gameActive = false;
            gameState.timeUp = false;

            // Clear all found circles
            foundCircles.forEach(circle => {
                if (circle && circle.parentElement) {
                    circle.remove();
                }
            });
            foundCircles = [];

            // Reinitialize the level
            setTimeout(() => {
                initLevel();
            }, 100);
        }

        function nextLevel() {
            if (gameState.currentLevel < 30) {
                const modal = document.getElementById('modal');
                if (modal) {
                    modal.classList.remove('active');
                }

                gameState.currentLevel++;
                gameState.foundDifferences = 0;
                gameState.gameActive = false;
                gameState.timeUp = false;

                // Clear all found circles
                foundCircles.forEach(circle => {
                    if (circle && circle.parentElement) {
                        circle.remove();
                    }
                });
                foundCircles = [];

                // Initialize next level
                setTimeout(() => {
                    initLevel();
                }, 100);
            } else {
                // All 30 levels completed!
                const modal = document.getElementById('modal');
                const modalTitle = document.getElementById('modalTitle');
                if (modal && modalTitle) {
                    modalTitle.textContent = '🏆 All 30 Levels Complete! You\'re Amazing!';
                    modalTitle.className = 'modal-title win';
                    modal.classList.add('active');
                }
            }
        }

        // ========== EVENT LISTENERS ==========
        document.addEventListener('DOMContentLoaded', () => {
            const canvas1 = document.getElementById('canvas1');
            const canvas2 = document.getElementById('canvas2');
            const image1 = document.getElementById('image1');
            const image2 = document.getElementById('image2');

            canvas1.addEventListener('click', (e) => handleCanvasClick(e, canvas1));
            canvas2.addEventListener('click', (e) => handleCanvasClick(e, canvas2));
            image1.addEventListener('click', (e) => handleImageClick(e, image1));
            image2.addEventListener('click', (e) => handleImageClick(e, image2));

            document.getElementById('hintBtn').addEventListener('click', useHint);
            document.getElementById('restartBtn').addEventListener('click', restartLevel);
            document.getElementById('modalRestartBtn').addEventListener('click', restartLevel);
            document.getElementById('modalNextBtn').addEventListener('click', nextLevel);

            // Difficulty selection listeners
            document.getElementById('easyBtn').addEventListener('click', () => selectDifficulty('easy'));
            document.getElementById('mediumBtn').addEventListener('click', () => selectDifficulty('medium'));
            document.getElementById('hardBtn').addEventListener('click', () => selectDifficulty('hard'));

            // Level selector dropdown
            const levelSelector = document.getElementById('levelSelector');
            for (let i = 1; i <= 30; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Level ${i}`;
                levelSelector.appendChild(option);
            }

            levelSelector.addEventListener('change', (e) => {
                if (e.target.value) {
                    jumpToLevel(parseInt(e.target.value));
                    e.target.value = ''; // Reset dropdown
                }
            });

            // Show difficulty selection modal
            showDifficultyModal();
        });

        function showDifficultyModal() {
            const difficultyModal = document.getElementById('difficultyModal');
            difficultyModal.classList.add('active');
        }

        function selectDifficulty(selectedDifficulty) {
            difficulty = selectedDifficulty;
            const difficultyModal = document.getElementById('difficultyModal');
            difficultyModal.classList.remove('active');

            // Initialize game with selected difficulty
            gameState.currentLevel = 1;
            gameState.score = 0;
            initLevel();
        }

        function jumpToLevel(levelNumber) {
            if (!difficulty) {
                alert('Please select a difficulty first!');
                showDifficultyModal();
                return;
            }

            if (levelNumber < 1 || levelNumber > 30) {
                alert('Invalid level number!');
                return;
            }

            clearInterval(timerInterval);
            const modal = document.getElementById('modal');
            if (modal) {
                modal.classList.remove('active');
            }

            gameState.currentLevel = levelNumber;
            gameState.foundDifferences = 0;
            gameState.gameActive = false;
            gameState.timeUp = false;

            // Clear all found circles
            foundCircles.forEach(circle => {
                if (circle && circle.parentElement) {
                    circle.remove();
                }
            });
            foundCircles = [];

            // Initialize the selected level
            setTimeout(() => {
                initLevel();
            }, 100);
        }

        // Prevent accidental context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

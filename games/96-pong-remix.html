<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pong Remix - ZenMagma</title>    <meta name="description" content="The original pong game remixed with power-ups and new game modes!">
    <link rel="canonical" href="https://zenmagma.com/games/96-pong-remix">
    <meta property="og:title" content="Pong Remix - ZenMagma">
    <meta property="og:description" content="The original pong game remixed with power-ups and new game modes!">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/96-pong-remix">

    <meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="../css/game-fx.css">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000010;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #00c6ff}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#00c6ff,#0072ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">You:<b id="ps"> 0</b></span><span class="hv">CPU:<b id="cs"> 0</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="480" height="360"></canvas>
<p style="color:#aaa;font-size:.8em">Mouse/touch to control paddle | First to 5 wins! Ball speeds up each rally!</p></div>
<div id="ov"><div id="ob"><h2>Pong Remix</h2><p>Classic Pong with power-ups! Move your paddle to deflect the ball. First to 7 points wins. Collect power-ups for advantages!</p><button class="btn" onclick="go()">Serve!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=360;
let ball,p1,cpu,ps=0,cs=0,level=1,powerups=[],frame=0,running=false;
const arenaBg=new Image();arenaBg.src='../assets/game-art/pong-remix/arena.jpg';
function init(){ball={x:W/2,y:H/2,vx:4*(Math.random()>.5?1:-1),vy:(Math.random()*4-2),r:8};p1={x:20,y:H/2-40,w:14,h:80};cpu={x:W-34,y:H/2-40,w:14,h:80};}
function spawnPowerup(){const types=["big","fast","slow"];powerups.push({x:W/2,y:50+Math.random()*(H-100),r:12,type:types[Math.floor(Math.random()*types.length)],color:["#2ecc71","#f39c12","#e74c3c"][Math.floor(Math.random()*3)],ttl:300});}
cv.addEventListener("mousemove",e=>{const r=cv.getBoundingClientRect();p1.y=Math.max(0,Math.min(H-p1.h,e.clientY-r.top-p1.h/2));});
cv.addEventListener("touchmove",e=>{e.preventDefault();const r=cv.getBoundingClientRect();p1.y=Math.max(0,Math.min(H-p1.h,e.touches[0].clientY-r.top-p1.h/2));},{passive:false});
function update(){
  frame++;ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<ball.r||ball.y>H-ball.r)ball.vy*=-1;
  // CPU AI
  const cpuCenter=cpu.y+cpu.h/2;const cpuSpd=2+level*.3;if(cpuCenter<ball.y-5)cpu.y=Math.min(H-cpu.h,cpu.y+cpuSpd);else if(cpuCenter>ball.y+5)cpu.y=Math.max(0,cpu.y-cpuSpd);
  // Collisions
  [p1,cpu].forEach(p=>{if(ball.x-ball.r<p.x+p.w&&ball.x+ball.r>p.x&&ball.y+ball.r>p.y&&ball.y-ball.r<p.y+p.h){ball.vx*=-1.05;ball.vy+=(ball.y-(p.y+p.h/2))*.1;if(window.GameFX)GameFX.burst(cv,ball.x,ball.y,{count:8,colors:[p===p1?'#00c6ff':'#ff4e50'],spread:2,life:0.3});}});
  // Score
  if(ball.x<0){cs++;document.getElementById("cs").textContent=cs;ball.vx=Math.sign(ball.vx)*(Math.abs(ball.vx)+0.3);ball.vy=Math.sign(ball.vy||1)*(Math.abs(ball.vy)+0.2);init();if(cs>=5){running=false;setTimeout(()=>window._showMod("CPU wins! Play again?"),200);}}
  if(ball.x>W){ps++;document.getElementById("ps").textContent=ps;level++;document.getElementById("lv").textContent=level;ball.vx=Math.sign(ball.vx)*(Math.abs(ball.vx)+0.3);ball.vy=Math.sign(ball.vy||1)*(Math.abs(ball.vy)+0.2);init();if(ps>=5){running=false;setTimeout(()=>window._showMod("You win! Score: "+ps),200);}}
  // Powerups
  if(frame%200===0)spawnPowerup();
  powerups=powerups.filter(pu=>{pu.ttl--;if(Math.hypot(ball.x-pu.x,ball.y-pu.y)<pu.r+ball.r){if(pu.type==="big")p1.h=Math.min(140,p1.h+20);else if(pu.type==="fast"){ball.vx*=1.3;ball.vy*=1.3;}else{cpu.h=Math.min(60,cpu.h-10);}return false;}return pu.ttl>0;});
}
function draw(){
  if(window.GameFX)GameFX.fxImage(ctx,arenaBg,()=>{ctx.fillStyle="#000010";ctx.fillRect(0,0,W,H);},0,0,W,H);
  else{ctx.fillStyle="#000010";ctx.fillRect(0,0,W,H);}
  ctx.strokeStyle="#333";ctx.lineWidth=2;ctx.setLineDash([10,10]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="#00c6ff";ctx.fillRect(p1.x,p1.y,p1.w,p1.h);
  ctx.fillStyle="#ff4e50";ctx.fillRect(cpu.x,cpu.y,cpu.w,cpu.h);
  ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  powerups.forEach(pu=>{ctx.fillStyle=pu.color;ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(pu.type[0].toUpperCase(),pu.x,pu.y);});
}
function go(){document.getElementById("ov").style.display="none";running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none'" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body></html>

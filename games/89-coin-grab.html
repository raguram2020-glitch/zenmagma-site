<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0800;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f1c40f,#f39c12);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #f1c40f}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f1c40f,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Lives:<b id="lf"> ❤️❤️❤️</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<div style="width:420px;max-width:96vw;margin:2px auto 4px"><div style="display:flex;justify-content:space-between;font-size:.7em;color:#aaa;margin-bottom:2px"><span>Level Progress</span><span id="lvpct">0%</span></div><div style="height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden"><div id="lvbar" style="height:100%;width:0%;background:linear-gradient(90deg,#f1c40f,#f39c12);border-radius:4px;transition:width .3s"></div></div></div>
<canvas id="c" width="420" height="460"></canvas>
<p style="color:#aaa;font-size:.8em">Arrow keys/touch drag to move basket. Catch coins, avoid bombs!</p></div>
<div id="ov"><div id="ob"><h2>Coin Grab</h2><p>Move your basket left and right to catch falling coins! Bombs will cost you a life. Collect power-ups for special effects!</p><button class="btn" onclick="go()">Grab!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=420,H=460;
let basket,items,score,lives,level,frame,running;
const keys={};
function init(){basket={x:W/2-40,y:H-50,w:80,h:24};items=[];score=0;lives=3;level=1;frame=0;
  document.getElementById("lf").textContent=" ❤️❤️❤️";
  const b=document.getElementById("lvbar");if(b)b.style.width="0%";
  const p=document.getElementById("lvpct");if(p)p.textContent="0%";}
function spawnItem(){const bomb=Math.random()<0.15+level*.01;const special=!bomb&&Math.random()<0.05;items.push({x:20+Math.random()*(W-40),y:-20,dy:2+level*.3+Math.random()*1.5,type:bomb?"bomb":special?"special":"coin",emoji:bomb?"💣":special?"⭐":"🪙",color:bomb?"#e74c3c":special?"#f1c40f":"#f39c12"});}
document.addEventListener("keydown",e=>keys[e.key]=true);document.addEventListener("keyup",e=>keys[e.key]=false);
let tx=null;cv.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});cv.addEventListener("touchmove",e=>{if(tx!==null){const dx=e.touches[0].clientX-tx;basket.x=Math.max(0,Math.min(W-basket.w,basket.x+dx));tx=e.touches[0].clientX;}},{passive:true});
function update(){
  frame++;
  if(keys["ArrowLeft"])basket.x=Math.max(0,basket.x-6);
  if(keys["ArrowRight"])basket.x=Math.min(W-basket.w,basket.x+6);
  if(frame%Math.max(15,40-level*3)===0)spawnItem();
  items=items.filter(it=>{it.y+=it.dy;if(it.y>H)return false;if(it.y+20>basket.y&&it.x>basket.x-10&&it.x<basket.x+basket.w+10){if(it.type==="bomb"){lives--;document.getElementById("lf").textContent=" "+"❤️".repeat(Math.max(0,lives));if(lives<=0){running=false;setTimeout(()=>window._showMod("Game Over! Score: "+score),200);}}else if(it.type==="special"){score+=50*level;}else{score+=10*level;}document.getElementById("sc").textContent=score;
  const prevScore=(level-1)*200,nextScore=level*200,pct=Math.min(100,Math.round((score-prevScore)/(nextScore-prevScore)*100));
  const lvb=document.getElementById("lvbar");if(lvb)lvb.style.width=pct+"%";
  const lvp=document.getElementById("lvpct");if(lvp)lvp.textContent=pct+"%";
  if(score>level*200){level++;document.getElementById("lv").textContent=level;}return false;}return true;});
}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#0a0800");g.addColorStop(1,"#1a1400");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<30;i++){ctx.fillStyle="rgba(255,200,0,.1)";ctx.fillRect((i*153+frame)%W,(i*97)%H,2,2);}
  items.forEach(it=>{ctx.font="28px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(it.emoji,it.x,it.y);});
  ctx.fillStyle="#8B4513";ctx.fillRect(basket.x,basket.y,basket.w,basket.h);ctx.fillStyle="#c9a84c";ctx.fillRect(basket.x+4,basket.y+4,basket.w-8,basket.h-8);ctx.fillStyle="#f1c40f";ctx.font="bold 12px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🧺",basket.x+basket.w/2,basket.y+basket.h/2);
}
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script>
<div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid #f1c40f"><div style="font-size:52px;margin-bottom:10px">💰</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#f1c40f;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none';init();setTimeout(go,100);" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#f1c40f,#f39c12);color:#fff;font-size:1em;font-weight:700;cursor:pointer;margin-right:8px">Play Again</button><a href="../index.html" style="padding:12px 28px;border-radius:14px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:1em;font-weight:700;cursor:pointer;text-decoration:none">Home</a></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>

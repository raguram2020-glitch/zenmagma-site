<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000a14;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #00d2ff}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Ammo:<b id="am"> 15</b></span><span class="hv">Frozen:<b id="fr"> 0</b></span><span class="hv">Level:<b id="lv"> 1</b></span><span class="hv">Lives:<b id="hpbar"> ❤️❤️❤️</b></span><button class="btn" onclick="ng()">New Game</button></div>
<canvas id="c" width="480" height="460"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Click to freeze enemies! Don't let them reach the right side!</p>
<div id="ov"><div id="ob"><h2>Ice Sniper</h2><p>Freeze the marching enemies with your ice shots before they reach your igloo on the right! Limited ammo - make each shot count!</p><button class="btn" onclick="go()">Freeze!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=460;
let enemies,iceShots,score,ammo,frozen,level,hp,frame,running;
function init(){enemies=[];iceShots=[];score=0;ammo=15;frozen=0;level=1;hp=3;frame=0;document.getElementById("am").textContent=15;document.getElementById("fr").textContent=0;document.getElementById("hpbar").textContent=" ❤️❤️❤️";}
function spawnEnemy(){const y=40+Math.random()*(H-80);enemies.push({x:-20,y,r:16,spd:0.6+level*.08,frozen:0,hp:1+Math.floor(level/3)});}
cv.addEventListener("click",e=>{
  if(!running||ammo<=0)return;
  iceShots.push({x:0,y:e.offsetY,tx:e.offsetX,ty:e.offsetY,progress:0,speed:0.05});
  ammo--;document.getElementById("am").textContent=ammo;
  if(ammo<=0&&enemies.length===0)setTimeout(()=>{level++;ammo=15+level*2;document.getElementById("am").textContent=ammo;document.getElementById("lv").textContent=level;},500);
});
function update(){
  frame++;if(frame%Math.max(30,80-level*5)===0)spawnEnemy();
  iceShots=iceShots.filter(s=>{s.progress+=s.speed;const ix=s.progress*s.tx,iy=s.ty;let hit=false;enemies=enemies.filter(e=>{if(!hit&&Math.hypot(ix-e.x,iy-e.y)<e.r+8){e.frozen=120+level*20;e.hp--;if(e.hp<=0){score+=20*level;frozen++;document.getElementById("sc").textContent=score;document.getElementById("fr").textContent=frozen;hit=true;return false;}return true;}return true;});return s.progress<1.05&&!hit;});
  enemies=enemies.filter(e=>{if(e.frozen>0)e.frozen--;else e.x+=e.spd;if(e.x>W-40){hp--;document.getElementById("hpbar").textContent=" "+"❤️".repeat(Math.max(0,hp));if(hp<=0){running=false;setTimeout(()=>window._showMod("Igloo destroyed! Score: "+score),200);}return false;}return true;});
}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#000a14");g.addColorStop(1,"#001428");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Snow ground
  ctx.fillStyle="#e8f4f8";ctx.fillRect(0,H-20,W,20);
  // Snowflakes
  for(let i=0;i<30;i++){ctx.fillStyle="rgba(200,240,255,.3)";ctx.beginPath();ctx.arc((i*137+frame*.2)%W,(i*97+frame*.1)%H,1+i%3,0,Math.PI*2);ctx.fill();}
  // Danger zone (last 40px before igloo)
  ctx.fillStyle="rgba(255,0,0,.08)";ctx.fillRect(W-80,0,80,H);
  ctx.strokeStyle="rgba(255,0,0,.4)";ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(W-80,0);ctx.lineTo(W-80,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(255,0,0,.5)";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillText("⚠️ DANGER",W-40,16);
  // Igloo
  ctx.fillStyle="#c8e6f0";ctx.beginPath();ctx.arc(W-30,H-30,40,Math.PI,0);ctx.fill();ctx.fillStyle="#5d9db5";ctx.fillRect(W-40,H-30,20,10);
  enemies.forEach(e=>{
    ctx.fillStyle=e.frozen>0?"#7fdbff":"#cc3300";ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    if(e.frozen>0){ctx.strokeStyle="#00d2ff";ctx.lineWidth=3;ctx.stroke();ctx.fillStyle="rgba(0,210,255,.3)";ctx.beginPath();ctx.arc(e.x,e.y,e.r+8,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle="#fff";ctx.font="18px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(e.frozen>0?"🥶":"👹",e.x,e.y);
  });
  iceShots.forEach(s=>{const ix=s.progress*s.tx,iy=s.ty;ctx.fillStyle="#00d2ff";ctx.beginPath();ctx.arc(ix,iy,6,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();});
}
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
function ng(){init();if(running)running=false;setTimeout(go,100);}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none'" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>
    <script src="../js/game-fx.js"></script>
<script src="../js/mobile-controls.js" defer></script>
</body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cat Catcher - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0008;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff9a9e,#fecfef);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #ff9a9e}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#ff9a9e,#fecfef);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Lives:<b id="lf"> 3</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="420" height="460"></canvas>
<p style="color:#aaa;font-size:.8em">Move mouse/finger to move basket. Catch cats, avoid dogs!</p></div>
<div id="ov"><div id="ob"><h2>Cat Catcher</h2><p>Cats are falling from the sky! Move your basket to catch them safely. Avoid dogs or lose a life!</p><button class="btn" onclick="go()">Catch!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=420,H=460;
let basket={x:W/2-50,w:100,y:H-50,h:28},items=[],score=0,lives=3,level=1,frame=0,running=false;
function spawnItem(){const dog=Math.random()<0.2+level*.02;items.push({x:20+Math.random()*(W-40),y:-30,dy:2+level*.4+Math.random()*1.5,emoji:dog?"🐕":"🐱",bad:dog});}
cv.addEventListener("mousemove",e=>{basket.x=Math.max(0,Math.min(W-basket.w,e.offsetX-basket.w/2));});
cv.addEventListener("touchmove",e=>{e.preventDefault();const r=cv.getBoundingClientRect();basket.x=Math.max(0,Math.min(W-basket.w,e.touches[0].clientX-r.left-basket.w/2));},{passive:false});
function update(){frame++;if(frame%Math.max(20,50-level*5)===0)spawnItem();items=items.filter(it=>{it.y+=it.dy;if(it.y>H)return false;if(it.y+20>basket.y&&it.x>basket.x-10&&it.x<basket.x+basket.w+10){if(it.bad){lives--;document.getElementById("lf").textContent=lives;if(lives<=0){running=false;showGameOver("Score: "+score);}}else{score+=10*level;if(score>level*150){level++;document.getElementById("lv").textContent=level;}}document.getElementById("sc").textContent=score;return false;}return true;});}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#1a0020");g.addColorStop(1,"#0a0008");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<20;i++){ctx.fillStyle="rgba(255,150,200,.05)";ctx.beginPath();ctx.arc((i*137+frame*.2)%W,(i*97+frame*.1)%H,2,0,Math.PI*2);ctx.fill();}
  items.forEach(it=>{ctx.font="32px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(it.emoji,it.x,it.y);});
  ctx.fillStyle="#ff6b8a";ctx.beginPath();ctx.roundRect(basket.x,basket.y,basket.w,basket.h,8);ctx.fill();ctx.fillStyle="#fff";ctx.font="18px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🧺",basket.x+basket.w/2,basket.y+basket.h/2);
}
function go(){document.getElementById("ov").style.display="none";running=true;(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script></body></html>

<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Word Jumble - ZenMagma</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0000;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);touch-action:none}
#hud{display:flex;gap:16px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}
.hval{background:rgba(255,255,255,.12);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.9em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f7797d,#FBD786);color:#fff;transition:.2s}
.btn:hover{transform:scale(1.05);opacity:.9}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}
#obox{background:#16213e;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;border:2px solid #f7797d}
#obox h2{font-size:2.2em;margin-bottom:8px;background:linear-gradient(135deg,#f7797d,#FBD786);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#obox p{color:#aaa;margin-bottom:22px;line-height:1.5}
#home{position:fixed;top:10px;left:10px;padding:6px 14px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.8em;z-index:100}
</style></head><body>


<div id="hud"><span class="hval">Score: <b id="sc">0</b></span><span class="hval">Level: <b id="lv">1</b></span><span class="hval">Time: <b id="tm">30</b>s</span><button class="btn" onclick="newGame()">New Game</button></div>
<div style="text-align:center;padding:20px">
<div style="font-size:2.5em;letter-spacing:12px;font-weight:900;color:#FBD786;padding:20px;background:rgba(255,255,255,.05);border-radius:16px;margin:10px" id="jumbled">LOADING</div>
<div style="font-size:.9em;color:#aaa;margin:8px">Hint: <span id="hint" style="color:#f7797d">-</span></div>
<input id="ans" style="padding:12px 20px;border-radius:30px;border:2px solid #f7797d;background:#1a0000;color:#fff;font-size:1.2em;width:260px;text-align:center;outline:none;margin:10px" placeholder="Type your answer..." maxlength="15">
<br><button class="btn" onclick="check()" style="margin:8px">Submit</button>
<button class="btn" onclick="skip()" style="margin:8px;background:linear-gradient(135deg,#555,#333)">Skip</button>
<div id="fb" style="font-size:1.1em;height:28px;margin-top:8px"></div>
</div>
<div id="overlay"><div id="obox"><h2>Word Jumble</h2><p>Unscramble the jumbled letters to find the hidden word!<br>Type your answer and press Submit.</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const WORDS=[
  {w:"PLANET",h:"Orbits the sun"},  {w:"JUNGLE",h:"Dense forest"},  {w:"CASTLE",h:"A royal fortress"},
  {w:"BRIDGE",h:"Crosses water"},   {w:"CANDLE",h:"Gives light"},   {w:"DRAGON",h:"Mythical creature"},
  {w:"FLOWER",h:"Nature's beauty"}, {w:"ISLAND",h:"Land in water"}, {w:"MAGNET",h:"Attracts iron"},
  {w:"PARROT",h:"Colorful bird"},   {w:"ROCKET",h:"Goes to space"}, {w:"SUNSET",h:"End of day"},
  {w:"TURTLE",h:"Slow reptile"},    {w:"WIZARD",h:"Casts spells"},  {w:"HAMMER",h:"A tool"},
  {w:"MIRROR",h:"Reflects image"},  {w:"OYSTER",h:"Makes pearls"},  {w:"PILLOW",h:"For sleeping"},
  {w:"RIBBON",h:"Tied in bows"},    {w:"SILVER",h:"Precious metal"},{w:"TROPHY",h:"Prize for winning"},
  {w:"VIOLIN",h:"Musical string"},  {w:"WINDOW",h:"In a wall"},     {w:"YELLOW",h:"A bright color"},
  {w:"ZIPPER",h:"Fastens clothes"}, {w:"ANCHOR",h:"Holds ships"},   {w:"BANANA",h:"Yellow fruit"},
  {w:"CAMERA",h:"Takes photos"},    {w:"DANCER",h:"Moves to music"},{w:"EMPIRE",h:"Great kingdom"},
];
function shuffle(s){return s.split("").sort(()=>Math.random()-.5).join("")}
let pool=[...WORDS].sort(()=>Math.random()-.5),cur,score=0,level=1,timer,timeLeft,running=false;
function next(){if(!pool.length)pool=[...WORDS].sort(()=>Math.random()-.5);cur=pool.pop();let j=shuffle(cur.w);while(j===cur.w)j=shuffle(cur.w);document.getElementById("jumbled").textContent=j;document.getElementById("hint").textContent=cur.h;document.getElementById("ans").value="";document.getElementById("fb").textContent="";clearInterval(timer);timeLeft=Math.max(10,30-level*2);tick();}
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){document.getElementById("fb").textContent="Time out! The word was: "+cur.w;document.getElementById("fb").style.color="#e74c3c";setTimeout(next,1500);}else{timer=setTimeout(()=>{timeLeft--;tick();},1000);}}
function check(){const a=document.getElementById("ans").value.toUpperCase().trim();if(a===cur.w){score+=timeLeft*level*5;level++;document.getElementById("sc").textContent=score;document.getElementById("lv").textContent=level;document.getElementById("fb").textContent="Correct! +"+timeLeft*level*5;document.getElementById("fb").style.color="#2ecc71";clearInterval(timer);setTimeout(next,1000);}else{document.getElementById("fb").textContent="Try again!";document.getElementById("fb").style.color="#e74c3c";}}
function skip(){document.getElementById("fb").textContent="Skipped! It was: "+cur.w;document.getElementById("fb").style.color="#f39c12";clearInterval(timer);setTimeout(next,1200);}
document.getElementById("ans").addEventListener("keydown",e=>{if(e.key==="Enter")check();});
function go(){document.getElementById("overlay").style.display="none";running=true;next();}
function newGame(){score=0;level=1;document.getElementById("sc").textContent=0;document.getElementById("lv").textContent=1;pool=[...WORDS].sort(()=>Math.random()-.5);if(running)next();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script>
</body></html>

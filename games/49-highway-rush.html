<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Highway Rush</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}
body{touch-action:none;user-select:none;-webkit-user-select:none}
#touch-btns{display:none;position:fixed;bottom:18px;left:0;width:100%;z-index:10;pointer-events:none}
#touch-btns button{pointer-events:all;width:110px;height:72px;font-size:18px;font-weight:bold;font-family:monospace;border:3px solid rgba(255,255,255,0.5);border-radius:14px;background:rgba(0,0,0,0.55);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#btn-jump{position:absolute;left:24px;bottom:0;background:rgba(0,0,100,0.7);border-color:#4488ff}
#btn-slide{position:absolute;right:24px;bottom:0;background:rgba(100,0,0,0.7);border-color:#ff8844}
@media(hover:none)and(pointer:coarse){#touch-btns{display:block}}</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<canvas id="c"></canvas>
<div id="touch-btns">
  <button id="btn-jump">⬆️ JUMP</button>
  <button id="btn-slide">⬇️ SLIDE</button>
</div>
<script>
const BG=new Image(); BG.src='../assets/backgrounds/highway-rush-bg.jpg';
const MOOD_LABELS=['CITY LIGHTS','RAIN SLICK','MIDNIGHT','NEON SURGE'];
const MOOD_OVERLAYS=['rgba(255,200,50,0.04)','rgba(0,30,80,0.38)','rgba(0,0,0,0.45)','rgba(200,0,100,0.2)'];
let moodIdx=0,moodFade=0,moodChanging=false,moodText='',moodTextT=0,moodRain=[];
function triggerMood(n){moodIdx=n%MOOD_LABELS.length;moodFade=0;moodChanging=true;moodText=MOOD_LABELS[moodIdx];moodTextT=120;if(moodIdx===1){moodRain=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,spd:10+Math.random()*5,len:14}));}else{moodRain=[];}}
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='hr_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120,MAX_LIVES=5;
// City buildings silhouette
const blds=Array.from({length:20},(x,i)=>({x:i/20,w:0.04+Math.random()*0.04,h:0.15+Math.random()*0.25,windows:Math.floor(Math.random()*5)+2}));
// Headlight streaks
const streaks=Array.from({length:6},()=>({x:Math.random(),y:0.5+Math.random()*0.4,len:0.05+Math.random()*0.08,speed:0.003+Math.random()*0.004}));
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT,lives;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;lives=MAX_LIVES;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');moodIdx=0;moodFade=0;moodChanging=false;moodText='';moodTextT=0;moodRain=[];}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
// ── Touch controls ───────────────────────────────────────────────────────────
let _ty0=null;
function _onTouchStart(e){
  e.preventDefault();
  _ty0=e.changedTouches[0].clientY;
  if(state==='start'||state==='over'){startGame();}
}
function _onTouchEnd(e){
  e.preventDefault();
  if(_ty0===null)return;
  const dy=e.changedTouches[0].clientY-_ty0;
  _ty0=null;
  if(state==='start'||state==='over'){return;}
  if(state==='play'){if(dy>40)doSlide();else doJump();}
}
document.addEventListener('touchstart',_onTouchStart,{passive:false});
document.addEventListener('touchend',_onTouchEnd,{passive:false});
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doJump();else startGame();},{passive:false});
document.getElementById('btn-slide').addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(state==='play')doSlide();else startGame();},{passive:false});
document.getElementById('btn-jump').addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();},{passive:false});
document.getElementById('btn-slide').addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();},{passive:false});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#ffff44',5);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-1)*4,life:30,col,s:Math.random()*5+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=40;w=28;oy=GY-h;}else if(t==='tall'){h=70;w=32;oy=GY-h;}else{h=12;w=90;oy=GY-78;}obs.push({x:W+60,y:oy,w,h,type:t});}
function spawnCoin(x){coll.push({x,y:GY-40-Math.random()*80,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function drawPlayer(x,y,sl){
  const t=cx,bob=Math.sin(fr*0.2)*2;
  t.save(); t.translate(Math.floor(x),Math.floor(y));
  if(sl){
    // Crouched low on skateboard
    t.fillStyle='#cc4400'; t.fillRect(-22,0,44,8); // board
    t.fillStyle='#333'; t.beginPath(); t.arc(-14,8,5,0,Math.PI*2); t.fill(); t.beginPath(); t.arc(14,8,5,0,Math.PI*2); t.fill(); // wheels
    t.fillStyle='#ff6600'; t.fillRect(-18,-14,36,14); // body crouched
    t.fillStyle='#f5c87a'; t.beginPath(); t.arc(12,-18,9,0,Math.PI*2); t.fill(); // head
    t.fillStyle='#333'; t.fillRect(-20,-18,38,4); // cap brim
    t.fillStyle='#222'; t.fillRect(-10,-28,22,12); // cap top
  } else {
    const lk=Math.sin(fr*0.23)*12;
    // Skateboard
    t.fillStyle='#cc4400'; t.fillRect(-18,2+bob,36,7);
    t.fillStyle='#ff8800'; t.fillRect(-16,2+bob,36,3); // deck stripe
    t.fillStyle='#222'; t.beginPath(); t.arc(-10,10+bob,5,0,Math.PI*2); t.fill(); t.beginPath(); t.arc(10,10+bob,5,0,Math.PI*2); t.fill(); // wheels
    // Legs
    t.fillStyle='#1a1a5a'; // dark jeans
    t.save(); t.rotate(lk*0.025); t.fillRect(-10,0+bob,10,18); t.restore();
    t.save(); t.rotate(-lk*0.025); t.fillRect(1,0+bob,10,18); t.restore();
    // Sneakers
    t.fillStyle='#fff'; t.fillRect(-12,14+bob,14,7); t.fillRect(0,14+bob,14,7);
    // Body - hoodie
    const hg=t.createLinearGradient(-14,-42+bob,14,-42+bob); hg.addColorStop(0,'#ff6600'); hg.addColorStop(1,'#cc3300');
    t.fillStyle=hg; t.fillRect(-14,-42+bob,28,44);
    // Hood up detail
    t.fillStyle='#aa2200'; t.fillRect(-14,-44+bob,28,4);
    // Arms
    t.fillStyle='#ff6600';
    t.save(); t.rotate(-lk*0.04); t.fillRect(-24,-40+bob,10,24); t.restore();
    t.save(); t.rotate(lk*0.04); t.fillRect(14,-40+bob,10,24); t.restore();
    // Hands
    t.fillStyle='#f5c87a'; t.fillRect(-24,-18+bob,10,8); t.fillRect(14,-18+bob,10,8);
    // Head
    t.fillStyle='#f5c87a'; t.beginPath(); t.arc(0,-54+bob,13,0,Math.PI*2); t.fill();
    // Cap
    t.fillStyle='#222'; t.fillRect(-14,-66+bob,28,14); // cap
    t.fillRect(-16,-56+bob,32,5); // brim
    // Eyes + headphones hint
    t.fillStyle='#333'; t.fillRect(-5,-56+bob,4,4); t.fillRect(3,-56+bob,4,4);
    t.fillStyle='#ff6600'; t.fillRect(-16,-58+bob,4,8); t.fillRect(12,-58+bob,4,8); // headphones
  }
  t.restore();
}
function drawObs(o){
  if(o.type==='short'){
    // Crashed traffic cone cluster
    const cx2=cx,bx=o.x,by=o.y+o.h;
    for(let ci=0;ci<3;ci++){
      const cx3=bx+ci*10-2,tilt=(ci-1)*0.3;
      cx2.save(); cx2.translate(cx3+7,by); cx2.rotate(tilt);
      cx2.fillStyle='#ff6600'; cx2.beginPath(); cx2.moveTo(0,0); cx2.lineTo(-8,-28); cx2.lineTo(8,-28); cx2.closePath(); cx2.fill();
      cx2.fillStyle='#fff'; cx2.fillRect(-6,-20,12,4); cx2.fillRect(-5,-11,10,3);
      cx2.fillStyle='#cc4400'; cx2.fillRect(-9,0,18,5);
      cx2.restore();
    }
  }else if(o.type==='tall'){
    // Street lamp post
    cx.fillStyle='#223'; cx.fillRect(o.x+o.w/2-4,o.y,8,o.h);
    cx.fillStyle='#334'; cx.fillRect(o.x+o.w/2-4,o.y,8,o.h*0.7);
    // Lamp arm
    cx.fillStyle='#445'; cx.fillRect(o.x,o.y,o.w,6);
    // Glowing orange light
    const lg=cx.createRadialGradient(o.x+o.w/2,o.y+3,2,o.x+o.w/2,o.y+3,28);
    lg.addColorStop(0,'rgba(255,200,80,0.9)'); lg.addColorStop(0.4,'rgba(255,140,20,0.5)'); lg.addColorStop(1,'rgba(255,100,0,0)');
    cx.fillStyle=lg; cx.fillRect(o.x-10,o.y-20,o.w+20,40);
    cx.fillStyle='#ffdd88'; cx.beginPath(); cx.arc(o.x+o.w/2,o.y+3,6,0,Math.PI*2); cx.fill();
  }else{
    // Road barrier - yellow/black striped metal
    cx.fillStyle='#888'; cx.fillRect(o.x,o.y,o.w,o.h);
    const stripeW=18;
    for(let i=0;i<o.w;i+=stripeW*2){
      cx.fillStyle='#ffdd00'; cx.fillRect(o.x+i,o.y,stripeW,o.h);
      cx.fillStyle='#222'; cx.fillRect(o.x+i+stripeW,o.y,stripeW,o.h);
    }
    cx.fillStyle='#aaa'; cx.fillRect(o.x,o.y,o.w,4); cx.fillRect(o.x,o.y+o.h-4,o.w,4);
    // Reflectors
    for(let i=12;i<o.w;i+=30){cx.fillStyle='#fff';cx.beginPath();cx.arc(o.x+i,o.y+o.h/2,3,0,Math.PI*2);cx.fill();}
  }
}
function drawCoin(c){
  const pulse=Math.sin(c.a*0.15)*2;
  cx.fillStyle='rgba(255,255,100,0.25)';cx.beginPath();cx.arc(c.x,c.y,14+pulse,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ffdd00';cx.beginPath();cx.arc(c.x,c.y,9,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(c.x-2,c.y-2,3,0,Math.PI*2);cx.fill();
  // Star points
  cx.strokeStyle='#ffcc00';cx.lineWidth=1.5;
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;cx.beginPath();cx.moveTo(c.x+Math.cos(a)*6,c.y+Math.sin(a)*6);cx.lineTo(c.x+Math.cos(a)*10+pulse,c.y+Math.sin(a)*10+pulse);cx.stroke();}
}
function drawBG(){
  cx.drawImage(BG,0,0,W,H);
  cx.fillStyle=MOOD_OVERLAYS[moodIdx];cx.fillRect(0,0,W,H);
  if(moodRain.length){cx.strokeStyle='rgba(150,180,255,0.4)';cx.lineWidth=1;moodRain.forEach(r=>{r.y+=r.spd;if(r.y>H){r.y=0;r.x=Math.random()*W;}cx.beginPath();cx.moveTo(r.x,r.y);cx.lineTo(r.x-1,r.y+r.len);cx.stroke();});}
  if(moodTextT>0){cx.globalAlpha=Math.min(1,moodTextT/20);cx.fillStyle='rgba(0,0,30,0.75)';cx.fillRect(W/2-160,H*0.18-28,320,46);cx.fillStyle='#ffcc00';cx.font='bold 26px monospace';cx.textAlign='center';cx.fillText('⚡ '+moodText,W/2,H*0.18+8);cx.textAlign='left';cx.globalAlpha=1;}
  cx.fillStyle='rgba(0,0,20,0.4)'; cx.fillRect(0,GY,W,H-GY);
  // Building silhouettes
  blds.forEach(b=>{
    const bx=((b.x-bgOff*0.0005)%1.1-0.05)*W;
    const bw=b.w*W,bh=b.h*H;
    cx.fillStyle='#111';cx.fillRect(bx,GY-bh,bw,bh);
    // Windows
    cx.fillStyle='rgba(255,200,50,0.7)';
    for(let wr=0;wr<b.windows;wr++)for(let wc=0;wc<3;wc++){
      if(Math.sin(wr*3+wc*5+b.x*100)>0.2)cx.fillRect(bx+wc*bw/3.5+2,GY-bh+wr*18+5,bw/4,8);
    }
  });
  // Streetlights
  for(let i=0;i<W;i+=180){const lx=(i+bgOff*3)%W;cx.fillStyle='#334';cx.fillRect(lx,GY-80,6,80);cx.fillStyle='#aaa';cx.fillRect(lx-15,GY-84,36,8);cx.fillStyle='rgba(255,220,100,0.4)';cx.beginPath();cx.ellipse(lx+4,GY-80,25,30,0,0,Math.PI*2);cx.fill();}
  // Headlight streaks
  streaks.forEach(s=>{s.x-=s.speed*(spd||4.5)*0.1;if(s.x<-0.1)s.x=1.1;cx.fillStyle='rgba(255,200,100,0.3)';cx.fillRect(s.x*W,s.y*H,s.len*W,2);});
  // Road
  cx.fillStyle='#222';cx.fillRect(0,GY,W,H-GY);
  // Lane dashes
  const dashW=50,gap=40;
  for(let i=(bgOff*3)%(dashW+gap)-(dashW+gap);i<W;i+=dashW+gap){cx.fillStyle='#fff';cx.fillRect(i,GY+H*0.04,dashW,4);}
  // Yellow lane lines
  for(let i=(bgOff*3)%(100)-100;i<W;i+=100){cx.fillStyle='#ff0';cx.fillRect(i,GY+2,50,3);}
  cx.fillStyle='#333';cx.fillRect(0,GY,W,6);
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';cx.strokeStyle=col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,12+Math.sin(p.a*0.1)*3,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(0,0,0,0.5)';cx.fill();cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t[0].toUpperCase(),p.x,p.y+4);cx.textAlign='left';}
function drawHUD(){cx.fillStyle='rgba(0,0,20,0.7)';cx.fillRect(0,0,W,44);cx.font='bold 14px monospace';cx.fillStyle='#ffff44';cx.fillText('SCORE: '+sc,16,28);cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);cx.fillStyle='#ffdd00';cx.fillText('COINS: '+coins,W*0.5,28);cx.fillStyle='#ff8800';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);for(let i=0;i<MAX_LIVES;i++){cx.fillStyle=i<lives?'#ff4444':'#444';cx.fillRect(W-20-i*22,12,14,14);}if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}}
function drawStart(){
  drawBG();
  cx.fillStyle='rgba(0,0,20,0.7)';cx.fillRect(W/2-240,H*0.28,480,H*0.55);
  cx.fillStyle='#ffff44';cx.font='bold 46px monospace';cx.textAlign='center';cx.fillText('HIGHWAY RUSH',W/2,H*0.38);
  cx.fillStyle='#ff8800';cx.font='18px monospace';cx.fillText('NIGHT CITY RUNNER',W/2,H*0.47);
  const mob=window.matchMedia('(hover:none)and(pointer:coarse)').matches;cx.fillStyle='#88aaff';cx.font='16px monospace';cx.fillText(mob?'TAP: JUMP  SWIPE ↓: SLIDE':'↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#223388';cx.fillRect(W/2-80,H*0.65,160,44);cx.fillStyle='#ffff44';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.65+28);
  if(best>0){cx.fillStyle='#ffdd00';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){cx.fillStyle='rgba(0,0,20,0.82)';cx.fillRect(0,0,W,H);cx.fillStyle='#ff4444';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);cx.fillStyle='#ffdd00';cx.fillText('BEST:  '+best,W/2,H*0.54);cx.fillStyle='#223388';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#ffff44';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);cx.textAlign='left';}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  const _dm=Math.floor(dist/100);if(_dm>0&&Math.floor((dist-spd*0.05)/100)<_dm){triggerMood(_dm);}
  if(moodChanging){moodFade=Math.min(1,moodFade+0.018);if(moodFade>=1)moodChanging=false;}
  if(moodTextT>0)moodTextT--;
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?50:28,ph=sliding?16:62,phY=sliding?py-16:py-62;
  if(!dead&&!inv){
    for(let o of obs){if(hit(PX-pw/2,phY,pw,ph,o)){if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00aaff',15);addFT(PX,py-60,'SHIELD!','#00aaff');}else{lives--;spawnP(PX,py-30,'#ff4444',15);if(lives<=0){dead=true;if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}else{inv=true;invT=120;obs=[];addFT(PX,py-60,'❤ '+lives+' LEFT!','#ff4444');}}break;}}
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-30)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffdd00');spawnP(c.x,c.y,'#ffdd00',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-30)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.s/2,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.strokeStyle='rgba(0,170,255,0.5)';cx.lineWidth=3;cx.beginPath();cx.arc(W*0.22,py-30,40,0,Math.PI*2);cx.stroke();}
    drawPlayer(W*0.22,py,sliding);
  }
  for(let o of obs){if(o.x-W*0.22<320&&o.x-W*0.22>60){cx.font='bold 16px monospace';cx.textAlign='center';if(o.type==='short'){cx.fillStyle='#88ff88';cx.fillText('JUMP ↑',W*0.22,GY-95);}else{cx.fillStyle='#ffaa44';cx.fillText('SLIDE ↓',W*0.22,GY-95);}cx.textAlign='left';}}
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){const mob=window.matchMedia('(hover:none)and(pointer:coarse)').matches;cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(0,0,20,0.6)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText(mob?'TAP: JUMP  SWIPE ↓: SLIDE':'↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){update();if(state==='start')drawStart();else if(state==='over'){draw();drawOver();}else draw();requestAnimationFrame(loop);}
init();loop();
</script>

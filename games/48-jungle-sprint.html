<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jungle Sprint</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,GY;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;GY=H*0.72;}
resize();window.addEventListener('resize',resize);
const LSK='js_hs',GRAV=0.55,JV=-13.5,SDUR=38,ISPD=4.5,MSPD=9,RAMP=0.2,RINT=300,SBASE=340,SRAND=120;
// Parallax trees
const trees=Array.from({length:12},(x,i)=>({x:i/12,layer:i%3,h:0.2+Math.random()*0.15}));
let state='start',sc,dist,coins,mult,spd,fr,sclk,best,vy,py,sliding,stmr,dead,inv,invT;
let obs=[],coll=[],parts=[],pups=[],ftxts=[];
let shield,mag,slow,shT,mgT,slT,hintT,bgOff=0;
function init(){sc=0;dist=0;coins=0;mult=1;spd=ISPD;fr=0;sclk=0;vy=0;py=GY;sliding=false;stmr=0;dead=false;inv=false;invT=0;obs=[];coll=[];parts=[];pups=[];ftxts=[];shield=false;mag=false;slow=false;shT=0;mgT=0;slT=0;hintT=300;bgOff=0;best=parseInt(localStorage.getItem(LSK)||'0');}
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(state==='play'){if(e.code==='ArrowUp'||e.code==='Space')doJump();if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();}if((e.code==='Space'||e.code==='Enter')&&state!=='play')startGame();e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',()=>{if(state!=='play')startGame();});
function doJump(){if(py>=GY-2){vy=JV;spawnP(W*0.22,py,'#88ff44',6);}}
function doSlide(){if(!sliding){sliding=true;stmr=SDUR;}}
function startGame(){state='play';init();}
function spawnP(x,y,col,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-1)*4,life:30,col,s:Math.random()*5+2});}
function spawnObs(){const t=['short','tall','low'][Math.floor(Math.random()*3)];let h,w,oy;if(t==='short'){h=65;w=35;oy=GY-h;}else if(t==='tall'){h=108;w=42;oy=GY-h;}else{h=16;w=130;oy=GY-82;}obs.push({x:W+60,y:oy,w,h,type:t});}
function spawnCoin(x){coll.push({x,y:GY-42-Math.random()*78,collected:false,a:0});}
function spawnPup(x){const t=['shield','magnet','slow'][Math.floor(Math.random()*3)];pups.push({x,y:GY-65,t,collected:false,a:0});}
function addFT(x,y,txt,col){ftxts.push({x,y,txt,col,life:60,vy:-1.5});}
function drawPlayer(x,y,sl){
  const bob=Math.sin(fr*0.2)*1.5;
  if(!sl){
    // Pith helmet
    cx.fillStyle='#d4a820';cx.beginPath();cx.ellipse(x,y-52+bob,18,8,0,Math.PI,Math.PI*2);cx.fill();
    cx.fillStyle='#c8961a';cx.beginPath();cx.ellipse(x,y-52+bob,22,5,0,Math.PI,Math.PI*2);cx.fill();
    // Head
    cx.fillStyle='#f4c090';cx.beginPath();cx.arc(x,y-42+bob,13,0,Math.PI*2);cx.fill();
    // Eyes
    cx.fillStyle='#333';cx.beginPath();cx.arc(x-4,y-43+bob,2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+4,y-43+bob,2,0,Math.PI*2);cx.fill();
    // Body - khaki
    cx.fillStyle='#c8a84b';cx.beginPath();cx.ellipse(x,y-20+bob,11,18,0,0,Math.PI*2);cx.fill();
    // Whip arm
    const whipA=Math.sin(fr*0.3)*0.4;
    cx.strokeStyle='#6b3a1a';cx.lineWidth=3;cx.beginPath();cx.moveTo(x+12,y-22+bob);cx.quadraticCurveTo(x+30+Math.sin(fr*0.3)*10,y-30+bob,x+50,y-15+bob);cx.stroke();
    // Legs
    const lg=Math.sin(fr*0.25)*8;
    cx.fillStyle='#a08030';cx.fillRect(x-10,y-2,9,20-lg);cx.fillRect(x+1,y-2,9,20+lg);
    cx.fillStyle='#6b3a1a';cx.fillRect(x-11,y+16-lg,11,6);cx.fillRect(x,y+16+lg,11,6);
    // Arms
    cx.fillStyle='#c8a84b';cx.fillRect(x-20,y-28+bob,8,14);
  }else{
    cx.fillStyle='#d4a820';cx.fillRect(x-28,y-20,16,10);
    cx.fillStyle='#f4c090';cx.beginPath();cx.arc(x-8,y-16,12,0,Math.PI*2);cx.fill();
    cx.fillStyle='#333';cx.beginPath();cx.arc(x-4,y-16,2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(x+2,y-16,2,0,Math.PI*2);cx.fill();
    cx.fillStyle='#c8a84b';cx.fillRect(x-4,y-8,34,12);
    cx.fillStyle='#a08030';cx.fillRect(x+24,y,16,8);
    cx.strokeStyle='#6b3a1a';cx.lineWidth=3;cx.beginPath();cx.moveTo(x+4,y-6);cx.lineTo(x+60,y-20);cx.stroke();
  }
}
function drawObs(o){
  if(o.type==='short'){
    // Fallen log
    cx.fillStyle='#5c3317';cx.fillRect(o.x,o.y,o.w,o.h);
    cx.fillStyle='#7a4a20';cx.fillRect(o.x,o.y,o.w,8);
    // Rings
    for(let i=0;i<o.w;i+=12){cx.strokeStyle='#4a2a10';cx.lineWidth=1;cx.beginPath();cx.ellipse(o.x+i+6,o.y+o.h/2,4,o.h/2-2,0,0,Math.PI*2);cx.stroke();}
    // End circle
    cx.fillStyle='#6a3820';cx.beginPath();cx.ellipse(o.x+3,o.y+o.h/2,6,o.h/2,0,0,Math.PI*2);cx.fill();
    // Leaves on top
    cx.fillStyle='#2d6e1a';for(let i=0;i<4;i++)cx.beginPath(),cx.ellipse(o.x+i*10+5,o.y-5,6,4,Math.random()*0.5,0,Math.PI*2),cx.fill();
  }else if(o.type==='tall'){
    // Boulder
    cx.fillStyle='#7a7a6a';cx.beginPath();cx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#8a8a7a';cx.beginPath();cx.ellipse(o.x+o.w/2-5,o.y+o.h/2-8,o.w/4,o.h/4,0.3,0,Math.PI*2);cx.fill();
    cx.fillStyle='#5a5a4a';cx.beginPath();cx.ellipse(o.x+o.w/2+6,o.y+o.h/2+5,o.w/5,o.h/5,0,0,Math.PI*2);cx.fill();
    // Moss
    cx.fillStyle='rgba(40,120,20,0.4)';cx.beginPath();cx.ellipse(o.x+o.w/2,o.y+8,o.w/2,12,0,0,Math.PI);cx.fill();
  }else{
    // Hanging vine bar
    cx.strokeStyle='#2d6e1a';cx.lineWidth=6;
    cx.beginPath();cx.moveTo(o.x,o.y);cx.lineTo(o.x+o.w,o.y);cx.stroke();
    cx.lineWidth=3;
    for(let i=0;i<o.w;i+=15){cx.beginPath();cx.moveTo(o.x+i,o.y);cx.quadraticCurveTo(o.x+i+4,o.y+8,o.x+i+2,o.y+o.h+8);cx.stroke();}
    // Leaves
    cx.fillStyle='#3a9020';
    for(let i=0;i<o.w;i+=18)cx.beginPath(),cx.ellipse(o.x+i+4,o.y-4,6,4,Math.random()*0.5,0,Math.PI*2),cx.fill();
  }
}
function drawCoin(c){
  cx.fillStyle='rgba(255,200,0,0.3)';cx.beginPath();cx.arc(c.x,c.y,14,0,Math.PI*2);cx.fill();
  cx.fillStyle='#cc9900';cx.beginPath();cx.arc(c.x,c.y,10,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ffcc00';cx.beginPath();cx.arc(c.x,c.y,8,0,Math.PI*2);cx.fill();
  // Idol face
  cx.fillStyle='#8B6914';cx.beginPath();cx.arc(c.x,c.y,5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ffd700';cx.beginPath();cx.arc(c.x-2,c.y-1,1.5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(c.x+2,c.y-1,1.5,0,Math.PI*2);cx.fill();
}
function drawBG(){
  // Sky - green canopy
  const grad=cx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a4a0a');grad.addColorStop(0.3,'#2a6a10');grad.addColorStop(0.6,'#3a8a20');grad.addColorStop(1,'#4a1a00');
  cx.fillStyle=grad;cx.fillRect(0,0,W,H);
  // Light shafts
  for(let i=0;i<5;i++){const lx=((i*200+bgOff*0.2)%W+W)%W;cx.fillStyle='rgba(255,255,180,0.04)';cx.beginPath();cx.moveTo(lx-20,0);cx.lineTo(lx+20,0);cx.lineTo(lx+60,GY);cx.lineTo(lx-60,GY);cx.closePath();cx.fill();}
  // Background foliage layers
  [0.5,0.3,0.15].forEach((speed,layer)=>{
    const off=(bgOff*speed*0.001)%1;
    trees.filter(t=>t.layer===layer).forEach(t=>{
      const tx=((t.x-off)%1.1-0.05)*W;
      const th=t.h*H;
      const col=['#1a4a0a','#2a6a10','#3a9020'][layer];
      cx.fillStyle=col;
      cx.beginPath();cx.moveTo(tx,GY);cx.lineTo(tx-20,GY-th);cx.lineTo(tx,GY-th-20);cx.lineTo(tx+20,GY-th);cx.lineTo(tx+40,GY);cx.closePath();cx.fill();
      // Trunk
      cx.fillStyle='#3d1c00';cx.fillRect(tx+12,GY-th,8,th);
    });
  });
  // Waterfall
  const wfx=((0.85-bgOff*0.0001)%1)*W;
  cx.fillStyle='rgba(100,180,255,0.5)';cx.fillRect(wfx,H*0.2,12,GY-H*0.2);
  cx.fillStyle='rgba(200,240,255,0.3)';cx.fillRect(wfx+3,H*0.2,5,GY-H*0.2);
  // Ground
  cx.fillStyle='#3d1c00';cx.fillRect(0,GY,W,H-GY);
  cx.fillStyle='#4a2200';cx.fillRect(0,GY,W,8);
  // Grass tufts
  cx.fillStyle='#4a9a20';
  for(let i=0;i<W;i+=20){const h2=4+Math.sin(i*0.3)*3;cx.fillRect(i,GY-h2,4,h2+2);}
}
function drawPup(p){const col=p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88';cx.strokeStyle=col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,12+Math.sin(p.a*0.1)*3,0,Math.PI*2);cx.stroke();cx.fillStyle='rgba(0,0,0,0.4)';cx.fill();cx.fillStyle=col;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText(p.t[0].toUpperCase(),p.x,p.y+4);cx.textAlign='left';}
function drawHUD(){cx.fillStyle='rgba(0,20,0,0.7)';cx.fillRect(0,0,W,44);cx.font='bold 14px monospace';cx.fillStyle='#ffdd44';cx.fillText('SCORE: '+sc,16,28);cx.fillStyle='#fff';cx.fillText('DIST: '+Math.floor(dist),W*0.25,28);cx.fillStyle='#ffcc00';cx.fillText('COINS: '+coins,W*0.5,28);cx.fillStyle='#88ff88';cx.fillText('MULT: x'+mult.toFixed(1),W*0.75,28);if(shield){cx.fillStyle='#00aaff';cx.fillText('SHIELD',W*0.88,28);}if(mag){cx.fillStyle='#ff88ff';cx.fillText('MAGNET',W*0.88,28);}}
function drawStart(){
  drawBG();
  cx.fillStyle='rgba(0,20,0,0.65)';cx.fillRect(W/2-230,H*0.28,460,H*0.55);
  cx.fillStyle='#ffdd44';cx.font='bold 46px monospace';cx.textAlign='center';cx.fillText('JUNGLE SPRINT',W/2,H*0.38);
  cx.fillStyle='#88ff88';cx.font='18px monospace';cx.fillText('TROPICAL RUNNER',W/2,H*0.47);
  cx.fillStyle='#fff';cx.font='16px monospace';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.57);
  cx.fillStyle='#3d1c00';cx.fillRect(W/2-80,H*0.65,160,44);cx.fillStyle='#ffdd44';cx.font='bold 22px monospace';cx.fillText('START',W/2,H*0.65+28);
  if(best>0){cx.fillStyle='#ffdd44';cx.font='16px monospace';cx.fillText('BEST: '+best,W/2,H*0.82);}
  cx.textAlign='left';
}
function drawOver(){cx.fillStyle='rgba(0,20,0,0.82)';cx.fillRect(0,0,W,H);cx.fillStyle='#ff6644';cx.font='bold 48px monospace';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H*0.35);cx.fillStyle='#fff';cx.font='22px monospace';cx.fillText('SCORE: '+sc,W/2,H*0.46);cx.fillStyle='#ffdd44';cx.fillText('BEST:  '+best,W/2,H*0.54);cx.fillStyle='#3d1c00';cx.fillRect(W/2-80,H*0.63,160,44);cx.fillStyle='#ffdd44';cx.font='bold 22px monospace';cx.fillText('RETRY',W/2,H*0.63+28);cx.textAlign='left';}
function hit(px2,py2,pw,ph,o){return px2<o.x+o.w&&px2+pw>o.x&&py2<o.y+o.h&&py2+ph>o.y;}
function update(){
  if(state!=='play')return;
  fr++;bgOff+=spd;dist+=spd*0.05;sc=Math.floor(dist*mult);
  if(fr%RINT===0&&spd<MSPD)spd=Math.min(MSPD,spd+RAMP);
  if(shield&&--shT<=0)shield=false;if(mag&&--mgT<=0)mag=false;
  if(slow&&--slT<=0){slow=false;spd=Math.min(MSPD,spd+2);}
  vy+=GRAV;py+=vy;if(py>=GY){py=GY;vy=0;}
  if(sliding){stmr--;if(stmr<=0)sliding=false;}
  sclk+=spd;
  if(sclk>=SBASE+Math.random()*SRAND){sclk=0;spawnObs();for(let i=0;i<3;i++)spawnCoin(W+80+i*32);if(Math.random()<0.15)spawnPup(W+200);}
  if(hintT>0)hintT--;
  const cs=slow?spd*0.5:spd;
  obs.forEach(o=>o.x-=cs);obs=obs.filter(o=>o.x>-200);
  coll.forEach(c=>{c.x-=cs;c.a++;if(mag){const dx=W*0.22-c.x,dy=GY-c.y,d2=Math.sqrt(dx*dx+dy*dy);if(d2<200){c.x+=dx*0.1;c.y+=dy*0.1;}}});
  coll=coll.filter(c=>c.x>-50&&!c.collected);
  pups.forEach(p=>{p.x-=cs;p.a++;});pups=pups.filter(p=>p.x>-50&&!p.collected);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;});parts=parts.filter(p=>p.life>0);
  ftxts.forEach(f=>{f.y+=f.vy;f.life--;});ftxts=ftxts.filter(f=>f.life>0);
  const PX=W*0.22,pw=sliding?50:28,ph=sliding?16:64,phY=sliding?py-16:py-64;
  if(!dead&&!inv){
    for(let o of obs){if(hit(PX-pw/2,phY,pw,ph,o)){if(shield){shield=false;inv=true;invT=60;spawnP(PX,py-30,'#00aaff',15);addFT(PX,py-60,'SHIELD!','#00aaff');}else{dead=true;spawnP(PX,py-30,'#ff6644',20);if(sc>best){best=sc;localStorage.setItem(LSK,best);}setTimeout(()=>{state='over';},800);}break;}}
  }
  if(inv&&--invT<=0)inv=false;
  coll.forEach(c=>{if(!c.collected&&Math.abs(W*0.22-c.x)<22&&Math.abs((py-32)-c.y)<32){c.collected=true;coins++;mult=Math.min(4,1+coins*0.1);addFT(c.x,c.y,'+1','#ffcc00');spawnP(c.x,c.y,'#ffcc00',4);}});
  pups.forEach(p=>{if(!p.collected&&Math.abs(W*0.22-p.x)<26&&Math.abs((py-32)-p.y)<32){p.collected=true;if(p.t==='shield'){shield=true;shT=300;}else if(p.t==='magnet'){mag=true;mgT=300;}else{slow=true;slT=200;spd=Math.max(2,spd-2);}addFT(p.x,p.y-20,p.t.toUpperCase()+'!',p.t==='shield'?'#00aaff':p.t==='magnet'?'#ff88ff':'#88ff88');}});
}
function draw(){
  drawBG();
  obs.forEach(o=>drawObs(o));
  coll.forEach(c=>{if(!c.collected)drawCoin(c);});
  pups.forEach(p=>{if(!p.collected)drawPup(p);});
  parts.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.s/2,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
  if(!dead||fr%4<2){
    if(shield){cx.strokeStyle='rgba(0,170,255,0.5)';cx.lineWidth=3;cx.beginPath();cx.arc(W*0.22,py-32,42,0,Math.PI*2);cx.stroke();}
    drawPlayer(W*0.22,py,sliding);
  }
  for(let o of obs){if(o.x-W*0.22<320&&o.x-W*0.22>60){cx.font='bold 16px monospace';cx.textAlign='center';if(o.type==='short'){cx.fillStyle='#88ff88';cx.fillText('JUMP ↑',W*0.22,GY-95);}else{cx.fillStyle='#ffaa44';cx.fillText('SLIDE ↓',W*0.22,GY-95);}cx.textAlign='left';}}
  ftxts.forEach(f=>{cx.globalAlpha=f.life/60;cx.font='bold 16px monospace';cx.fillStyle=f.col;cx.textAlign='center';cx.fillText(f.txt,f.x,f.y);cx.globalAlpha=1;cx.textAlign='left';});
  if(hintT>0&&state==='play'){cx.globalAlpha=Math.min(1,hintT/60);cx.fillStyle='rgba(0,20,0,0.6)';cx.fillRect(W/2-165,H*0.78,330,38);cx.fillStyle='#fff';cx.font='16px monospace';cx.textAlign='center';cx.fillText('↑/SPACE: JUMP   ↓/S: SLIDE',W/2,H*0.78+24);cx.globalAlpha=1;cx.textAlign='left';}
  drawHUD();
}
function loop(){update();if(state==='start')drawStart();else if(state==='over'){draw();drawOver();}else draw();requestAnimationFrame(loop);}
init();loop();
</script>
</body>
</html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Balloon Pop - ZenMagma</title>    <meta name="description" content="Pop balloons as they float up! Don\">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000a14;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b6b,#feca57);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #ff6b6b}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#ff6b6b,#feca57);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Time:<b id="tm"> 60</b>s</span><span class="hv">Combo:<b id="cb"> x1</b></span></div>
<canvas id="c" width="480" height="420"></canvas>
<p style="color:#aaa;font-size:.8em">Click balloons to pop them! Match colors for combo!</p></div>
<div id="ov"><div id="ob"><h2>Balloon Pop</h2><p>Click balloons to pop them! Pop same-colored balloons consecutively for combo multipliers. Don't miss!</p><button class="btn" onclick="go()">Pop!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=480,H=420;
const COLORS=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e91e63","#ff9800"];
let balloons=[],pops=[],score=0,combo=1,lastColor=null,timeLeft=60,timer,running=false;
function spawn(){const c=COLORS[Math.floor(Math.random()*COLORS.length)];balloons.push({x:Math.random()*(W-80)+40,y:H+40,r:24+Math.random()*14,color:c,spd:0.5+Math.random()*1.5});}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#000a14");g.addColorStop(1,"#001428");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  balloons.forEach(b=>{
    ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.3)";ctx.beginPath();ctx.ellipse(b.x-b.r*.3,b.y-b.r*.3,b.r*.25,b.r*.18,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,.3)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(b.x,b.y+b.r);ctx.quadraticCurveTo(b.x+10,b.y+b.r+20,b.x,b.y+b.r+35);ctx.stroke();
  });
  pops=pops.filter(p=>{p.r+=3;p.alpha-=0.06;ctx.globalAlpha=p.alpha;ctx.strokeStyle=p.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;return p.alpha>0;});
}
function update(){balloons.forEach(b=>b.y-=b.spd);balloons=balloons.filter(b=>{if(b.y+b.r<0){combo=1;document.getElementById("cb").textContent="x1";return false;}return true;});if(balloons.length<10&&Math.random()<0.05)spawn();}
cv.addEventListener("click",e=>{
  if(!running)return;
  const mx=e.offsetX,my=e.offsetY;let hit=false;
  balloons=balloons.filter(b=>{if(!hit&&Math.hypot(b.x-mx,b.y-my)<b.r){hit=true;pops.push({x:b.x,y:b.y,r:b.r,color:b.color,alpha:1});if(b.color===lastColor){combo++;} else{combo=1;}lastColor=b.color;score+=10*combo;document.getElementById("sc").textContent=score;document.getElementById("cb").textContent="x"+combo;return false;}return true;});
});
function tick(){document.getElementById("tm").textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;setTimeout(()=>window._showMod("Time up! Score: "+score),200);}else timeLeft--;}
function go(){document.getElementById("ov").style.display="none";running=true;for(let i=0;i<8;i++)spawn();timer=setInterval(tick,1000);(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  score=0;lives=3;level=1;
  try{document.getElementById('sc').textContent=0;}catch(e){}
  try{document.getElementById('lf').textContent=3;}catch(e){}
  try{document.getElementById('lv').textContent=1;}catch(e){}
  mkLevel&&mkLevel();
  running=true;
  (function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById(''_gmod'').style.display=''none''" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>

</body></html>

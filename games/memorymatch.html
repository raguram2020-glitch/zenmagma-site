<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Kids Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial;
            background: radial-gradient(ellipse at 30% 20%, #1a0a3a 0%, #050514 60%, #000008 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c, #ff9a3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .info {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .info-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            backdrop-filter: blur(6px);
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .card {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2a1a5e 0%, #1a0a3a 100%);
            border: 1px solid rgba(120,60,220,0.5);
            border-radius: 14px;
            font-size: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            color: rgba(160,120,255,0.8);
            font-weight: 900;
            font-size: 28px;
            user-select: none;
        }

        .card:hover {
            transform: scale(1.06) translateY(-2px);
            border-color: rgba(200,120,255,0.7);
            box-shadow: 0 6px 24px rgba(160,60,255,0.4);
        }

        .card.flipped {
            background: linear-gradient(135deg, #2a1060 0%, #1a0840 100%);
            border-color: rgba(200,100,255,0.7);
            color: #fff;
        }

        .card.matched {
            background: linear-gradient(135deg, #1a4a10 0%, #0a3008 100%);
            border-color: rgba(100,255,80,0.6);
            box-shadow: 0 0 20px rgba(100,255,80,0.3);
            cursor: default;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 12px 32px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #7b2ff7, #f107a3);
            color: white;
            box-shadow: 0 4px 16px rgba(160,40,255,0.4);
            transition: transform .15s, box-shadow .15s;
        }
        .controls button:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(160,40,255,0.6);}

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(160deg, #1a0a3a, #0a0818);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid rgba(200,100,255,0.4);
            text-align: center;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

        .modal-title {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(135deg,#f093fb,#f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-score {
            font-size: 42px;
            font-weight: bold;
            color: #ffd700;
            margin: 16px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }
        .modal-buttons button{
            padding: 12px 28px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #7b2ff7, #f107a3);
            color: white;
            box-shadow: 0 4px 16px rgba(160,40,255,0.4);
            transition: transform .15s;
        }
        .modal-buttons button:hover{transform:translateY(-2px);}
    </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
    <div class="container">
        <h1>🧠 MEMORY MATCH 🎮</h1>

        <div class="info">
            <div class="info-box">
                <div>Moves: <span id="moves">0</span></div>
            </div>
            <div class="info-box">
                <div>Matched: <span id="matched">0</span>/8</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="btn-primary" onclick="resetGame()">New Game</button>
            
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">You Won! 🎉</div>
            <div class="modal-score" id="finalMoves">0 Moves</div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="resetGame()">Play Again</button>
                
            </div>
        </div>
    </div>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let cards = [];
        let flipped = [];
        let matched = 0;
        let moves = 0;
        let canFlip = true;

        document.addEventListener('DOMContentLoaded', initGame);

        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            const pairs = [...emojis, ...emojis];
            cards = pairs.sort(() => Math.random() - 0.5);

            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '?';
                card.onclick = () => flipCard(card, index);
                gameBoard.appendChild(card);
            });

            flipped = [];
            matched = 0;
            moves = 0;
            updateDisplay();
        }

        function flipCard(card, index) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            card.innerHTML = cards[index];
            flipped.push({ card, index, emoji: cards[index] });

            if (flipped.length === 2) {
                canFlip = false;
                moves++;
                updateDisplay();

                setTimeout(() => {
                    if (flipped[0].emoji === flipped[1].emoji) {
                        flipped[0].card.classList.add('matched');
                        flipped[1].card.classList.add('matched');
                        matched++;
                        updateDisplay();

                        if (matched === 8) {
                            showWinModal();
                        }
                    } else {
                        flipped[0].card.classList.remove('flipped');
                        flipped[1].card.classList.remove('flipped');
                        flipped[0].card.innerHTML = '?';
                        flipped[1].card.innerHTML = '?';
                    }
                    flipped = [];
                    canFlip = true;
                }, 600);
            }
        }

        function updateDisplay() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matched').textContent = matched;
        }

        function showWinModal() {
            document.getElementById('finalMoves').textContent = moves + ' Moves';
            document.getElementById('winModal').classList.add('active');
        }

        function resetGame() {
            document.getElementById('winModal').classList.remove('active');
            initGame();
        }
    </script>
</body>
</html>

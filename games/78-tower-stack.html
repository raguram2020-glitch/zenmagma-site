<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tower Stack - ZenMagma</title>    <meta name="description" content="Stack blocks to build the tallest tower! Keep your balance or it all falls down.">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0800;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #f7971e}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Height:<b id="ht"> 0</b></span><span class="hv">Best:<b id="bt"> 0</b></span><span class="hv">Score:<b id="sc"> 0</b></span></div>
<canvas id="c" width="400" height="500"></canvas>
<p style="color:#aaa;font-size:.8em">Tap/click to drop the block! Align perfectly to stack higher!</p></div>
<div id="ov"><div id="ob"><h2>Tower Stack</h2><p>Click to drop the swinging block onto the stack. The more aligned it is, the taller your tower grows. Perfect drops give bonuses!</p><button class="btn" onclick="go()">Stack!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=400,H=500;
let stack,moving,score,height,best,running=false,slowUntil=0,powerMsg='';
function init(){stack=[{x:W/2-60,w:120,y:H-40,color:"#e74c3c"}];moving={x:0,w:120,spd:4,dir:1,y:H-80};score=0;height=0;best=parseInt(localStorage.getItem("stackbest")||"0");document.getElementById("bt").textContent=best;}
function drop(){
  const top=stack[stack.length-1];const overlap_x=Math.max(moving.x,top.x);const overlap_end=Math.min(moving.x+moving.w,top.x+top.w);const overlap=overlap_end-overlap_x;
  if(overlap<=0){running=false;if(height>best){best=height;localStorage.setItem("stackbest",best);document.getElementById("bt").textContent=best;}setTimeout(()=>window._showMod("Tower collapsed at height "+height+"!"),200);return;}
  const colors=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c"];
  stack.push({x:overlap_x,w:overlap,y:moving.y,color:colors[stack.length%colors.length]});
  const perfect=Math.abs(overlap-top.w)<4;score+=perfect?20:Math.round(overlap/top.w*10);height++;
  document.getElementById("sc").textContent=score;document.getElementById("ht").textContent=height;
  // Power-up every 10 blocks
  if(height>0&&height%10===0){const pu=Math.random()<0.5?'slow':'wide';if(pu==='slow'){slowUntil=height+15;powerMsg='⏱ SLOW-MO!';}else{moving.w=Math.min(W*0.6,moving.w+20);powerMsg='📏 WIDTH BOOST!';}setTimeout(()=>powerMsg='',2000);}
  // Scroll view up
  if(stack.length>8){stack.forEach(s=>s.y+=40);moving.y+=40;}
  moving={x:Math.random()<.5?-120:W,w:overlap,spd:Math.min(6,4+height*.15),dir:Math.random()<.5?1:-1,y:moving.y-40};
}
cv.addEventListener("click",()=>{if(running)drop();});
cv.addEventListener("touchstart",e=>{e.preventDefault();if(running)drop();},{passive:false});
function update(){const spd=height<slowUntil?moving.spd*0.5:moving.spd;moving.x+=spd*moving.dir;if(moving.x+moving.w>W+10||moving.x<-10)moving.dir*=-1;}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#0a0800");g.addColorStop(1,"#1a1400");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  stack.forEach(s=>{ctx.fillStyle=s.color;ctx.fillRect(s.x,s.y,s.w,36);ctx.fillStyle="rgba(255,255,255,.2)";ctx.fillRect(s.x,s.y,s.w,8);});
  if(powerMsg){ctx.fillStyle="#ffd200";ctx.font="bold 18px sans-serif";ctx.textAlign="center";ctx.fillText(powerMsg,W/2,30);}
  ctx.fillStyle="#f1c40f";ctx.fillRect(moving.x,moving.y,moving.w,36);ctx.fillStyle="rgba(255,255,255,.3)";ctx.fillRect(moving.x,moving.y,moving.w,8);
  // Danger line — always visible so player can gauge risk
  ctx.fillStyle="rgba(255,0,0,.4)";ctx.fillRect(0,moving.y+36,W,2);
  ctx.fillStyle="rgba(255,0,0,.15)";ctx.fillRect(0,moving.y+36,W,H-(moving.y+36));
}
function go(){document.getElementById("ov").style.display="none";running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script><div id="_gmod" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;align-items:center;justify-content:center;"><div style="background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:340px;width:90%;border:2px solid rgba(255,255,255,.2)"><div style="font-size:52px;margin-bottom:10px">🎮</div><div id="_gmod_t" style="font-size:1.6em;font-weight:800;color:#fff;margin-bottom:10px">Game Over</div><div id="_gmod_m" style="color:#aaa;margin-bottom:24px;font-size:1em;line-height:1.5"></div><button onclick="document.getElementById('_gmod').style.display='none'" style="padding:12px 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1em;font-weight:700;cursor:pointer">OK</button></div></div>
<script>function _showMod(msg){var m=document.getElementById("_gmod");if(!m)return;document.getElementById("_gmod_m").textContent=msg;m.style.display="flex";}</script>

</body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Snake Reborn - ZenMagma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#001100;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em;display:inline-block;margin:3px}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#2ecc71,#1e8449);color:#fff;transition:.2s;margin:3px}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;border:2px solid #2ecc71}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#2ecc71,#1e8449);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<div style="text-align:center"><div style="padding:6px"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Length:<b id="ln"> 3</b></span><span class="hv">Level:<b id="lv"> 1</b></span></div>
<canvas id="c" width="400" height="400"></canvas>
<p style="color:#aaa;font-size:.8em">Arrow keys / WASD to move. Eat food, avoid walls!</p></div>
<div id="ov"><div id="ob"><h2>Snake Reborn</h2><p>Classic Snake with portals, power-ups and multiplying food! Eat to grow, use portals to teleport, collect power-ups!</p><button class="btn" onclick="go()">Slither!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),N=20,SZ=20;
let snake,dir,ndir,foods,portals,powerups,score,level,frame,spd,running;
const keys={};
function init(){snake=[[10,10],[9,10],[8,10]];dir=[1,0];ndir=[1,0];foods=[];portals=[];powerups=[];score=0;level=1;frame=0;spd=8;for(let i=0;i<3;i++)spawnFood();spawnPortals();}
function spawnFood(){let x,y;do{x=Math.floor(Math.random()*N);y=Math.floor(Math.random()*N);}while(snake.some(s=>s[0]===x&&s[1]===y));const special=Math.random()<0.15;foods.push({x,y,special,color:special?"#f1c40f":"#e74c3c",pts:special?50:10});}
function spawnPortals(){portals=[[2,2],[N-3,N-3]];}
document.addEventListener("keydown",e=>{const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};if(m[e.key]){const nd=m[e.key];if(nd[0]!==-dir[0]||nd[1]!==-dir[1])ndir=nd;e.preventDefault();}});
let lastTouch=null;cv.addEventListener("touchstart",e=>{lastTouch=[e.touches[0].clientX,e.touches[0].clientY];},{passive:true});
cv.addEventListener("touchend",e=>{if(!lastTouch)return;const dx=e.changedTouches[0].clientX-lastTouch[0],dy=e.changedTouches[0].clientY-lastTouch[1];if(Math.abs(dx)>Math.abs(dy)){ndir=dx>0?[1,0]:[-1,0];}else{ndir=dy>0?[0,1]:[0,-1];}},{passive:true});
function update(){
  frame++;if(frame%(Math.max(2,spd-level))!==0)return;
  dir=ndir;const head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];
  // Portal
  const portal=portals.find(p=>p[0]===head[0]&&p[1]===head[1]);
  if(portal){const other=portals.find(p=>p!==portal);head[0]=other[0];head[1]=other[1];}
  // Wall wrap
  head[0]=(head[0]+N)%N;head[1]=(head[1]+N)%N;
  // Self collision
  if(snake.some(s=>s[0]===head[0]&&s[1]===head[1])){running=false;showGameOver("Score: "+score);return;}
  snake.unshift(head);
  // Food
  const fi=foods.findIndex(f=>f.x===head[0]&&f.y===head[1]);
  if(fi>=0){const f=foods[fi];score+=f.pts*level;foods.splice(fi,1);spawnFood();if(f.special)for(let i=0;i<2;i++)spawnFood();document.getElementById("sc").textContent=score;document.getElementById("ln").textContent=snake.length;if(score>level*200){level++;document.getElementById("lv").textContent=level;}}
  else snake.pop();
}
function draw(){
  ctx.fillStyle="#001100";ctx.fillRect(0,0,N*SZ,N*SZ);
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){ctx.strokeStyle="rgba(0,80,0,.2)";ctx.strokeRect(i*SZ,j*SZ,SZ,SZ);}
  portals.forEach(p=>{ctx.fillStyle="rgba(102,126,234,.4)";ctx.beginPath();ctx.arc(p[0]*SZ+SZ/2,p[1]*SZ+SZ/2,SZ*.6,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#667eea";ctx.lineWidth=3;ctx.stroke();});
  foods.forEach(f=>{ctx.fillStyle=f.color;ctx.beginPath();ctx.arc(f.x*SZ+SZ/2,f.y*SZ+SZ/2,SZ*.4,0,Math.PI*2);ctx.fill();if(f.special){ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();}});
  snake.forEach(([x,y],i)=>{const frac=i/snake.length;ctx.fillStyle=`hsl(${140-frac*40},70%,${50-frac*15}%)`;ctx.fillRect(x*SZ+1,y*SZ+1,SZ-2,SZ-2);if(i===0){ctx.fillStyle="#fff";ctx.fillRect(x*SZ+4,y*SZ+4,3,3);ctx.fillRect(x*SZ+SZ-7,y*SZ+4,3,3);}});
}
function go(){document.getElementById("ov").style.display="none";running=true;init();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script></body></html>

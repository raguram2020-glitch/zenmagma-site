<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Snake Reborn - ZenMagma</title>
    <meta name="description" content="The classic snake game reimagined! Eat food, grow longer, avoid yourself.">
    <link rel="canonical" href="https://zenmagma.com/games/98-snake-reborn">
    <meta property="og:title" content="Snake Reborn - ZenMagma">
    <meta property="og:description" content="The classic snake game reimagined! Eat food, grow longer, avoid yourself.">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://zenmagma.com/games/98-snake-reborn">
    <meta property="og:image" content="https://zenmagma.com/assets/thumbs/snake-reborn.jpg">
    <meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030810;font-family:'Segoe UI',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none}
#wrap{position:relative;display:inline-block}
canvas{display:block;border-radius:16px;box-shadow:0 0 0 1px rgba(0,230,118,.12),0 8px 60px rgba(0,0,0,.8),0 0 80px rgba(0,230,118,.06)}
#hud{display:flex;gap:10px;align-items:center;padding:0 0 10px;flex-wrap:wrap;justify-content:center}
.hv{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);padding:5px 16px;border-radius:20px;font-weight:700;font-size:.82em;letter-spacing:.5px;color:#a7f3c8}
.hv b{color:#00e676;font-size:1.1em}
.btn{padding:10px 24px;border-radius:25px;border:none;font-size:.88em;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#00e676,#00b248);color:#000;transition:.2s;letter-spacing:.5px}
.btn:hover{transform:scale(1.06);box-shadow:0 4px 20px rgba(0,230,118,.5)}
#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(3,8,16,.92);z-index:50;border-radius:16px;backdrop-filter:blur(8px)}
#ob{text-align:center;max-width:340px;width:90%;padding:0 16px}
.ov-icon{font-size:64px;margin-bottom:12px;filter:drop-shadow(0 0 20px #00e676aa)}
.ov-title{font-size:2em;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#00e676,#00b248);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.ov-sub{color:rgba(255,255,255,.5);margin-bottom:8px;line-height:1.6;font-size:.88em}
.ov-score{font-size:2.4em;font-weight:900;color:#00e676;margin:12px 0;font-family:'Segoe UI',sans-serif;text-shadow:0 0 20px rgba(0,230,118,.6)}
.ov-feats{display:flex;gap:12px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.ov-feat{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:8px 14px;font-size:.8em;color:#a7f3c8}
.ov-feat b{display:block;color:#00e676;font-size:1.2em;margin-bottom:2px}
</style></head>
<body>
<div id="hud">
  <span class="hv">⭐ Score:<b id="sc"> 0</b></span>
  <span class="hv">🐍 Length:<b id="ln"> 3</b></span>
  <span class="hv">⚡ Level:<b id="lv"> 1</b></span>
</div>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ov">
  <div id="ob">
    <div class="ov-icon">🐍</div>
    <div class="ov-title">SNAKE REBORN</div>
    <div class="ov-sub">Classic Snake with neon portals, power-ups and multiplying food!<br>Eat to grow. Use portals to teleport. Don't bite yourself!</div>
    <div class="ov-feats">
      <div class="ov-feat"><b>🌀</b>Portals</div>
      <div class="ov-feat"><b>⚡</b>Power-ups</div>
      <div class="ov-feat"><b>🌟</b>Special Food</div>
    </div>
    <button class="btn" onclick="go()">▶  SLITHER!</button>
  </div>
</div>
</div>
<script>
/* ── AUDIO ── */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(f,d,v=.12,t='sine',f2=0){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;
  o.frequency.setValueAtTime(f,a.currentTime);
  if(f2)o.frequency.linearRampToValueAtTime(f2,a.currentTime+d);
  g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const SND={
  eat:()=>{beep(660,.06,.1,'sine',780);},
  special:()=>{beep(880,.08,.14,'sine');setTimeout(()=>beep(1100,.08,.12),80);setTimeout(()=>beep(1320,.1,.1),160);},
  portal:()=>{beep(400,.18,.12,'sine',200);},
  die:()=>{beep(120,.4,.22,'sawtooth');setTimeout(()=>beep(80,.5,.2,'sawtooth'),180);},
  level:()=>{beep(660,.06,.1);setTimeout(()=>beep(880,.06,.1),80);setTimeout(()=>beep(1100,.1,.12),160);}
};
document.addEventListener('pointerdown',()=>ac(),{once:true});

/* ── CANVAS SETUP ── */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const N=20,SZ=22;
cv.width=N*SZ;cv.height=N*SZ;

/* ── STATE ── */
let snake,dir,ndir,foods,portals,powerups,particles,score,level,frame,spd,running,highScore=0,shakeFrame=0;

/* ── INIT ── */
function init(){
  snake=[[10,10],[9,10],[8,10]];dir=[1,0];ndir=[1,0];
  foods=[];portals=[];powerups=[];particles=[];
  score=0;level=1;frame=0;spd=8;running=false;
  for(let i=0;i<2;i++)spawnFood();
  spawnPortals();
  updHUD();
}

function spawnFood(){
  let x,y,attempts=0;
  do{x=Math.floor(Math.random()*N);y=Math.floor(Math.random()*N);attempts++;}
  while(attempts<100&&(snake.some(s=>s[0]===x&&s[1]===y)||foods.some(f=>f.x===x&&f.y===y)));
  const special=Math.random()<.15,power=Math.random()<.08;
  foods.push({x,y,special,power,pts:special?50:10,anim:Math.random()*Math.PI*2});
}
function spawnPortals(){portals=[[2,2],[N-3,N-3]];}
function updHUD(){
  document.getElementById('sc').textContent=score.toLocaleString();
  document.getElementById('ln').textContent=snake.length;
  document.getElementById('lv').textContent=level;
}

/* ── CONTROLS ── */
const KM={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
document.addEventListener('keydown',e=>{
  if(KM[e.key]){const nd=KM[e.key];if(nd[0]!==(-dir[0])||nd[1]!==(-dir[1]))ndir=nd;e.preventDefault();}
});
let tx=null,ty=null;
cv.addEventListener('touchstart',e=>{ac();const t=e.touches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  if(tx===null)return;const t=e.changedTouches[0];
  const dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){ndir=dx>0?[1,0]:[-1,0];}else{ndir=dy>0?[0,1]:[0,-1];}
},{passive:true});

/* ── PARTICLES ── */
function burst(x,y,col,n=8){
  for(let i=0;i<n;i++)particles.push({
    x:x*SZ+SZ/2,y:y*SZ+SZ/2,
    vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,
    life:1,col,r:2+Math.random()*3
  });
}

/* ── UPDATE ── */
function update(){
  frame++;
  // advance particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=.04;return p.life>0;});
  // food animation
  foods.forEach(f=>f.anim+=.07);
  // only move snake every Nth frame (integer speed: level1=7fps, level6+=2fps)
  if(frame%Math.max(2,8-level)!==0)return;
  dir=ndir;
  const head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];
  // Portal
  const portal=portals.find(p=>p[0]===head[0]&&p[1]===head[1]);
  if(portal){const other=portals.find(p=>p!==portal);head[0]=other[0];head[1]=other[1];SND.portal();burst(other[0],other[1],'rgba(102,126,234,.9)',12);}
  // Wall wrap
  head[0]=(head[0]+N)%N;head[1]=(head[1]+N)%N;
  // Self collision
  if(snake.some(s=>s[0]===head[0]&&s[1]===head[1])){
    running=false;shakeFrame=18;SND.die();
    highScore=Math.max(highScore,score);
    setTimeout(()=>showDead(),400);
    return;
  }
  snake.unshift(head);
  // Food check
  const fi=foods.findIndex(f=>f.x===head[0]&&f.y===head[1]);
  if(fi>=0){
    const f=foods[fi];const gained=f.pts*level;score+=gained;
    burst(f.x,f.y,f.special?'rgba(255,215,0,.9)':'rgba(0,230,118,.9)',f.special?14:8);
    foods.splice(fi,1);
    if(f.special){SND.special();for(let i=0;i<2;i++)spawnFood();}
    else SND.eat();
    spawnFood();
    if(score>=level*220){level++;SND.level();burst(head[0],head[1],'rgba(255,215,0,.9)',20);}
    updHUD();
  } else snake.pop();
  if(shakeFrame>0)shakeFrame--;
}

/* ── DRAW BACKGROUND ── */
function drawBg(){
  // deep space gradient
  const bg=ctx.createRadialGradient(N*SZ/2,N*SZ/2,0,N*SZ/2,N*SZ/2,N*SZ*.8);
  bg.addColorStop(0,'#050f14');bg.addColorStop(1,'#020609');
  ctx.fillStyle=bg;ctx.fillRect(0,0,N*SZ,N*SZ);
  // neon grid
  ctx.strokeStyle='rgba(0,230,118,.06)';ctx.lineWidth=.5;
  for(let i=0;i<=N;i++){
    ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,N*SZ);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(N*SZ,i*SZ);ctx.stroke();
  }
  // corner accent glow
  const cg=ctx.createRadialGradient(0,0,0,0,0,N*SZ*.5);
  cg.addColorStop(0,'rgba(0,230,118,.025)');cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.fillRect(0,0,N*SZ,N*SZ);
}

/* ── DRAW PORTALS ── */
function drawPortals(){
  portals.forEach((p,i)=>{
    const cx=p[0]*SZ+SZ/2,cy=p[1]*SZ+SZ/2,R=SZ*.7;
    const hue=i===0?240:270;
    // glow ring
    ctx.shadowColor=`hsl(${hue},80%,65%)`;ctx.shadowBlur=16;
    ctx.strokeStyle=`hsla(${hue},80%,65%,.8)`;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
    // spinning spokes
    ctx.lineWidth=1.5;
    for(let s=0;s<6;s++){
      const a=frame*.06+s*Math.PI/3;
      ctx.globalAlpha=.5+Math.sin(frame*.1+s)*.3;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R*.7,cy+Math.sin(a)*R*.7);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // label
    ctx.font='bold 8px sans-serif';ctx.fillStyle=`hsla(${hue},80%,75%,.7)`;ctx.textAlign='center';
    ctx.fillText('PORTAL',cx,cy+R+10);ctx.textAlign='left';
  });
}

/* ── DRAW FOOD ── */
function drawFoods(){
  foods.forEach(f=>{
    const cx=f.x*SZ+SZ/2,cy=f.y*SZ+SZ/2,pulse=Math.sin(f.anim)*.2;
    const r=SZ*.38*(1+pulse*.2);
    if(f.special){
      // golden star food
      ctx.shadowColor='rgba(255,215,0,.8)';ctx.shadowBlur=18;
      ctx.fillStyle=`rgba(255,215,0,${.85+pulse*.1})`;
      drawStar(cx,cy,r*.8,r*.4);
      ctx.shadowBlur=0;
      // halo
      ctx.strokeStyle=`rgba(255,215,0,${.3+pulse*.2})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(cx,cy,r*1.6,0,Math.PI*2);ctx.stroke();
    } else if(f.power){
      // power-up bolt
      ctx.shadowColor='rgba(0,229,255,.8)';ctx.shadowBlur=16;
      ctx.fillStyle='rgba(0,229,255,.9)';
      ctx.font=`bold ${Math.round(r*2)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⚡',cx,cy);ctx.textAlign='left';ctx.textBaseline='alphabetic';
      ctx.shadowBlur=0;
    } else {
      // regular food — glowing orb
      const grad=ctx.createRadialGradient(cx-r*.3,cy-r*.3,0,cx,cy,r);
      grad.addColorStop(0,'#a7f3c8');grad.addColorStop(.5,'#00e676');grad.addColorStop(1,'#00b248');
      ctx.shadowColor='rgba(0,230,118,.7)';ctx.shadowBlur=14;
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // outer glow ring
      ctx.strokeStyle=`rgba(0,230,118,${.2+pulse*.25})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(cx,cy,r*1.55,0,Math.PI*2);ctx.stroke();
    }
  });
}

function drawStar(cx,cy,ro,ri){
  const n=5;ctx.beginPath();
  for(let i=0;i<n*2;i++){
    const r=i%2===0?ro:ri;const a=i*Math.PI/n-Math.PI/2;
    i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }ctx.closePath();ctx.fill();
}

/* ── DRAW SNAKE ── */
function drawSnake(){
  snake.forEach(([x,y],i)=>{
    const frac=i/snake.length;
    const cx=x*SZ+SZ/2,cy=y*SZ+SZ/2;
    const segR=SZ*.44-frac*SZ*.1;
    if(i===0){
      // head with gradient and glow
      ctx.shadowColor='rgba(0,230,118,.9)';ctx.shadowBlur=18;
      const hg=ctx.createRadialGradient(cx-2,cy-2,1,cx,cy,segR);
      hg.addColorStop(0,'#b2ffd6');hg.addColorStop(.5,'#00e676');hg.addColorStop(1,'#009e45');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,segR,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // eyes based on direction
      const ex=dir[0],ey=dir[1];
      const eyeR=2.2,eyeOff=segR*.48;
      const perp=[-ey*.4,ex*.4];
      [[ex*eyeOff+perp[0]*eyeOff,ey*eyeOff+perp[1]*eyeOff],[ex*eyeOff-perp[0]*eyeOff,ey*eyeOff-perp[1]*eyeOff]].forEach(([ox,oy])=>{
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx+ox,cy+oy,eyeR,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(cx+ox+ex*.6,cy+oy+ey*.6,eyeR*.55,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(cx+ox+ex*.3,cy+oy+ey*.3,eyeR*.3,0,Math.PI*2);ctx.fill();
      });
      // tongue flicker
      if(Math.floor(frame*.15)%3===0){
        ctx.strokeStyle='#ff4444';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(cx+ex*segR,cy+ey*segR);
        ctx.lineTo(cx+ex*(segR+5),cy+ey*(segR+5));
        const tp=[cx+ex*(segR+8)+ey*3,cy+ey*(segR+8)+ex*3];
        const tp2=[cx+ex*(segR+8)-ey*3,cy+ey*(segR+8)-ex*3];
        ctx.stroke();ctx.beginPath();ctx.moveTo(cx+ex*(segR+5),cy+ey*(segR+5));ctx.lineTo(tp[0],tp[1]);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx+ex*(segR+5),cy+ey*(segR+5));ctx.lineTo(tp2[0],tp2[1]);ctx.stroke();
      }
    } else {
      // body segment with gradient fade
      const hue=140-frac*20;const lightness=50-frac*22;
      ctx.shadowColor=`hsla(${hue},70%,${lightness}%,.5)`;
      ctx.shadowBlur=i===1?12:6;
      const sg=ctx.createRadialGradient(cx-1,cy-1,0,cx,cy,segR);
      sg.addColorStop(0,`hsl(${hue+10},70%,${lightness+15}%)`);
      sg.addColorStop(1,`hsl(${hue},65%,${lightness}%)`);
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,segR*(1-frac*.15),0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // scale pattern every 3 segments
      if(i%3===0&&i>0){
        ctx.strokeStyle=`hsla(${hue+15},60%,${lightness+30}%,.25)`;ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(cx,cy,segR*.55,0,Math.PI*2);ctx.stroke();
      }
    }
  });
}

/* ── DRAW PARTICLES ── */
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*.8;
    ctx.shadowColor=p.col;ctx.shadowBlur=8;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

/* ── DRAW ── */
function draw(){
  if(shakeFrame>0){
    ctx.save();
    const sm=shakeFrame*.4;
    ctx.translate((Math.random()-.5)*sm,(Math.random()-.5)*sm);
  }
  drawBg();
  drawPortals();
  drawFoods();
  drawSnake();
  drawParticles();
  // level indicator
  if(level>1){
    ctx.font='bold 11px Segoe UI';ctx.fillStyle='rgba(0,230,118,.3)';ctx.textAlign='right';
    ctx.fillText('LEVEL '+level,N*SZ-6,N*SZ-6);ctx.textAlign='left';
  }
  if(shakeFrame>0)ctx.restore();
}

/* ── SCREENS ── */
function showDead(){
  const ov=document.getElementById('ov');
  const ob=document.getElementById('ob');
  ob.innerHTML=`
    <div class="ov-icon">💀</div>
    <div class="ov-title">GAME OVER</div>
    <div class="ov-score">${score.toLocaleString()}</div>
    <div class="ov-feats">
      <div class="ov-feat"><b>${snake.length}</b>Length</div>
      <div class="ov-feat"><b>${level}</b>Level</div>
      <div class="ov-feat"><b>${highScore.toLocaleString()}</b>Best</div>
    </div>
    <button class="btn" onclick="go()">▶  PLAY AGAIN</button>`;
  ov.style.display='flex';
}

/* ── GAME LOOP ── */
function go(){
  document.getElementById('ov').style.display='none';
  init();running=true;
  (function lp(){
    if(!running){draw();return;}
    update();draw();requestAnimationFrame(lp);
  })();
}

init();
</script>    <script src="../js/mobile-controls.js" defer></script>
</body></html>

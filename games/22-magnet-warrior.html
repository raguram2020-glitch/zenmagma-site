<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#00000a;font-family:"Segoe UI",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}canvas{border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);max-width:100vw}#hud{display:flex;gap:12px;align-items:center;padding:8px 0;flex-wrap:wrap;justify-content:center}.hv{background:rgba(255,255,255,.12);padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85em}.btn{padding:9px 20px;border-radius:24px;border:none;font-size:.85em;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ee9ca7,#ffdde1);color:#fff;transition:.2s}.btn:hover{transform:scale(1.05)}#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:50}#ob{background:#16213e;border-radius:20px;padding:36px;text-align:center;max-width:360px;width:90%;border:2px solid #ee9ca7}#ob h2{font-size:1.9em;margin-bottom:8px;background:linear-gradient(135deg,#ee9ca7,#ffdde1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#ob p{color:#aaa;margin-bottom:20px;line-height:1.5;font-size:.9em}#hm{position:fixed;top:10px;left:10px;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:.75em;z-index:100}</style></head><body>
<a href="../index.html" style="position:fixed;top:12px;left:14px;z-index:9999;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:700;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← Home</a>

<div id="hud"><span class="hv">Score:<b id="sc"> 0</b></span><span class="hv">Lives:<b id="lf"> 3</b></span><span class="hv">Polarity:<b id="pl"> +</b></span><span class="hv">Level:<b id="lv"> 1</b></span><button class="btn" onclick="flip()">Flip Polarity</button></div>
<canvas id="c" width="420" height="480"></canvas>
<p style="text-align:center;color:#aaa;font-size:.8em">Move: arrow keys | Space/click: flip polarity</p>
<div id="ov"><div id="ob"><h2>Magnet Warrior</h2><p>Flip your polarity to attract friendly bullets and repel enemy shots! Deflect enemies' projectiles back at them!</p><button class="btn" onclick="go()">Play!</button></div></div>
<script>

// === Sound Engine ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq=440,dur=0.08,vol=0.15,type='square'){
  try{const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);}catch(e){}
}
function sndScore(){beep(660,0.07,0.12,'square');}
function sndHit(){beep(180,0.15,0.18,'sawtooth');}
function sndLose(){beep(120,0.4,0.2,'sawtooth');setTimeout(()=>beep(80,0.4,0.2,'sawtooth'),200);}
function sndWin(){beep(880,0.1,0.15);setTimeout(()=>beep(1100,0.1,0.15),120);setTimeout(()=>beep(1320,0.2,0.15),240);}
function sndJump(){beep(300,0.08,0.1,'sine');}
function sndCollect(){beep(780,0.06,0.12,'sine');}
// Resume AudioContext on first interaction
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});

function showGameOver(msg){
  sndLose();
  const el=document.getElementById('goov');
  if(el){document.getElementById('gomsg').textContent=msg||'';el.style.display='flex';}
}
function showWin(msg){
  sndWin();
  const el=document.getElementById('winov');
  if(el){document.getElementById('winmsg').textContent=msg||'';el.style.display='flex';}
}

const cv=document.getElementById("c"),ctx=cv.getContext("2d"),W=420,H=480;
let player,enemies,bullets,particles,score,lives,level,polarity,frame,running;
const keys={};
function init(){player={x:W/2,y:H-60,r:16,spd:4};enemies=[];bullets=[];particles=[];score=0;lives=3;level=1;polarity=1;frame=0;}
function spawnEnemies(){for(let i=0;i<3+level;i++){enemies.push({x:50+i*(W-100)/(2+level),y:60+Math.sin(i)*30,hp:2,shoot:60+i*30,dx:level*.5*(i%2===0?1:-1)});}}
function flip(){polarity*=-1;document.getElementById("pl").textContent=polarity>0?"+":"-";}
document.addEventListener("keydown",e=>{keys[e.key]=true;if(e.key===" ")flip();});
document.addEventListener("keyup",e=>keys[e.key]=false);
cv.addEventListener("click",flip);
function update(){
  frame++;
  if(keys["ArrowLeft"])player.x=Math.max(player.r,player.x-player.spd);
  if(keys["ArrowRight"])player.x=Math.min(W-player.r,player.x+player.spd);
  if(keys["ArrowUp"])player.y=Math.max(player.r,player.y-player.spd);
  if(keys["ArrowDown"])player.y=Math.min(H-player.r,player.y+player.spd);
  enemies.forEach(e=>{e.x+=e.dx;if(e.x<20||e.x>W-20)e.dx*=-1;e.shoot--;if(e.shoot<=0){bullets.push({x:e.x,y:e.y+10,dx:0,dy:3,pol:-1,enemy:true});e.shoot=60+Math.random()*40;}});
  bullets=bullets.filter(b=>{
    // Polarity effect - attract same, repel different
    const dx=player.x-b.x,dy=player.y-b.y,dist=Math.hypot(dx,dy);
    if(dist<120){const force=0.08/dist*40;if(b.pol===polarity){b.dx+=dx/dist*force;b.dy+=dy/dist*force;}else{b.dx-=dx/dist*force;b.dy-=dy/dist*force;}}
    b.x+=b.dx;b.y+=b.dy;
    // Check hit enemies (if deflected)
    enemies=enemies.filter(e=>{if(b.pol===polarity&&Math.hypot(b.x-e.x,b.y-e.y)<18){e.hp--;for(let i=0;i<6;i++)particles.push({x:e.x,y:e.y,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:25,color:"#ee9ca7"});if(e.hp<=0){score+=20*level;document.getElementById("sc").textContent=score;}return e.hp>0;}return true;});
    // Hit player
    if(b.pol!==polarity&&Math.hypot(b.x-player.x,b.y-player.y)<player.r+6){lives--;document.getElementById("lf").textContent=lives;if(lives<=0){running=false;showGameOver("Score: "+score);}return false;}
    return b.x>0&&b.x<W&&b.y>0&&b.y<H;
  });
  particles=particles.filter(p=>{p.x+=p.dx;p.y+=p.dy;p.life--;return p.life>0;});
  if(enemies.length===0){level++;document.getElementById("lv").textContent=level;spawnEnemies();}
}
function draw(){
  ctx.fillStyle="#00000a";ctx.fillRect(0,0,W,H);
  // Stars bg
  for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,255,255,${.1+Math.sin(frame*.05+i)*.05})`;ctx.fillRect((i*137)%W,(i*97)%H,1,1);}
  enemies.forEach(e=>{ctx.fillStyle="#c0392b";ctx.beginPath();ctx.arc(e.x,e.y,16,0,Math.PI*2);ctx.fill();ctx.fillStyle="#e74c3c";ctx.font="20px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("👾",e.x,e.y);});
  bullets.forEach(b=>{ctx.fillStyle=b.pol>0?"#3498db":"#e74c3c";ctx.beginPath();ctx.arc(b.x,b.y,6,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();});
  // Player
  ctx.fillStyle=polarity>0?"#3498db":"#e74c3c";ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle="#fff";ctx.font="bold 18px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(polarity>0?"N":"S",player.x,player.y);
  particles.forEach(p=>{ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);ctx.globalAlpha=1;});
}
function go(){document.getElementById("ov").style.display="none";running=true;spawnEnemies();(function lp(){if(!running)return;update();draw();requestAnimationFrame(lp);})();}
init();

function doRestart(){
  const g=document.getElementById('goov');if(g)g.style.display='none';
  const w=document.getElementById('winov');if(w)w.style.display='none';
  init();
}
</script>    <script src="../js/mobile-controls.js" defer></script>
</body></html>
